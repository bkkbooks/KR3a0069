body:
  text: 交道七韓詩外傳九孔子出遊少原之野有婦人中澤而哭其音甚哀孔子怪之使弟子問焉曰夫人何哭之哀婦人對曰向者刈蓍薪亡吾蓍簪吾是以哀也弟子曰刈蓍薪而亡蓍簪有何悲焉婦人曰非傷亡簪也蓋不忘故也韓詩外傳九子路曰人善我我亦善之人不善我我不善之子貢曰人善我我亦善之人不善我我則引之進退而已耳顏回曰人善我我亦善之人不善我我亦善之三子所持各異問於夫子夫子曰由之所言蠻貊之言也賜之所言朋友之言也回之所言親屬之言也韓詩外傳十顏淵問於孔子曰淵願貧如富賤如貴無勇而威與士交通終身無患難亦且可乎孔子曰善哉回也夫貧而如富其知足而無欲也賤而如貴其讓而有禮也無勇而威其恭敬而不失於人也終身無患難其擇言而出之也若回者其至乎雖上古聖人亦如此而已荀子王霸孔子曰審吾所以適人適人之所以來我也荀子堯問子貢問於孔子曰賜為人下而未知也孔子曰為人下者其猶土也深抇之而得甘泉焉樹之而五穀蕃焉草木殖焉禽獸育焉生則立焉死則入焉多其功而不息為人下者其猶土也韓詩外傳七孔子間居子貢侍坐請問為人下之道奈何孔子曰善哉爾之問也為人下其猶土乎子貢未達孔子曰夫土者掘之得甘泉焉樹之得五穀焉草木植焉鳥獸魚鱉遂焉生則立焉死則入焉多功不言賞世不絶故曰能為下者其惟土乎子貢曰賜雖不敏請事斯語說苑臣術子貢問孔子曰賜為人下而未知所以為人下之道也孔子曰為人下者其猶土乎種之則五穀生焉掘之則甘泉出焉草木植焉禽獸育焉生人立焉死人入焉多其功而不言為人下者其猶土乎群書治要尸子明堂孔子曰大哉河海乎下之也夫河下天下之川故廣人下天下之士故大群書治要尸子處道仲尼曰得之身者得之民失之身者失之民不出於戶而知天下不下其堂而治四方知反之於己者也說苑敬慎孔子見羅者其所得者皆黃口也孔子曰黃口盡得大爵獨不得何也羅者對曰黃口從大爵者不得大爵從黃口者可得孔子顧謂弟子曰君子慎所從不得其人則有羅網之患說苑雜言曾子曰吾聞夫子之三言未之能行也夫子見人之一善而忘其百非是夫子之易事也夫子見人有善若己有之是夫子之不爭也聞善必躬親行之然後道之是夫子之能勞也夫子之能勞也夫子之不爭也夫子之易事也吾學夫子之三言而未能行說苑雜言孔子將行無蓋弟子曰子夏有蓋可以行孔子曰商之為人也甚短於財吾聞與人交者推其長者違其短者故能久長矣說苑雜言子路行辭於仲尼曰敢問新交取親若何言寡可行若何長為善士而無犯若何仲尼曰新交取親其忠乎言寡可行其信乎長為善士而無犯其禮乎說苑雜言孔子曰以富貴為人下者何人不與以富貴敬愛人者何人不親衆言不逆可謂知言矣衆向之可謂知時矣說苑雜言孔子曰夫富而能富人者欲貧而不可得也貴而能貴人者欲賤而不可得也達而能達人者欲窮而不可得也說苑雜言仲尼曰非其地而樹之不生也非其人而語之弗聽也得其人如聚沙而雨之非其人如聚聾而鼓之說苑雜言孔子曰船非水不可行水入船中則其沒也故曰君子不可不嚴也小人不可不閉也說苑雜言孔子曰依賢固不困依富固不窮馬趼折而復行者何以輔足衆也說苑雜言孔子曰不知其子視其所友不知其君視其所使又曰與善人居如入蘭芷之室久而不聞其香則與之化矣與惡人居如入鮑魚之肆久而不聞其臭亦與之化矣中論貴驗孔子曰居而得賢友福之次也
