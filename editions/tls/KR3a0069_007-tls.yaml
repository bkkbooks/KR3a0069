body:
  text: 論人八繹史九十五引尚書大傳東郭子思問於子貢曰夫子之門何其雜也子貢曰夫隱栝之旁多枉木良醫之門多疾人砥礪之旁多頑鈍夫子聞之曰修道以俟天下來者不止是以雜也說苑雜言東郭子惠問於子貢曰夫子之門何其雜也子貢曰夫隱栝之旁多枉木良醫之門多疾人砥礪之旁多頑鈍夫子修道以俟天下來者不止是以雜也毛詩巷伯傳昔者顏叔子獨處於室鄰之釐婦又獨處於室夜暴風雨至而室壞婦人趨而至顏叔子納之而使執燭放乎旦而蒸盡縮屋而繼之自以為辟嫌之不審矣若其審者宜若魯人然魯人有男子獨處於室鄰之釐婦又獨處於室夜暴風雨至而室壞婦人趨而托之男子閉戶而不納婦人自牖與之言曰子何為不納我乎男子曰吾聞之也男子不六十不閑居今子幼吾亦幼不可以納子婦人曰子何不若柳下惠然嫗不逮門之女國人不稱其亂男子曰柳下惠固可吾固不可吾將以吾不可學柳下惠之可孔子曰欲學柳下惠者未有似於是者也韓詩外傳一荊伐陳陳西門壞因其降民使修之孔子過而不式子貢執轡而問曰禮過三人則下二人則式今陳之修門者眾矣夫子不為式何也孔子曰國亡而弗知不智也知而不爭非忠也亡而不死非勇也修門者雖眾不能行一於此吾故弗式也說苑立節楚伐陳陳西門燔因使其降民修之孔子過之不軾子路曰禮過三人則下車過二人則軾今陳修門者人數眾矣夫子何為不軾孔子曰丘聞之國亡而不知不智知而不爭不忠忠而不死不廉今陳修門者不行一於此丘故不為軾也韓詩外傳二子路與巫馬期薪於韞丘之下陳之富人有處師氏者脂車百乘觴於韞丘之上子路與巫馬期曰使子無忘子之所知亦無進子之所能得此富終身無複見夫子子為之乎巫馬期喟然仰天而歎騑然投鐮於地曰吾嚐聞之夫子勇士不忘喪其元誌士仁人不忘在溝壑子不知予與試予與意者其誌與子路心慚故負薪先歸孔子曰由來何為偕出而先返也子路曰向也由與巫馬期薪於韞丘之下陳之富人有處師氏者脂車百乘觴於韞丘之上由謂巫馬期曰使子無忘子之所知亦無進子之所能得此富終身無複見夫子子為之乎巫馬期喟然仰天而歎騑然投鐮於地曰吾嚐聞之夫子勇士不忘喪其元誌士仁人不忘在溝壑子不知予與試予與意者其誌與由也心慚故先負薪歸孔子援琴而彈詩曰肅肅鴇羽集於苞栩王事靡盬不能藝稷黍父母何怙悠悠蒼天曷其有所予道不行邪使汝願者韓詩外傳二孔子曰士有五有勢尊貴者有家富厚者有資勇悍者有心智惠者有貌美好者勢尊貴者不以愛民行義理而反以暴敖家富厚者不以振窮救不足而反以侈靡無度資勇悍者不以衛上攻戰而反以侵陵私鬥心智惠者不以端計數而反以事奸飾詐貌美好者不以統朝蒞民而反以蠱奸從欲此五者所謂士失其美質者也韓詩外傳三舜生於諸馮遷於負夏卒於鳴條東夷之人也文王生於岐周卒於畢郢西夷之人也地之相去也千有餘裏世之相後也千有餘歲然得誌行乎中國若合符節孔子曰先聖後聖其揆一也韓詩外傳四孔子見客客去顏淵曰客仁也孔子曰恨兮其心顙兮其口仁則吾不知也言之所聚也顏淵蹙然變色曰良玉度尺雖有十仞之土不能掩其光良珠度寸雖有百仞之水不能掩其瑩夫形體也色心也閔閔乎其薄也苟有溫良在中則眉睫著之矣瑕疵在中則眉睫不能匿之詩曰鼓鍾於宮聲聞於外禦覽五百十引高士傳客有候孔子者顏淵問曰客何人也孔子曰宵兮法兮吾不測也夫良玉徑尺雖十仞之土不能掩其光明珠徑寸雖有函丈之石不能戢其曜苟縕矣自厚容止可知矣韓詩外傳七孔子遊於景山之上子路子貢顏淵從孔子曰君子登高必賦小子願者何言其願丘將啟汝子路曰由願奮長戟蕩三軍乳虎在後仇敵在前蠡躍蛟奮進救兩國之患孔子曰勇士哉子貢曰兩國構難壯士列陳塵埃張天賜不持一尺之兵一斗之糧解兩國之難用賜者存不用賜者亡孔子曰辯士哉顏回不願孔子曰回何不願顏淵曰二子已願故不敢願孔子曰不同意各有事焉回其願丘將啟汝顏淵曰願得小國而相之主以道製臣以德化君臣同心外內相應列國諸侯莫不從義向風壯者趨而進老者扶而至教行乎百姓德施乎四蠻莫不釋兵輻輳乎四門天下鹹獲永寧蝖飛蠕動各樂其性進賢使能各任其事於是君綏於上臣和於下垂拱無為動作中道從容得禮言仁義者賞言戰鬥者死則由何進而救賜何難之解孔子曰聖士哉大人出小人匿聖者起賢者伏回與執政則由賜焉施其能哉韓詩外傳九孔子與子貢子路顏淵遊於戎山之上孔子喟然歎曰二三子各言爾誌予將覽焉由爾何如對曰得白羽如月赤羽如日擊鍾鼓者上聞於天下槊於地使將而攻之惟由為能孔子曰勇士哉賜爾何如對曰得素衣縞冠使於兩國之間不持尺寸之兵升鬥之糧使兩國相親如弟兄孔子曰辯士哉回爾何如對曰鮑魚不與蘭茝同笥而藏桀紂不與堯舜同時而治二子已言回何言哉孔子曰回有鄙之心顏淵曰願得明王聖主為之相使城郭不治溝池不鑿陰陽和調家給人足鑄庫兵以為農器孔子曰大士哉由來區區汝何攻賜來便便汝何使願得之冠為子宰焉說苑指武孔子北遊東上農山子路子貢顏淵從焉孔子喟然歎曰登高望下使人心悲二三子者各言爾誌丘將聽之子路曰願得白羽若月赤羽若日鍾鼓之音上聞乎天旌旗翩翻下蟠於地由且舉兵而擊之必也攘地千里獨由能耳使夫二子為我從焉孔子曰勇哉士乎憤憤者乎子貢曰賜也願齊楚合戰於莽洋之野兩壘相當旌旗相望塵埃相接接戰構兵賜願著縞衣白冠陳說白刃之間解兩國之患獨賜能耳使夫二子者為我從焉孔子曰辯哉士乎仙仙者乎顏淵獨不言孔子曰回來若獨何不願乎顏淵曰文武之事二子已言之回何敢與焉孔子曰若鄙心不與焉第言之顏淵曰回聞鮑魚蘭芷不同篋而藏堯舜桀紂不同國而治二子之言與回言異回願得明王聖主而相之使城郭不修溝池不越鍛劍戟以為農器使天下千歲無戰鬥之患如此則由何憤憤而擊賜又何仙仙而使乎孔子曰美哉德乎姚姚者乎子路舉手問曰願聞夫子之意孔子曰吾所願者顏氏之計吾願負衣冠而從顏氏子也大戴禮哀公問五義魯哀公問於孔子曰吾欲論吾國之士與之為政何如者取之孔子對曰生乎今之世誌古之道居今之俗服古之服舍此而為非者不亦鮮乎哀公曰然則今夫章甫句屨紳帶而縉笏者此皆賢乎孔子曰否不必然今夫端衣元裳冕而乘路者誌不在於食葷斬衰蕑屨杖而歠粥者誌不在於飲食故生乎今之世誌古之道居今之俗服古之服舍此而為非者雖有不亦鮮乎哀公曰善何如則可謂庸人矣孔子對曰所謂庸人者口不能道善言而誌不邑邑不能選賢人善士而托其身焉以為已憂動行不知所務止力不知所定日選於物不知所貴從物而流不知所歸五鑿為政心從而壞若此則可謂庸人矣哀公曰善何如則可謂士矣孔子對曰所謂士者雖不能盡道術必有所由焉雖不能盡善盡美必有所處焉是故知不務多而務審其所知行不務多而務審其所由言不務多而務審其所謂知既知之行既由之言既順之若夫性命肌膚之不可易也富貴不足以益貧賤不足以損若此則可謂士矣哀公曰善何如則可謂君子矣孔子對曰所謂君子者躬行忠信其心不買仁義在己而不害不誌聞誌廣博而色不伐思慮明達而辭不爭君子猶然如將可及也而不可及也如此可謂君子矣哀公曰善敢問何如可謂賢人矣孔子對曰所謂賢人者好惡與民同情取舍與民同統行中矩繩而不傷於本言足法於天下而不害於其身躬為匹夫而願富貴為諸侯而無財如此則可謂賢人矣哀公曰善敢問何如可謂聖人矣孔子對曰所謂聖人者知通乎大道應變而不窮能測萬物之情性者也大道者所以變化而凝成萬物者也情性也者所以理然不然取舍者也故其事大配乎天地參乎日月雜於雲霓總要萬物穆穆純純其莫之能循若天之司莫之能職百姓淡然不知其善若此則可謂聖人矣哀公曰善孔子出哀公送之荀子哀公魯哀公問於孔子曰吾欲論吾國之士與之治國敢問何如之邪孔子對曰生今之世誌古之道居今之俗服古之服舍此而為非者不亦鮮乎哀公曰然則夫章甫絇屨紳而搢笏者此賢乎孔子對曰不必然夫端衣元裳才而乘路者誌不在於食葷斬衰菅屨杖而啜粥者誌不在於酒肉生今之世誌古之道居今之俗服古之服舍此而為非者雖有不亦鮮乎哀公曰善孔子曰人有五儀有庸人有士有君子有賢人有大聖哀公曰敢問何如斯可謂庸人矣孔子對曰所謂庸人者口不能道善言心不知色色不知選賢人善士托其身焉以為己憂勤行不知所務止交不知所定日選擇於物不知所貴從物如流不知所歸五鑿為正心從而壞如此則可謂庸人矣哀公曰善敢問何如斯可謂士矣孔子對曰所謂士者雖不能盡道術必有率也雖不能遍美善必有處也是故知不務多務審其所知言不務多務審其所謂行不務多務審其所由故知既已知之矣言既已謂之矣行既已由之矣則若性命肌膚之不可易也故富貴不足以益也卑賤不足以損也如此則可謂士矣哀公曰善敢問何如斯可謂君子矣孔子對曰所謂君子者言忠信而心不德仁義在身而色不伐思慮明通而辭不爭故猶然如將可及者君子也哀公曰善敢問何如斯可謂賢人矣孔子對曰所謂賢人者行中規繩而不傷於本言足法於天下而不傷於身富有天下而無怨財布施天下而不病貧如此則可謂賢人矣哀公曰善敢問何如斯可謂大聖矣孔子對曰所謂大聖者知通乎大道應變而不窮辨乎萬物之情性者也大道者所以變化遂成萬物也情性者所以理然不取舍也是故其事大辨乎天地明察乎日月總要萬物於風雨繆繆肫肫其事不可循若天之嗣其事不可識百姓淺然不識其鄰若此則可謂大聖矣哀公曰善大戴禮衛將軍文子衛將軍文子問於子貢曰吾聞夫子之施教也先以詩世道者孝悌說之以義而觀諸體成之以文德蓋受教者七十有餘人聞之孰為賢也子貢對辭以不知文子曰吾子學焉何謂不知也子貢對曰賢人無妄知賢則難故君子曰智莫難於知人此以難也文子曰若夫知賢人莫不難吾子親遊焉是敢問也子貢對曰夫子之門人蓋三就焉賜有逮及焉有未及焉不得辯知也文子曰吾子之所及請問其行也子貢對曰夙興夜寐諷誦崇禮行不貳過稱言不苟是顏淵之行也孔子說之以詩詩雲媚茲一人應侯順德永言孝思孝思惟則故國一逢有德之君世受顯命不失厥名以禦於天子以申之在貧如客使其臣如藉不遷怒不探怨不錄舊罪是冉雍之行也孔子曰有士君子有眾使也有刑用也然後怒匹夫之怒惟以亡其身詩雲靡不有初鮮克有終以告之不畏強禦不侮矜寡其言曰性都其富哉任其戎是仲由之行也夫子未知以文也詩雲受小共大共為下國恂蒙何天之寵傅奏其勇夫強乎武哉文不勝其質恭老恤孤不忘賓旅好學省物而不勤是冉求之行也孔子因而語之曰好學則智恤孤則惠恭老則近禮克篤恭以天下其稱之也宜為國老誌通而好禮擯相兩君之事篤雅其有禮節也是公西赤之行也孔子曰禮儀三百可勉能也威儀三千則難也公西赤問曰何謂也孔子曰貌以擯禮禮以擯辭是之謂也主人聞之以成孔子之語人也曰當賓客之事則通矣謂門人曰二三子欲學賓客之禮者於赤也滿而不滿實如虛通之如不及先生難之不學其貌竟其德敦其言於人也無所不信其橋大人也常以皓皓是以眉壽是曾參之行也孔子曰孝德之始也弟德之序也信德之厚也忠德之正也參也中夫四德者矣哉以此稱之也業功不伐貴位不善不侮可侮不佚可佚不敖無告是顓孫之行也孔子言之曰其不伐則猶可能也其不弊百姓者則仁也詩雲愷悌君子民之父母夫子以其仁為大也學以深厲以斷送迎必敬上友下交銀手如斷是卜商之行也孔子曰詩雲式夷式己無小人殆而商也其可謂不險也貴之不喜賤之不怒苟於民利矣廉於其事上也以佐其下是澹台滅明之行也孔子曰獨貴獨富君子恥之夫也中之矣先成其慮及事而用之是故不忘是言偃之行也孔子曰欲能則學欲知則問欲善則訊欲給則豫當是如偃也得之矣獨居思仁公言言義其聞之詩也一日三複白圭之玷是南宮縚之行也夫子信其仁以為異姓自見孔子入戶未嚐越屨往來過人不履影開蟄不殺方長不折執親之喪未嚐見齒是高柴之行也孔子曰高柴執親之喪則難能也開蟄不殺則天道也方長不折則恕也恕則仁也湯恭以恕是以日躋也此賜之所親睹也吾子有命而訊賜則不足以知賢文子曰吾聞之也國有道則賢人興焉中人用焉百姓歸焉若吾子之語審茂則一諸侯之相也亦未逢明君也子貢既與衛將軍文子言適魯見孔子曰衛將軍問二三子之行於賜也不一而三賜也辭不獲命以所見者對矣未知中否請嚐以告孔子曰言之子貢以其質告孔子既聞之笑曰賜汝偉為知人賜子貢對曰賜也焉能知人此賜之所親睹也孔子曰是汝所親也吾語女耳之所未聞目之所未見思之所未至智之所未及者乎子貢曰賜得則願聞之也孔子曰不克不忌不念舊惡蓋伯夷叔齊之行也晉平公問於祁傒曰羊舌大夫晉國之良大夫也其行如何祁傒對辭曰不知也公曰吾聞女少長乎其所女其閹知之祁傒對曰其幼也恭而遜恥而不使其過宿也其為侯大夫也悉善而謙其端也其為公車尉也信而好直其功也至於其為和容也溫良而好禮博聞而時出其誌也公曰向者問女女何曰弗知也祁傒對曰每位改變未知所止是以不知蓋羊舌大夫之行也畏天而敬人服義而行信孝乎父而恭於兄好從善而鎙往蓋趙文子之行也其事君也不敢愛其死然亦不忘其身謀其身不遺其友君陳則進不陳則行而退蓋隨武子之行也其為人之淵泉也多聞而難誕也不內辭足以沒世國家有道其言足以生國家無道其默足以容蓋桐提伯華之行也外寬而內直自設於隱栝之中直己而不直於人以善存亡汲汲蓋蘧伯玉之行也孝子慈幼允德稟義約貨去怨蓋柳下惠之行也其言曰君雖不諒於臣臣不可以不量於君是故君擇臣而使之臣擇君而事之有道順君無道橫命晏平仲之行也德恭而行信終日言不在尤之內在尤之外貧而樂也蓋老萊子之行也易行以俟天命居下位而不援其上觀於四方也不忘其親苟思其親不盡其樂以不能學為己終身之憂蓋介山子推之行也群書治要屍子勸學孔子曰自娛於隱栝之中直己而不直人以善廢而不邑邑蘧伯玉之行也穀梁成五年傳梁山崩壅遏河三日不流晉君召伯尊而問焉伯尊來遇輦者輦者不辟使車右下而鞭之輦者曰所以鞭我者其取道遠矣伯尊下車而問焉曰子有聞乎對曰梁山崩壅遏河三日不流伯尊曰君為此召我也為之奈何輦者曰天有山天崩之天有河天壅之雖召伯尊如之何伯尊由忠問焉輦者曰君親素縞帥群臣而哭之既而祠焉斯流矣伯尊至君問之曰梁山崩壅遏河三日不流為之奈何伯尊曰君親素縞帥群臣而哭之既而祠焉斯流矣孔子聞之曰伯尊其無績乎攘善也韓詩外傳八梁山崩晉君召大夫伯宗道逢輦者以其輦服伯宗使其右下欲鞭之輦者曰君趨道豈不遠矣不知事而行可乎伯宗喜問其居曰絳人也伯宗曰子亦有聞乎曰梁山崩壅河顧三日不流是以召子伯宗曰如之何曰天有山天崩之天有河天壅之伯宗將如之何伯宗私問之曰君其率群臣素服而哭之既而祠焉河斯流矣伯宗問其姓名弗告伯宗到君問伯宗以其言對於是君素服率群臣而哭之既而祠焉河斯流矣君問伯宗何以知之伯宗不言受輦者詐以自知孔子聞之曰伯宗其無後攘人之善魯語下公父文伯退朝朝其母其母方績文伯曰以歜之家而主猶績懼忓季孫之怒也其以歜為不能事主乎其母歎曰魯其亡乎使僮子備官而未之聞邪居吾語汝昔聖王之處民也擇瘠土而處之勞其民而用之故長王天下夫民勞則思思則善心生逸則淫淫則忘善忘善則惡心生沃土之民不材淫也瘠土之民莫不向義勞也是故天子大采朝日與三公九卿祖識地德日中考政與百官之政事師尹維旅牧相宣序民事少采夕月與太史司載糾虔天刑日入監九禦使潔奉禘郊之粢盛而後即安諸侯朝修天子之業命晝考其國職夕省其典刑夜儆百工使無慆淫而後即安卿大夫朝考其職晝講其庶政夕序其業夜庀其家事而後即安士朝而受業晝而習貫夕而習複夜而計過無憾而後即安自庶人以下明而動晦而休無日以怠王後親織元紞公侯之夫人加之以紘綖卿之內子為大帶命婦成祭服列士之妻加之以朝服自庶士以下皆衣其夫社而賦事蒸而獻功男女效績愆則有辟古之製也君子勞心小人勞力先王之訓也自上以下誰敢淫心舍力今我寡也爾又在下位朝夕處事猶恐忘先人之業況有怠惰其何以避辟吾冀而朝夕修我曰必無廢先人爾今曰胡不自安以是承君之官餘懼穆伯之絕嗣也仲尼聞之曰弟子誌之季氏之婦不淫矣魯語下公父文伯之母季康子之從祖叔母也康子往焉門為門與之言皆不逾閾祭悼子康子與焉胙不受徹俎不宴宗不具不繹繹不盡飫則退仲尼聞之以為別於男女之禮矣魯語下公父文伯卒其母戒其妾曰吾聞之好內女死之好外士死之今吾子夭死吾惡其以好內聞也二三婦之辱共先者祀請無瘠色無洵涕無掐膺無憂容有降服無加服從禮而靜是昭吾子也仲尼聞之曰女知莫若婦男知莫若夫公父氏之婦智也夫欲明其子之令德魯語下公父文伯之母朝哭穆伯而暮哭文伯仲尼聞之曰季氏之婦可謂知禮矣愛而無私上下有章晏子春秋諫上景公之時雨雪三日而不霽公衣狐白之裘坐堂側陛晏子入見立有間公曰怪哉雨雪三日而天不寒晏子對曰天不寒乎公笑晏子曰嬰聞古之賢君飽而知人之饑溫而知人之寒逸而知人之勞今君不知也公曰善寡人聞命矣乃令出裘發粟與饑寒令所睹於塗者無問其鄉所睹於裏者無問其家循國計數無言其名士既事者兼月疾者兼歲孔子聞之曰晏子能明其所欲景公能行其所善也晏子春秋諫下景公之嬖妾嬰子死公守之三日不食膚著於席不去左右以複而君無聽焉晏子入複曰有術客與醫俱言曰聞嬰子病死願請治之公喜遽起曰病猶可為乎晏子曰客之道也以為良醫也請嚐試之君請屏潔沐浴飲食間病者之宮彼亦將有鬼神之事焉公曰諾屏而沐浴晏子令棺人入斂已斂而複曰醫不能治病已斂矣不敢不以聞公作色不悅曰夫子以醫命寡人而不使視將斂而不以聞吾之為君名而已矣晏子曰君獨不知死者之不可以生邪嬰聞之君正臣從謂之順君僻臣從謂之逆今君不道順而行僻從邪者邇導害者遠讒諛萌通而賢良廢滅是以諂諛繁於間邪行交於國也昔吾先君桓公用管仲而霸嬖乎豎刁而滅今君薄於賢人之禮而厚嬖妾之哀且古聖王畜私不傷行斂死不失愛送死不失哀行傷則溺己愛失則傷生哀失則害性是故聖王節之也即畢殮不留生事棺槨衣衾不以害生養哭泣處哀不以害生道今朽屍以留生廣愛以傷行修哀以害性君之失矣故諸侯之賓客慚入吾國本朝之臣慚守其職崇君之行不可以導民從君之欲不可以持國且嬰聞之朽而不殮謂之僇屍臭而不收謂之陳胔反明王之性行百姓之誹而內嬖妾於僇胔此之為不可公曰寡人不識請因夫子而為之晏子複曰國之士大夫諸侯四鄰賓客皆在外君其哭而節之仲尼聞之曰星之昭昭不若月之曀曀小事之成不若大事之廢君子之非賢於小人之是也其晏子之謂歟晏子春秋雜上晉平公欲伐齊使範昭往觀焉景公觴之飲酒酣範昭曰請君之棄樽公曰酌寡人之樽進之於客範昭已飲晏子曰徹樽更之樽觶具矣範昭佯醉不悅而起舞謂太師曰能為我調成周之樂乎吾為子舞之太師曰冥臣不習範昭趨而出景公謂晏子曰晉大國也使人來將觀吾政今子怒大國之使者將奈何晏子曰夫範昭之為人也非陋而不知禮也且欲試吾君臣故絕之也景公謂太師曰子何以不為客調成周之樂乎太師對曰夫成周之樂天子之樂也調之必人主舞之今範昭人臣欲舞天子之樂臣故不為也範昭歸以報平公曰齊未可伐也臣欲試其君而晏子識之臣欲犯其禮而太師知之仲尼聞曰夫不出於尊俎之間而知千里之外其晏子之謂也可謂折衝矣而太師其與焉韓詩外傳八晉平公使範昭觀齊國之政景公錫之宴晏子在前範昭趨曰願君之倅樽以為壽景公顧左右曰酌寡人樽獻之客範昭飲晏子對曰徹去樽範昭不說起舞顧太師曰子為我奏成周之樂願舞太師對曰盲臣不習範昭起出門景公謂晏子曰夫晉天下大國也使範昭來觀齊國之政今子怒大國之使者將奈何晏子曰範昭之為人也非陋而不知禮也是欲試吾君嬰故不從於是景公召太師而問之曰範昭使子奏成周之樂何故不調對如晏子於是範昭歸報平公曰齊未可並也吾試其君晏子知之吾犯其樂太師知之孔子聞之曰善乎晏子不出俎豆之間折衝千里新序雜事一晉平公欲伐齊使範昭往觀焉景公賜之酒酣範昭曰願請君之樽酌公曰酌寡人之樽進之於客範昭已飲晏子曰徹樽更之樽觶具矣範昭佯醉不悅而起舞謂太師曰能為我調成周之樂乎吾為子舞之太師曰冥臣不習範昭趨而出景公謂晏子曰晉大國也使人來將觀吾政也今子怒大國之使者將奈何晏子曰夫範昭之為人非陋而不識禮也且欲試吾君臣故絕之也景公謂太師曰子何以不為客調成周之樂乎太師對曰夫成周之樂天子之樂也若調之必人主舞之今範昭人臣也而欲舞天子之樂臣故不為也範昭歸以告平公曰齊未可伐也臣欲試其君而晏子識之臣欲犯其禮而太師知之仲尼聞之曰夫不出於樽俎之間而知千里之外其晏子之謂乎可謂折衝矣而太師其與焉晏子春秋雜上晏子居晏桓子之喪粗衰斬苴絰帶杖菅履食粥居倚廬寢苫枕草其家老曰非大夫喪父之禮也晏子曰唯卿為大夫曾子以聞孔子孔子曰晏子可謂能遠害矣不以己之是駁人之非遜辭以避咎義也夫荀子大略子謂子家駒續然大夫不如晏子晏子功用之臣也不如子產子產惠人也不如管仲管仲之為人力功不力義力知不力仁野人也不可以為天子大夫荀子子道子路問於孔子曰魯大夫練而床禮邪夫子曰吾不知也子路出謂子貢曰吾以夫子為無所不知夫子徒有所不知子貢曰汝何問哉子路曰由問魯大夫練而床禮邪夫子曰吾不知也子貢曰吾將為汝問之子貢問曰練而床禮邪孔子曰非禮也子貢出謂子路曰汝謂夫子為有所不知乎夫子徒無所不知汝問非也禮居是邑不非其大夫荀子哀公魯哀公問於孔子曰請問取人孔子對曰無取健無取泬無取口健貪也泬亂也口誕也故弓調而後求勁焉馬服而後求良焉士信愨而後求知能焉士不信愨而有多知能譬之其豺狼也不可以身爾也語曰桓公用其賊文公用其盜故明主任計不信怒闇主信怒不任計計勝怒者強怒勝計者亡韓詩外傳四哀公問取人孔子曰無取健無取佞無取口讒健驕也佞諂也讒誕也故弓調然後求勁焉馬服然後求良焉士信愨而後求知焉士不信焉又多知譬之豺狼其難以身近也周書曰為虎傅翼也不亦殆乎說苑尊賢哀公問於孔子曰人何若而可取也孔子對曰無取拑者無取倢者毋取口銳者哀公曰何謂也孔子曰拑者大給利不言盡用倢者必欲兼人不可以為法也口銳者多誕而寡信後恐不驗也夫弓矢和調而後求其中焉馬愨願順然後求其良材焉人必忠信重厚然後求其知能焉今人有不忠信重厚而多知能如此人者譬猶豺狼與不可以身近也是故先其仁信之誠者然後親之於是有知能者然後任之故曰親仁而使能夫取人之術也觀其言而察其行夫言者所以抒其胸而發其情者也能行之士必能言之是故先觀其言而揆其行雖有奸軌之人無以逃其情矣哀公曰善列子天瑞孔子遊於太山見榮啟期行乎郕之野鹿裘帶索鼓琴而歌孔子問曰先生所以樂何也對曰吾樂甚多天生萬物唯人為貴而吾得為人是一樂也男女之別男尊女卑故以男為貴吾既得為男矣是二樂也人生有不見日月不免繈褓者吾既已行年九十矣是三樂也貧者士之常也死者人之終也處常得終當何憂哉孔子曰善乎能自寬者也禦覽三百八十三引新序孔子見宋榮啟期老白首衣弊服鼓琴自樂孔子問曰先生老而窮何樂也啟期曰吾有三樂天生萬物以人為貴吾得為人一樂也人生以男為貴吾得為男二樂也人生命有夭傷吾年九十歲是三樂也貧者士之常死者人之終居常以守終何不樂乎說苑雜言孔子見榮啟期衣鹿皮裘鼓瑟而歌孔子問曰先生何樂也對曰吾樂甚多天生萬物唯人為貴吾既已得為人是一樂也人以男為貴吾既已得為男是為二樂也人生不免繈褓吾年已九十五是三樂也夫貧者士之常也死者民之終也處常待終當何憂乎列子說符趙襄子使新稚穆子攻翟勝之取左人中人使遽人謁之襄子方食而有憂色左右曰一朝而兩城下此人之所喜也今君有憂色何也襄子曰夫江河之大也不過三日飄風暴雨不終朝日中不須臾今趙氏之德行無所施於積一朝而兩城下亡其及我哉孔子聞之曰趙氏其昌乎呂氏春秋慎大覽趙襄子攻翟勝老人中人使使者來謁之襄子方食摶飯有憂色左右曰一朝而兩城下此人之所以喜也今君有憂色何襄子曰江河之大也不過三日飄風暴雨日中不須臾今趙氏之德行無所於積一朝而兩城下亡其及我乎孔子聞之曰趙氏其昌乎淮南子道應訓趙襄子攻翟而勝之尤人終人使者來謁之襄子方將食而有憂色左右曰一朝而兩城下此人之所喜也今君有憂色何也襄子曰江河之大也不過三日飄風暴雨日中不須臾今趙氏之德行無所積今一朝兩城下亡其及我乎孔子聞之曰趙氏其昌乎莊子列禦寇孔子曰凡人心險於山川難於知天天猶有春秋冬夏旦暮之期人者厚貌深情故有貌願而益有長若不肖有順懷而達有堅而縵有緩而釬故其就義若渴者其去義若熱故君子遠使之而觀其忠近使之而觀其敬煩使之而觀其能卒然問焉而觀其知急與之期而觀其信委之以財而觀其仁告之以危而觀其節醉之以酒而觀其側雜之以處而觀其色九征至不肖人得矣禦覽九百十五引莊子老子見孔子從弟子五人問曰前為誰對曰子路勇且多力其次子貢為智曾子為孝顏回為仁子張為武老子歎曰吾聞南方有鳥名鳳凰其所居也積石千里河水出下鳳凰居止天為生食其樹名瓊枝高百仞以璆琳琅玕為實天又為生離朱一人三頭遞起以伺琅玕鳳鳥之文戴聖嬰仁右智左賢韓非子說林下孔子謂弟子曰孰能導子西之釣名也子貢曰賜也能乃導之不複疑也孔子曰寬哉不被於利絜哉民性有恒曲為曲直為直孔子曰子西不免白公之難子西死焉韓非子外儲說左下管仲相齊曰臣貴矣然而臣貧桓公曰使子有三歸之家曰臣富矣然而臣卑桓公使立於高國之上曰臣尊矣然而臣疏乃立為仲父孔子聞而非之曰泰侈逼上一曰仲父出朱蓋青衣置鼓而歸庭有陳鼎家有三歸孔子曰良大夫也其侈逼上韓非子顯學孔子曰以容取人乎失之子羽以言取人乎失之宰予薛據集語引說苑子曰以容取人失之子羽以言取人失之宰予澹台子羽君子之容也與之久處而言不充其貌宰予之辭雅而文也與之久處而智不充其辯禦覽四百六十九引王孫子趙簡子獵於晉陽之山撫轡而歎董安於曰今遊獵樂也而主君歎敢問何故也簡子曰汝不知也吾效廄養食穀之馬以千數合宮養多力之士日數百欲以獵獸也吾憂鄰國養賢以獵吾也孔子聞之曰簡子知所歎也呂氏春秋恃君覽知分荊有次非者得寶劍於幹遂還反涉江至於中流有兩蛟夾繞其船次非謂舟人曰子嚐見兩蛟繞船能兩活者乎船人曰未之見也次非攘臂袪衣拔寶劍曰此江中之腐肉朽骨也棄劍以全己餘奚愛焉於是赴江刺蛟殺之而複上船舟中之人皆得活荊王聞之仕之執圭孔子聞之曰夫善哉不以腐肉朽骨而棄劍者其次非之謂乎淮南子道應訓荊有佽非得寶劍於幹隊還反度江至於中流陽侯之波兩蛟俠繞其船佽非謂枻船者曰嚐有如此而得活者乎對曰未嚐見也於是佽非瞑目勃然攘臂拔劍曰武士可以仁義之禮說也不可劫而奪也此江中之腐肉朽骨棄劍而已餘有奚愛焉赴江刺蛟遂斷其頭船中人盡活風波畢除荊爵為執圭孔子聞之曰夫善哉腐肉朽骨棄劍者佽非之謂乎呂氏春秋恃君覽召類士尹池為荊使於宋司城子罕觴之南家之牆犨於前而不直西家之潦徑其宮而不止士尹池問其故司城子罕曰南家工人也為鞔百也吾將徙之其父曰吾恃為鞔以食三世矣今徙之是宋國之求鞔者不知吾處也吾將不食願相國之憂吾不食也為是故吾弗徙也西家高吾宮庳潦之經吾宮也利故弗禁也士尹池歸荊荊王適興兵而攻宋士尹池諫於荊王曰宋不可攻也其主賢其相仁賢者能得民仁者能用人荊國攻之其無功而為天下笑乎故釋宋而攻鄭孔子聞之曰夫修之於廟堂之上而折衝乎千里之外者其司城子罕之謂乎新序刺奢士尹池為荊使於宋司城子罕止而觴之南家之牆擁於前而不直西家之潦經其宮而不止士尹池問其故子罕曰南家工人也為鞔者也吾將徙之其父曰吾恃為鞔已食三世矣今徙是宋邦之求鞔者不知吾處也吾將不食願相國之憂吾不食也為是故吾不徙西家高吾宮卑潦之經吾宮也利為是故不禁也士尹池歸荊適興兵欲攻宋士尹池諫於王曰宋不可攻也其主賢其相仁賢者得民仁者能用人攻之無功為天下笑楚釋宋而攻鄭孔子聞之曰夫修之於廟堂之上而折衝於千里之外者司城子罕之謂也呂氏春秋恃君覽觀表郈成子為魯聘於晉過衛右宰穀臣止而觴之陳樂而不樂酒酣而送之以璧顧反過而弗辭其仆曰向者右宰穀臣之觴吾子也甚歡今侯渫過而弗辭郈成子曰夫止而觴我與我歡也陳樂而不樂告我憂也酒酣而送我以璧寄之我也若由是觀之衛其有亂乎倍衛三十里聞甯喜之難作右宰穀臣死之還車而臨三舉而歸至使人迎其妻子隔宅而異之分祿而食之其子長而反其璧孔子聞之曰夫智可以微謀仁可以托財者其後阝成子之謂乎呂氏春秋慎行論求人晉人欲攻鄭令叔向聘焉視其有人與無人子產為之詩曰子惠思我褰裳涉洧子不思我豈無他士叔向歸曰鄭有人子產在焉不可攻也秦荊近其詩有異心不可攻也晉人乃輟攻鄭孔子曰詩雲無競惟人子產一稱而鄭國免鹽鐵論大論孔子曰進見而不以能往者非賢士才女也新序雜事四鄭人遊於鄉校以議執政之善否然明謂子產曰何不毀鄉校子產曰胡為夫人朝夕遊焉以議執政之善否其所善者吾將行之其所惡者吾將改之是吾師也如之何毀之吾聞為國忠信以損怨不聞作威以防怨譬之若防川也大決所犯傷人必多吾不能救也不如小決之使導吾聞而藥之也然明曰蔑也乃今知吾子之信可事也小人實不材若果行此其鄭國實賴之豈惟二三臣仲尼聞是語也曰以是觀之人謂子產不仁吾不信也新序刺奢魯孟獻子聘於晉韓宣子觴之三徙鍾石之懸不移而具獻子曰富哉家宣子曰子之家孰與我家富獻子曰吾家甚貧惟有二士曰顏回茲無靈者使吾邦家安平百姓和協惟此二者耳吾盡於此矣客出宣子曰彼君子也以畜賢為富我鄙人也以鍾石金玉為富孔子曰孟獻子之富可著於春秋說苑立節曾子衣敝衣以耕魯君使人往致邑焉曰請以此修衣曾子不受反複往又不受使者曰先生非求於人人則獻之奚為不受曾子曰臣聞之受人者畏人予人者驕人縱子有賜不我驕也我能勿畏乎終不受孔子聞之曰參之言足以全其節也說苑複恩東閭子嚐富貴而後乞人問之曰公何為如是曰吾自知吾嚐相六七年未嚐薦一人也吾嚐富三千萬者再未嚐富一人也不知七出身之咎然也孔子曰物之難矣小大多少各有怨惡數之理也人而得之在於外假之也說苑善說子路問於孔子曰管仲何如人也子曰大人也子路曰昔者管子說襄公襄公不說是不辯也欲立公子糾而不能是無能也家殘於齊而無憂色是不慈也桎梏而居檻車中無慚色是無愧也事所射之君是不貞也召忽死之管子不死是無仁也夫子何以大之子曰管仲說襄公襄公不說管子非不辯也襄公不知說也欲立子糾而不能非無能也不遇時也家殘於齊而無憂色非不慈也知命也桎梏居檻車而無慚色非無愧也自裁也事所射之君非不貞也知權也召忽死之管子不死非無仁也召忽者人臣之材也不死則三軍之虜也死之則名聞天下夫何為不死哉管子者天子之佐諸侯之相也死之則不免為溝中之瘠不死則功複用於天下夫何為死之哉由汝不知也說苑權謀孔子問漆雕馬人曰子事臧文仲武仲孺子容三大夫者孰為賢漆雕馬人對曰臧氏家有龜焉名曰蔡文仲立三年為一兆焉武仲立三年為二兆焉孺子容立三年為三兆焉馬人見之矣若夫三大夫之賢不賢馬人不識也孔子曰君子哉漆雕氏之子其言人之美也隱而顯其言人之過也微而著故智不能及明不能見得無數卜乎說苑權謀中行文子出亡至邊從者曰為此嗇夫者君人也胡不休焉且待後車者文子曰異日吾好音此子遺吾琴吾好佩又遺吾玉是不非吾過者也自容於我者也吾恐其以我求容也遂不入後車入門文子問嗇夫之所在執而殺之仲尼聞之曰中行文子背道失義以亡其國然後得之猶活其身道不可遺也若此說苑雜言孔子曰回若有君子之道四強於行己弱於受諫怵於待祿慎於持身說苑雜言仲尼曰史蠙有君子之道三不仕而敬上不祀而敬鬼直能曲於人說苑雜言孔子曰丘死之後商也日益賜也日損商也好與賢己者處賜也好說不如己者潛夫論誌氏姓周靈王之太子晉幼有成德聰明博達溫恭敦敏穀雒水鬥將毀王宮欲壅之太子晉諫以為不順天心不若修政晉平公使叔譽聘於周見太子與之言五稱而三窮逡巡而退歸告平公曰太子晉行年十五而譽弗能與言君請事之平公遣師曠見太子晉太子晉與言師曠服德深相結也乃問師曠曰吾聞太師能知人年之長短師曠對曰女色赤白女聲清汗火色不壽晉曰然吾後三年將上賓於帝女慎無言殃將及女其後三年而太子死孔子聞之曰惜夫殺吾君也繹史九十五引留青日劄公冶長貧而閑居無以給食其雀飛鳴其舍呼之曰公冶長公冶長南山有個虎馱羊爾食肉我食腸當亟取之勿彷徨子長如其言往取食之及亡羊者跡之得其角乃以為偷訟之魯君魯君不信鳥語逮係之獄孔子素知之為之白於魯君亦不解也於是歎曰雖在縲絏之中非其罪也未幾子長在獄舍雀複飛鳴其上呼之曰公冶長公冶長齊人出師侵我疆沂水上嶧山旁當亟禦之勿彷徨子長介獄吏白之魯君魯君亦勿信也姑如其言往跡之則齊師果將及矣急發兵應敵遂獲大勝因釋公冶長而厚賜之欲爵為大夫辭不受蓋恥因禽語以得祿也後世遂廢其學
