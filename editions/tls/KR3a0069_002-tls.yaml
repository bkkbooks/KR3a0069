body:
  text: 孝本二尚書大傳孔子對子張曰男子三十而娶女子二十而嫁女二十而通織瑽績紡之事黼黻文章之美不若是則上無以孝於舅姑下無以事夫養子也舜父頑母嚚不見室家之端故謂之鰥尚書大傳書曰高宗梁闇三年不言何為梁闇也傳曰高宗居凶廬三年不言此之謂梁闇子張曰何為也孔子曰古者君薨世子聽於塚宰三年不敢服先王之服履先王之位而聽焉以民臣之義則不可一日無君矣不可一日無君猶不可一日無天也以孝子之隱乎則孝子三年弗居矣故曰義者彼也隱者此也遠彼而近此則孝子之道備矣韓詩外傳八曾子有過曾皙引杖擊之仆地有間乃蘇起曰先生得無病乎魯人賢曾子以告夫子夫子告門人參來汝不聞昔者舜為人子乎小棰則待笞大杖則逃索而使之未嘗不在側索而殺之未嘗可得今汝委身以待暴怒拱立不去非王者之民其罪何如說苑建本曾子芸瓜而誤斬其根曾皙怒援大杖擊之曾子仆地有頃蘇蹶然而起進曰曩者參得罪於大人大人用力教參得無疾乎退屏鼓琴而歌欲令曾皙聽其歌聲令知其平也孔子聞之告門人曰參來勿內也曾子自以無罪使人謝孔子孔子曰汝聞瞽瞍有子名曰舜舜之事父也索而使之未嘗不在側求而殺之未嘗可得小棰則待大棰則走以逃暴怒也今子委身以待暴怒立體而不去殺身以陷父不義不孝孰是大乎汝非天子之民邪殺天子之民罪奚如韓詩外傳九孔子行聞哭聲甚悲孔子曰驅驅前有賢者至則皋魚也被褐擁鐮哭於道傍孔子辟車與之言曰子非有喪何哭之悲也皋魚曰吾失之三矣少而學遊諸侯以後吾親失之一也高尚吾志間吾事君失之二也與友厚而小絕之失之三也樹欲靜而風不止子欲養而親不待也往而不可追者年也去而不可得見者親也吾請從此辭矣立槁而死孔子曰弟子誡之足以識矣於是門人辭歸而養親者十有三人說苑敬慎孔子行遊中路聞哭者聲其音甚悲孔子曰驅之驅之前有異人音少進見之丘吾子也擁鐮帶索而哭孔子辟車而下問曰夫子非有喪也何哭之悲也丘吾子對曰吾有三失孔子曰願聞三失丘吾子對曰吾少好學問周遍天下還後吾親亡一失也事君奢驕諫不遂是二失也厚交友而後絕三失也樹欲靜乎風不定子欲養乎親不待往而不來者年也不可得再見者親也請從此辭則自刎而死孔子曰弟子記之此足以為戒也於是弟子歸養親者十三人韓詩外傳十太王亶父有子曰太伯仲雍季曆曆有子曰昌太伯知太王賢昌而欲季為後也太伯去之吳太王將死謂曰我死汝往讓兩兄彼即不來汝有義而安太王薨季之吳告伯仲伯仲從季而歸群臣欲伯之立季季又讓伯謂仲曰今群臣欲我立季季又讓何以處之仲曰刑有所謂矣要於扶微者可以立季季遂立而養文王文王果受命而王孔子曰太伯獨見王季獨知伯見父志季知父心故太王太伯王季可謂見始知終而能承志矣大戴禮曾子立孝子曰可人也吾任其過不可人也吾辭其罪詩云有子七人莫慰母心子之辭也夙興夜寐無忝爾所生言不自舍也不恥其親君子之孝也大戴禮曾子大孝樂正子春下堂而傷其足傷瘳數月不出猶有憂色門弟子問曰夫子傷足瘳矣數月不出猶有憂色何也樂正子春曰善如爾之問也吾聞之曾子曾子聞諸夫子曰天之所生地之所養人為大矣父母全而生之子全而歸之可謂孝矣不虧其體可謂全矣故君子頃步之不敢忘也今予忘夫孝之道矣予是以有憂色呂氏春秋孝行覽樂正子春下堂而傷足瘳而數月不出猶有憂色門人問之曰夫子下堂而傷足瘳而數月不出猶有憂色敢問其故樂正子春曰善乎而問之吾聞之曾子曾子聞之仲尼父母全而生之子全而歸之不虧其身不損其形可謂孝矣君子無行咫步而忘之餘忘孝道是以憂大戴禮曾子大孝夫子曰伐一木殺一獸不以其時非孝也荀子子道魯哀公問於孔子曰子從父命孝乎臣從君命貞乎三問孔子不對孔子趨出以語子貢曰向者君問丘曰子從父命孝乎臣從君命貞乎三問而丘不對賜以為何如子貢曰子從父命孝矣臣從君命貞矣夫子有奚對焉孔子曰小人哉賜不識也昔萬乘之國有爭臣四人則封疆不削千乘之國有爭臣三人則社稷不危百乘之家有爭臣二人則宗廟不毀父有爭子不行無禮士有爭友不為不義故子從父奚子孝臣從君奚臣貞審其所以從之之謂孝之謂貞也荀子子道子路問於孔子曰有人於此夙興夜寐耕耘樹藝手足胼胝以養其親然而無孝之名何也孔子曰意者身不敬與辭不遜與色不順與古之人有言曰衣與繆與不女聊今夙興夜寐耕耘樹藝手足胼胝以養其親無此三者則何以為而無孝之名也孔子曰由誌之吾語汝雖有國士之力不能自舉其身非無力也勢不可也故入而行不修身之罪也出而名不彰友之過也故君子入則篤行出則友賢何為而無孝之名也韓詩外傳九子路曰有人於斯夙興夜寐手足胼胝而面目黧黑樹藝五穀以事其親而無孝子之名者何也孔子曰吾意者身未敬邪色不順邪辭不遜邪古人有言曰衣歟食歟曾不爾即子勞以事其親無此三者何為無孝之名意者所友非仁人邪坐語汝雖有國士之力不能自舉其身非無力也勢不便也是以君子入則篤孝出則友賢何為其無孝子之名莊子寓言曾子再仕而心再化曰吾及親仕三釜而心樂後仕三千鍾不洎吾心悲弟子問於仲尼曰若參者可謂無所縣其罪乎曰既已縣矣夫無所縣者可以有哀乎彼視三釜三千鍾如觀雀蚊虻相過乎前也韓非子五蠹魯人從君戰三戰三北仲尼問其故對曰吾有老父身死莫之養也仲尼以為孝舉而上之呂氏春秋仲冬紀當務楚有直躬者其父竊羊而謁之上上執而將誅之直躬者請代之將誅矣告吏曰父竊羊而謁之不亦信乎父誅而代之不亦孝乎信且孝而誅之國將有不誅者乎荊王聞之乃不誅也孔子聞之曰異哉直躬之為信也一父而載取名焉新序雜事一昔者舜自耕稼陶漁而躬孝友父瞽瞍頑母嚚及弟象傲皆下愚不移舜盡孝道以供養瞽瞍瞽瞍與象為浚井塗廩之謀欲以殺舜舜孝益篤出田則號泣年五十猶嬰兒慕可謂至孝矣故耕於歷山歷山之耕者讓畔陶於河濱河濱之陶者器不苦窳漁於雷澤雷澤之漁者分均及立為天子天下化之蠻夷率服北發渠搜南撫交阯莫不慕義麟鳳在郊故孔子曰孝弟之至通於神明光於四海舜之謂也孔子在州裏篤行孝道居於闕黨闕黨之子弟畋漁分有親者得多孝以化之也是以七十二子自遠方至服從其德說苑建本孔子曰行身有六本本立焉然後為君子立體有義矣而孝為本處喪有禮矣而哀為本戰陣有隊矣而勇為本治政有理矣而能為本居國有禮矣而嗣為本生財有時矣而力為本說苑建本夫子亦云人之行莫大於孝說苑權謀魯公索氏將祭而亡其牲孔子聞之曰公索氏比及三年必亡矣後一年而亡弟子問曰昔公索氏亡牲夫子曰比及三年必亡矣今期年而亡夫子何以知其將亡也孔子曰祭之為言索也索也者盡也乃孝子所以自盡於親也至祭而亡其牲則餘所亡者多矣吾以此知其將亡也說苑辨物子貢問孔子死人有知無知也孔子曰吾欲言死者有知也恐孝子順孫妨生以送死也欲言無知恐不孝子孫棄不葬也賜欲知死人有知將無知也死徐自知之猶未晚也說苑反質魯有儉者瓦鬲煮食食之而美盛之土鉶之器以進孔子孔子受之歡然而悅如受大牢之饋弟子曰瓦甂陋器也煮食薄膳也而先生何喜如此乎孔子曰吾聞好諫者思其君食美者念其親吾非以饌為厚也以其食美而思我親也搜神記曾子從仲尼在楚而心動辭歸問母母曰思爾齧指孔子聞之曰曾參之孝精感萬里御覽四百十三引師覺授孝子傳老萊子者楚人行年七十父母俱存至孝蒸蒸常著班斕之衣為親取飲上堂腳跌恐傷父母之心僵仆為嬰兒啼孔子曰父母老常言不稱老為其傷老也若老萊子可謂不失孺子之心矣御覽四百八十二引師覺授孝子傳仲子崔者仲由之子也初子路仕衛赴蒯聵之亂衛人狐黶時守門殺子路子崔既長告孔子欲報父仇夫子曰行矣子崔即行黶知之曰夫君子不掩人之不備須後日於城西決戰其日黶持蒲弓木戟而與子崔戰而死亢倉子訓道閔子騫問仲尼道之與孝相去奚若仲尼曰道者自然之妙用孝者人道之至德夫其包運天地發育萬物曲成萬類布丕性壽其功至實而不為物府不為事官無為功屍捫求視聽莫得而有字之曰道用之於人字之曰孝孝者善事父母之名也夫善事父母敬順為本意以承之順承顏色無所不至發一言舉一意不敢忘父母營一手措一足不敢忘父母事君不敢不忠朋友不敢不信臨下不敢不敬向善不敢不勤雖居獨室之中亦不敢懈其誠此之謂全孝故至誠之至通乎神明光於四海有感必應善事父母之所致也昔者虞舜其大孝矣庶母惑父屢憎害之舜心益恭懼而無怨謀使浚井下土實之於時天休震動神明駿赫導穴而出奉養滋謹由是元德茂盛為天下君善事父母之所致也文王之為太子也其大孝矣朝夕必至乎寢門之外問寺人曰茲日安否如何曰安太子溫然喜色小不安節太子色憂滿容朝夕食上太子必視寒暖之節食下必知膳羞所進然後退寺人言疾太子肅冠而齋膳宰之饌必敬視之湯液之貢必親嚐之嚐饌善則太子亦能食嚐饌寡太子亦不能飽以至於復初然後亦復初君后有過怡聲以諷君后所愛雖小物必嚴龔是故孝成於身道洽天下雅曰文王陟降在帝左右言文王靜作進退天必贊之故紂不能害夢啟之壽卜世三十卜年七百天所命也善事父母之所致也閔子騫曰善事父母之道既幸聞矣敢問教子之義仲尼曰凡三王教子必視禮樂樂所以修內禮所以修外禮樂交修則德容發輝於貌故能溫恭而文明夫為人臣者殺其身有益於君則為之況利其身以善其君乎是故擇建忠良貞正之士為之師傅欲其知父子君臣長幼之道夫知為人子然後可以為人父知為人臣然後可以為人君知事人然後能使人此三王教子之義也閔子騫退而事之於家三年無間於父母昆弟之言交遊稱其信鄉黨稱其仁宗族稱其弟德行之聲溢於天下此善事父母之所致也
