body:
  text: 孔子集語卷上宋薛據輯易者第一子曰易者易也變易也不易也管三成為道徳包籥見先秦古書易乾鑿度子曰易有太易有太初有太始有太素太易者未見氣太初者氣之始太始者形之始太素者質之始氣形質具而未離故曰渾淪渾淪者言萬物渾淪而未相離視之不見聽之不聞循之不得故曰易也易無形畔易變而為一太初也一變而為七太始也七變而為九太素也九者氣變之究也乃復變而為一一者形變之始清輕者上為天濁重者下為地物有始有壯有究故三畫而成乾乾坤相並俱生物有陰陽因而重之故六畫而成卦子曰上古之時人民無别群物無殊未有衣食器用之利於是伏羲乃仰觀象於天俯觀法於地中觀萬物之宜始作八卦以通神明之徳類萬物之情故易者所以繼天地理人倫而明王道是故八卦以建五氣以立五常以之行象法乾坤順陰陽以正君臣父子之義度時制宜作網罟以畋以漁以贍人用於是人民乃治君親以尊臣子以順群生和洽各安其性子曰文王因陰陽消息立乾坤統天地夫有形者生於無形則乾坤安從生子曰八卦之序成立則五氣變形故人生而應八卦之體得五氣以為五常仁義禮智信是也子曰陽三陰四位之正也夫易卦六十四分而上下象陰陽也陽道純而竒故上篇三十所以象陽也陰道不純而偶故下篇三十四所以法陰也乾坤者陰陽之根本萬物之祖宗故為上篇始而尊之也離為日坎為月日月之道陰陽之經所以始終萬物故以坎離為上篇終咸者男女之始夫婦之道也人道之興必由夫婦所以奉承祖宗為天地生故為下篇始而貴之也既濟未濟為最終者所以明戒謹而全王道也以上並見易乾鑿度子曰昔紂有臣曰王子須務為諂使其君樂須㬰之樂而忘終身之憂子曰商汝知君之為君乎子夏曰魚失水則死水失魚猶為水也子曰惡人者人惡之知得之己者亦知得之人所謂不出環堵之室而知天下者知及之己者也並見尸子子張見魯哀公七日不見禮託僕夫而去曰臣聞君好士日舍重趼魚見切足健也來見君七日而不禮君之好士也有似葉公子髙之好龍也葉公子髙好龍居室雕文以象龍天龍聞而下之窺頭於牖拖尾於堂葉公見之棄而還走失其魂魄是葉公非好龍也好夫似龍而非龍者也今臣聞君好士不逺千里而見君七日不禮君非好士也子張以告夫子子曰彼好夫士而非士者也子曰某少而好學晩而聞道此以博矣並申子子貢第二子貢問曰昔黄帝四面信乎孔子曰黄帝取合己者四人使治四方不計而耦不約而成此之謂四面也尸子季子治單父三年巫馬期往觀化焉見夜漁所得小魚釋之巫馬期以報孔子子曰季子之徳至矣使人闇行若有嚴刑在其側季子何以至此某嘗聞之誠於此者形於彼季子必行此術也哀公問於仲尼曰吾欲小則守大則攻其道若何仲尼曰若朝廷上下皆君之親附也君誰與攻朝廷無禮上下無親其衆皆君之讐也君誰與守哀公於是廢梁澤之禁弛關市之征以惠民子曰善為吏者立徳不善為吏者立怨並見韓非子孔子為魯相七日而誅少正夘門人進問曰夫少正夘魯之聞人也夫子為政而始誅之得毋太甚乎子曰居吾語汝人而惡者五而盜不與焉一曰心逆而險二曰行僻而堅三曰言偽而辯四曰記醜而博五曰順非而澤此五者有一於人則不免於君子之誅而少正夘兼之不可不誅也尹文子荆有佽非者得寶劔於干音寒隊反渡江中流兩蛟俠繞其船佽非謂枻船者曰嘗有如此而得活者乎對曰未嘗見也於是佽非攘臂拔劔曰武士可以仁義説也不可刧而奪也此江之腐肉朽骨棄劔而已余奚有焉赴江刺蛟遂㫁其頭風波畢除荆爵為執圭孔子聞之曰夫善除腐肉朽骨棄劔者佽非之謂乎夫子見禾之三變滔滔然曰狐首丘而死鳥飛反鄉兎走歸窟我其首禾乎穗垂而向根不忘本也子曰小辯破言小利破義小義破道小見不達大禮必簡河以委蛇故能逺山以陵遲故能髙陰陽無為故能和道以優㳺故能化並見淮南子子讀易至損益未嘗不喟然歎曰或欲利之適足以害之或欲害之適足以利之利害禍福之門不可以不察子曰有虞氏不賞不罰夏后氏賞而已殷人罰而不賞罰禁也賞使也並見慎子子曰誦詩讀書與古人居讀書誦詩與古人期金樓子孔子御第三孔子御坐於魯哀公公賜之桃與黍子先飯黍而後食桃左右掩口而笑公曰黍非飯也以雪桃也子曰丘知之然黍者五穀之長先王以為上盛果蓏有六桃為下宗廟不以祭丘聞之也以賤雪貴不聞貴雪賤今以五穀之長雪果蓏之下是從上雪下也丘以為妨義故不敢韓非子哀公問於孔子曰吾聞䕫一足信乎對曰䕫人也何其一足也䕫通於聲堯曰䕫一而已使為樂正故君子曰䕫有一足非一足也呉伐越墮音揮㑹稽獲骨焉節專車使客問之仲尼曰骨何為大仲尼曰某聞之昔禹致羣臣於㑹稽防風後至禹殺而戮之其骨節專車此為大矣客曰敢問誰守為神仲尼曰山川之神足以紀綱天下者其守為神社稷之守為公侯皆屬於王者客曰防風何守也仲尼曰汪芒氏之君也守封嵎之山者也為漆姓在虞夏商為汪芒氏於周為長翟今為大人客曰人長之極幾何仲尼曰焦僥氏長三尺短之至也長者不過十之數之極也仲尼在陳有隼集於陳庭而死楛矢貫之楛侯古反楛矢木也可為箭簳石砮其長尺有咫陳惠公使人以隼如仲尼之館問之仲尼曰隼之來也逺矣此肅慎氏之矢也昔者武王克商通道於九夷百蠻使各以其方賄來貢於是肅慎氏貢楛矢石砮其長尺有咫先王欲昭令徳之致逺也以示後人故名其楛曰肅慎氏之貢矢以分大姬配虞胡公而封諸陳古者分同姓以珍玊展親也分異姓以逺方之職貢使無忘服也故分陳以肅慎氏之貢君若使有司求諸故府其可得也使求得之金櫝如之並魯語孔子出逰於少原之野有婦人中澤而哭其音甚哀孔子怪之使弟子問焉曰夫人何哭之哀婦人曰鄉者刈蓍薪而亡吾蓍簪吾是以哀也孔子曰刈蓍薪而亡蓍簪有何悲焉婦人曰非傷吾簪也而所以悲者蓋不忘故也詩曰代馬依北風飛鳥揚故巢皆不忘故之謂也子曰易先同人後大有承之以謙不亦可乎故徳行寛容而守之以恭者榮土地廣大而守之以儉者安位尊禄重而守之以卑者貴人衆兵强而守之以畏者勝聰明睿智而守之以愚者哲博聞强記而守之以淺者不溢此六者謙徳也易曰謙亨君子有終吉魯哀公問於孔子曰有智者壽乎孔子對曰然人有三死而非其命也人自取之寢處不時飲食不節勞佚過度者疾共殺之居下位而好干上嗜欲無厭求索不止者刑共殺之少以犯衆弱以侮强忿不量力兵共殺之此三死者非其命也人自取之子曰可以與言終日而不倦者其惟學乎其身體不足觀也勇力不足憚也先祖不足稱也族姓不足道也然而可以聞四方而昭於諸侯者其惟學乎並韓詩外傳持盈第四子曰持盈之道挹而損之順之者吉逆之者凶能此者其惟周公乎周公以文王之子武王之弟成王之叔父所執贄而師見者七人所還贄而友見者十三人窮巷白屋之士所先見者四十九人時進善者百人官朝者千人諫臣五人輔臣五人拂音弼臣六人載干戈以至封侯異族九十七人而同姓之士百人猶以周公為天下黨則以同族為衆異族為寡也子曰不謹於前而悔於後嗟乎雖悔亦無及矣詩曰惙其泣矣何嗟及矣此之謂也孔子遭齊程本子於郊傾蓋而語終日有間顧子路曰由束帛一以贈先生子路不對有間又顧曰由束帛一以贈先生子路㞕然而對曰㞕與屑同昔者由也聞之夫子士不中道而見女無媒而嫁君子不行也子曰由詩不云乎野有蔓草零露漙兮有美一人清揚婉兮邂逅相遇適我願兮今程本子賢士也於是不贈終身不之見也子曰大夫有爭臣三人雖無道不失其家季氏僭天子舞八佾旅泰山以雍徹無道甚矣然而不亡者以冉有季路為之宰也劔雖利不厲不㫁材雖美不學不髙雖有㫖酒嘉肴不嘗不知其㫖也雖有善道不學不達其功也故學然後知不足教然後知不究不足故自慊而勉不究故盡思而熟由此觀之則教學相長也子曰堯舜清微其身以聴天下務來賢人夫舉賢百福之宗也神明之主也孔子適衛衛使見客客去顔淵問曰客仁也乎子曰恨兮其心顙兮其口仁即吾不知也顔淵蹵然變色曰良玉度尺雖有十仞之土不能掩其光良珠度寸雖有百仞之水不能掩其氣夫形體之包心也閔閔乎其薄也茍有温瑩良在其中則眉䀹見之矣疵瑕在其中亦不能匿也詩曰鼓鐘于宫聲聞于外言有諸中者必形諸外也孔子行聞有哭聲甚哀子曰驅驅前有賢者至則臯魚也被褐擁鎌哭於道傍子辟車與之言曰子非有喪何哭之悲也臯魚曰吾失之三矣少而好學周流諸侯以歿吾親失之一也髙尚吾志簡於事君失之二也與交友厚中而絶之失之三也木欲靜而風不止子欲養而親不逮往而不可反者年也逝而不可追者親也吾請從此辭矣立槁而死孔子曰弟子識之於是門人辭歸而養親者十有三人宋大水魯弔之曰天降淫雨害於粢盛延及君地以憂執政使人敬弔宋人應之曰寡君不仁齋戒不脩使民失時天加以災又遺君憂拜命之辱孔子聞之曰宋其庶幾乎昔有桀紂不任其過其亡也忽焉文王知任其過其興也勃焉知過而改之是不過矣宋人聞之乃夙興夜寐弔死問疾戮力宇内三嵗年豐政平並韓詩外傳子觀第五子觀於魯桓公之廟有欹器焉子曰此為何器曰此為宥坐之器子曰吾聞宥坐之器者虛則欹中則正滿則覆明君以為至誡顧謂弟子曰注水焉弟子挹水而注之中則正滿則覆子喟然而歎曰吁惡有滿而不覆者哉物盈則衰樂極則悲日中則移月盈則虧子路曰敢問持滿有道乎子曰聰明睿智守之以愚功被天下守之以遜勇力蓋世守之以怯富有四海守之以謙此所謂挹而損之之道也子曰終日言不遺己憂終日行不遺己患唯智者有之故恐懼所以除患也恭敬所以越難也終日為之一言敗之可以不謹乎顔淵問曰囘願貧而如富賤而如貴無勇而威與人交通終身無患其可乎子曰善哉問也夫貧而如富知足而無欲也賤而如貴能遜而有禮也無勇而威恭敬而無失也終身無患擇言而後出也並韓詩外傳孔子曰簫韶者舞之遺音也温潤以和似南風之至其為音如寒暑風雨之動物如物之動人雷動獸禽風雨動魚龍仁義動君子財色動小人是以聖人務其本樂動聲儀子曰蚩尤庶人之貧者非天子也並孔子三朝記魯大夫季桓子穿井獲如土缶其中有羊焉使問之仲尼曰吾穿井而獲狗何也對曰以某之所聞羊也某聞之木石之怪曰䕫蝄蜽水之怪曰龍罔象土之怪曰羵羊魯語公父文伯第六公父文伯朝其母其母方績文伯曰以歜之家而主猶績懼干季孫之怒也其以歜為不能事主乎其母歎曰魯其亡乎使童子備官而未之聞邪居吾語女昔聖王之處民也擇瘠土而處之勞其民而用之故長王天下夫民勞則思思則善心生逸則淫淫則忘善忘善則惡心生沃土之民不材淫也瘠土之民莫不向義勞也是故天子大采朝日與三公九卿祖識地徳祖習也識知也天子因朝日以修陽政故謂之習地徳也日中考政與百官之政事師尹惟旅牧相宣序民事少采夕月與太史司載糾䖍天刑而後即安諸侯朝修天子之業命晝考其國職夕省其典刑夜儆百工使無慆淫而後即安卿大夫朝考其職晝講其庶政夕序其業夜庀音髀具也其家事而後即安士朝而受業書而講貫夕而習復夜而計過無憾而後即安自庶人以下明而動晦而休無日以怠王后親織𤣥紞丁敢切冠垂也公侯之夫人加之以紘綖卿之内子為大帶命婦成祭服列士之妻加之以朝服自庶士以下皆衣其夫社而賦事烝而獻功男女效績愆則有辟音平入聲古之制也君子勞心小人勞力先王之訓也自上以下誰敢淫心舍力今我寡也爾又在下位朝夕處事猶恐忘先人之業况有怠惰其何以避辟吾冀而朝夕修我曰必無廢先人爾今曰胡不自安以是承君之官余懼穆伯之絶祀也仲尼聞之曰弟子志之季氏之婦不淫矣季康子欲以田賦使冉有訪諸仲尼仲尼不對私於冉有曰求來汝不聞乎先王制土籍田以力而砥音止平也其逺近賦里以入而量其有無任力以夫而議其老幼於是乎有鰥寡孤疾有軍旅之出則徵之無則已其嵗收田一井出稯禾六百四十斛也秉芻百六十斛缶米缶庾也十六斛不是過也先王以為足若子季孫欲其法也則有周公之籍矣若欲犯法則茍而賦又何訪焉並魯語子曰黍可為酒禾入水也一貫三為王推一合十為士許氏説文孔子讀易韋編三絶鐵擿三折漆書三滅序彖繫象説卦文言曰假我數年若是我於易則彬彬矣夫子作春秋筆則筆削則削子夏之徒不能贊一辭弟子受春秋子曰後世知丘者以春秋罪丘者亦以春秋子曰自吾得由而惡言不入於耳子曰神龜知吉凶而骨直空枯日陽徳而君於天下而辱於三足之烏月為刑而相佐見食於蝦蟆蝟辱於鵲騰蛇之神而殆於即且竹外有節理中直空虛松栢為百木長而守門閭日辰不全而有空虛黄金有疵白玊有瑕事有所疾亦有所徐物有所拘亦有所據罔有所數亦有所疎人有所貴亦有所不如何而可適乎物安可全乎並見史記六藝第七子曰六藝於治一也禮以節人樂以發和書以道事詩以達意易以神化春秋以道義孔子遷於蔡三嵗呉伐陳楚救陳軍於城父聞孔子在陳蔡之間楚使人聘孔子孔子將往陳蔡之大夫謀曰楚大國也孔子用於楚則陳蔡用事大夫危矣於是相與發徒役圍孔子於野不得行絶糧從者皆莫能興孔子講誦弦歌不衰子路慍見曰君子亦有窮乎子曰君子固窮小人窮斯濫矣子貢作色子曰賜爾以予為多學而識之者與曰非與子曰非也予一以貫之孔子知弟子有慍心乃召子路而問曰詩云匪兕匪虎率彼曠野吾道非邪吾何為於此子路曰意者吾未仁邪人之不我信也意者吾未知邪人之不我行也子曰有是乎由譬使仁者而必信安有伯夷叔齊使知者而必行安有王子比干子路出子貢入見子曰詩云匪兕匪虎率彼曠野吾道非邪吾何為於此子貢曰夫子之道至大也故天下莫能容夫子夫子盍少貶焉子曰賜良農能稼而不能為穡良工能巧而不能為順君子能修其道綱而紀之統而理之而不能為容今爾不修爾道而求為容賜而志不逺矣子貢出顔回入子曰囘詩云匪兕匪虎率彼曠野吾道非邪吾何為於此顔囘曰夫子之道至大故天下莫能容雖然夫子推而行之不容何病不容然後見君子夫道之不修也是吾醜也道已大修而不用是有國者之醜也不容何病不容然後見君子子欣然而笑曰有是哉顔氏之子使爾多財吾為爾宰並史記子曰通國皆人也以道導之則吾民也不以道導之則吾讎也魯哀公問政於孔子孔子對曰政有使民富且壽哀公曰何謂也子曰薄賦歛則民富無事則逺罪逺罪則民壽公曰若是則國貧矣子曰詩云豈弟君子民之父母未見子富而父母貧者也子曰良藥苦口利於病忠言逆耳利於行故武王諤諤而昌紂嘿嘿而亡諫有五一曰正諫二曰降諫三曰忠諫四曰戇諫五曰諷諫孔子曰吾其從諷諫矣乎夫不諫則危君固諫則危身與其危君寧危身危身而終不用則諫亦無功矣子曰非其地而樹之不生也非其人而語之弗聽也得其人如聚沙而雨之非其人如聚聾而鼓之孔子觀於周之太廟有金人焉三緘其口而銘其背曰古之謹言人也戒之哉戒之哉無多言多言多敗無多事多事多害安樂必戒無行所悔勿謂何傷其禍將長勿謂何害其禍將大勿謂何殘其禍將然勿謂莫聞神將伺人熒熒不滅炎炎奈何涓涓不壅將成江河綿綿不絶將成網羅青青不伐將尋斧柯誠不能謹禍之根也口是何傷禍之門也强梁者不得其死好勝者必遇其敵君子知天下之不可蓋也故後之下之使人慕之執雌持下莫能與爭人皆趨彼我獨守此衆人惑惑我獨不從内藏我智不與人論技我雖尊髙人莫害我夫江河長百谷者以其卑下也天道無親常與善人戒之哉戒之哉孔子顧謂弟子曰識之此言雖鄙而中事情子曰不知其子視其所友不知其君視其所使與善人居如入芝蘭之室久而不聞其香與之俱化矣與不善人居如入鮑魚之肆久而不聞其臰臭同亦與之化矣故君子謹所與並見説苑依賢第八子曰依賢固不困依富故不貧馬蚿斬而復行者輔足衆也説苑子曰夫富而能富人者欲貧不可得也貴而能貴人者欲賤不可得也達而能達人者欲窮不可得也子曰士有五有埶尊貴者有家富厚者有資勇悍者有心智慧者有貌美好者埶尊貴者不以愛民行義理而反以暴傲陵物家富厚者不以賑窮救不足而反以侈靡無度資勇悍者不以衛上攻戰而反以侵陵私鬭心智慧者不以端計數而反以事姦飾詐貌美好者不以統朝涖官而反以蠱女從欲此五者所謂喪其美質者也並韓詩外傳孔子謂宓子賤曰子治單父而衆説語丘以其故曰不齊父其父子其子恤諸孤而哀喪紀孔子曰善小節也小民附矣猶未也曰不齊也所父事者三人所兄事者五人所友者十一人孔子曰父事三人可以教孝矣兄事五人可以教悌矣友十一人可以教學矣中節也中民附矣猶未足也曰此地有賢於不齊者五人不齊事之皆教不齊以治之之術孔子曰其大者乃於此在矣子曰回若有君子之道四强於行己弱於受諫怵於待禄慎於持身子曰自季孫之賜我千鍾而友益親自南宫項叔之乘我車也而道加行故道有時而後重有勢而後行微二子丘之道幾於廢也子路問曰君子亦有憂乎孔子曰無也君子修其身未得則樂其意已得又樂其知是以有終身之樂無一日之憂小人則不然未得之也則憂不得既得之又恐失之是以有終身之憂無一日之樂孔子曰丘死之後商也日益賜也日損商也好與賢己者處賜也好説不如己者孔子曰鞭朴之子不從父之教刑戮之民不從君之政言疾之難行故君子不急㫁不意使以為亂源子曰以富貴為人下者何人不與以富貴敬愛人者何人不親愛衆言不逆可謂知言矣衆嚮之可謂知時矣孔子曰船非水不可行水入船中則沒矣故君子不可不嚴也小人不可不閑也孔子曰貞以幹之敬以輔之待人無倦見君子則舉之見小人則退之去爾惡心而忠與之敏其行而修其禮千里之外親若兄弟若行不敏禮不合則對門不通矣並説苑漆雕氏第九孔子曰漆雕氏之子君子哉其善人之美也隱而顯言人之惡也微而著故智不能及明不能見也得無數卜乎孔子卦得賁喟然而歎子張進而問曰師聞賁吉卦而歎之乎孔子曰賁非正色也是以歎之吾思夫質素白當正白黒當正黒夫質文何也吾聞丹漆不文白玉不雕寶珠不飾何也質有餘者不受飾也魯有儉者瓦鬲煮食食之而美盛以土缻音缶之器以進孔子孔子受之懽然如受大牢之饋弟子曰瓦甂酒器也煮食薄膳也而先生何喜如此乎孔子曰吾聞好諫者思其君食美者思其親吾非以饋為厚也以其食美而思我親也孔子曰無體之禮敬也無服之喪憂也無聲之樂懽也不言而信不怒而威不施而仁志也鐘鼓之聲怒而擊之則武憂而擊之則悲喜而擊之則樂其志變其聲亦變至誠通乎金石而况人乎子路治蒲見孔子曰願受教子曰蒲多壯士難治也吾語汝恭以敬可以懾勇寛以正可以容衆恭以潔可以親上子貢為信陽令辭孔子而行孔子曰力之順之因子之時無奪無伐無暴無盜子貢曰君子固有盜乎孔子曰夫以不賢伐賢是謂奪以賢伐不肖是謂伐緩其令急其誅是謂暴取人之善為己之善是謂盜君子之盜豈必財幣乎吾聞之知為吏者奉法利民不知為吏者枉法害民皆怨之所由生也臨官莫如平臨財莫如廉廉平之守不可攻也匿人之善是蔽賢也揚人之惡是小人也不内相教而外相謗者是不足親也言人之善者有所得無所傷言人之惡者無所得有所傷故君子慎言語毋先己而後人擇言出之令口如耳齊景公問孔子曰秦穆公國小處僻而霸何也對曰國小而志大處僻而政中其舉果其謀和其令不媮親舉五羖大夫於繫縲之中與之語三日而授之以政以此取之雖王可也霸則小矣子路為蒲令備水災與民春修溝瀆故予民一簞食壺漿孔子聞之使子貢覆之子路不説往見夫子曰由也以暴雨將至恐有水災故與民修溝瀆以避之而民多匱於食故與人簞食壺漿而夫子使賜止之是夫子止由之行化也子曰爾以民餓何不告君發廩以給之而爾以私饋之是汝不明君之惠而見汝之徳也速已可矣否則爾之受罪不久矣子路心服而退並見説苑楚昭王第十楚昭王渡江有物大如斗直觸王舟中昭王恠之使聘問孔子子曰此名萍實吉祥也惟霸者能獲之其後齊有飛鳥一足來下止於殿前舒翼而跳齊侯恠之使聘問孔子子曰此名商羊也急治溝渠天將大雨於是諸國皆被水齊國獨以安孔子歸弟子問焉子曰異時兒童之謡曰楚王渡江得萍實大如斗赤如日剖而食之甜如蜜此楚之應也兒有兩兩相攜屈一足而跳者曰天將大雨商羊起舞今齊見之亦其應也夫謡未嘗不相應也在人非獨守道而已子曰以容取人失之子羽以言取人失之宰予澹臺子羽君子之容也與之久處而言不充其貌宰予之辭雅而文也與之久處而智不充其辯子貢問曰今之人臣孰賢子曰齊有鮑叔鄭有子皮賢者也子貢曰然則齊無管仲鄭無子産乎子曰賜女知其一而不知其二女聞進賢為賢邪用力為賢邪子貢曰進賢為賢子曰然吾聞鮑叔之進管仲也聞子皮之進子産也未聞管仲子産之有所進也介子推年十五為荆相仲尼聞之使弟子往視焉還曰庭下有二十五進士堂上有二十五老人仲尼曰合二十五人之智智於湯武并二十五人之力力於彭祖以治其國有不濟乎子貢曰君子見大川必觀焉何也孔子曰夫水者君子比徳焉徧與之而無私似徳所及者生所不及者死似仁其流行卑下皆循其理似義淺者流行深者不測似智其赴百仞之谷不疑似勇綿弱而微達似察受惡不讓似包䝉不清以入鮮潔以出似善至量必平似正盈不求概似度萬折必東似意是以君子見大水必觀焉爾也並説苑孔子集語卷上
