body:
  text: 孔子集語儒家類提要臣等謹案孔子集語三卷宋薛據撰據字叔容永嘉人官至浙東常平提舉林徳暘霽山集有二薛先生文集序曰薛氏世學盖三百年玉成公學於慈湖楊敬仲刋華據實猶程門緒餘偽學禁興隻手衛道著伊洛源流各為譜𫝊又以弓治授其子叔容公志宏力毅負荷千年念聖逺言湮為孔子集語二十卷即是書也此本但分二十篇僅有三卷殆舊以一篇為一卷後人併之歟所列書凡三十餘種其凡例謂曽子大戴禮孔叢子孔子家語四全書及左氏莊子荀子列子槩不採及惟見於他古書者採之然孔子世家列在正史不僻於孔叢家語且既云不録大戴禮記而顔叔子第十二乃又引其一條亦自亂其例至引說文黍可為酒禾入水也一貫三為王推一合十為士等語并數條為一條義不相貫尤為失倫他若韓非子說林下内儲說上内儲說下外儲說左上内儲說右下難一難三諸篇可採者幾二十條而此書所引僅三條若淮南子道應訓主術訓下齊俗訓修務訓泰族訓要畧諸篇所可採者不下十餘條而此所引者亦僅三條則其餘挂漏可以槩知又文翔鳯雲夢藥溪談摘其五酉一條引搜神記而諱其所出又訛五酉為五酋則駁襍舛錯亦所不免特所録尚有秦漢古書殘篇斷句或可藉此以僅存故考古者亦不能廢焉乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀孔子集語原序聖人之道至大矣其猶天乎三光二氣經其常雷霆風雨霜露緯其變斯人由之而不自知知之而莫能盡子曰予欲無言吾無行而不與二三子者然則當時鑽仰之淵騫蓋亦僅得之耳目所接耳及夫逍遥曳杖之歌作而金聲玉振之響不嗣則其一話一言之記載尚左尚右之彷彿轉相授受奚止百家漢承嫚秦滅學之後逮景武之世其去孔子未逺也去曽子未逺也去子思孟子又未逺也董仲舒對策獨推明孔氏令學者知所統一方是時有韓嬰者與董生齊名學詩著詩内外傳數萬言多引孔子言行以為之證仲舒所引悉與論語合嬰所載頗與荀子同又有曽子大戴禮孔叢子所取可謂備而傳之矣及長讀左氏公羊穀梁荀卿列禦冦韓嬰劉向等書其所記者益衆惑滋甚焉設以為孔子沒諸弟子追思料簡止以學而以下二十篇為確耶則此非君子之言齊東野人之語當時蓋擇之精矣豈傳偽者哉遂取諸書所載裒而聚之日纍月積寖成篇帙而見於曽子大戴記孔叢子家語四全書與夫載於左氏莊周列禦冦荀卿者皆不與而錯見於漢儒諸書者録之其草創也訂之丞相克齋㳺先生先生曰嘻夥哉子勉成之時禮部侍郎蘧徑東甽二曹先生十餘年間列官秘府遂得借書以閲辛夘火秘書之藏逸矣古書有不得盡見者屬南宫下第乃詮次此書為二十篇題曰集語以畢其志世有得而讀之者其猶兑之戈和之弓垂之竹矢在金櫝云淳祐丙午孟夏庚申朔永嘉薛據序
