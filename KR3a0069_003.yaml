body:
  text: 五性三禦覽四百十九引尚書大傳子張曰仁者何樂於山也孔子曰夫山者草忌然高草忌然高則何樂焉山草木生焉鳥獸蕃焉財用殖焉生財用而無私為四方皆伐焉每無私豫焉出雲風以通乎天地之間陰陽和合雨露之澤萬物以成百姓以饗此仁者之所以樂於山者也韓詩外傳一哀公問孔子曰有智壽乎孔子曰然人有三死而非命也者自取之也居處不理飲食不節勞過者病共殺之居下而好幹上嗜欲無厭求索不止者刑共殺之少以敵衆弱以侮強忿不量力者兵共殺之故有三死而非命者自取之也説苑雜言魯哀公問於孔子曰有智者壽乎孔子曰然人有三死而非命也者人自取之夫寢處不時飲食不節佚勞過度者疾共殺之居下位而上忤其君嗜欲無厭而求不止者刑共殺之少以犯衆弱以侮強忿怒不量力者兵共殺之此三死者非命也人自取之韓詩外傳二孔子曰口欲味心欲佚教之以仁心欲兵身惡勞教之以恭好辨論而畏懼教之以勇目好色耳好聲教之以義易曰艮其限列其摐厲薰心詩曰籲嗟女兮無與士耽皆防邪禁佚調和心志韓詩外傳五孔子曰夫談説之術齊莊以立之端誠以處之堅強以待之辟稱以喻之分別以明之歡欣芬芳以送之寶之珍之貴之神之如是則説恆無不行矣夫是之謂能貴其所貴若夫無類之説不形之行不讚之辭君子慎之大戴禮保傅孔子曰少成若天性習貫之為常賈子新書保傅孔子曰少成若天性習貫如自然大戴禮記勸學子貢曰君子見大川必觀何也孔子曰夫水者君子比德焉遍與之而無私似德所及者生所不及者死似仁其流行痺下倨句皆循其理似義其赴百仞之溪不疑似勇淺者流行深淵不測似智弱約危通似察受惡不讓似真苞裏不清以入鮮潔以出似善化必出量必平似正盈不求概似厲折必以東西似意是以見大川必觀焉荀子宥坐孔子觀於東流之水子貢問於孔子曰君子之所以見大水必觀焉者何也孔子曰夫水大遍與諸生而無為也似德其流也埤下裾拘必循其理似義其洸洸乎不淈盡似道若有決行之其應佚若聲響其赴百仞之穀不懼似勇主量必平似法盈不求概似正淖約微達似察以出以入就鮮潔似善化其萬折也必東似志是故君子見大水必觀焉説苑雜言子貢問曰君子見大水必觀焉何也孔子曰夫水者君子比德焉遍豫而無私似德所及者生似仁其流卑下句倨皆循其理似義淺者流行深者不測似智其赴百仞之穀不疑似勇綿弱而微達似察受惡不讓似包蒙不清以入鮮潔以出似善化至量必平似正盈不求概似度其萬折必東似意是以君子見大水必觀焉爾也後漢書李固傳固奏記孔子曰智者見變思刑愚者睹怪諱名荀子仲尼孔子曰巧而好度必節勇而好同必勝知而好謙必賢説苑雜言孔子曰巧而好度必工勇而好同必勝知而好謀必成愚者反是夫處重擅寵專事妒賢愚者之情也志驕傲而輕舊怨是以尊位則必危任重則必崩擅寵則必辱荀子儒效孔子曰周公其盛乎身貴而愈恭家富而愈儉勝敵而愈戒荀子王霸孔子曰知者之知固以多矣有以守少能無察乎愚者之知固以少矣有以守多能無狂乎荀子子道子路盛服見孔子孔子曰由是裾裾何也昔者江出於岷山其始出也其源可以濫觴及其至江之津也不放舟不避風則不可涉也非維下流水多邪今汝服既盛顏色充盈天下且孰肯諫汝矣由子路趨而出改服而入蓋猶若也孔子曰志之吾語汝奮於言者華奮於行者伐色知而有能者小人也故君子知之曰知之不知曰不知言之要也能之曰能之不能曰不能行之至也言要則知行至則仁既知且仁夫惡有不足矣哉韓詩外傳三傳曰子路盛服以見孔子孔子曰由疏疏者何也昔者江於濆其始出也不足濫觴及其至乎江之津也不方舟不避風不可渡也非其衆川之多歟今汝衣服其盛顏色充滿天下有誰加汝哉子路趨出改服而入蓋攝如也孔子曰由志之吾語汝夫慎於言者不譁慎於行者不伐色知而有長者小人也故君子知之為知之不知為不知言之要也能之為能之不能為不能行之要也言要則知行要則仁既知且仁又何加哉説苑雜言子路盛服而見孔子孔子曰由是襜襜者何也昔者江水出於岷山其始也大足以濫觴及至江之津也不方舟不避風不可渡也非唯下流衆川之多乎今若衣服甚盛顏色充盈天下誰肯加若者哉子路趨而出改服而入蓋自如也孔子曰由記之吾語若賁於言者華也奮於行者伐也夫色智而有能者小人也故君子知之為知之不知為不知言之要也能之為能不能為不能行之至也言要則知行要則仁既知且仁夫有何加矣哉由荀子子道子路人子曰由知者若何仁者若何子路對曰知者使人知己仁者使人愛己子曰可謂士矣子貢入子曰賜知者若何仁者若何子貢對曰知者知人仁者愛人子曰可謂士君子矣顏淵入子曰回知者若何仁者若何顏淵對曰知者自知仁者自愛子曰可謂明君子矣荀子法行子貢問於孔子曰君子之所以貴玉而賤瑉者何也為夫玉之少而瑉之多邪孔子曰惡賜是何言也夫君子豈多而賤之少而貴之哉夫玉者君子比德焉溫潤而澤仁也縝栗而理知也堅剛而不屈義也廉而不劌行也折而不橈勇也瑕適並見情也扣之其聲清揚而遠聞其止輟然辭也故雖有瑉之雕雕不若玉之章章詩曰言念君子溫其如玉此之謂也列子仲尼子夏問孔子曰顏回之為人奚若子曰回之仁賢於丘也曰子貢之為人奚若子曰賜之辨賢於丘也曰子路之為人奚若子曰由之勇賢於丘也曰子張之為人奚若子曰師之莊賢於丘也子夏避席而問曰然則四子者何為事夫子曰居吾語汝夫回能仁而不能反賜能辨而不能訥由能勇而不能怯師能莊而不能同兼四子之有以易吾吾弗許也此其所以事吾而不二也淮南子人間訓人或問孔子曰顏回何如人也曰仁人也丘弗如也子貢何如人也曰辨人也丘弗如也子路何如人也曰勇人也丘弗如也賓曰三人皆賢賢而為夫子役何也孔子曰丘能仁且忍辨且訥勇且怯以三子之能易丘一道丘弗為也孔子知所施之也説苑雜言子夏問仲尼曰顏淵之為人也何若曰回之信賢於丘也曰子貢之為人也何若曰賜之敏賢於丘也曰子路之為人也何若曰由之勇賢於丘也曰子張之為人何若曰師之莊賢於丘也於是子夏避席而問曰然則四者何為事先生曰坐吾語汝回能信而不能反賜能敏而不能屈由能勇而不能怯師能莊而不能同兼此四者丘不為也論衡定賢或問於孔子曰顏淵何人也曰仁人也丘不如也子貢何人也曰辨人也丘弗如也子路何人也曰勇人也丘弗如也客曰三子者皆賢於夫子而為夫子服役何也孔子曰丘能仁且忍辨且詘勇且怯以三子之能易丘之道弗為也禦覽八百三十引尸子孔子曰詘寸而信尺小枉而大直吾弗為也法言五百宋鹹注孔子曰君子之行已可以詘則詘可以伸則伸呂氏春秋孟冬紀異用孔子之弟子從遠方來者孔子荷杖而問之曰子之公不有恙乎搏杖而揖之問曰子之父母不有恙乎置杖而問曰子之兄弟不有恙乎戈步而倍之問曰子之妻子不有恙乎賈子容經子贛由其家來謁於孔子孔子正顏舉杖磬折而立曰子之大親毋乃不寧乎放杖而立曰子之兄弟亦得無恙乎曳杖倍下行曰妻子家中得無病乎故身之倨佝手之高下顏色聲氣各有宜稱所以明尊卑別疏戚也淮南子繆稱訓夫子見禾之三變也滔滔然曰狐向丘而死我其首禾焉薛據孔子集語引新序孔子謂曾子曰君子不以利害義則恥辱安從生哉官怠於宦成病加於少愈禍生於怠惰孝衰於妻子察此四者慎終如始説苑君道魯哀公問於孔子曰吾聞君子不博有之乎孔子對曰有之哀公曰何為其不博也孔子對曰為其有二乘哀公曰有二乘則何為不博也孔子對曰為行惡道也哀公懼焉有間曰若是乎君子之惡惡道之甚也孔子對曰惡惡道不能甚則其好善道亦不能甚好善道不能甚則百姓之親之也亦不能甚詩雲未見君子憂心惙惙亦既見止亦既覯止我心則説詩之好善道之甚也如此哀公曰善哉吾聞君子成人之美不成人之惡微孔子吾焉聞斯言也哉説苑敬慎顏回將西遊問於孔子曰何以為身孔子曰恭敬忠信可以為身恭則免於衆敬則人愛之忠則人與之信則人恃之人所愛人所與人所恃必免於患矣可以臨國家何況於身乎説苑雜言子路將行辭於仲尼曰贈汝以車乎以言乎子路曰請以言仲尼曰不強不遠不勞無功不忠無親不信無復不恭無禮慎此五者可以長久矣説苑雜言孔子曰中人之情有餘則侈不足則儉無禁則淫無度則失縱欲則敗飲食有量衣服有節宮室有度畜聚有數車器有限以防亂之源也故夫度量不可不明也善欲不可不聽也説苑雜言孔子曰君子終日言不遺己之憂終日行不遺已之患唯智者有之故恐懼所以除患也恭敬所以越難也終身為之一言敗之可不慎乎説苑辨物顏淵問於仲尼曰成人之行何若子曰成人之行達乎情性之理通乎物類之變知幽明之故睹遊氣之源若此而可謂成人既知天道行躬以仁義飭身以禮樂夫仁義禮樂成人之行也窮神知化德之盛也潛夫論浮侈孔子曰多貨財傷於德弊則沒禮中論貴驗孔子曰欲人之信己也則微言而篤行之篤行之則用日久用日久則事著明事著明則有目莫不見也有耳莫不聞也其可誣哉中論貴言孔子曰惟君子然後能貴其言貴其色小人能乎哉中論核辨孔子曰小人毀訾以為辨絞急以為智不遜以為勇六藝四上周易乾鑿度仲尼魯人生不知易本偶筮其命得旅請益於商瞿氏曰子有聖智而無位孔子泣而曰天也命也鳳鳥不來河無圖至嗚呼天命之也歎訖而後息志停讀禮止史削五十究易作十翼明也明易幾教若曰終日而作思之於古聖頤師於姬昌法旦作九問十惡七正八歎上下係辭大道大數大法大義易書中為通聖之問明者以為聖賢矣孔子曰吾以觀之曰仁者見為仁幾之文智者見為智幾之問聖者見為通神之文仁者見之為之仁智者見之為之智隨仁智也周易乾鑿度孔子曰易者易也變易也不易也管三成德為道苞籲易者以言其德也通情無門藏神無內也光明四通佼易立節天地爛明日月星辰布設八卦錯序律曆調列五緯順軌四時和栗孳結四瀆通情優遊信潔根著浮流氣更相實虛無感動清淨昭哲移物致耀至誠專密不煩不橈淡泊不失此其易也變易也者其氣也天地不變不能通氣五行迭終四時更廢君臣取象變節相和能消者息必專者敗君臣不變不能成朝紂行酷虐天地反文王下呂九尾見夫婦不變不能成家妲已擅寵殷以之破大任順季享國七百此其變易也不易也者其位也天在上地在下君南面臣北面父坐子伏此其不易也故易者天地之道也乾坤之德萬物之寶至哉易一元以為元紀周易乾鑿度孔子曰方上古之時人民無別群物無殊未有衣食器用之利於是伏羲乃仰觀象於天俯觀法於地中觀萬物之宜始作八卦以通神明之德以類萬物之情故易者所以繼天地理人倫而明王道是故八卦以建五氣以立五常以之行象法乾坤順陰陽以正君臣父子夫婦之義度時制宜作網罟以畋以漁以贍人用於是人民乃治君親以尊臣子以順群生和洽各安其性八卦之用伏羲氏之王天下也始作八卦結繩而為網罟以畋以漁蓋取諸離質者無文以天言此易之意夫八卦之變象感在人文王因性情之宜為之節文周易乾鑿度孔子曰易始於太極太極分而為二故生天地天地有春秋冬夏之節故生四時四時各有陰陽剛柔之分故生八卦八卦成列天地之道立雷風水火山澤之象定矣其布散用事也震生物於東方位在二月巽散之於東南位在四月離長之於南方位在五月坤養之於西南方位在六月兌收之於西方位在八月乾製之於西北方位在十月坎藏之於北方位在十一月艮終始之於東北方位在十二月八卦之氣終則四正四維之分明生長收藏之道備陰陽之體定神明之德通而萬物各以其類成矣皆易之所苞也至矣哉易之德也周易乾鑿度孔子曰歲三百六十日而天氣周八卦用事各四十五日方備歲焉故艮漸正月巽漸三月坤漸七月乾漸九月而各以卦之所言為月也乾者天也終而為萬物始北方萬物所始也故乾位在於十月艮者止物者也故在四時之終位在十二月巽者陰始順陽者也陽始壯於東南方故位在四月坤者地之道也形正六月四維正紀經緯仲序度畢矣周易乾鑿度孔子曰乾坤陰陽之主也陽始於亥形於醜乾位在西北陽祖微據始也陰始於巳形於未據正立位故坤位在西南陰之正也君道倡始臣道終正是以乾位在亥坤位在未所以明陰陽之職定君臣之位也周易乾鑿度孔子曰八卦之序成立則五氣變形故人生而應八卦之體得五氣以為五常仁義禮智信是也夫萬物始出於震震東方之卦也陽氣始生受形之道也故東方為仁成於離離南方之卦也陽得正於上陰得正於下尊卑之象定禮之序也故南方為禮入於兌兌西方之卦也陰用事而萬物得其宜義之理也故西方為義漸於坎坎北方之卦也陰氣形盛陰陽氣含閉信之類也故北方為信夫四方之義皆統於中央故乾坤艮巽位在四維中央所以繩四方行也智之決也故中央為智故道興於仁立於禮理於義定於信成於智五者道德之分天人之際也聖人所以通天意理人倫而明至道也周易乾鑿度孔子曰陽三陰四位之正也故易卦六十四分而為上下象陰陽也夫陽道統而奇故上篇三十所以象陽也陰道不純而偶故下篇三十四所以法陰也乾坤者陰陽之根本萬物之祖宗也為上篇始者尊之也離為日坎為月日月之道陰陽之經所以終始萬物故以坎離為終咸恆者男女之始夫婦之道也人道之興必由夫婦所以奉承祖宗為天地主也故為下篇始者貴之也既濟未濟為最終者所以明戒慎而存王道京氏易傳下孔子曰陽三陰四位之正也三者東方之數東方日之所出又圓者徑一而開三也四者西方之數西方日之所入又方者徑一而取四也言日月終天之道故易卦六十四分上下象陰陽也奇耦之數取之於乾坤乾坤者陰陽之根本坎離者陰陽之性命分四營而成易十有八變而成卦卦象定吉凶明得失降五行分四象順則吉逆則凶故曰吉凶悔吝生乎動又曰明得失於四序運機布度其氣轉易主者亦當則天而行與時消息安而不忘亡將以順性命之理極蓍龜之源重三成六能事畢矣分天地乾坤之象益之以甲乙壬癸震巽之象配庚辛坎離之象配戊己艮兌之象配丙丁八卦分陰陽六位五行光明四通變易立節天地若不變易不能通氣五行迭終四時更廢變動不居周流六虛上下無常剛柔相易不可以為典要惟變所適吉凶共列於位進退明乎機要易之變化六爻不可據以隨時所占周易乾鑿度孔子曰泰者天地交通陰陽用事長養萬物也否者天地不交通陰陽不用事止萬物之長也上經象陽故以乾為首坤為次先泰而後否損者陰用事澤損山而萬物損也下損以事其上益者陽用事而雷風益萬物也上自損以益下下經以法陰故以咸為始恆為次先損而後益各順其類也周易乾鑿度孔子曰升者十二月之卦也陽氣升上陰氣欲承萬物始進譬猶文王之修積道德宏開基業始即升平之路當此時也鄰國被化岐民和洽是以六四蒙澤而承吉九三可處王位享於岐山為報德也明陰以顯陽之化民臣之順德也故言無咎周易乾鑿度孔子曰益之六二或益之十朋之龜弗克違永貞吉王用享於帝吉益者正月之卦也天氣下施萬物皆益言王者之法天地施政教而天下被陽德蒙王化如美寶莫能違害永貞其道咸受吉化德施四海能繼天道也王用享於帝者言祭天也三王之郊一用夏正天氣三微而成一著三著而成一體方知此之時天地交萬物通故泰益之卦皆夏之正也此四時之正不易之道也故三王之郊一用夏正所以順四時法天地之道也周易乾鑿度孔子曰隨上六拘係之乃從維之王用享於西山隨者二月之卦隨德施行藩決難解萬物隨陽而出故上六欲九五拘係之維持之明被陽化而陰隨從之也譬猶文王之崇至德顯中和之美拘民以禮係民以義當此之時仁恩所加靡不隨從咸悅其德得用道之王故言王用享於西山周易乾鑿度孔子曰陽消陰言陰消陽言剝者萬物之祖也斷製除害全物為務之為言決也當三月之時陽盛息消陰之氣萬物畢生靡不蒙化譬猶王者之崇至德奉承天命伐決小人以安百姓故謂之決夫陰傷害為行故剝之為行剝也當九月之時陽氣衰消而陰終不能盡陽小人不能決君子也謂之剝言不安而已是以之九五言決小人剝之六五言盛殺萬物皆剝墮落譬猶君子之道衰小人之道盛侵害之行興安全之道廢陰貫魚而欲承君子也周易乾鑿度孔子曰易有六位三才天地人道之分際也三才之道天地人也天有陰陽地有柔剛人有仁義法此三者故生六位六位之變陽爻者製於天也陰爻者係於地也天動而施曰仁地靜而理曰義仁成而上義成而下上者專製下者順從正形於人則道德立而尊卑定矣此天地人道之分際也天地之氣必有終始六位之設皆由上下故易始於一分於二通於三於四盛於五終於上初為元士二為大夫三為三公四為諸侯五為天子上為宗廟凡此六者陰陽所以進退君臣所以升降萬人所以為象則也故陰陽有盛衰人道有得失聖人因其象隨其變為之設卦方盛則托吉將衰則寄凶陰陽不正皆為失位其應實而有之皆失義善雖微細必見吉端惡雖纖介必有悔吝所以極天地之變盡萬物之情明王事也丘係之曰立象以盡意設卦以盡情偽係辭焉以盡其言周易乾鑿度孔子曰易六位正王度見矣周易乾鑿度孔子曰易有君人五號也帝者天稱也王者美行也天子者爵號也大君者與上行異也大人者聖明德備也變文以著名題德以別操王者天下所歸往易曰在師中吉無咎王三錫命師者衆也言有盛德行中和順民心天下歸往之莫不美命為王也行師以除民害賜命以長世德之盛天子者繼天理物改一統各得其宜父天母地以養萬民至尊之號也易曰公用享於天子大君者君人之盛者也易曰知臨大君之宜吉臨者大也陽氣在內中和之盛應於盛位浸大之化行於萬民故言宜處王位施大化為大君矣臣民欲被化之詞也大人者聖人之在位者也夫大人者與天地合其德易曰見龍在田利見大人又曰飛龍在天利見大人言德化施行天地之和故曰大人周易乾鑿度孔子曰既濟九三高宗伐鬼方三年克之高宗者武丁也湯之後有德之君也九月之時陽失正位盛德既衰而九三得正下陰能終其道濟成萬物猶殷道中衰王道陵遲至於高宗內理其國以得民心扶救衰微伐征遠方三年而惡消滅王道成殷人高而宗之文王挺以校易勸德也周易乾鑿度孔子曰易本陰陽以譬於物也掇序帝乙箕子高宗著德易者所以昭天道定王業也上術先聖考諸近世采美善以見王事言帝乙箕子高宗明有法也美帝乙之嫁妹順天地之道以立嫁娶之義義立則妃匹正妃匹正則王化全周易乾鑿度孔子曰泰者正月之卦也陽氣始通陰道執順故因此以見湯之嫁妹能順天地之道立教戒之義也至於歸妹八月卦也陽氣歸下陰氣方盛故復以見湯妹之嫁以天子貴妹而能自卑順從變節而欲承陽者以執湯之戒是以因時變一用見帝乙之道所以彰湯之美明陰陽之義也孔子曰自成湯至帝乙帝乙湯之元孫之孫也此帝乙即湯也殷録質以生日為名順天性也元孫之孫外絶恩矣同以乙日生疏可同名湯以乙生嫁妹本天地正夫婦夫婦正王道興矣故曰易之帝乙為成湯書之帝乙六世王同名不害以明功周易乾鑿度孔子曰紱者所以別尊卑彰有德也故朱赤者盛色也是以聖人法以為紱服欲百世不易也故困九五文王為紂三公故言困於赤紱也至於九二周將王故言朱紱方來不易之法也周易乾鑿度孔子曰易天子三公諸侯紱服皆同色困九二困於酒食朱紱方來九五劓刖困於赤茀夫困之九二有中和居亂世交於小人困於酒食者困於祿也朱茀者天子賜大夫之服而有九二大人之行將賜之朱茀其位在二故以大夫言之至於九五劓刖者不安也文王在諸侯之位上困於紂也故曰劓刖困於赤茀夫執中和順時變所以全王德通至美也乃徐有説丘記彖曰困而不失其所亨貞大人吉以剛中也文王因陰陽定消息立乾坤統天地夫有形者生於無形則乾坤安從生故曰有太易有太初有太始有太素太易者未見氣太初者氣之始太始者形之始太素者質之始氣形質具而未相離故曰渾淪言萬物相渾淪而未相離視之不見聽之不聞循之不得故曰易也易無形埒也易變而為一一變而為七七變而為九九者氣變之究也乃復變而為一一者形變之始清輕上為天濁重下為地物有始有壯有究故三畫而成乾乾坤相並俱生物有陰陽因而重之故六畫而成卦卦者挂也挂萬物視而見之故三畫已下為地四畫已上為天物感以動類相應也易氣從下生故動於地之下則應於天之下動於地之中則應於天之中動於地之上則應於天之上故初以四二以五三以上此謂之應陽動而進陰動而退故陽以七陰以八為彖易一陰一陽合而為十五之謂道陽變七之九陰變八之六亦合於十五則彖變之數若一陽動而進變七之九象其氣之息也陰動而退變八之六象其氣之消也故太一取其數以行九宮四正四維皆合於十五五音六律七宿由此作焉八卦之生物也畫六爻之移氣周而從卦八卦數二十四以生陰陽衍之皆合之於度量陽析九陰析六陰陽之析各百九十二以四時乘之八而周三十二而大周三百八十四爻萬一千五百二十析也故卦當歲爻當月析當日大衍之數必五十以成變化而行鬼神也故曰日十者五音也辰十二者六律也星二十八者七宿也凡五十所以大閡物而出之者故六十四卦三百八十四爻戒各有所係焉故陽唱而陰和男行而女隨天道左旋地道右遷二卦十二爻而期一歲乾陽也坤陰也並治而交錯行乾貞於十一月子左行陽時六坤貞於六月未右行陰時六以奉順成其歲歲終次從於屯蒙屯蒙主歲屯為陽貞於十二月醜其爻左行以間時而治六辰蒙為陰貞於正月寅其爻右行亦間時而治六辰歲終則從其次卦陽卦以其辰為貞醜與左行間辰卦遇大畜艮之二世九二甲寅木為世六五景子水為應世生外象生象來爻生互內象艮別子應有五子一子短命顏回云何以知之內象是本子一艮變為二醜三陽爻五於是五子一子短命何以知短命他以故也京氏易傳下孔子易云有四易一世二世為地易三世四世為人易五世六世為天易遊魂歸魂為鬼易八卦鬼為係爻財為製爻天地為義爻福德為寶爻同氣為專爻龍德十一月在子在坎卦左行虎刑五月午在離卦右行甲乙庚辛天官申酉地官丙丁壬癸天官亥子地官戊己甲乙天官寅卯地官壬癸戊己天官辰戌地官靜為悔發為貞貞為本悔為末初爻上二爻中三爻下三月之數以成一月初爻三日二爻三日三爻三日名九日餘有一日名曰閏餘初爻十日為上旬二爻十日為中旬三爻十日為下旬三旬三十積旬成月積月成年八八六十四卦分六十四卦配三百八十四爻成萬一千五百二十策定氣候二十四考五行於運命人事天道日月星辰局於指掌吉凶見乎其位係乎吉凶悔吝生乎動寅中有生火亥中有生木巳中有生金申中有生水醜中有死金戌中有死火未中有死木辰中有死水土兼於中建子陽生建午陰生二氣相衝吉凶明矣積算隨卦起宮乾坤震巽坎離艮兌八卦相蕩二氣陽入陰陰入陽二氣交互不停故曰生生之謂易天地之內無不通也乾起巳坤起亥震起午巽起辰坎起子離起醜艮起寅兌起於六十四卦遇王則吉廢則凶衝則破刑則敗死則危生則榮考其義理其可通乎分三十為中六十為上三十為下總一百二十通陰陽之數也新新不停生生相續故淡泊不而治六辰陰卦與陽卦同位者退一辰以為貞其爻右行間辰而治六辰泰否之卦獨各貞其辰共北辰左行相隨也中孚為陽貞於十一月子小過為陰貞於六月未法於乾坤三十二歲期而周六十四卦三百八十四爻萬一千五百二十析復從於貞曆以三百六十五日四分度之一為一歲易以三百六十析當期之日此律曆數也五歲再閏故再扐而後卦以應律曆之數故乾坤氣合戌亥音受二子之節陽生秀白之州載鍾名太一之精也其帝一世紀録事明期推移不奪而消焉周易乾鑿度孔子曰三萬一千九百二十歲録圖受命易姓三十二紀德有七其三法天其四法地五王有三十五半聖人君子消息卦純者為帝不純者為王六子上不及帝下有過王故六子雖純不為乾坤周易坤靈圖丘序曰天經曰乾元亨利貞爻曰飛龍在天利見大人故德配天地天地不私公位稱之曰帝故堯天之精陽萬物莫不從者故乾居西北乾用事萬物蟄伏致乎萬物蟄伏故能致乎萬人之化經曰用九經曰震下乾上無妄天精起帝必有洪水之災天生聖人使殺之故言乃統天也丘括義因象助類辭曰天無雲而雷先王以茂對時育萬物經曰乾下艮上大畜天災將至預畜而待之人免於飢故曰元亨上下皆通各載其性故曰利貞至德之萌五星若連珠日月如合璧天精起鬥口有位雞鳴鬥運行復始莫敢當之黃星笰於北斗必以戊己日其先無芒行文元武動事莫之敢拒史記仲尼弟子傳正義引中備魯人商瞿使向齊國瞿年四十今復使行遠路畏慮恐絶無子夫子正月與瞿母筮告曰後有五丈夫子子貢曰何以知子曰失其所確然示人陰陽運行一寒一暑五行互用一吉一凶以通神明之德以類萬物之情故易所以斷天下之理定之以人倫而明王道八卦建五氣立五常法象乾坤順於陰陽以正君臣父子之義故易曰元亨利貞夫作易所以垂教教之所被本被於有無且易者包備有無有吉則有凶有凶則有吉生吉凶之義始於五行終於八卦從無入有見災於星辰也從有入無見象於陰陽也陰陽之義歲月分也歲月既分吉凶定矣故曰八卦成列象在其中矣六爻上下天地陰陽運轉有無之象配乎人事八卦仰觀俯察在乎人隱顯災祥在乎天考天時察人事在乎卦八卦之要始於乾坤通乎萬物故曰易窮則變變則通通則久久於其道其理得矣卜筮非襲於吉唯變所適窮理盡性於茲矣困學紀聞引京氏易積算法夫子曰八卦因伏羲暨於神農重乎八純聖理元微易道難究迄乎西伯父子研理窮通上下囊括推爻考象配卦世應加乎星宿局於六十四所二十四氣分天地之數定人倫之理驗日月之行尋五行之端災祥進退莫不因茲而兆矣故考天地日月星辰山川草木蟲魚鳥獸之情狀運氣生死休咎不可執一隅故曰易含萬象韓詩外傳八孔子曰易先同人後大有承之以謙不亦可乎故天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙者抑事而損者也持盈之道抑而損之此謙德之於行也順之者吉逆之者凶五帝既沒三王既衰能行謙德者其惟周公乎文王之子武王之弟成王之叔父假天子之尊位七年所執贄而師見者十人所還質而友見者十三人窮巷白屋之士所先見者四十九人時進善者百人官朝者千人諫臣五人輔臣五人拂臣六人載干戈以至於封侯而同姓之士百人孔子曰猶以周公為天下賞則以同族為衆而異族為寡也故德行寬容而守之以恭者榮土地廣大而守之以儉者安位尊祿重而守之以卑者貴人衆兵強而守之以畏者勝聰明睿智而守之以愚者哲博聞強記而守之以淺者不溢此六者皆謙德也易曰謙亨君子有終吉能以終吉者君子之道也貴為天子富有四海而德不謙以亡其身者桀紂是也而況衆庶乎夫易有一道焉大足以治天下中足以安家國近足以守其身者其惟謙德乎大戴禮易本命子曰夫易之生人禽獸萬物昆蟲各有以生或奇或偶或飛或行而莫知其情惟達道德者能原本之矣天一地二人三三三而九九九八十一一主日日數十故人十月而生八九七十二偶以承奇奇主辰辰主月月主馬故馬十二月而生七九六十三三主鬥鬥主狗故狗三月而生六九五十四四主時時主豕故豕四月而生五九四十五五主音音主猿故猿五月而生四九三十六六主律律主禽鹿故禽鹿六月而生也三九二十七七主星星主虎故虎七月而生二九十八八主風風主蟲故蟲八月化也其餘各以其類也鳥魚皆生於陰而屬於陽故鳥魚皆卵魚遊於水鳥飛於雲故冬燕雀入於海化而為蚧萬物之性各異類故蠶食而不飲蟬飲而不食蜉蝣不飲不食介鱗夏食冬蟄齕吞者八竅而卵生咀嚾者九竅而胎生四足者無羽翼戴角者無上齒無角者膏而無前齒有羽者脂而無後齒晝生者類父夜生者類母凡地東西為緯南北為經山為積德川為積刑高者為生下者為死丘陵為牡溪穀為牝蚌蛤龜珠與月盛虛是故堅土之人肥虛土之人大沙土之人細息土之人美耗土之人醜是故食水者善遊能寒食土者無心而不息食木者多力而拂食草者善走而愚食桑者有絲而蛾食肉者勇敢而捍食穀者智惠而巧食氣者神明而壽不食者不生而神故曰有羽之蟲三百六十而鳳凰為之長有毛之蟲三百六十而麒麟為之長有甲之蟲三百六十而神龜為之長有鱗之蟲三百六十而蛟龍為之長倮之蟲三百六十而聖人為之長此乾坤之美類禽獸萬物之數也故帝王好壞巢破卵則鳳凰不翔焉好竭水搏魚則蛟龍不出焉好刳胎殺夭則麒麟不來焉好填溪塞穀則神龜不出焉故王者動必以道靜必以理動不以道靜不以理則自夭而不壽妖孽數起神靈不見風雨不時暴風水旱並興人民夭死五穀不滋六畜不蕃息盧辨大戴禮易本命注孔子曰聖人智通於大道應化而不窮能測萬品之情也後漢書郎珝傳孔子曰雷之始發大壯始君弱臣強從解起呂氏春秋慎行論一行孔子卜得賁孔子曰不吉子貢曰夫賁亦好矣何謂不吉乎孔子曰夫白而白黑而黑夫賁又何好乎説苑反質孔子卦得賁喟然仰而歎息意不平子張進舉手而問曰師聞賁者吉卦而歎之乎孔子曰賁非正色也是以歎之吾思夫質素白當正白黑當正黑文質又何也吾亦聞之丹漆不文白玉不雕寶珠不飾何也質有餘者不受飾也淮南子人間訓孔子讀易至損益未嘗不憤然而歎曰益損者其王者之事與事或欲以利之適足以害之或欲害之乃反以利之利害之反禍福之門戶不可不察也説苑敬慎孔子讀易至於損益則喟然而歎子夏避席而問曰夫子何為歎孔子曰夫自損者益自益者缺吾是以歎也子夏曰然則學者不可以益乎孔子曰否天之道成者未嘗得久也夫學者以虛受之故曰得苟不知持滿則天下之善言不得入其耳矣昔堯履天子之位猶允恭以持之虛靜以待下故百載以逾盛迄今而益章昆吾自臧而滿意窮高而不衰故當時而虧敗迄今而逾惡是非損益之征與吾故曰謙也者致恭以存其位者也夫豐明而動故能大苟大則虧矣吾戒之故曰天下之善言不得入其耳矣日中則昃月盈則食天地盈虛與時消息是以聖人不敢當盛升輿而遇三人則下二人則軾調其盈虛故能長久也子夏曰善請終身誦之論衡卜筮子路問孔子曰豬肩羊膊可以得兆萑葦稿芼可以得數何必以蓍龜孔子曰不然蓋取其名也夫蓍之為言耆也龜之為言舊也明狐疑之事當問耆舊也抱朴子內篇袪惑有古強者云孔子嘗勸我讀易云此良書也丘竊好之韋編三絶鐵撾三折今乃大悟尚書序疏引尚書緯孔子求書得黃帝元孫帝魁之書迄於秦穆公凡三千二百四十篇斷遠取近定可以為世法者百二十篇以百二篇為尚書十八篇為中候尚書大傳鄭注心明曰聖孔子説休徵曰聖者通也兼四而明則所謂聖聖者包貌言視聽而載之以思心者通以待之君思心不通則是不能心明其事也尚書大傳孔子曰吾於洛誥見周公之德光明於上下勤施四方旁作穆穆至於海表莫敢不來服莫敢不來享以勤文王之鮮光以揚武王之大訓而天下大洽故曰聖之與聖也猶規之相周矩之相襲也尚書大傳子張曰堯舜之主二人刑而天下治何則教誠而愛深也一夫而被此五刑子龍子曰未可謂能為書孔子曰不然也五刑有此教尚書大傳略説子夏讀書畢見於夫子夫子問焉子何為於書子夏對曰書之論事也昭昭如日月之代明離離若星辰之錯行上有堯舜之道下有三王之義商所受於夫子志之於心弗敢忘也雖退而岩居河濟之間深山之中作壞室編蓬戶尚彈琴其中以歌先王之風則可以發憤慷慨忘己貧賤有人亦樂之無人亦樂之而忽不知憂患與死也夫子造然變色曰嘻子殆可與言書矣雖然見其表未見其裏也顏淵曰何為也子曰窺其門而不入其中觀其奧藏之所在乎然藏又非難也丘嘗悉心盡志以入其則前有高岸後有大溪填填正立而已是故堯典可以觀美禹貢可以觀事咎繇可以觀治鴻範可以觀度六誓可以觀義五誥可以觀仁甫刑可以觀誡通斯七觀書之大義舉矣韓詩外傳二子夏讀詩已畢夫子問曰爾亦何大於詩矣子夏對曰詩之於事也昭昭乎若日月之光明燎燎乎如星辰之錯行上有堯舜之道下有三王之義弟子不敢忘雖居蓬戶之中彈琴以詠先王之風有人亦樂之無人亦樂之亦可發憤忘食矣詩曰衡門之下可以棲遲泌之洋洋可以療飢夫子造然變容曰嘻吾子殆可以言詩已矣然子以見其表未見其裏顏淵曰其表已見其裏又何有哉孔子曰窺其門不入其中安知其奧藏之所在乎然藏又非難也丘嘗悉心盡志已入其中前有高岸後有深谷泠泠然如此既立而已矣不能見其裏未謂精微者也説苑敬慎孔子曰存亡禍福皆在己而已天災地妖亦不能殺也昔者殷王帝辛之時爵生烏於城之隅工人占之曰凡小以生巨國家必祉王名必倍帝辛喜爵之德不治國家亢暴無極外寇乃至遂亡殷國此逆天之時詭福反為禍至殷王武丁之時先王道缺刑法弛桑穀俱生於朝七日而大拱工人占之曰桑穀者野物也野物生於朝意朝亡乎武丁恐駭側身修行思昔先王之政興滅國繼絶世舉逸民明養老之道三年之後遠方之君重譯而朝者六國此迎天時得禍反為福也故妖孽者天所以警天子諸侯也惡夢者所以警士大夫也故妖孽不勝善政惡夢不勝善行也至治之極禍反為福故太甲曰天作孽猶可違自作孽不可逭史記三代世表褚少孫補讚孔子曰昔者堯命契為子氏為有湯也命後稷為姬氏為有文王也太王命季曆明天瑞也太伯之吳遂生源也意林四王逸正部仲尼敘書上謂天談下謂民語兼該男女究其表裏隸釋四周憬銘孔子曰禹不決江疏河吾其魚矣六藝四下禦覽八百四引詩含神霧孔子曰詩者天地之心君德之祖百福之宗萬物之戶也刻之玉版藏之金府毛詩木瓜傳孔子曰吾於木瓜見苞苴之禮行韓詩外傳五子夏問曰關雎何以為國風始也孔子曰關雎至矣乎夫關雎之人仰則天俯則地幽幽冥冥德之所藏紛紛沸沸道之所行如神龍變化斐斐文章大哉關雎之道也萬物之所係群生之所懸命也河洛出書圖麟鳳翔乎郊不由關雎之道則關雎之事將奚由至矣哉夫六經之策皆歸論汲汲蓋取之乎關雎關雎之事大矣哉馮馮翊翊自東自西自南自北無思不服子其勉強之思服之天地之間生民之屬王道之原不外此矣子夏喟然歎曰大哉關雎乃天地之基也呂氏春秋季春紀先己詩曰執轡如組孔子曰審此言也可以為天下子貢曰何其躁也孔子曰非謂其躁也謂其為之於此而成文於彼也聖人組修其身而成文於天下矣鹽鐵論相刺孔子曰詩人疾之不能默丘疾之不能伏是以東西南北七十説而不用然後退而修王道作春秋垂之萬載之後天下折中焉論衡對作孔子曰詩人疾之不能默丘疾之不能伏是以論也鹽鐵論執務孔子曰吾於河廣知德之至也而欲得之各反其本復諸古而已説苑貴德孔子曰吾於甘棠見宗廟之敬也甚尊其人必敬其位順安萬物古聖之道幾哉説苑敬慎孔子論詩至於正月之六章懼然曰不逢時之君子豈不殆哉從上依世則廢道違上離俗則危身世不與善己獨由之則曰非妖則孽也是以桀殺關龍逢紂殺王子比幹故賢者不遇時常恐不終焉詩曰謂天蓋高不敢不局謂地蓋厚不敢不蹐此之謂也漢書劉向傳孔子論詩至於殷士膚敏灌將於京喟然歎曰大哉天命善不可不傳於子孫是以富貴無常不如是則王公其何以戒慎民萌何以勸勉毛詩素冠傳子夏三年之喪畢見於夫子援琴而弦衎衎而樂作而曰先王製禮不敢不及夫子曰君子也閔子騫三年之喪畢見於夫子援琴而弦切切而哀作而曰先王製禮不敢過也夫子曰君子也子路曰敢問何謂也夫子曰子夏哀已盡能引而致之於禮故曰君子也閔子騫哀未盡能自割以禮故曰君子也夫三年之喪賢者之所輕不肖者之所勉淮南子繆稱訓閔子騫三年之喪畢援琴而彈其弦是也其聲切切而哀夫子曰弦則是也其聲非也説苑修文子夏三年之喪畢見於孔子孔子與之琴使之弦援琴而弦衎衎而樂作而曰先王製禮不敢不及也子曰君子也閔子騫三年之喪畢見於孔子孔子與之琴使之弦援琴而弦切切而悲作而曰先王製禮不敢過也孔子曰君子也子貢問曰閔子哀不盡子曰君子也子夏哀已盡子曰君子也賜也惑敢問何謂孔子曰閔子哀未盡能斷之以禮故曰君子也子夏哀已盡能引而致之故曰君子也夫三年之喪固優者之所屈劣者之所勉後漢張奮傳孔子謂子夏曰禮以修外樂以修內丘已矣夫大戴禮記哀公問哀公問於孔子曰大禮何如君子之言禮何其尊也孔子曰丘也小人何足以知禮君曰否吾子言之也孔子曰丘聞之也民之所由生禮為大非禮無以節事天地之神明也非禮無以辨君臣上下長幼之位也非禮無以別男女父子兄弟之親昏姻疏數之交也君子以此之為尊敬然然後以其所能教百姓不廢其會節有成事然後治其雕鏤文章黼黻以嗣其順之然後言其喪算備其鼎俎設其豕臘修其宗廟歲時以敬祭祀以序宗族則安其居處醜其衣服卑其宮室車不雕幾器不刻鏤食不二味以與民同利昔之君子之行禮者如此公曰今之君子胡莫之行也孔子曰今之君子好色無厭淫德不倦荒怠敖慢固民是盡忤其衆以伐有道求得當欲不以其所古之用民者由前今之用民者由後今之君子莫為禮也孔子侍坐於哀公哀公曰敢問人道誰為大孔子愀然作色而對曰君及此言也百姓之德也固臣敢無辭而對人道政為大公曰敢問何謂為政孔子對曰政者正也君為正則百姓從政矣君之所為百姓之所從也君所不為百姓何從公曰敢問為政如之何孔子對曰夫婦別父子親君臣嚴三者正則庶民從之矣公曰寡人雖無似也願聞所以行三言之道可得而聞乎孔子對曰古之為政愛人為大所以治愛人禮為大所以治禮敬為大敬之至也大昏為大大昏至矣大昏既至冕而親迎親之也親之也者親之也是故君子興敬為親舍敬是遺親也弗愛不親弗敬不正愛與敬其政之本與公曰寡人願有言然冕而親迎不已重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以為天地社稷宗廟之主君何謂已重乎公曰寡人固不固焉得聞此言也寡人欲問不得其辭請少進孔子曰天地不合萬物不生大昏萬世之嗣也君何以謂已重焉孔子遂有言曰內以治宗廟之禮足以配天地之神明出以治直言之禮足以立上下之敬物恥足以振之國恥足以興之為政先禮禮者政之本與孔子遂言曰昔三代明王之政必敬其妻子也有道妻也者親之主也敢不敬與子也者親之後也敢不敬與君子無不敬也敬身為大身也者親之枝也敢不敬與不能敬其身是傷其親傷其親是傷其本傷其本枝從而亡三者百姓之象也身以及身子以及子配以及配君子行此三者則愾乎天下矣大王之道也如此國家順矣公曰敢問何謂敬身孔子對曰君子過言則民作辭過動則民作則君子言不過辭動不過則百姓不命而敬恭如是則能敬其身能敬其身則能成其親矣公曰敢問何謂成親孔子對曰君子也者人之成名也百姓歸之名謂之君子之子是使其親為君子也是為成其親名也已孔子遂言曰古之為政愛人為大不能愛人不能有其身不能有其身不能安土不能安土不能樂天不能樂天不能成身公曰敢問何謂成身孔子對曰不過乎物公曰敢問君子何貴乎天道也孔子對曰貴其不已如日月西東相從而不已也是天道也不閉其久也是天道也無為物成是天道也已成而明是天道也公曰寡人蠢愚冥煩子識之心也孔子蹴然避席而對曰仁人不過乎物孝子不過乎物是仁人之事親也如事天事天如事親是故孝子成身公曰寡人既聞是言也無如後罪何孔子對曰君之及此言也是臣之福也穀梁桓三年傳子貢曰冕而親迎不已重乎孔子曰合二姓之好以繼萬世之後何謂已重乎大戴禮禮察孔子曰君子之道譬猶防與夫禮之塞亂之所從生也猶防之塞水之所從來也故以舊防為無用而壞之者必有水敗以舊禮為無所用而去之者必有亂患故婚姻之禮廢則夫婦之道苦而淫辟之罪多矣鄉飲酒之禮廢則長幼之序失而爭鬥之獄繁矣聘射之禮廢則諸侯之行惡而盈溢之敗起矣喪祭之禮廢則臣子之恩薄而倍死忘生之禮衆矣凡人之知能見已然不能見將然禮者禁於將然之前而法者禁於已然之後是故法之用易見而禮之所為生難知也若夫慶賞以勸善刑罰以懲惡先王執此之正堅如金石行此之信順如四時處此之功無私如天地爾豈顧不用哉然如曰禮雲禮雲貴絶惡於未萌而起敬於微眇使民日徙善遠罪而不自知也大戴禮曾子天圓曾子曰參嘗聞之夫子曰天道曰圓地道曰方方曰幽而圓曰明明者吐氣者也是故外景幽者含氣者也是故內景白虎通社稷曾子問曰諸侯之祭社稷俎豆既陳聞天子崩如之何孔子曰廢臣子哀痛之不敢終於禮也白虎通封公侯曾子問曰立適以長不以賢何以言為賢不肖不可知也白虎通嫁娶曾子問曰昏禮既納幣有吉日女之父母死何如孔子曰壻使人吊之如壻之父母死女亦使人吊之父喪稱父母喪稱母父母不在則稱伯父世母壻已葬壻之伯父叔父使人致命女氏曰某子有父母之喪不得嗣為兄弟使某致命女氏許諾不敢嫁禮也壻免喪女父使人請壻不娶而後嫁之禮也女之父母死壻亦如之白虎通喪服曾子問曰君薨既殯而臣有父母之喪則如之何孔子曰歸居於家有殷事則之君所朝夕否曰君既斂而臣有父母之喪則如之何孔子曰歸殯哭而反於君所有殷事則歸朝夕否大夫室老行事士則子孫行事夫內子有殷事則亦如之君所朝夕否白虎通喪服子夏問曰三年之喪既卒哭金革之事無避者禮與孔子曰吾聞諸老聃曰魯公伯禽則有為之也今以三年之喪從其利者不知也漢書藝文志仲尼有言禮失而求諸野韓非子外儲説左下孔子侍坐於魯哀公哀公賜之桃與黍哀公請用孔子先飯黍而後啖桃左右皆掩口而笑哀公曰黍者非飯之也以雪桃也仲尼對曰丘知之矣夫黍者五穀之長也祭先王為上盛果蓏有六而桃為下祭先王不得入廟丘聞之也君子以賤雪貴不聞以貴雪賤今以五穀之長雪果蓏之下是從上雪下也丘以為妨義故不敢以先於宗廟之盛也呂氏春秋孟冬紀安死魯季孫有喪孔子往吊之入門而左從客也主人以璵璠收孔子徑庭而趨曆級而上曰以寶玉收譬之猶暴骸中原也淮南子繆稱訓子曰鈞之哭也曰子豫奈何兮乘我何其哀則同其所以哀則異故哀樂之襲人情也深矣説苑修文孔子曰移風易俗莫善於樂安上治民莫善於禮是故聖王修禮文設庠序陳鍾鼓天子辟雍諸侯泮宮所以行德化説苑修文孔子曰無體之禮敬也無服之喪憂也無聲之樂歡也不言而信不動而威不施而仁志也鍾鼓之聲怒而擊之則武憂而擊之則悲喜而擊之則樂其志變其聲亦變其志誠通乎金石而況人乎論衡儒增孔子曰言不文或時不言論衡實知魯以偶人葬而孔子歎水經注六引喪服要記魯哀公祖載其父孔子問曰寧設桂樹乎哀公曰不也桂樹者起於介子推子推晉之人也文公有內難出國之狄子推隨其行割肉以續軍糧後文公復國忽忘子推子推奉唱而歌文公始悟當受爵祿子推奔介山抱木而燒死國人葬之恐其神魂濆於地故作桂樹焉吾父生於宮殿死於枕席何用桂樹為藝文類聚八十五引喪服要記昔者魯哀公祖載其父孔子問曰寧設五穀囊乎哀公曰不也五穀囊者起伯夷叔齊不食周粟而餓死首陽山恐魂之飢故作五穀囊吾父食味含哺而死何用此為禦覽五百四十八引喪服要記魯哀公葬父孔子問曰寧設菰廬乎哀公曰菰廬起太伯太伯出奔聞古公崩還赴喪故作菰廬以彰其尸吾父無太伯之罪何用此為禦覽五百五十二引喪服要記魯哀公葬父孔子問曰寧設桐人乎哀公曰桐人起於虞卿齊人遇惡繼母不得養父死不能葬知有過故作桐人吾父生得供養何桐人為禦覽八百八十六引喪服要記魯哀公葬其父孔子問曰寧設魂衣乎哀公曰魂衣起宛荊於山之下道逢寒死友哀往迎其尸憫神之寒故作魂衣吾父生服錦繡死於衣被何魂衣為禦覽九百六十七引喪服要記昔者魯哀公祖載其父孔子問曰寧設三桃湯乎答曰不也桃湯者起於衛靈公有女嫁乳母送新婦就夫家道聞夫死乳母欲將新婦返新婦曰女有三從今屬於人死當卒哀因駕素車白馬進到夫家治三桃湯以沐死者出東門北隅禮三終使死者不恨吾父無所恨何用三桃湯為路史後紀十三注引喪服要記魯哀公葬其父孔子問曰寧設表門乎公曰夫表門起於禹禹治洪水故表其門以紀其功吾父無功何用焉抱朴子外篇譏惑孔子雲喪親者若嬰兒之失母其號豈常聲之有寧令哀有餘而禮不足五行大義四孔子曰夏正得天韓詩外傳五孔子學鼓琴於師襄子而不進師襄子曰夫子可以進矣孔子曰丘已得其曲矣未得其數也有間曰夫子可以進矣曰丘已得其數矣未得其意也有間復曰夫子可以進矣曰丘已得其人矣未得其類也有間曰邈然遠望洋洋乎翼翼乎必作此樂也默然思戚然而悵以王天下以朝諸侯者其惟文王乎師襄子避席再拜曰善師以為文王之操也故孔子持文王之聲知文王之為人師襄子曰敢問何以知其文王之操也孔子曰然夫仁者好偉和者好粉智者好彈有殷勤之意者好麗丘是以知文王之操也淮南子主術訓孔子學鼓琴於師襄而諭文王之志見微以知明矣韓詩外傳七昔者孔子鼓瑟曾子子貢側耳而聽曲終曾子曰嗟乎夫子瑟聲殆有貪狼之心邪僻之行何其不仁趨利之甚子貢以為然不對而入夫子望見子貢有諫過之色應難之狀釋瑟而待之子貢以曾子之言告子曰嗟乎夫參天下賢人也其習知音矣向者丘鼓瑟有鼠出遊狸見於屋循梁微行造焉而避厭目曲脊求而不得丘以瑟浮其音參以丘為貪狼邪僻不亦宜乎禦覽八十一引樂動聲儀孔子曰簫韶者舜之遺音也溫潤以和似南風之至其為音如寒暑風雨之動物如物之動人雷動獸禽風雨動魚龍仁義動君子財色動小人是以聖人務其本白虎通三教引樂稽耀嘉顏回問三教變虞夏何如曰教者所以追補敗政靡敝溷濁謂之治也舜之承堯無為易也五行大義一引樂緯孔子曰丘吹律定姓一言得土曰宮三言得火曰徵五言得水曰羽七言得金曰商九言得木曰角禦覽十六引春秋演孔圖孔子曰丘援律吹命陰得羽之宮魯語下魯哀公問於孔子曰吾聞夔一足信乎對曰夔人也何其一足也夔通於聲堯曰夔一而已使為樂正故君子曰夔有一足非一足也韓非子外儲説左下魯哀公問於孔子曰吾聞古者有夔一足其果信有一足乎孔子對曰不也夔非一足也夔者忿戾惡心人多不喜説也雖然其所以得免於人害者以其信也人皆曰獨此一足矣夔非一足也一而足也哀公曰審而是固足矣一曰哀公問於孔子曰吾聞夔一足信乎曰夔人也何故一足彼其無他異而獨通於聲堯曰夔一而足矣使為樂正故君子曰夔有一足非一足也呂氏春秋慎行論察傳魯哀公問於孔子曰樂正夔一足信乎孔子曰昔者舜欲以樂傳教於天下乃令重黎舉夔於草莽之中而進之舜以為樂正夔於是正六律和五聲以通八風而天下大服重黎又欲益求人舜曰夫樂天地之精也得失之節也故唯聖人為能和樂之本也夔能和之以平天下若夔者一而足矣故曰夔一足非一足也淮南子主術訓夫榮啓期一彈而孔子三日樂感於和説苑修文子路鼓瑟有北鄙之聲孔子聞之曰信矣由之不才也冉有侍孔子曰求來爾奚不謂由夫先王之製音也奏中聲為中節流入於南不歸於北南者生育之鄉北者殺伐之域故君子執中以為本務生以為基故其音溫和而居中以象生育之氣憂哀悲痛之感不加乎心暴厲淫荒之動不在乎體夫然者乃治存之風安樂之為也彼小人則不然執末以論本務剛以為基故其音湫厲而微末以象殺伐之氣和節中正之感不加乎心溫儼恭莊之動不存乎體夫殺者乃亂亡之風奔北之為也昔舜造南風之聲其興也勃焉至今王公述而不釋紂為北鄙之聲其廢也忽焉至今王公以為笑彼舜以匹夫積正合仁履中行善而卒以興紂以天子好慢淫荒剛厲暴賊而卒以滅今由也匹夫之徒布衣之醜也既無意乎先王之製而又有亡國之聲豈能保七尺之身哉冉有以告子路子路曰由之罪也小人不能耳陷而入於斯宜矣夫子之言也遂自悔不食七日而骨立焉孔子曰由之改過矣公羊哀十四年疏引揆命篇孔子年七十歲知圖書作春秋禦覽十六引洪範五行傳孔子作春秋正春正秋所以重曆也禦覽九百二十三引禮稽命征孔子謂子夏曰鴝鵒至非中國之禽也文選答賓戲注引春秋元命包孔子曰丘作春秋始於元終於麟王道成也儀禮士冠禮疏引春秋演孔圖孔子修春秋九月而成卜之得陽豫之卦公羊哀十四年疏引演孔圖獲麟而作春秋九月書成初學記二十一引春秋握誠圖孔子作春秋陳天人之際記異考符古微書引春秋説題辭孔子言曰五變入臼米出甲謂磑之為糲米也舂之則稗米也皞之則鑿米也臿之則毀米也又鳷擇之易差之則為晶米引春秋命曆序孔子始春秋退修殷之故曆使其數可傳於後春秋宜以殷曆正之公羊僖四年解詁孔子曰書之重辭之復嗚呼不可不察其中必有美者焉公羊成八年解詁孔子曰皇象元逍遙術無文字德明諡公羊昭十二年疏引春秋説孔子作春秋一萬八千字九月而書成以授遊夏之徒遊夏之徒不能改一字史記太史公自序子曰我欲載之空言不如見之行事之深切著明也公羊隱公第一疏引閔因敘昔孔子受端門之命製春秋之義使子夏等十四人求周史記得百二十國寶書九月經立春秋繁露俞豫仲尼之作春秋也上探正天端王公之位萬物民之所欲下明得失起賢才以待後聖故引史記理往事正是非也王公史記十二公之間皆衰世之事故門人惑孔子曰吾因其行事而加乎王心焉以為見之空言不如行事博深切故子貢閔子公肩子言其切而為國家賢也其為切而至於殺君亡國奔走不得保社稷其所以然是皆不明於道不覽於春秋也故衛子夏言有國家者不可不學春秋不學春秋則無以見前後旁側之危則不知國之大柄君子重任也故或脅窮失國手拿殺於位一朝至爾苟能述春秋之法致行其道豈徒除禍哉乃堯舜之德也故世子曰功及子孫光輝百世聖王之德莫美於世故豫先言春秋詳己而略人因其國而容天下春秋之道大得之則以王小得之則以霸故曾子子石盛美齊侯安諸侯尊天子霸王之道皆本於仁仁天心故次以天心愛人之大者莫大於思患而豫防之故蔡得意於吳魯得意於齊而春秋皆不告故次以言怨人不可通敵國不可狎擾竊之國不可使久親皆防患為民除患之意也不愛民之漸乃至於死亡故言楚靈王晉厲公生弒於位不仁之所致也故善宋襄公不厄人不由其道而勝不如由其道而敗春秋貴之將以變習俗而成王化也故夏言春秋重人諸譏皆本此或奢侈使人憤怨或暴虐賊害人終皆禍及身故子池言魯莊築台丹楹刻桷晉厲之刑刻意者皆不得以壽終上奢侈刑又急皆不內恕求備於人故次以春秋緣人情赦小過而傳明之曰君子辭也孔子明得失見成敗疾時世之不仁失王孔子曰吾因行事赦小過傳又明之曰君子辭也孔子曰吾因行事加吾王心焉假其位號以正人倫因其成敗以明順逆故其所善則桓文行之而遂其所惡則亂國行之終以敗故始言大惡殺君亡國終言赦小國是以始於粗糲終於精微教化流行德澤大洽天下之人人有士君子之行而少過矣亦譏二名之意也穀梁桓二年傳孔子曰名從主人物從中國穀梁桓十四年傳孔子曰聽遠音者聞其疾而不聞其舒望遠者察其貌而不察其形立乎定哀以指隱桓隱桓之日遠矣穀梁僖十六年傳子曰石無知之物鳥兒微有知之物石無知故日之鳥兒微有知之物故月之君子之於物無所苟而已穀梁哀十三年傳吳王夫差曰好冠來孔子曰大矣哉夫差未能言冠而欲冠也藝文類聚八十引莊子仲尼讀書老聃倚灶觚而聽之曰是何書也曰春秋也韓非子內儲説上七術魯哀公問於仲尼曰春秋之記曰冬十二月濆霜不殺菽何為記此仲尼對曰此言可以殺而不殺也夫宜殺而不殺桃李冬實天失道草木猶犯幹之而況於人君乎鹽鐵論散不足孔子讀史記喟然而歎傷正德之廢君臣之危也論衡效力孔子周世多力之人也作春秋刪五經祕書微文無所不定論衡超奇孔子作春秋以示王意論衡超奇孔子得史記以作春秋及其立義創意褒貶賞誅不復因史記者眇思自出於胸中也説苑君道孔子曰文王似元年武王似春王周公似正月文王以王季為父以太任為母以太姒為妃以武王周公為子以泰顛閎夭為臣其本美矣武王正其身以正其國正其國以正天下伐無道刑有罪一動天下正其事正矣春致其時萬物皆得生君致其道萬人皆及治周公戴己而天下順之其誠至矣説苑君道孔子曰夏道不亡商德不作商德不亡周德不作周德不亡春秋不作春秋作而後君子知周道亡也説苑至公夫子行説七十諸侯無定處意欲使天下之民各得其所而道不行退而修春秋采豪毛之善貶纖介之惡人事浹王道備精和聖製上通於天而麟至此天之知夫子也於是喟然而歎曰天以至明為不可蔽乎日何為而食地以至安為不可危乎地何為而動天地而尚有動蔽是故賢聖説於世而不得行其道故災異並作也周禮九嬪注孔子雲日者天之明月者地之理陰契製故月上屬為天使婦從夫放月紀春秋左傳序疏引孝經鉤命決春秋二尺四寸書之孝經一尺二寸書之公羊序疏引鉤命決孔子在庶德無所施功無所就志在春秋行在孝經禦覽六百十引鉤命決孝經者篇題就號也所以表指括意序中書名出義見道曰著一字苞十八章為天地喉襟道要德本故挺以題符篇冠就又曰曾子撰斯問曰孝乎文駁不同乎子曰吾作孝經以素王無爵之賞斧鉞之誅與先王以托權目至德要道以題行首仲尼以立情性言子曰以開號列曾子示撰輔書詩以合謀公羊哀十四年疏引孝經説孔子曰春秋屬商孝經屬參公羊哀十四年疏引孝經説丘以匹夫徒步以製正法論衡雷虛論語迅雷風烈必變禮記有疾風迅雷甚雨則必變雖夜必興衣服冠而坐子曰天之與人猶父子有父為之變子安能忽故天變己亦宜變順天時示已不違也説文逸論語曰玉粲之瑟兮其裛猛也説文逸論語曰如玉之瑩初學記二十七逸論語曰玉十謂之區治玉謂之琢亦謂之雕差玉色鮮白也瑩玉色也瑛玉光也瓊赤玉也璿瑾瑜美玉也無三采玉也玲瑲琤瑣皇玉聲也枿玉佩也敫充耳也噪玉飾以水藻也初學記二十七逸論語曰璠璵魯之寶玉也孔子曰美哉璠璵遠而望之奐若也近而視之瑟若也一則理勝一則孚勝文選劉歆移書太常博士注引論語讖自衛反魯刪詩書修春秋文選齊安陸王碑文注引論語讖仲尼居鄉黨卷懷道美説文孔子曰一貫三為王説文孔子曰推十合一為士説文孔子曰烏盱呼也取其助氣故以為烏呼説文孔子曰牛羊之字以形舉也説文孔子曰黍可為酒禾入水也説文孔子曰粟之為言續也説文孔子曰在人下故詰屈説文孔子曰貉之為言惡也説文孔子曰視犬之字如畫狗也説文孔子曰狗叩也叩氣吠以守史記滑稽列傳孔子曰六藝於治一也禮以節人樂以發和書以道事詩以達意易以神化春秋以義白虎通五經孔子居周之末世王道陵遲禮義廢壞強陵弱衆暴寡天子不敢誅方伯不敢伐閔道德之不行故周流應聘冀行其道德自衛反魯自知不用故追定五經以行其道論衡佚文孝武皇帝封弟為魯恭王恭王壞孔子宅以為宮得佚尚書百篇禮三百春秋三十篇論語二十一篇
