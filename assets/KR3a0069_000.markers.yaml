  - {type: variant, offset: 480, length: 598, content: 大義足以羽儀經業導揚儒風者往往而有其纂輯成書者梁武帝孔子正言二十卷王勃次論語十卷皆不存見存楊簡先聖大訓十卷薛據孔子集語二卷潘士達論語外篇二十卷而薛書最顯不免掛漏近人曹廷棟又為孔子逸語十卷援稽失實不足論嘉慶辛未歲觀察引疾歸田惜儒書之闕失乃博搜群籍綜核異同增多薛書六七倍而仍名之為孔子集語者識所緣起也其纂輯大例易十翼禮小戴記春秋左氏傳孝經論語孟子舉世誦習不載家語孔叢子有成書專行不載史記孔子世家弟子傳易檢亦不載其餘群經傳注秘緯諸史諸子以及唐宋人類書巨篇隻句畢登無所去取皆明言出處篇卷或疑文脫句酌加按語或一事而彼此互見且五六見得失短長可互證得之逾年初稿成又二年屬其友人烏程嚴可均略仿說苑體裁理而董之覆檢群書是正訛字更移次第增益闕遺為十四篇勸學第一孝本第二五性第三六藝第四主德第五臣術第六交道第七論人第八論政第九博物第十事譜第十一雜事第十二遺讖第十三寓言第十四篇各為卷六藝事譜寓言卷大分為上下以十四篇為十七卷勸學等篇與正經相表裏遺讖不醇寓言蓋依托乃雕版於金陵公諸後世嚴可均為之序表山東督糧道臣孫星衍稽首頓首上言臣所撰孔子集語十四篇成謹奉表上進者伏以黃顓授道丹書備北面之儀河洛浮圖元扈有東巡之典蓋折衷俟諸至聖而稽古所以同天欽惟我皇上雅詠宗經臨雍尊聖如天蕩蕩堯本難名猶日孜孜禹思聞善芻蕘之所必采謨訓況有明征昔在孔子微言大義史氏有將絕之虞性道文章及門有難聞之歎故易翼麟書而外緯候載其遺言孝經論語之餘子史傳其佚說, WYG: ''}
