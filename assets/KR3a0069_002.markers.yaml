  - {type: variant, offset: 480, length: 2, content: 汝非, WYG: 並見説苑文王第十四文王似元年武王似春周公似正月文王以王季為父太任為母太姒為妃武王周公為子泰顛閎夭為臣其本美矣武王正其身正其國以正天下伐無道刑有罪一動天下正其事正矣春致其時萬物皆生君致其道萬人皆治周公戴已而天下順其誠矣孔子曰存亡禍福在己而己天災地妖不能殺也昔殷王帝辛爵生烏於城之隅占者曰小而生巨國家必祉帝辛喜不治國家亢暴無極外冦乃至遂亡殷國此逆天之時詭福而反得禍也殷王武丁之時刑法弛廢桑榖共生於朝七日而大拱占者曰桑榖野物也而生於朝意朝亡乎武丁恐駭側身脩行興滅國繼絶世舉逸民三年之後逺方之君重譯而朝者六國此迎天之時詭禍而反得福也故妖孽者天之所以警天子諸侯也惡夢者所以警士大夫也妖孽不勝善政惡夢不勝善行孔子讀易至損益喟然而歎子夏避席曰夫子何歎孔子曰自損者益自益者損吾是以歎也子夏曰然則學不可益乎孔子曰否天之道成者未嘗得乆也夫學者以虚而受之故曰茍得持滿則天下之善言不得入其耳矣昔堯履}
