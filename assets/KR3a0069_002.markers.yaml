  - {type: variant, offset: 3145, length: 1, content: 外, WYG: 闗勇復孟諸足蹀狄兔不以力聞呂氏春秋孔子去魯佩象環五寸象言其有文理也環可循而無窮也古禮記西狩獲麟有告者曰有麕而角者子曰孰為來哉反袂拭面涕沾袍曰吾道窮矣公羊傳孔子將死遺袐書曰不知何一男子自稱秦始皇上我堂踞我牀顛倒我衣裳至沙丘而亡後始皇至魯觀孔子宅至沙丘而亡王充論衡鮑永為魯郡太守時彭豐等不降闕里無故荆棘自闢從講堂埽除至孔子廟永異之謂府丞曰方今阸急而闕里無故自滌豈夫子欲行大饗誅無狀也乃脩學行鄉禮請豐㑹手格殺之東觀漢記魯哀公十六年夏四月己丑孔子卒公誄之曰旻天不弔不憖遺一老俾屏余一人以在位㷀㷀余在疚嗚呼哀哉尼父無自律國語孔子卒受魯君璜玉𦵏郭之北泗水為之却流白虎通鍾離意為魯相出私錢付户曹孔訢脩孔子車身入廟拭几席劒履男子張伯除堂下草得璧七枚懷其一以六枚白意孔子教授堂下牀頭懸一甕召訢}
