  - {type: variant, offset: 175, length: 230, content: 孝子之隱乎則孝子三年弗居矣故曰義者彼也隱者此也遠彼而近此則孝子之道備矣韓詩外傳八曾子有過曾皙引杖擊之仆地有間乃蘇起曰先生得無病乎魯人賢曾子以告夫子夫子告門人參來汝不聞昔者舜為人子乎小棰則待笞大杖則逃索而使之未嘗不在側索而殺之未嘗可得今汝委身以待暴怒拱立不去非王者之民其罪何如說苑建本曾子芸瓜而誤斬其根曾皙怒援大杖擊之曾子仆地有頃蘇蹶然而起進曰曩者參得罪於大人大人用力教參得無疾乎退屏鼓琴而歌欲令曾皙聽其歌聲令知其平也孔子聞之告門人曰參來勿內也曾子自以無罪使人謝, WYG: 問}
