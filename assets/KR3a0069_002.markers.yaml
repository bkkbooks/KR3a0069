  - {type: variant, offset: 2460, length: 1, content: 將, WYG: 非源也孔子謂子路曰汝何好曰好劍孔子曰非此之問也請以汝之所能加以好學豈不可哉子路曰學有益乎孔子曰人君無諫臣則失政士無教友則失徳狂馬不擇其策操弓不反於檠正弓之器木受繩則直人受諫則聖受學重問孰不順成毁仁惡士且近於刑君子不可不學也子路曰南山有竹弗揉自直斬而射之通乎犀革又何學焉孔子曰括而羽之鏃而砥礪之其入不益深乎子路拜曰敬受教哉並見説苑楚伐陳第十八楚伐陳焚西門使降民脩之孔子過之不軾子路問曰禮過三人則下車二人則軾陳脩門者衆矣夫子不軾何也孔子曰丘聞之國}
