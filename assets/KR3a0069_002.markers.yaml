  - {type: variant, offset: 3047, length: 0, content: '', WYG: 文事必有武備孔子夾谷之㑹見之公羊傳孔子之宋匡簡子將殺陽虎孔子似之甲士圍孔子之舍子路奮㦸將下鬭孔子止之曰何仁義之不免俗也夫詩書之不習禮樂之不脩也是丘之過也若似陽虎非丘之罪也命也夫由歌吾和汝子路歌孔子和之三終而甲罷説苑孔子母顔氏徴在游大澤之陂夢黑帝使請己己徃夢交語曰汝乳必於空桑之中覺則若}
