  - {type: variant, offset: 2605, length: 1, content: 君, WYG: 才不遇其時雖才不用茍遇其時何難之有故舜耕厯山而陶於河畔立為天子則其遇堯也傅説負壤土釋版築而立佐天子則其遇武丁也伊尹有莘氏之媵臣也負鼎俎調五味而佐天子則其遇成湯也吕望行年五十賣}
