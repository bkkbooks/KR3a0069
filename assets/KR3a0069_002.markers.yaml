  - {type: variant, offset: 2607, length: 1, content: 美, WYG: 於棘津行年七十屠牛朝歌行年九十為天子師則其遇文王也管夷吾束縛膠目居檻車中自車中起為仲父則其遇桓公也百里奚自賣取五羊皮而為卿大夫則其遇秦穆公也沈尹名聞天下為令尹而讓孫叔敖則其遇楚荘王也伍子胥前多功後戮死非其智益衰也前遇闔廬後遇夫差也夫驥阸鹽車非無驥狀也夫世莫知也使驥得王良造父驥其無千里之足乎芝蘭生於深林非為無人而不芳故學}
