  - {type: variant, offset: 444, length: 1, content: 待, WYG: 有網羅之患子路問曰治國何如子曰在於尊賢而賤不肖子路曰范中行氏尊賢而賤不肖何為其亡也子曰范中行氏尊賢而不能用賤不肖而不能去也賢者知其不用己也怨之不肖者知其賤己也讎之怨讎並興欲無亡得乎並見説苑齊侯問第十三齊侯問於晏子曰為政何患對曰患善惡之不分公曰何以察之對曰審擇左右左右善則百僚各得其所宜而善惡分孔子聞之曰善哉子曰本不正者末必倚始不盛者終必衰春秋之義有正春無亂秋有正君無危國易曰建其本而萬國理失之毫釐差以千里故君子貴建本而重其始子曰中人之情有餘則侈不足則儉無禁則淫無度則失縱欲則敗故飲食有量衣服有節宫室有度蓄聚有數車器有限以防亂之源也子曰夏道不亡商德不作商德不亡周德不作周德不亡春秋不作春秋作而後君子知周道亡也故上下相虧也猶水火之相滅也人君不可不察而}
