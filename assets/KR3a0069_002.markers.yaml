  - {type: variant, offset: 3279, length: 250, content: 雅曰文王陟降在帝左右言文王靜作進退天必贊之故紂不能害夢啟之壽卜世三十卜年七百天所命也善事父母之所致也閔子騫曰善事父母之道既幸聞矣敢問教子之義仲尼曰凡三王教子必視禮樂樂所以修內禮所以修外禮樂交修則德容發輝於貌故能溫恭而文明夫為人臣者殺其身有益於君則為之況利其身以善其君乎是故擇建忠良貞正之士為之師傅欲其知父子君臣長幼之道夫知為人子然後可以為人父知為人臣然後可以為人君知事人然後能使人此三王教子之義也閔子騫退而事之於家三年無間於父母昆弟之言交遊稱其信鄉黨稱其仁宗族稱其弟德行之聲溢於天下此善事父母之所致也, WYG: ''}
