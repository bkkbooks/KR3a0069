  - {type: variant, offset: 456, length: 2, content: 委身, WYG: 欲釋古之學而行子之意庸知子用非為是用是為非子不慎其初雖欲悔難哉孔子曰惡惡道不能甚者則其好善道亦不能甚好善道不能甚則百姓之親之也亦不能甚子曰吾於甘棠見宗廟之美也尊其人敬其位古聖之道幾音基哉仲尼見梁君梁君問曰吾欲長有國吾欲列都之得吾欲民不惑吾欲士竭力吾欲使日月當時吾欲使聖人自來吾欲使官府治為之奈何仲尼曰丘聞之兩君相親則長有國君惠臣忠則列都之得毋殺不辜毋釋罪人則民不惑益士禄賞則竭其力尊天敬鬼則日月當時善為刑罰則聖人自來尚賢使能則官府治魯有父子訟者康子曰殺之孔子曰未可殺也夫民不知子父訟之不善者乆矣是則上過也上有道是人亡矣康子曰夫治民}
