  - {type: variant, offset: 1882, length: 383, content: 曰既已縣矣夫無所縣者可以有哀乎彼視三釜三千鍾如觀雀蚊虻相過乎前也韓非子五蠹魯人從君戰三戰三北仲尼問其故對曰吾有老父身死莫之養也仲尼以為孝舉而上之呂氏春秋仲冬紀當務楚有直躬者其父竊羊而謁之上上執而將誅之直躬者請代之將誅矣告吏曰父竊羊而謁之不亦信乎父誅而代之不亦孝乎信且孝而誅之國將有不誅者乎荊王聞之乃不誅也孔子聞之曰異哉直躬之為信也一父而載取名焉新序雜事一昔者舜自耕稼陶漁而躬孝友父瞽瞍頑母嚚及弟象傲皆下愚不移舜盡孝道以供養瞽瞍瞽瞍與象為浚井塗廩之謀欲以殺舜舜孝益篤出田則號泣年五十猶嬰兒慕可謂至孝矣故耕於歷山歷山之耕者讓畔陶於河濱河濱之陶者器不苦窳漁於雷澤雷澤之漁者分均及立為天子天下化之蠻夷率服北發渠搜南撫交阯莫不慕義麟鳳在郊故孔子曰孝弟之至通於神明光於四海舜之謂也孔子在州裏篤行孝道居於闕黨闕黨之子弟畋漁分有親者得多孝以化之也是以七十二子自遠方至服從其德說苑建本, WYG: ''}
