  - {type: variant, offset: 3046, length: 0, content: '', WYG: 舜之謂也孔子謂曽子曰君子不以利害義則恥辱安從生哉官怠於宦成病加於少愈禍生於怠惰孝衰於妻子察此四者慎終如始並見新序子曰聽逺音者聞其疾而不聞其舒望逺者察其貎而不察其形立乎定哀之間而指乎隠桓隠桓之日逺矣榖梁子定公㑹齊侯於夾谷孔子相兩君就壇兩相相揖齊人鼓譟而起欲執魯君孔子厯階而止不盡一等命司馬止之孔子視歸乎齊侯曰兩君之合而夷狄之人何為來為齊侯謝曰寡人之過也退而屬二三大夫曰大夫率君行古人之道二三子率我入夷狄之俗何為乃罷㑹齊君使優施舞於魯君之幕下孔子曰笑君者罪當死司馬行法首足異門出齊人懼來歸鄆讙龜隂之田蓋為此也因是以見}
