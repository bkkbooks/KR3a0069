markers:
  front:
  - {type: variant, offset: 0, length: 3, content: 孝本二, WYG: 欽定四庫全書孔子集語卷下宋薛據輯子岀衛第十一子岀衞東門逢姑布子卿子卿迎而謂子貢曰是為魯孔丘與得堯之顙舜之目禹之頸臯陶之喙從前視之盎盎乎似有土者從後視之髙肩弱脊循循固得之轉要下四寸此惟不及四聖者也子貢曰吁子卿曰子何患焉汙面而不惡葭喙而不藉羸乎若喪家之狗子何患焉子貢以告子無辭而獨辭喪家之狗曰丘何敢乎賜汝不見喪家之狗與既歛而椁布噐而祭顧望無人意欲施之今上無眀王下無賢方伯王道衰政教失强凌弱衆暴寡百姓縱心莫之紀綱是故以丘為欲當之者也丘何敢乎哉韓詩外傳子貢曰葉公問政於夫子子曰政在於附近而來逺魯哀公問政子曰政在於論臣齊景公問政子曰政在於節用三君問政夫子應之不同然則政有異乎子曰荆之地廣而都狹民有離志焉故曰在於附近而來逺哀公有臣三人内比周以惑其君外障距諸侯賓客以蔽其明故曰政在論臣齊景公奢於臺榭滛於苑囿五官之樂不解一旦而賜人百乘之家者三故曰政在節用東郭子思問於子貢曰夫子之門何其雜也子貢曰夫􅕍栝之旁多枉木良醫之門多疾人砥礪之旁多頑鈍夫子聞之曰脩道以俟天下來者不止是以雜也子曰參女以為明主為勞乎昔者舜左禹而右皋陶不下席而天下治子曰古之刑者省之今之刑者繁之古者有禮然後有刑是以刑省也今也反是無禮而齊之以刑是以繁也子如衞人謂曰公甫不能聽獄子曰非公甫不能聽獄也有罪者懼無罪者恥民近禮矣子曰聽訟者雖得其情必哀矜之死者不可復生􅓟者不可復續也子曰呉越之俗男女同川而浴其刑重而不勝由無禮也中國之教内外有别男女不同椸架不同巾櫛其刑重而勝由有禮也語曰夏后不殺不刑罰有罪而民不輕犯子曰古之聽民者察貧窮哀孤獨矜寡宥老幼不肖無告是故老而受刑謂之悖弱而受刑謂之暴不赦過謂之逆率過以小謂之枳子曰今之聽民者求所以殺之古之聽民者求所以生之不得其所以生之之道乃刑殺君與臣㑹焉子曰君子不可以不學見人不可以不飾不飾無貌無貌不敬不敬無禮無禮不立夫逺而光者飾也近而逾明者學也譬之汙邪水潦集焉菅蒲生焉從上觀之誰知其非源水也子曰文王得四臣丘得四友吾得回也門人加親是非胥附邪吾得賜也逺方之士至是非奔走邪吾得師也前有光後有輝是非先後邪吾得由也惡言不至於耳是非禦侮邪故文王有四臣免於虎口丘有四友以禦侮子曰心之精神是謂聖並見}
