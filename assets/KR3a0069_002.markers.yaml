  - {type: variant, offset: 1192, length: 153, content: 今予忘夫孝之道矣予是以有憂色呂氏春秋孝行覽樂正子春下堂而傷足瘳而數月不出猶有憂色門人問之曰夫子下堂而傷足瘳而數月不出猶有憂色敢問其故樂正子春曰善乎而問之吾聞之曾子曾子聞之仲尼父母全而生之子全而歸之不虧其身不損其形可謂孝矣君子無行咫步而忘之餘忘孝道是以憂大戴禮曾子大孝夫子曰伐一木殺一獸不以其時非孝也荀子子道, WYG: ''}
