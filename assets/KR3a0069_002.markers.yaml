  - {type: variant, offset: 531, length: 193, content: 子辟車與之言曰子非有喪何哭之悲也皋魚曰吾失之三矣少而學遊諸侯以後吾親失之一也高尚吾志間吾事君失之二也與友厚而小絕之失之三也樹欲靜而風不止子欲養而親不待也往而不可追者年也去而不可得見者親也吾請從此辭矣立槁而死孔子曰弟子誡之足以識矣於是門人辭歸而養親者十有三人說苑敬慎孔子行遊中路聞哭者聲其音甚悲孔子曰驅之驅之前有異人音少進見之丘吾子也擁鐮帶索而哭孔子辟車而下問曰夫子非有喪也何哭之悲也丘吾, WYG: ''}
