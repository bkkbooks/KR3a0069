  - {type: variant, offset: 2600, length: 0, content: '', WYG: 之務施而不腐餘財者聖人也受聖人之饋可無祭乎孔子曰北方有獸其名曰蟨前足䑕而後足兔是獸也甚愛蛩蛩巨虚也食得甘草必齧以遺蛩蛩巨虛蛩蛩巨虛見人將來必負蟨以走蟨非性愛蛩蛩巨虛也為其假足故也二獸者亦非性愛蟨也為其得甘草而遺之也夫禽獸昆蟲猶知比假以相報也况於士君子之欲興名利於天下者乎並見説苑孔子席不正不坐割不正不食席不正不坐不飲盗泉之水積正也漢許慎説文士尹池為荆使於宋司城子罕止而觴之南家之牆擁於前而不直西家之潦經其宫而不止士尹池問其故子罕曰南家鞔工也吾徙之其父曰吾恃鞔而食者三世今徙是國之求鞔者不知吾處也吾無以食願相國之憂吾不食也為是吾不徙西家高吾室卑潦之經吾宫也利為是故不禁也士尹池歸荆適興兵欲攻宋士尹池諫於王曰宋不可伐也其君賢其相仁賢者得民仁者能用人攻之無功乃為天下笑荆釋宋而攻鄭孔子聞之曰夫脩之廟堂之上而折衝千里之外者司城子罕之謂也劉向新序楚共王出獵而遺其弓左右請求之共王曰止楚人遺弓楚人得之又何求焉仲尼聞之曰惜乎其不大也亦曰人遺弓人得之而已何必楚也虞人芮人質成於文王入文王之境見其人民遜為士大夫入其國見其士大夫遜為公卿二國者相謂曰其人民遜為士大夫其士大夫遜為公卿其君亦遜以天下而不居矣二國者未見文王歸而遜其所爭為閒田孔子曰大哉文王之道乎其不可加矣不動而變無為而成敬謹恭已而虞芮自平曽子芸𤓰誤斷其根曽晳怒投大杖擊之曽子仆地有頃而蘓蹷然而起曰大人教參得無疾乎孔子聞之以告門人曰參來勿内三日曽子因客而見孔子孔子曰汝聞瞽瞍有子曰舜乎舜之事父也索而使之未甞不在側求而殺之未甞可得小箠則待大箠則走以逃暴怒也立體而不去殺身以陷父不義不孝孰是大乎孔子既不得用於衛將西見趙簡子至河而聞竇鳴犢舜華之死也曰竇鳴犢舜華晉國之賢大夫也趙簡子未得志之時須此兩人而後從政及其已得志殺之丘聞之刳胎殺夭則麒麟不至竭澤涸魚則蛟龍不游覆巢毁卵則鳳凰不翔何則君子重傷其類也夫鳥獸之於不義也尚知避之而况丘哉乃還並見説苑孔子先第十九孔子先世宋緡公之長子曰弗父何何世為宋大夫其曽孫曰正考父考父之子曰孔嘉父嘉為華父督所殺其子奔魯始為陬人孔子之曽大父曰孔防叔防叔生伯夏伯夏生叔梁紇以勇力聞於諸侯禱於尼丘生孔子故名之曰丘字仲尼孔子之生魯襄公之二十二年也孔子為兒嬉戱常陳俎豆設禮容幼而喪父𦵏於防山母不以告及母死不知其墓乃殯於五父之衢有過而疑焉因問之得於聊曼父之母然後合𦵏於防孔子長九尺六寸人皆謂之長人蓋未有知之者年三十有四魯大夫孟僖子病且死屬説與何忌事之而學禮焉以定其位闕里世載齊景公致廪丘於孔子以為養子不受曰吾聞君子當以功受禄今説景公未之行而賜廪丘其不知丘甚矣遂辭而行孔子遭難於陳蔡之境絶糧弟子皆有饑色孔子歌兩柱之間子路入見曰夫子之歌禮乎孔子不應曲終而曰君子}
