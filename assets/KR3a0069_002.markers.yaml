  - {type: variant, offset: 7, length: 0, content: '', WYG: 顔叔子第十二顔叔子獨處於室鄰之嫠婦又獨處於室夜暴風雨至而室壞婦人趨而至顔叔子納而使執燭放乎旦而蒸盡縮屋而繼之自以為辟嫌之不審矣若其審者宜若魯人然魯人有男子獨處室鄰之嫠婦獨處於室夜暴風雨至而室壞婦人趨而就之男子閉戸而不納婦人自牖與之言曰子何為不納我乎男子曰吾聞之也男女不六十不同居吾子幼吾亦幼不可以納子婦人曰子何不若栁下惠嫗不逮門之女國人不稱其亂男子曰栁下惠固可吾固不可吾将以吾不可學栁下惠之可}
