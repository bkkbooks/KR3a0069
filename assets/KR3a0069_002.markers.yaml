  - {type: variant, offset: 2601, length: 0, content: '', WYG: 樂為無驕也小人好樂為無懾也其誰知之子不我知而從我者乎子路不悦授干而舞三終而出及至七日孔子脩樂不休子路愠見曰夫子脩樂時乎孔子不應樂終而曰由昔齊桓公霸心生於莒勾踐霸心生於㑹稽晉文霸心生於驪氏故居不幽者思不逺身不約者智不廣庸知不遇於是興明日免於阸子貢執轡曰二三子從夫子而遇此難也其不忘可也孔子曰惡是何言也語不云乎三折肱而成良醫夫陳蔡之間丘之幸也二三子從丘皆幸人也吾聞人君不困不成王士不困不成行昔者湯困於莒文王困於羑里秦穆公困於殽齊桓公困於長勺勾踐困於㑹稽晉文困於驪姬夫困之道從寒之暖暖之及寒也唯賢者獨知其難而言之也易曰困亨貞大人吉孔子困於陳蔡之間七日不食藜羮不糝弟子皆有饑色孔子讀詩書治禮樂不休子路進諫曰凡為善者天報以福為不善者天報以禍今先生積德行為善乆矣意者尚有遺行乎奚居之隠也孔子曰由來汝不知吾語汝子以智者為無知乎則王子比干何為剖心而死子以}
