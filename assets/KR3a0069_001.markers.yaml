  - {type: variant, offset: 543, length: 0, content: '', krp: 下明而動晦而休無日以怠王后親織𤣥紞丁敢切冠垂也公侯之夫人加之以紘綖卿之内子為大帶命婦成祭服列士之妻加之以朝服自庶士以下皆衣其夫社而賦}
  - {type: variant, offset: 544, length: 0, content: '', WYG: 烝而獻功男女效績愆則有辟音平入聲古之制也君子勞心小人勞力先王之訓也自上以下誰敢淫心舍力今我寡也爾又在下位朝夕處事猶恐忘先人之業况有怠惰其何以避辟吾冀而朝夕修我曰必無廢先人爾今曰胡不自安以是承君之官余懼穆伯之絶祀也仲尼聞之曰弟子志之季氏之婦不淫矣季康子欲以田賦使冉有訪諸仲尼仲尼不對私於冉有曰求來汝不聞乎先王制土籍田以力而砥音止平也其逺近賦里以入而量其有無任力以夫而議其老幼於是乎有鰥寡孤疾有軍旅之出則徵之無則已其嵗收田}
