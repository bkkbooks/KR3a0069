  - {type: punctuation, offset: 492, content: 「, id: KR3a0069_tls_001-bkkpn128}
  - {type: variant, offset: 494, length: 1, content: 事, WYG: 識之於是門人辭歸而養親者十有三人宋大水魯弔之曰天降淫雨害於粢盛延及君地以憂執政使人敬弔宋人應之曰寡君不仁齋戒不脩使民失時天加以災又遺君憂拜命之辱孔子聞之曰宋其庶幾乎昔有桀紂不任其過其亡也忽焉文王知任其過其興也勃焉知過而改之是不過矣宋人聞之乃夙興夜寐弔死問疾戮力宇内三嵗年豐政平並韓詩外傳子觀第五子觀於魯桓公之廟有欹器焉子曰此為何器曰此為宥坐之器子曰吾聞宥坐之器者虛則欹中則正滿則覆明君以為至誡顧謂弟子曰注水焉弟子挹水而注之中則正滿則覆子喟然而歎曰吁惡有滿而不覆者哉物盈則衰樂極則悲日中則移月盈則虧子路曰敢問持滿有道乎子曰聰明睿智守之以愚功被天下守之以遜勇力蓋世守之以怯富有四海守之以謙此所謂挹而損之之道也子曰終日言不遺己憂終日行不遺己患唯智者有之故恐懼所以除患也恭敬所以越難也終日為之一言敗之可以不謹乎顔淵問曰囘願貧而如富賤而如貴無勇而威與人交通終身無患其可乎子曰善哉問也}
