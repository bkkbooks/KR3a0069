  - {type: variant, offset: 491, length: 0, content: '', WYG: 有賢者至則臯魚也被褐擁鎌哭於道傍子辟車與之言曰子非有喪何哭之悲也臯魚曰吾失之三矣少而好學周流諸侯以歿吾親失之一也髙尚吾志簡於事君失之二也與交友厚中而絶之失之三也木欲靜而風不止子欲養而親不逮往而不可反者年也逝而不可追者親也吾請從此辭矣立槁而死孔子}
  - {type: page-break, offset: 491, content: '', id: KR3a0069_WYG_001-11a, image: WYG0709/WYG0709-0326c.png}
  - {type: variant, offset: 491, length: 0, content: '', krp: 有賢者至則臯魚也被褐擁鎌哭於道傍子辟車與之言曰子非有喪何哭之悲也臯魚曰吾失之三矣少而好學周流諸侯以歿吾親失之一也髙尚吾志簡於事君失之二也與交友厚中而絶之失之三也木欲靜而風不止子欲養而親不逮往而不可反者年也逝而不可追者親也吾請從此辭矣立槁而死孔子}
