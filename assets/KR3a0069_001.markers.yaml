  - {type: variant, offset: 1490, length: 472, content: 三思而不可不思也少而不學長無能也老而不教死無思也有而不施窮無與也是故君子少思長則學老思死則教有思窮則施禦覽六百七引慎子孔子曰丘少而好學晚而聞道此以博矣群書治要屍子勸學夫子曰車唯恐地之不堅也舟唯恐水之不深也有其器則以人之難為易夫道以人之難為易也群書治要屍子處道孔子曰欲知則問欲能則學欲給則豫欲善則肄國亂則擇其邪人去之則國治矣胸中亂則擇其邪欲而去則德正矣意林一引屍子孔子雲誦詩讀書與古人居讀書誦詩與古人謀莊子雜篇讓王孔子謂顏回曰回來家貧居卑胡不仕乎顏回對曰不願仕回有郭外之田五十畝足以給掞粥郭內之田十畝足以為絲麻鼓琴足以自娛所學夫子之道者足以自樂也回不願仕孔子愀然變容曰善哉回之意丘聞之知足者不以利自累也審自得者失之而不懼行修於內者無位而不怍丘誦之久矣今於回而後見之是丘之得也呂氏春秋季春紀尊師子貢問孔子曰後世將何以稱夫子孔子曰吾何足以稱哉勿已者則好學而不厭好教而不倦其惟此邪淮南子要略孔子修成康之道述周公之訓以教七十子使服其衣冠修其篇籍故儒者之學生焉說苑建本孔子謂子路曰汝何好子路曰好長劍孔子曰非此之問也請以汝之所能加之以學豈可及哉子路曰學亦有益, WYG: 盜}
