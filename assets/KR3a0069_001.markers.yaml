  - {type: variant, offset: 11, length: 0, content: '', WYG: 易者易也變易也不易也管三成為道徳包籥見先秦古書易乾鑿度子曰易有太易有太初有太始有太素太易者未見氣太初者氣之始太始者形之始太素者質之始氣形質具而未離故曰渾淪渾淪者言萬物渾淪而未相離視之不見聽之不聞循之不得故曰易也易無形畔易變而為一太初也一變而為七太始也七變而為九太素也九者氣變之究也乃復變而為一一者形變之始清輕者上為天濁重者下為地物有始有壯有究故三畫而成乾乾坤相並俱生物有陰陽因而重之故六畫而成卦子曰上古之時人民無别群物無殊未有衣食器用之利於是伏羲乃仰觀象於天俯觀法於地中觀萬物之宜始作八卦以通神明之徳類萬物之情故易者所以繼天地理人倫而明王道是故八卦以建五氣以立五常以之行象法乾坤順陰陽以正君臣父子之義度時制宜作網罟以畋以漁以贍人用於是人民乃治君親以尊臣子以順群生和洽各安其性子曰文王因陰陽消息立乾坤統天地夫有形者生於無形則乾坤安從生子曰八卦之序成立則五氣變形故人生而應八卦之體得五氣以為五常仁義禮智信是也子曰陽三陰四位之正也夫易卦六十四分而上下象陰陽也陽道純而竒故上篇三十所以象陽也陰道不純而偶故下篇三十四所以法陰也乾坤者陰陽之根本萬物之祖宗故為上篇始而尊之也離為日坎為月日月之道陰陽之經所以始終萬物故以坎離為上篇終咸者男女之始夫婦之道也人道之興必由夫婦所以奉承祖宗為天地生故為下篇始而貴之也既濟未濟為最終者所以明戒謹而全王道也以上並見易乾鑿度子曰昔紂有臣曰王子須務為諂使其君樂須㬰之樂而忘終身之憂子曰商汝知君之為君乎子夏曰魚失水則死水失魚猶為水也子曰惡人者人惡之知得之己者亦知得之人所謂不出環堵之室而知天下者知及之己者也並見尸子子張見魯哀公七日不見禮託僕夫而去曰臣聞君好士日舍重趼魚見切足健也來見君七日而不禮君之好士也有似葉公子髙之好龍也葉公子髙好龍居室雕文以象龍天龍聞而下之窺頭於牖拖尾於堂葉公見之棄而還走失其魂魄是葉公非好龍也好夫似龍而非龍者也今臣聞君好士不逺千里而見君七日不禮君非好士也子張以告夫子子曰彼好夫士而非士者也子曰某少而好學晩而聞道此以博矣並申子子貢第二子貢問曰昔黄帝四面信乎孔子曰黄帝取合己者四人使治四方不計而耦不約而成此之謂四面也尸子季子治單父三年巫馬期往觀化焉見夜漁所得小魚釋之巫馬期以報孔子子曰季子之徳至矣使人闇行若有嚴刑在其側季子何以至此某嘗聞之誠於此者形於彼季子必行此術也哀公問於仲尼曰吾欲小則守大則攻其道若何仲尼曰若朝廷上下皆君之親附也君誰與攻朝廷無禮上下無親其衆皆君之讐也君誰與守哀公於是廢梁澤之禁弛關市之征以惠民子曰善為吏者立徳不善為吏者立怨並見韓非子孔子為魯相七日而誅少正夘門人進問曰夫少正夘魯之聞人也夫子為政而始誅之得毋太甚乎子曰居吾語汝人而惡者五而盜不與焉一曰心逆而險二曰行僻而堅三曰言偽而辯四曰記醜而博五曰順非而澤此五者有一於人則不免於}
