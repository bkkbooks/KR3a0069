  - {type: variant, offset: 536, length: 3, content: 詩雲夙, WYG: 吾穿井而獲狗何也對曰以某之所聞羊也某聞之木石之怪曰䕫蝄蜽水之怪曰龍罔象土之怪曰羵羊魯語公父文伯第六公父文伯朝其母其母方績文伯曰以歜之家而主猶績懼干季孫之怒也其以歜為不能事主乎其母歎曰魯其亡乎使童子備官而未之聞邪居吾語女昔聖王之處民也擇瘠土而處之勞其民而用之故長王天下夫民勞則思思則善心生逸則淫淫則忘善忘善則惡心生沃土之民不材淫也瘠土之民莫不向義勞也是故天子大采朝日與三公九卿祖識地徳祖習也識知也天子因朝日以修陽政故謂之習地徳也日中考政與百官之政事師尹惟旅牧相宣序民事少采夕月與太史司載糾䖍天刑而後即安諸侯朝修天子之業命晝考其國職夕省其典刑}
