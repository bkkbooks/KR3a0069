  - {type: variant, offset: 480, length: 1, content: 八, WYG: 持盈第四子曰持盈之道挹而損之順之者吉逆之者凶能此者其惟周公乎周公以文王之子武王之弟成王之叔父所執贄而師見者七人所還贄而友見者十三人窮巷白屋之士所先見者四十九人時進善者百人官朝者千人諫臣五人輔臣五人拂音弼臣六人載干戈以至封侯異族九十七人而同姓之士百人猶以周公為天下黨則以同族為衆異族為寡也子曰不謹於前而悔於後嗟乎雖悔亦無及矣詩曰惙其泣矣何嗟及矣此之謂也}
