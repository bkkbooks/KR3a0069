  - {type: variant, offset: 1482, length: 1, content: 法, WYG: 曰丘死之後商也日益賜也日損商也好與賢己者處賜也好説不如己者孔子曰鞭朴之子不從父之教刑戮之民不從君之政言疾之難行故君子不急㫁不意使以為亂源子曰以富貴為人下者何人不與以富貴敬愛人者何人不親愛衆言不逆可謂知言矣衆嚮之可謂知時矣孔子曰船非水不可行水入船中則沒矣故君子不可不嚴也小人不可不閑也孔子曰貞以幹之敬以輔之待人無倦見君子則舉之見小人則退之去爾惡心而忠與之敏其行而修其禮千里之外親若兄弟若行不敏禮不合則對門不通矣並説苑漆雕氏第九孔子曰漆雕氏之子君子哉其善人之美也隱而顯言人之惡也微而著故智不能及明不能見也得無數卜乎孔子卦得賁喟然而歎子張進而問曰師聞賁吉卦而歎之乎孔子曰賁非正色也是以歎之吾思夫質素白當正白黒當正黒夫質文何也吾聞丹漆不文白玉不雕寶珠不飾何也質有餘者不受飾也魯有儉者瓦鬲煮食食之而美盛以土缻音缶之器以進孔子孔子受之懽然如受大牢之饋弟子曰瓦甂酒器也煮食薄膳也而先生何喜如此乎孔子曰吾聞好諫者思其君食美者思其親吾非以饋為厚也以其食美而思我親也孔子曰無體之禮敬也無服之喪憂也無聲之樂懽也不言而信不怒而威不施而仁志也鐘鼓之聲怒而擊之則武憂而擊之則悲喜而擊之則樂其志變其聲亦變至誠通乎金石而况人乎子路治蒲見孔子曰願受教子曰蒲多壯士難治也吾語汝恭以敬可以懾勇寛以正可以容衆恭以潔可以親上子貢為信陽令辭孔子而}
