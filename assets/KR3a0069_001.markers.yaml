  - {type: variant, offset: 2064, length: 1, content: 入, WYG: 後齊有飛鳥一足來下止於殿前舒翼而跳齊侯恠之使聘問孔子子曰此名商羊也急治溝渠天將大雨於是諸國皆被水齊國獨以安孔子歸弟子問焉子曰異時兒童之謡曰楚王渡江得萍實大如斗赤如日剖而食之甜如蜜此楚之應也兒有兩兩相攜屈一足而跳者曰天將大雨商羊起舞今齊見之亦其應也夫謡未嘗}
