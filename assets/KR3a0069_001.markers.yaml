  - {type: variant, offset: 2066, length: 2, content: 益深, WYG: 相應也在人非獨守道而已子曰以容取人失之子羽以言取人失之宰予澹臺子羽君子之容也與之久處而言不充其貌宰予之辭雅而文也與之久處而智不充其辯子貢問曰今之人臣孰賢子曰齊有鮑叔鄭有子皮賢者也子貢曰然則齊無管仲鄭無子産}
