  - {type: variant, offset: 1107, length: 2, content: 非利, WYG: 不以衛上攻戰而反以侵陵私鬭心智慧者不以端計數而反以事姦飾詐貌美好者不以統朝涖官而反以蠱女從欲此五者所謂喪其美質者也並韓詩外傳孔子謂宓子賤曰子治單父而衆説語丘以其故曰不齊父其父子其子恤諸孤而哀喪紀孔子曰善小節也小民附矣猶未也曰不齊也所父事者三人所兄事者五人所友者十一人孔子曰父事三人可以教孝矣兄事五人可以教悌矣友十一人可以教學矣中節也中民附矣猶未}
