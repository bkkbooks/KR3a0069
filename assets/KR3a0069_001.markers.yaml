  - {type: variant, offset: 571, length: 0, content: '', krp: 假我數年若是我於易則彬彬矣夫子作春秋筆則筆削則削子夏之徒不能贊一辭弟子受春秋子曰後世知丘者以春秋罪丘者亦以春秋子曰自吾得由而惡言不入於耳子曰神龜知吉凶而骨直空枯日陽徳而君於天下而辱於三足之烏月為刑而相佐見食於蝦蟆蝟辱於鵲騰蛇之神而殆於即且竹外有節理中直空虛松栢為百木長而守門閭日辰不全而有空虛黄金有疵白玊有瑕事有所疾亦有所徐物有所拘亦有所據罔有所數亦有所疎人有所貴亦有所不如何而可適乎物安可全乎並見史記六藝第七子曰六藝於治一也禮以節人樂以發和書以道事}
