  - {type: variant, offset: 2102, length: 295, content: 曰不可昔者東夷慕諸夏之義有女其夫死為之內私婿終身不嫁不嫁則不嫁矣然非貞節之義也蒼梧之弟娶妻而美好請與兄易忠則忠矣然非禮也今子欲釋古之學而行子之意庸知子用非為是用是為非乎不順其初雖欲悔之難哉說苑貴德子路持劍孔子問曰由安用此乎子路曰善古者固以善之不善古者固以自衛孔子曰君子以忠為質以仁為衛不出環堵之內而聞千里之外不善以忠化寇暴以仁圍何必持劍乎子路曰由也請攝齊以事先生矣中論治學孔子曰弗學何以行弗思何以得小子勉之斯可以為人師矣中論修本孔子曰弟子勉之汝毋自舍人猶舍汝況自舍乎人違汝其遠矣中論修本孔子謂子張曰師吾欲聞彼將以改此也聞彼而不改此雖聞何益中論修本孔子曰小人何以壽為一日之不能善矣久惡惡之甚也, WYG: 集語卷上}
