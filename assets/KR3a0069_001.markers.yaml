  - {type: variant, offset: 1140, length: 178, content: 荀子宥坐孔子曰吾有恥也吾有鄙也吾有殆也幼不能強學老無以教之吾恥之去其故鄉事君而達卒遇故人曾無舊言吾鄙之與小人處者吾殆之也荀子宥坐孔子曰如垤而進吾與之如丘而止吾已矣今學曾未如疣贅則具然欲為人師荀子宥坐子貢觀於魯廟之北堂出而問於孔子曰向者賜觀於太廟之北堂吾亦未輟還複瞻被九蓋皆繼彼有說邪匠過絕邪孔子曰太廟之堂亦嚐有說官致良工因麗節文非無良材也蓋曰貴文也荀子子道, WYG: ''}
