  - {type: variant, offset: 2060, length: 2, content: 砥礪, WYG: 授之以政以此取之雖王可也霸則小矣子路為蒲令備水災與民春修溝瀆故予民一簞食壺漿孔子聞之使子貢覆之子路不説往見夫子曰由也以暴雨將至恐有水災故與民修溝瀆以避之而民多匱於食故與人簞食壺漿而夫子使賜止之是夫子止由之行化也子曰爾以民餓何不告君發廩以給之而爾以私饋之是汝不明君之惠而見汝之徳也速已可矣否則爾之受罪不久矣子路心服而退並見説苑楚昭王第十楚昭王渡江有物大如斗直觸王舟中昭王恠之使聘問孔子子曰此名萍實吉祥也惟霸者能獲}
