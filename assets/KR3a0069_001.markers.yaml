  - {type: variant, offset: 490, length: 0, content: '', WYG: 語終日有間顧子路曰由束帛一以贈先生子路不對有間又顧曰由束帛一以贈先生子路㞕然而對曰㞕與屑同昔者由也聞之夫子士不中道而見女無媒而嫁君子不行也子曰由詩不云乎野有蔓草零露漙兮有美一人清揚婉兮邂逅相遇適我願兮今程本子賢士也於是不贈終身不之見也子曰大夫有爭臣三人雖無道不失其家季氏僭天子舞八佾旅泰山以雍徹無道甚矣然而不亡者以冉有季路為之宰也劔雖利不厲不㫁材雖美不學不髙雖有㫖酒嘉肴不嘗不知其㫖也雖有善道不學不達其功也故學然後知不足教然後知不究不足故自慊而勉不究故盡思而熟由此觀之則教學相長也子曰堯舜清微其身以聴天下務來賢人夫舉賢百福之宗也神明之主也孔子適衛衛使見客客去顔淵問曰客仁也乎子曰恨兮其心顙兮其口仁即吾不知也顔淵蹵然變色曰良玉度尺雖有十仞之土不能掩其光良珠度寸雖有百仞之水不能掩其氣夫形體之包心也閔閔乎其薄也茍有温瑩良在其中則眉䀹見之矣疵瑕在其中亦不能匿也詩曰鼓鐘于宫聲聞于外言有諸中者必形諸外也孔子行聞有哭聲甚哀子曰驅驅}
  - {type: page-break, offset: 490, content: '', id: KR3a0069_WYG_001-10a, image: WYG0709/WYG0709-0326a.png}
  - {type: page-break, offset: 490, content: '', id: KR3a0069_WYG_001-10b, image: WYG0709/WYG0709-0326b.png}
