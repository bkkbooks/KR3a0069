  - {type: variant, offset: 13, length: 0, content: '', WYG: 之誅而少正夘兼之不可不誅也尹文子荆有佽非者得寶劔於干音寒隊反渡江中流兩蛟俠繞其船佽非謂枻船者曰嘗有如此而得活者乎對曰未嘗見也於是佽非攘臂拔劔曰武士可以仁義説也不可刧而奪也此江之腐肉朽骨棄劔而已余奚有焉赴江刺蛟遂㫁其頭風波畢除荆爵為執圭孔子聞之曰夫善除腐肉朽骨棄劔者佽非之謂乎夫子見禾之三變滔滔然曰狐首丘而死鳥飛反鄉兎走歸窟我其首禾乎穗垂而向根不忘本也子曰小辯破言小利破義小義破道小見不達大禮必簡河以委蛇故能逺山以陵遲故能髙陰陽無為故能和道以優㳺故能化並見淮南子子讀易至損益未嘗不喟然歎曰或欲利之適足以害之或欲害之適足以利之利害禍福之門}
