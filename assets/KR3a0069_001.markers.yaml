  - {type: variant, offset: 1074, length: 1, content: 博, WYG: 雨之非其人如聚聾而鼓之孔子觀於周之太廟有金人焉三緘其口而銘其背曰古之謹言人也戒之哉戒之哉無多言多言多敗無多事多事多害安樂必戒無行所悔勿謂何傷其禍將長勿謂何害其禍將大勿謂何殘其禍將然勿謂莫聞神將伺人熒熒不滅炎炎奈何涓涓不壅將成江河綿綿不絶將成網羅青青不伐將尋斧柯誠不能謹禍之根也口是何傷禍之門也强梁者不得其死好勝者必遇其敵君子知天下之不可蓋也故後之下之使人慕之執雌持下莫能與爭人皆趨彼我獨守此衆人惑惑我獨不從内藏我智不與人論技我雖尊髙人莫害我夫江河長百谷者以其卑下也天道無親常與善人戒之哉戒之哉孔子顧謂弟子曰識之此言雖鄙而中事情子曰不知其子視其所友不知其君視其所使與善人居如入芝蘭之室久而不聞其香與之俱化矣與不善人居如入鮑魚之肆久而不聞其臰􅆨同亦與之化矣故君子謹所與並}
