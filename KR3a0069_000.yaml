body:
  text: 孔子集語宋薛據撰據字叔容永嘉人官至浙東常平提舉林德旸霽山集有二薛先生文集序曰薛氏世學蓋三百年玉成公學於慈湖楊敬仲刊華據實猶程門緒餘偽學禁興隻手衛道著伊洛源流各為譜傳又以弓冶授其子叔容公誌宏力毅負荷千年念聖遠言湮為孔子集語二十卷即是書也此本但分二十篇僅有三卷殆舊以一篇為一卷後人並之歟所列書凡三十餘種其凡例為曾子大戴禮孔叢子孔子家語四全書及左氏莊子荀子列子概不採及惟見於他古書者采之然孔子世家列在正史不僻於孔叢家語且既雲不錄大戴禮記而顏叔子第十二乃引其一條亦自亂其例至引說文黍可為酒禾入水也一貫三為王推一合十為士等語並數條為一條義不相貫尤為失倫他若韓非子說林下內儲說上內儲說下外儲說左上外儲說右下難一難三諸篇可采者幾二十條而此書所引僅三條若淮南子道應訓主術訓下齊俗訓修務訓泰俗訓要略諸篇所可采者不下十餘條而此所引者亦僅三條則其餘掛漏可以概知又文翔鳳雲夢藥溪談摘其五酉一條引搜神記而諱其所出又訛五酉為五酋則駁雜舛錯亦所不免特所錄尚多秦漢古書殘篇斷句或可藉此以僅存故考古者亦不能廢焉序孔子集語者陽湖孫觀察星衍字伯淵所撰也孔子修百王之道以詔來者六經而外傳記百家所載微言大義足以羽儀經業導揚儒風者往往而有其纂輯成書者梁武帝孔子正言二十卷王勃次論語十卷皆不存見存楊簡先聖大訓十卷薛據孔子集語二卷潘士達論語外篇二十卷而薛書最顯不免掛漏近人曹廷棟又為孔子逸語十卷援稽失實不足論嘉慶辛未歲觀察引疾歸田惜儒書之闕失乃博搜群籍綜核異同增多薛書六七倍而仍名之為孔子集語者識所緣起也其纂輯大例易十翼禮小戴記春秋左氏傳孝經論語孟子舉世誦習不載家語孔叢子有成書專行不載史記孔子世家弟子傳易檢亦不載其餘群經傳注秘緯諸史諸子以及唐宋人類書巨篇隻句畢登無所去取皆明言出處篇卷或疑文脫句酌加按語或一事而彼此互見且五六見得失短長可互證得之逾年初稿成又二年屬其友人烏程嚴可均略仿說苑體裁理而董之覆檢群書是正訛字更移次第增益闕遺為十四篇勸學第一孝本第二五性第三六藝第四主德第五臣術第六交道第七論人第八論政第九博物第十事譜第十一雜事第十二遺讖第十三寓言第十四篇各為卷六藝事譜寓言卷大分為上下以十四篇為十七卷勸學等篇與正經相表裏遺讖不醇寓言蓋依托乃雕版於金陵公諸後世嚴可均為之序表山東督糧道臣孫星衍稽首頓首上言臣所撰孔子集語十四篇成謹奉表上進者伏以黃顓授道丹書備北面之儀河洛浮圖元扈有東巡之典蓋折衷俟諸至聖而稽古所以同天欽惟我皇上雅詠宗經臨雍尊聖如天蕩蕩堯本難名猶日孜孜禹思聞善芻蕘之所必采謨訓況有明征昔在孔子微言大義史氏有將絕之虞性道文章及門有難聞之歎故易翼麟書而外緯候載其遺言孝經論語之餘子史傳其佚說吾無隱爾絕賢哲之讚詞天何言哉托素王之眇論而籍亡七國書散嬴秦畏鑽仰之高堅孰網羅其放失臣拜恩繡斧承乏奎婁慕禮器而升堂曆歲時以載筆識大識小一話一言靡不綜其異同征其典據撞鍾以莛冀有餘音集腋成裘多存粹白其六經所載謹避雷同三豕傳訛悉加讎正或有寓言依托小說流傳恐魚目之混珠窺豹斑而撥霧醇疵不雜仿晏嬰內外之篇事類相從比說苑區分之目視宋臣薛據之帙采獲加多勘曹氏廷棟之書增刪期當昔方言屬草有子駿之旁求封禪留書因所忠而奏上臣職容專達病久罷閑附闕里之上公述聖門之祖德恭呈乙覽或為座側之資廣布儒林聊比壁中之簡臣無任屏營惶恐瞻天望闕踴躍歡忭謹因衍聖公臣慶鎔奉表恭進以聞目錄卷一勸學一卷二孝本二卷三五性三卷四六藝四上卷五六藝四下卷六主德五卷七臣術六卷八交道七卷九論人八卷十論政九卷十一博物十卷十二事譜十一上卷十三事譜十一下卷十四雜事十二卷十五遺讖十三卷十六寓言十四上卷十七寓言十四下
