body:
  text: 博物十魯語下季桓子穿井獲如土缶其中有羊焉使問之仲尼曰吾穿井而獲狗何也對曰以丘之所聞羊也丘聞之木石之怪曰夔蝄蜽水之怪曰龍罔象土之怪曰績羊說苑辨物季桓子穿井得土缶中有羊以問孔子言得狗孔子曰以吾所聞非狗乃羊也木之怪夔罔兩水之怪龍罔象土之怪績羊也非狗也桓子曰善哉搜神記十二季桓子穿井獲如土缶其中有羊焉使問之仲尼曰吾穿井而獲狗何邪對曰以丘所聞羊也丘聞之木石之怪夔蝄蜽水之怪龍罔象土中之怪曰賁羊初學記七引韓詩外傳魯哀公使人穿井三月不得泉得一玉羊哀公甚懼孔子聞之曰水之精為玉土之精為羊此羊肝乃土爾哀公使人殺羊其肝即土也文選齊故安陸王碑注引韓詩外傳孔子曰水之精為玉老蒲為葦願無怪之禦覽九百二引韓詩外傳魯哀公使人穿井三月不得泉得一玉羊焉公以為祥使祝鼓舞之欲上於天羊不能上孔子見公曰水之精為玉土之精為羊願無怪之此羊肝土也公使殺之視肝即土矣魯語下吳伐越墮會稽獲骨焉節專車吳子使來好聘且問之仲尼曰無以吾命賓發幣於大夫及仲尼仲尼爵之既徹俎而宴客執骨而問曰敢問骨何為大仲尼曰丘聞之昔禹致群神於會稽之山防風氏後至禹殺而戮之其骨節專車此為大矣客曰敢問誰守為神仲尼曰山川之靈足以紀綱天下者其守為神社稷之守者為公侯皆屬於王者客曰防風何守也仲尼曰汪芒氏之君也守封嵎之山者也為漆姓在虞夏商為汪芒氏於周為長狄今為大人客曰人長之極幾何仲尼曰僬僥氏長三尺短之至也長者不過十數之極也說苑辨物吳伐越隳會稽得骨專車使使問孔子曰骨何者最大孔子曰禹致群臣會稽山防風氏後至禹殺而戮之其骨節專車此為大矣使者曰誰為神孔子曰山川之靈足以紀綱天下者其守為神社稷為公侯山川之祀為諸侯皆屬於王者曰防風氏何守孔子曰汪芒氏之君守封嵎之山者也其神為釐姓在虞夏為防風氏商為汪芒氏於周為長狄氏今謂大人使者曰人長幾何孔子曰僬僥氏三尺短之至也長者不過十數之極也使者曰善哉聖人也魯語下仲尼在陳有隼集於陳侯之庭而死楛矢貫之石砮其長尺有咫陳惠公使人以隼如仲尼之館問之仲尼曰隼之來也遠矣此肅慎氏之矢也昔武王克商通道於九夷百蠻使各以其方賄來貢使無忘職業於是肅慎氏貢楛矢石砮其長尺有咫先王欲昭其令德之致遠也以示後人使永監焉故銘其栝曰肅慎氏之貢矢以分大姬配虞胡公而封諸陳古者分同姓以珍玉展親也分異姓以遠方之職貢使無忘服也故分陳以肅慎氏之貢君若使有司求諸故府其可得也使求得之金櫝如之說苑辨物仲尼在陳有隼集於陳侯之廷而死楛矢貫之石砮矢長尺而咫陳侯使問孔子孔子曰隼之來也遠矣此肅慎氏之矢也昔武王克商通道九夷百蠻使各以其方賄來貢思無忘職業於是肅慎氏貢楛矢石砮長尺而咫先王欲昭其令德之致故銘其栝曰肅慎氏貢楛矢以勞大姬配虞胡公而封諸陳分同姓以珍玉展親也分別姓以遠方職貢使無忘服也故分陳以肅慎氏之矢試求之故府果得焉初學記十六引晏子春秋齊景公為大鍾將懸之仲尼伯常騫晏子三人俱來朝皆曰鍾將毀撞之果毀公召三子問之晏子曰鍾大非禮是以曰將毀仲尼曰鍾大懸下其氣不得上薄是以曰將毀伯常騫曰今日庚申雷日也陰莫勝於雷是以曰將毀說苑辨物楚昭王渡江有物大如鬥直觸王舟止於舟中昭王大怪之使聘問孔子孔子曰此名萍實令剖而食之惟霸者能獲之此吉祥也其後齊有飛鳥一足來下止於殿前舒翅而跳齊侯大怪之又使聘問孔子孔子曰此名商羊急告民趣治溝渠天將大雨於是如之天果大雨諸國皆水齊獨以安孔子歸弟子請問孔子曰異哉小兒謠曰楚王渡江得萍實大如拳赤如日剖而食之美如蜜此楚之應也兒又有兩兩相牽屈一足而跳曰天將大雨商羊起舞今齊獲之亦其應也夫謠之後未嘗不有應隨者也故聖人非獨守道而已也睹物記也即得其應矣論衡明雩孔子出使子路齎雨具有頃天果大雨子路問其故孔子曰昨暮月離於畢後日月復離畢孔子出子路請齎雨具孔子不聽出果無雨子路問其故孔子曰昔日月離其陰故雨昨暮月離其陽故不雨論衡卜筮魯將伐越筮之得鼎折足子貢占之以為凶何則鼎而折足行用足故謂之凶孔子占之以為吉曰越人水居行用舟不用足故謂之吉魯伐越果克之論衡實知孔子未嘗見猩猩至輒能名之然而孔子名猩猩聞昭人之歌繹史孔子類記四引衝波傳有烏九尾孔子與子夏見之人以問孔子曰鶬也子夏曰何以知之孔子曰河上之歌雲鶬兮鶬兮逆毛衰兮一身九尾長兮廣韻十三末鴰字注引韓詩孔子渡江見之異衆莫能名孔子嘗聞河上人歌曰鴰兮鴰兮逆毛衰兮一身九尾長兮鶬鴰也北戶録上引白澤圖鬼車昔孔子子夏所見故歌之其圖九首虞世南撰夫子廟堂碑辨飛龜於石函事譜十一上詩商頌序疏引世本宋湣公生弗甫何弗甫何生宋父宋父生正考甫正考甫生孔父嘉為宋司馬華督殺之而絶其世其子木金父降為士木金父生祁父祁父生防叔為華氏所逼奔魯為防大夫故曰防叔防叔生伯夏伯夏生叔梁紇叔梁紇生仲尼潛夫論志氏姓閔公子弗父何生宋父宋父生世子世子生正考父正考父生孔父嘉孔父嘉生子木金父木金父降為士故曰滅於宋金父生祁父祁父生防叔防叔為華氏所逼出奔魯為防大夫故曰防叔防叔生伯夏伯夏生叔梁紇為鄹大夫故曰鄹叔紇生孔子續博物志二孔子生於魯襄公二十二年韓詩外傳二孔子遭齊程本子於郯之間傾蓋而語終日有間顧子路曰由來取束帛十匹以贈先生子路不對有間又顧謂曰取束帛十匹以贈先生子路率爾而對曰昔者由也聞之於夫子士不中道相見女無媒而嫁者君子不行也孔子曰夫詩不雲乎野有蔓草零露漙兮有美一人青揚宛兮邂逅相遇適我願兮且夫齊程本子天下之賢士也吾於是而不贈終身不之見也大德不逾間小德出入可也說苑尊賢孔子之郯遭程子於途傾蓋而語終日有間顧子路曰取束帛一以贈先生子路不對有間又顧曰取束帛一以贈先生子路屑然對曰由聞之也士不中而見女無媒而嫁君子不行也孔子曰由詩不雲乎野有蔓草零露漙兮有美一人清揚婉兮邂逅相遇適我願兮今程子天下之賢士也於是不贈終身不見大德毋逾間小德出入可也子華子子華子反自郯遭孔子於途傾蓋相顧相語終日甚相歡也孔子命子路曰取束帛以贈先生子路屑然而對曰由聞之士不中間見女嫁無媒君子不以交禮也子曰固哉由也詩不雲乎有美一人清揚婉兮邂逅相遇適我願兮今程子天下之賢士也於斯不贈則終身弗能見也小子行之高士傳孔子年十七遂適周見老聃莊子外篇天道孔子西藏書於周室子路謀曰由聞周之征藏史有老聃者免而歸居夫子欲藏書則試往因焉孔子曰善往見老聃而老聃不許於是紵十二經以說老聃中其說曰大謾願聞其要孔子曰要在仁義老聃曰請問仁義人之性邪孔子曰然君子不仁則不成不義則不生仁義真人之性也又將奚為矣老聃曰請問何謂仁義孔子曰中心物愷兼愛無私此仁義之情也說苑敬慎孔子之周觀於太廟右陛之前有金人焉三緘其口而銘其背曰古之慎言人也戒之哉戒之哉無多言多言多敗無多事多事多患安樂必戒無行所悔勿謂何傷其禍將長勿謂何害其禍將大勿謂何殘其禍將然勿謂莫聞天妖伺人熒熒不滅炎炎奈何涓涓不壅將成江河綿綿不絶將成網羅青青不伐將尋斧柯誠不能慎之禍之根也曰是何傷禍之門也強梁者不得其死好勝者必遇其敵盜怨主人民害其貴君子知天下之不可蓋也故後之下之使人慕之執雌持下莫能與之爭者人皆趨彼我獨守此衆人惑惑我獨不從內藏我知不與人論技我雖尊高人莫害我夫江河長百穀者以其卑下也天道無親常與善人戒之哉戒之哉孔子顧謂弟子曰記之此言雖鄙而中事情詩曰戰戰兢兢如臨深淵如履薄冰行身如此豈以口遇禍哉說苑雜言孔子曰自季孫之賜我千鍾而友益親自南宮項叔之乘我車也而道加行故道有時而後重有勢而後行微夫二子之賜丘之道幾於廢也荀子宥坐孔子觀於魯桓公之廟有欹器焉孔子問於守廟者曰此為何器守廟者曰此蓋為宥坐之器孔子曰吾聞宥坐之器者虛則欹中則正滿則覆孔子顧謂弟子曰注水焉弟子挹水而注之中而正滿而覆虛而欹孔子喟然而歎曰籲惡有滿而不覆者哉子路曰敢問持滿有道乎孔子曰聰明聖知守之以愚功被天下守之以讓勇力撫世守之以怯富有四海守之以謙此所謂挹而損之之道也韓詩外傳三孔子觀於周廟有欹器焉孔子問於守廟者曰此謂何器也對曰此蓋為宥坐之器孔子曰聞宥坐器滿則覆虛則欹中則正有之乎對曰然孔子使子路取水試之滿則覆中則正虛則欹孔子喟然而歎曰嗚呼惡有滿而不覆者哉子路曰敢問持滿有道乎孔子曰持滿之道抑而損之子路曰損之有道乎孔子曰德行寬裕者守之以恭土地廣大者守之以儉祿位尊盛者守之以卑人衆兵強者守之以畏聰明睿知者守之以愚博聞強記者守之以淺夫是之謂抑而損之淮南子道應訓孔子觀桓公之廟有器焉謂之宥卮孔子曰善哉豫得見此器顧曰弟子取水水至灌之其中則正其盈則覆孔子造然革容曰善哉持盈者乎子貢在側曰請問持盈曰益而損之曰何謂益而損之曰夫物盛而衰樂極而悲日中而移月盈而虧是故聰明睿知守之以愚多聞博辨守之以陋武力毅勇守之以畏富貴廣大守之以儉德施天下守之以讓此五者先王所以守天下而弗失也反此五者未嘗不危也說苑敬慎孔子觀於周廟而有欹器焉孔子問守廟者曰此為何器對曰蓋為宥坐之器孔子曰吾聞宥坐之器滿則覆虛則欹中則正有之乎對曰然孔子使子路取水而試之滿則覆中則正虛則欹孔子喟然歎曰嗚呼惡有滿而不覆者哉子路曰敢問持滿有道乎孔子曰持滿之道挹而損之子路曰損之有道乎孔子曰高而能下滿而能虛富而能儉貴而能卑智而能愚勇而能怯辨而能訥博而能淺明而能暗是謂損而不極能行此道唯至德者及之易曰不損而益之故損自損而終故益呂氏春秋離俗覽舉難季孫氏劫公家孔子欲諭術則見外於是受養而便說魯國以訾孔子曰龍食乎清而遊乎清螭食乎清而遊乎濁魚食乎濁而遊乎濁今丘上不及龍下不若魚丘其螭邪論衡龍虛孔子曰龍食於清遊於清龜食於清遊於濁魚食於濁遊於清丘上不及龍下不為魚中止其龜與說苑修文孔子至齊郭門之外遇一嬰兒挈一壺相與俱行其視精其心正其行端孔子謂禦曰趣驅之趣驅之韶樂方作孔子至彼聞韶三月不知肉味晏子春秋外篇下仲尼遊齊見景公景公曰先生奚不見寡人宰乎仲尼對曰臣聞晏子事三君而得順焉是有三心所以不見也仲尼出景公以其言告晏子晏子對曰不然嬰為三心三君為一心故三君皆欲其國之安是以嬰得順也嬰聞之是而非之非而是之猶非也孔丘必據處此一心矣晏子春秋外篇下仲尼之齊見景公而不見晏子子貢曰見君不見其從政者可乎仲尼曰吾聞晏子事三君而順焉吾疑其為人晏子聞之曰嬰則齊之世民也不維其行不識其過不能自立也嬰聞之有幸見愛無幸見惡誹譽為類聲響相應見行而從之者也嬰聞之以一心事三君者所以順焉以三心事一君者不順焉今未見嬰之行而非其順也嬰聞之君子獨立不慚於影獨寢不慚於魂孔子拔樹削跡不自以為辱窮陳蔡不自以為約非人不得其故是猶澤人之非斤斧山人之非網罟也出之其口不知其困也始吾望傅而貴之今吾望傅而疑之仲尼聞之曰語有之言發於爾不可止於遠也行存於身不可掩於衆也吾竊議晏子而不中夫人之過吾罪幾矣丘聞君子過人以為友不及人以為師今丘失言於夫子譏之是吾師也因宰我而謝焉然仲尼見之說苑權謀孔子與齊景公坐左右白曰周使來言周廟燔齊景公出問曰何廟也孔子曰是釐王廟也景公曰何以知之孔子曰詩雲皇皇上帝其命不忒天之與人必報有德禍亦如之夫釐王變文武之製而作元黃宮室輿馬奢侈不可振也故天殃其廟是以知之景公曰天何不殃其身曰天以文王之故也若殃其身文王之祀無乃絶乎故殃其廟以章其過也左右入報曰周釐王廟也景公大驚起再拜曰善哉聖人之智豈不大乎晏子春秋外篇下仲尼之齊見景公景公說之欲封之以爾稽以告晏子晏子對曰不可彼浩裾自順不可以教下好樂綏於民不可使親治立命而建事不可使守職厚葬破民貧國久喪道哀費日不可使子民行之難者在內而傳者無其外故異於服勉於行不可以道衆而馴百姓自大賢之滅周室之卑也威儀加多而民行滋薄聲樂繁充而世德滋衰今孔丘盛聲樂以侈世飾弦歌鼓舞以聚徒繁登降之禮趨翔之節以觀衆博學不可以儀世勞思不可以補民兼壽不能殫其教當年不能究其禮積財不能贍其樂繁飾邪術以營世君盛為聲樂以淫愚其民其道也不可以示世其教也不可以導民今欲封之以移齊國之俗非所以道衆存民也公曰善於是厚其禮而留其封敬見不問其道仲尼乃行墨子非儒下孔丘之齊見景公景公說欲封之以尼溪以告晏子晏子曰不可夫儒浩居而自順者也不可以教下好樂而淫人不可使親治立命而怠事不可使守職宗喪循哀不可使慈民機服勉容不可使導衆孔丘盛容修飾以蠱世弦歌鼓舞以聚徒繁登降之禮以示儀務趨翔之節以勸衆儒學不可使議世勞思不可以補民絫壽不能盡其學當年不能行其禮積財不能贍其樂繁飾邪術以營世君盛為聲樂以淫遇民其道不可以期世其學不可以導衆今君封之以利齊俗非所以導國先衆公曰善於是厚其禮留其封敬見而不問其道孔丘乃恚怒於景公與晏子乃樹鴟夷子皮於田常之門告南郭惠子以所欲為歸於魯呂氏春秋離俗覽高義孔子見齊景公景公致廩丘以為養孔子辭不受入謂弟子曰吾聞君子當功以受祿今說景公景公未之行而賜之廩丘其不知丘亦甚矣令弟子趣駕而行淮南子泛論訓下孔子辭廩丘終不盜刀鉤說苑立節孔子見齊景公景公致廩丘以為養孔子辭不受出謂弟子曰吾聞君子當功以受祿今說景公景公未之行而賜我廩丘其不知丘亦甚矣遂辭而行韓詩外傳八傳曰豫小子使爾繼邵公之後受命者必以其祖命之孔子為魯司寇命之曰宋公之子弗甫有孫魯孔丘命爾為司寇孔子曰弗甫敦及厥辟將不堪公曰不妄禦覽二百八引苻子魯侯欲以孔丘為司徒將召三桓議之乃謂左丘明曰寡人欲以孔子為司徒而授以魯政焉寡人將欲詢諸三子左丘明曰孔丘其聖人與夫聖人任政過者離位焉君雖欲謀其將弗合乎魯侯曰吾子奚以知之丘明曰周人有愛裘而好珍羞欲為千金之裘而與狐謀其皮欲具少牢之珍而與羊謀其羞言水卒狐相率逃於重邱之下羊相呼藏於深林之中與聖人十年不製一裘五年不具一牢何者周人之謀失之矣今君欲以孔丘為司徒召三桓而議之亦與狐謀裘與羊謀羞哉於是魯侯遂不與三桓謀而召孔丘為司徒呂氏春秋孝行覽遇合孔子周流海內再幹世主如齊至衛所見八十餘君委質於弟子者三千人達徒七十人萬乘之主得一人用可為師不於無人以此遊僅至於魯司寇荀子儒效仲尼將為司寇沈猶氏不敢朝飲其羊公慎氏出其妻慎潰氏逾境而徙魯之粥牛馬者不豫賈必蚤正以待之者也居於闕黨闕黨之子弟罔不分有親者取多孝悌以化之也新序雜事一魯有沈猶氏者旦飲羊飽之以欺市人公慎氏有妻而淫慎潰氏奢侈驕佚魯市之鬻牛馬善豫賈孔子將為魯司寇沈猶氏不敢朝飲其羊公慎氏出其妻慎潰氏逾境而徙魯之鬻馬牛不豫賈布正以待之也既為司寇季孟墮郈費之城齊人歸所侵魯之地由積正之所致也呂氏春秋先識覽樂成孔子始用於魯魯人幹誦之曰麛裘而緌投之無戾緌而麛裘投之無郵用三年男子行乎途右女子行乎途左財物之遺者民莫之舉淮南子泰族訓孔子為魯司寇道不拾遺市買不豫賈田漁皆讓長而斑白不負戴非法之所能致也公羊定十年解詁頰穀之會齊侯作侏儒之樂欲以執定公孔子曰匹夫而熒惑於諸侯者誅於是誅侏儒首足異處齊侯大懼曲節從教穀梁定十年傳頰穀之會孔子相焉兩君就壇兩相相揖齊人鼓噪而起欲以執魯君孔子曆階而上不盡一等而視歸乎齊侯曰兩君合好夷狄之民何為來為命司馬止之齊侯逡巡而謝曰寡人之過也退而屬其二三大夫曰夫人率其君與之行古人之道二三子獨率我而入夷狄之俗何為罷會齊人使優施舞於魯君之幕下孔子曰笑君者罪當死使司馬行法焉首足異門而出齊人來歸鄆歡龜陰之田者蓋為此也陸賈新語辨惑魯定公之時與齊侯會於夾穀孔子行相事兩君升壇兩相處下而相揖君臣之禮濟濟備焉齊人鼓噪而起欲執魯公孔子曆階而上不盡一等而立謂齊侯曰兩君合好以禮相率以樂相化臣聞嘉樂不野合犧象之薦不下堂夷狄之民何求為命司馬請止之定公曰諾齊侯逡巡而避席曰寡人之過退而自責大夫罷會齊人使優旃舞於魯公之幕下傲戲欲候魯君之隙以執定公孔子歎曰君辱臣當死使司馬行法斬焉首足異門而出於是齊人瞿然而恐君臣易操不安其故行乃歸魯四邑之侵地終無乘魯之心公羊定十二年解詁郈叔孫氏所食邑費季氏所食邑二大夫宰吏數叛患之以問孔子孔子曰陪臣執國命采長數叛者坐邑有城池之固家有甲兵之藏故也季氏說其言而墮之春秋繁露五行相勝火者司馬也司馬為讒反言易辭以譖訴人內離骨肉之親外疏忠臣賢聖旋亡讒邪日昌魯上大夫季孫是也專權擅勢薄國威德反以怠惡譖訴其群臣劫惑其君孔子為魯司寇據義行法季孫自消墮費郈城兵甲有差夫火者大朝有讒邪熒惑其君執法誅之執法者水也故曰水勝火春秋繁露五行相生北方者水執法司寇也司寇尚禮君臣有位長幼有序朝廷有爵鄉黨以齒升降揖讓般伏拜謁折旋中矩立而磬折拱則抱鼓執衡而藏至清廉平賂遺不受請謁不聽據法聽訟無有所阿孔子是也為魯司寇斷獄屯屯與衆共之不敢自專是死者不恨生者不怨鹽鐵論備胡孔子仕於魯前仕三月及齊平後仕三月及鄭平務以德安近而綏遠當此之時魯無敵國之謀鄰境之患強臣變節而忠順故季柏隳其都城大國畏義而合好齊人來歸鄆郈龜陰之田說苑至公孔子為魯司寇聽獄必師斷敦敦然皆立然後君子進曰某子以為何若某子以為雲雲又曰某子以為何若某子曰雲雲辨矣然後君子幾當從某子雲雲乎以君子之知豈必待某子之雲雲然後知所以斷獄哉君子之敬讓也文辭有可與人共之者君子不獨有也荀子宥坐孔子為魯攝相朝七日而誅少正卯門人進問曰夫少正卯魯之聞人也夫子為政而始誅之得無失乎孔子曰居吾語汝其故人有惡者五而盜竊不與焉一曰心達而險二曰行辟而堅三曰言僞而辨四曰記醜而博五曰順非而澤此五者有一於人則不得免於君子之誅而少正卯兼有之故居處足以聚徒成群言談足以飾邪營衆強足以反是獨立此小人之桀雄也不可不誅也是以湯誅尹諧文王誅潘止周公誅管叔太公誅華仕管仲誅付裏乙子産誅鄧析史付此七子者皆異世同心不可不誅也詩曰憂心悄悄慍於群小小人成群斯足憂矣尹文子聖人孔丘攝魯相七日而誅少正卯門人進問曰夫少正卯魯之聞人也夫子為政而先誅得無失乎孔子曰居吾語汝其故人有惡者五而竊盜奸私不與焉一曰心達而險二曰行僻而堅三曰言僞而辨四曰強記而博五曰順非而澤此五者有一於人則不免君子之誅而少正卯兼有之故居處足以聚徒成群言談足以飾邪熒衆強記足以反是獨立此小人雄桀也不可不誅也是以湯誅尹諧文王誅潘正太公誅華士管仲誅付裏乙子産誅鄧析史付此六子者異世而同心不可不誅也詩曰憂心悄悄慍於群小小人成群斯足畏也淮南子泛論訓孔子誅少正卯而魯國之邪塞說苑指武孔子為魯司寇七日而誅少正卯於東觀之下門人聞之趨而進至者不言其意皆一也子貢後至趨而進曰夫少正卯者魯國之聞人矣夫子始為政何以先誅之孔子曰賜也非爾所及也夫王者之誅有五而盜竊不與焉一曰心辨而險二曰言僞而辨三曰行辟而堅四曰志愚而博五曰順非而澤此五者皆有辨知聰達之名而非其真也苟行以僞則其知足以移衆強足以獨立此奸人之雄也不可不誅夫有五者之一則不免於誅今少正卯兼之是以先誅之也昔者湯誅蠋沐太公誅潘址管仲誅史附裏子産誅鄧析此五子未有不誅也所謂誅之者非為其晝則攻盜暮則穿窬也皆傾覆之徒也此固君子之所疑愚者之所惑也詩云憂心悄悄慍於群小此之謂矣論衡講瑞子貢事孔子一年自謂過孔子二年自謂與孔子同三年自知不及孔子當一年二年之時未知孔子聖也三年之後然乃知之以子貢知孔子三年乃定世儒無子貢之才其見聖人不從之學任倉卒之視無三年之接自謂知聖誤矣少正卯在魯與孔子並孔子之門三盈三虛唯顏淵不去顏淵獨知孔子聖也夫門人去孔子歸少正卯不徒不能知孔子之聖又不能知少正卯門人皆惑子貢曰夫少正卯魯之聞人也子為政何以先之孔子曰賜退非爾所及劉子心隱少正卯在魯與孔子同時孔子門人三盈三虛唯顏淵不去獨知聖人之德也夫門人去仲尼而皈少正卯非不知仲尼之聖亦不知少正卯之佞子貢曰少正卯魯之聞人也夫子為政何以先之子曰賜也還非爾所及也夫少正卯心逆而蠤行辟而堅言僞而辨詞鄙而博順非而澤有此五僞而亂聖人以子貢之明而不能見知人之難也韓非子內儲說下仲尼為政於魯道不拾遺齊景公患之黎且謂景公曰去仲尼猶吹毛耳君何不迎之以重祿高位遺哀公以女樂以驕榮其意哀公新樂之必怠於政仲尼必諫諫而不聽必輕絶於魯景公曰善乃令黎且以女樂六遺哀公哀公樂之果怠於政仲尼諫不聽去而之楚晏子春秋外篇下仲尼相魯景公患之謂晏子曰鄰國有聖人敵國之憂也今孔子相魯若何晏子對曰君其勿憂彼魯君弱主也孔子聖相也君不如陰重孔子設以相齊孔子強諫而不聽必驕魯而有齊君勿納也夫絶於魯無主於齊孔子困矣居期年孔子去魯之齊景公不納故困於陳蔡之間陸賈新語辨惑孔子遭君暗臣亂衆邪在位政道隔於三家仁義閉於公門故作公陵之歌傷無權力於世琴操龜山操者孔子所作也齊人饋女樂季桓子受之魯君閉門不聽朝當此之時季氏專政上僭天子下畔大夫賢聖斥逐讒邪滿朝孔子欲諫不得退而望魯魯有龜山蔽之辟季氏於龜山托勢位於斧柯季氏專政猶龜山蔽魯也傷政道之陵遲閔百姓不得其所欲誅季氏而力不能於是援琴而歌雲豫欲望魯兮龜山蔽之手無斧柯奈龜山何事譜十一下韓詩外傳五孔子抱聖人之心倣徨乎道德之域逍遙乎無形之鄉倚天理觀人情明終始知得失故興仁義厭勢利以持養之於時周室微王道絶諸侯力政強劫弱衆暴寡百姓靡安莫之紀綱禮儀廢壞人倫不理於是孔子自東自西自南自北匍匐救之韓詩外傳六孔子行簡子將殺陽虎孔子似之帶甲以圍孔子舍子路慍怒奮戟將下孔子止之曰由何仁義之寡裕也夫詩書之不習禮樂之不講是丘之罪也若吾非陽虎而以我為陽虎則非丘之罪也命也我歌子和若子路歌孔子和之三終而圍罷莊子外篇秋水孔子遊於匡宋人圍之數匝而弦歌不輟子路入見曰何夫子之娛也孔子曰來吾語女我諱窮久矣而不免命也求通久矣而不得時也當堯舜而天下無窮人非知得也當桀紂而天下無通人非知失也時勢適然夫水行不避蛟龍者漁父之勇也陸行不避兕虎者獵夫之勇也白刃交於前視死若生者烈士之勇也知窮之有命知通之有時臨大難而不懼者聖人之勇也由處矣吾命有所製矣無幾何將甲者進辭曰以為陽虎也故圍之今非也請辭而退說苑雜言孔子之宋匡簡子將殺陽虎孔子似之甲士以圍孔子之舍子路怒奮戟將下鬥孔子止之曰何仁義之不免俗也夫詩書之不習禮樂之不修也是丘之過也若似陽虎則非丘之罪也命也夫由歌吾和汝子路歌孔子和之三終而甲罷琴操孔子厄者孔子使顏淵執轡到匡郭外顏淵舉策指匡穿垣曰往與陽虎正從此入匡人聞其言孔子貌似陽虎告匡君曰往者陽虎今復來至乃率衆圍孔子數日不解弟子皆有饑色於是孔子仰天而歎曰君子固亦窮乎子路聞孔子之言悲感悖然大怒張目奮劍聲如鍾鼓顧謂二三子曰使吾有此厄也孔子曰由來今汝欲鬥名為戮我於天下為汝悲歌而感之汝皆和我由等唯唯孔子乃引琴而歌音曲甚哀有暴風擊拒軍士僵仆於是匡人乃知孔子聖人瓦解而去呂氏春秋慎大覽貴因孔子道彌子瑕見釐夫人因也淮南子泰族訓孔子欲行王道東西南北七十說而無所偶故因衛夫人彌子瑕而欲通其道鹽鐵論論儒孔子適衛因嬖臣彌子瑕以見衛夫人子路不說藝文類聚六十七引典略孔子返衛衛夫人南子使人謂之曰四方君子之來者必見寡小君孔子不得已見之夫人在錦帷中孔子北面稽首夫人自帷中再拜環珮之聲璆然呂氏春秋恃君覽召類趙簡子將襲衛使史默往睹之期以一月六月而後返趙簡子曰何其久也史默曰謀利而得害猶弗察也今蘧伯玉為相史蠙佐焉孔子為客子貢使令於君前甚聽易曰渙其群元吉渙者賢也群者衆也元者吉之始也渙其群元吉者其佐多賢也簡子按兵而不動鹽鐵論論儒孔子能方不能圓故饑於黎丘藝文類聚三十引典略孔子過宋與弟子習禮於樹下宋司馬桓魋使人拔其樹去適於野韓詩外傳九孔子出衛之東門逆姑布子卿曰二三子引車避有人將來必相我者也志之姑布子卿亦曰二三子引車避有聖人將來孔子下步姑布子卿迎而視之五十步從而望之五十步顧子貢曰是何為者也子貢曰賜之師也所謂魯孔丘也姑布子卿曰是魯孔丘歟吾固聞之子貢曰賜之師何如姑布子卿曰得堯之顙舜之目禹之頸皋陶之喙從前視之盎盎乎似有王者從後視之高肩弱脊此惟不及四聖者也子貢吁然姑布子卿曰子何患焉汙面而不惡葭喙而不藉遠而望之羸乎若喪家之狗子何患焉子貢以告孔子孔子無所辭獨辭喪家之狗耳曰丘何敢乎子貢曰汙面而不惡葭喙而不藉賜以知之矣不知喪家狗何足辭也子曰賜汝獨不見夫喪家之狗歟既斂而槨布器而祭顧望無人意欲施之上無明王下無賢士方伯王道衰政教失強陵弱衆暴寡百姓縱心莫之綱紀是以固以丘為欲當之者也丘何敢乎白虎通壽命夫子過鄭與弟子相失獨立郭門外或謂子貢曰東門有一人其頭似堯其頸似皋繇其肩似子産然自要以下不及禹三寸儡儡如喪家之狗子貢以告孔子孔子喟然而笑曰形狀未也如喪家之狗然哉乎然哉乎論衡骨相孔子適鄭與弟子相失孔子獨立鄭東門鄭人或問子貢曰東門有人其頭似堯其項若皋陶肩類子産然自腰以下不及禹三寸傫傫若喪家之狗子貢以告孔子孔子欣然笑曰形狀未也如喪家狗然哉然哉三國魏劉廙傳注引新序趙簡子欲專天下謂其相曰趙有犢隹晉有鐸鳴魯有孔丘吾殺三人者天下可王也於是乃召犢隹鐸鳴而問政焉已即殺之使使者聘孔子於魯以胖牛肉迎於河上使者謂船人曰孔子即上船中河必流而殺之孔子至使者致命進胖牛之肉孔子仰天而歎曰美哉水乎洋洋乎使丘不濟此水者命也夫子路趨而進曰敢問何謂也孔子曰夫犢隹鐸鳴晉國之賢大夫也趙簡子未得意之時須而後從政及其得意也殺之黃龍不反於涸澤鳳凰不離其罻羅故刳胎焚林則麒麟不臻覆巢破卵則鳳皇不翔竭澤而漁則龜龍不見鳥獸之於不仁猶知避之況丘乎故虎嘯而穀風起龍興而景雲見擊庭鍾於外而黃鍾應於內夫物類之相感精神之相應若響之應聲影之象形故君子違傷其類者今彼已殺吾類矣何為之此乎於是遂回車不渡而還說苑權謀趙簡子曰晉有澤鳴犢犨魯有孔丘吾殺此三人則天下可圖也於是乃召澤鳴犢犨任之以政而殺之使人聘孔子於魯孔子至河臨水而觀曰美哉水洋洋乎丘之不濟於此命也夫子路趨進曰敢問奚謂也孔子曰夫澤鳴犢犨晉國之賢大夫也趙簡子之未得志也與之同聞見及其得志也殺之而後從政故丘聞之刳胎焚夭則麒麟不至乾澤而漁蛟龍不遊覆巢毀卵則鳳凰不翔丘聞之君子重傷其類者也琴操將歸操者孔子之所作也趙簡子循執玉帛以聘孔子孔子將往未至渡狄水聞趙殺其賢大夫竇鳴犢喟然而歎之曰夫趙之所以治者鳴犢之力也殺鳴犢而聘餘何丘之往也夫燔林而田則麒麟不至覆巢破卵則鳳凰不翔鳥獸尚惡傷類而況君子哉於是援琴而鼓之云翱翔於衛復我舊居從吾所好其樂只且水經河水注五昔趙鞅殺鳴犢仲尼臨河而歎自是而返曰丘之不濟命也夫琴操以為孔子臨狄水而歌矣曰狄水衍兮風揚波船楫顛倒更相加莊子雜篇寓言莊子謂惠子曰孔子行年六十而六十化始時所是卒而非之未知今之所謂是之非五十九非也惠子曰孔子勤志服知也莊子曰孔子謝之矣而其未之嘗言孔子云夫受才乎大本復靈以生鳴而當律言而當法利義陳乎前而好惡是非直服人之口而已矣使人乃以心服而不敢蘁立定天下之定已乎已乎吾且不得及彼乎墨子耕柱葉公子高問政於仲尼曰善為政者若之何仲尼對曰善為政者遠者近之而舊者新之莊子內篇人間世葉公子高將使於齊問於仲尼曰王使諸梁也甚重齊之待使者蓋將甚敬而不急匹夫猶未可動也而況諸侯乎吾甚栗之子嘗語諸梁也曰凡事若小若大寡不道以歡成事若不成則必有人道之患事若成則必有陰陽之患若成若不成而後無患者唯有德者能之吾食也執粗而不臧爨無欲清之人今吾朝受命而夕飲水我其內熱與吾未至乎事之情而既有陰陽之患矣事若不成必有人道之患是兩也為人臣者不足以任之子其有以語我來仲尼曰天下有大戒二其一命也其一義也子之愛親命也不可解於心臣之事君義也無適而非君也無所逃於天地之間是之謂大戒是以夫事其親者不擇地而安之孝之至也夫事其君者不擇事而安之忠之盛也自事其心者哀樂不易施乎前知其不可奈何而安之若命德之至也為人臣子者固有所不得已行事之情而忘其身何暇至於悅生而惡死夫子其行可矣丘請復以所聞凡交近則必相靡以信遠則必忠之以言言必或傳之夫傳兩喜兩怒之言天下之難者也夫兩喜必多溢美之言兩怒必多溢惡之言凡溢之類妄妄則其信之也莫莫則傳言者殃故法言曰傳其常情無傳其溢言則幾乎全且以巧鬥力者始乎陽常卒乎陰泰至則多奇巧以禮飲酒者始乎治常卒乎亂泰至則多奇樂凡事亦然始乎諒常卒乎鄙其作始也簡其將畢也必巨言者風波也行者實喪也夫風波易以動實喪易以危故忿設無由巧言偏辭獸死不擇音氣息茀然於是並生心厲克核太至則必有不肖之心應之而不知其然也苟為不知其然也孰知其所終故法言曰無遷令無勸成過度益也遷令勸成殆事美成在久惡成不及改可不慎與且夫乘物以遊心托不得已以養中至矣何作為報也莫若為致命此其難者荀子宥坐孔子南適楚厄於陳蔡之間七日不火食藜羹不糝弟子皆有饑色子路進問之曰由聞之為善者天報之以福為不善者天報之以禍今夫子纍德積義懷美行之日久矣奚居之隱也孔子曰由不識吾語汝汝以知者為必用邪王子比干不見剖心乎汝以忠者為必用邪關龍逢不見刑乎汝以為諫者為必用邪伍子胥不磔姑蘇東門外乎夫遇不遇者時也賢不肖者材也君子博學深謀不遇時者多矣由是觀之不遇世者衆矣何獨丘也哉夫芷蘭生於深林非以無人而不芳君子之學非為通也為窮而不困憂而意不衰也知禍福終始而心不惑也夫賢不肖者材也為不為者人也遇不遇者時也死生者命也今有其人不遇其時雖賢其能行乎苟遇其時何難之有故君子博學深謀修身端行以俟其時孔子曰由居吾語汝昔晉公子重耳霸心生於曹越王句踐霸心生於會稽齊桓公小白霸心生於莒故居不隱者思不遠身不佚者志不廣女庸安知吾不得之桑落之下韓詩外傳七孔子困於陳蔡之間即三經之席七日不食藜羹不糝弟子有饑色讀書習禮樂不休子路進諫曰為善者天報之以福為不善者天報之以賊今夫子積德纍仁為善久矣意者尚有遺行乎奚居之隱也孔子曰由來汝小人也未講於論也居吾語汝子以知者為無罪乎則王子比干何為刳心而死子以義者為聽乎則伍子胥何為抉目而縣吳東門子以廉者為用乎則伯夷叔齊何為餓於首陽之山子以忠者為用乎則鮑叔何為而不用葉公子高終身不仕鮑焦抱木而泣子推登山而燔故君子博學深謀不遇時者衆矣豈獨丘哉賢不肖者材也遇不遇者時也今無有時賢安所用哉故虞舜耕於曆山之陽立為天子其遇堯也傅說負土而版築以為大夫其遇武丁也伊尹固有莘氏僮也負鼎操俎調五味而立為相其遇湯也呂望行年五十賣食棘津年七十屠於朝歌九十乃為天子師則遇文王也管夷吾束縛自檻車以為仲父則遇齊桓公也百里奚自賣五羊之皮為秦伯牧牛舉為大夫則遇秦繆公也虞丘於天下以為令尹讓於孫叔敖則遇楚莊王也伍子胥前功多後戮死非知有盛衰也前遇闔閭後遇夫差也夫驥罷鹽車此非無形容也莫知之也使驥不得伯樂安得千里之足造父亦無千里之手矣夫蘭茝生於茂林之中深山之間人莫見之故不芬夫學者非為通也為窮而不困憂而志不衰先知禍福之始而心無惑焉故聖人隱居深念獨聞獨見夫舜亦賢聖矣南面而治天下惟其遇堯也使舜居桀紂之世能自免於刑戮之中則為善矣亦何位之有桀殺關龍逢紂殺王子比干當此之時豈關龍逢無知而王子比干不慧乎哉此皆不遇時也故君子務學修身端行而須其時者也子無惑焉說苑雜言孔子困於陳蔡之間居環堵之內席三經之席七日不食藜羹不糝弟子皆有饑色讀詩書治禮不休子路進諫曰凡人為善者天報以福為不善者天報以禍今先生積德行為善久矣意者尚有遺行乎奚居隱也孔子曰由來汝不知坐吾語汝子以夫知者為無不知乎則王子比干何為剖心而死以諫者為必聽邪伍子胥何為抉目於吳東門子以廉者為必用乎伯夷叔齊何為餓死於首陽山之下子以忠者為必用乎則鮑莊何為而肉枯荊公子高終身不顯鮑焦抱木而立枯介子推登山焚死故夫君子博學深謀不遇時者衆矣豈獨丘哉賢不肖者才也為不為者人也遇不遇者時也死生者命也有其才不遇其時雖才不用苟遇其時何難之有故舜耕曆山而逃於河畔立為天子則其遇堯也傅說負壤土釋版築而立佐天子則其遇武丁也伊尹有莘氏媵臣也負鼎俎調五味而佐天子則其遇成湯也呂望行年五十賣食於棘津行年七十屠牛朝歌行年九十為天子師則其遇文王也管夷吾束縛膠目居檻車中自車中起為仲父則其遇齊桓公也百里夷自賣取五羊皮伯氏牧羊以為卿大夫則其遇秦穆公也沈尹名聞天下以為令尹而讓孫叔敖則其遇楚莊王也伍子胥前多功後戮死非其智益衰也前遇闔閭後遇夫差也夫驥厄罷鹽車非無驥狀也夫世莫能知也使驥得王良造父驥無千里之足乎芝蘭生深林非為無人而不香故學者非為通也為窮而不困也憂而不衰也此知禍福之始而心不惑也聖人之深念獨知獨見舜亦賢聖矣南面治天下唯其遇堯也使舜居桀紂之世能自免刑戮固可也又何官得治乎夫桀殺關龍逢而紂殺王子比干當是時豈關龍逢無知而比干無惠哉此桀紂無道之世然也故君子疾學修身端行以須其時也說苑雜言孔子遭難陳蔡之境絶糧弟子皆有饑色孔子歌兩柱之間子路入見曰夫子之歌禮乎孔子不應曲終而曰由君子好樂為無驕也小人好樂為無懾也其誰知之子不我知而從我者乎子路不說授干而舞三終而出及至七日孔子修樂不休子路慍見曰夫子之修樂時乎孔子不應樂終而曰由昔者齊桓霸心生於莒句踐霸心生於會稽晉文霸心生於驪氏故居不幽則思不遠身不約則智不廣庸知而不遇之於是興明日免於厄子貢執轡曰二三子從夫子而遇此難也其不可忘已孔子曰惡是何也語不云乎三折肱而成良醫夫陳蔡之間丘之幸也二三子從丘者皆幸人也吾聞人君不困不成王列士不困不成行昔者湯困於呂文王困於羑裏秦穆公困於殽齊桓困於長勺句踐困於會稽晉文困於驪氏夫困之為道從寒之及暖暖之及寒也唯賢者獨知而難言之也易曰困亨貞大人吉無咎有言不信聖人所與人難言信也莊子雜篇讓王孔子窮於陳蔡之間七日不火食藜羹不糝顏色甚憊而弦歌於室顏回擇菜子路子貢相與言曰夫子再逐於魯削跡於衛伐樹於宋窮於商周圍於陳蔡殺夫子者無罪藉夫子者無禁弦歌鼓琴未嘗絶音君子之無恥也若此乎顏回無以應入告孔子孔子推琴喟然而歎曰由與賜細人也召而來吾語之子路子貢入子路曰如此者可謂窮矣孔子曰是何言也君子通於道之謂通窮於道之謂窮今丘抱仁義之道以遭亂世之患其何窮之為故內省而不窮於道臨難而不失其德天寒既至霜雪既降吾是以知松柏之茂也陳蔡之隘於丘其幸乎孔子削然反琴而弦歌子路扢然執干而舞子貢曰吾不知天之高也地之下也古之得道者窮亦樂通亦樂所樂非窮通也道德於此則窮通為寒暑風雨之序矣故許由娛於潁陽而共伯得乎共首呂氏春秋孝行覽慎人孔子窮於陳蔡之間七日不嘗食藜羹不糝宰豫備矣孔子弦歌於室顏回擇菜於外子路與子貢相與而言曰夫子逐於魯削跡於衛伐樹於宋窮於陳蔡殺夫子者無罪藉夫子者不禁夫子弦歌鼓舞未嘗絶音蓋君子之無所醜也若此乎顏回無以對入以告孔子孔子扢然推琴喟然而歎曰由與賜小人也召吾語之子路與子貢入子貢曰如此者可謂窮矣孔子曰是何言也君子達於道之謂達窮於道之謂窮今丘也拘仁義之道以遭亂世之患其所也何窮之謂故內省而不疚於道臨難而不失其德大寒既至霜雪既降吾是以知松柏之茂也昔桓公得之莒文公得之曹越王得之會稽陳蔡之厄於丘其幸乎孔子烈然返瑟而弦子路抗然執干而舞子貢曰吾不知天之高也不知地之下也古之得道者窮亦樂達亦樂所樂非窮達也道得於此則窮達一也為寒暑風雨之序矣故許由虞乎潁陽而共伯得乎共首風俗通七孔子困於陳蔡之間七日不嘗粒藜羹不糝而猶弦琴於室顏回擇菜於戶外子路子貢相與言曰夫子逐於魯削跡於衛拔樹於宋今復見厄於此殺夫子者無罪籍夫子者不禁夫子弦歌鼓舞未嘗絶音蓋君子之無恥也若此乎顏淵無以對以告孔子孔子恬然推琴喟然而歎曰由與賜小人也召吾語之子路與子貢入子路曰如此可謂窮矣夫子曰由是何言也君子通於道之謂通窮於道之謂窮今丘抱仁義之道以遭亂世之患其何窮之為故內省不疚於道臨難而不失其德大寒既至霜雪既降吾是以知松柏之茂也昔者桓公得之莒文公得之曹越得之會稽陳蔡之厄於丘其幸乎莊子外篇山木孔子窮於陳蔡之間七日不火食左據槁木右擊槁枝而歌焱氏之風有其具而無其數有其聲而無宮角木聲與人聲犁然有當於人之心顏回端拱還目而窺之仲尼恐其廣己而造大也愛己而造哀也曰回無受天損易無受人益難無始而非卒也人與天一也夫今之歌者其誰乎回曰敢問無受天損易仲尼曰饑渴寒暑窮桎不行天地之行也運物之泄也言與之偕遊之謂也為人臣者不敢去之執臣之道猶若是而況乎所以待天乎何謂無受人益難仲尼曰始用四達爵祿並至而不窮物之所利乃非己也吾命有在外者也君子不為盜賢人不為竊吾若取之何哉故曰鳥莫知於鷾鴯目之所不宜處不給視雖落其實棄之而走其畏人也而襲諸人間社稷存焉爾何謂無始而非卒仲尼曰化其萬物而不知其禪之者焉知其所終焉知其所始正而待之而已耳何謂人與天一邪仲尼曰有人天也有天亦天也人之不能有天性也聖人晏然體逝而終矣墨子非儒孔丘窮於陳蔡之間藜羹不糝十日子路為享豚孔丘不問肉之所由來而食號人衣以酤酒孔丘不問酒之所由來而飲哀公迎孔丘席不端弗坐割不正弗食子路進請曰何其與陳蔡反也孔丘曰來吾語汝曩與女為苟生今與女為苟義呂氏春秋審分覽任數孔子窮乎陳蔡之間藜羹不斟七日不嘗粒晝寢顏回索米得而爨之幾熟孔子望見顏回攫其甑中而食之選間食熟謁孔子而進食孔子佯為不見之孔子起曰今者夢見先君食潔而後饋顏回對曰不可向者煤室入甑中棄食不祥回攫而飯之孔子歎曰所信者目也而目猶不可信所恃者心也而心猶不足恃弟子記之知人固不易矣論衡知實顏淵炊飯塵落甑中欲置之則不清投地則棄飯掇而食之孔子望見以為竊食說苑貴德孔子之楚有漁者獻魚甚強孔子不受獻魚者曰天暑遠市賣之不售思欲棄之不若獻之君子孔子再拜受使弟子掃除將祭之弟子曰夫人將棄之今夫子將祭之何也孔子曰吾聞之務施而不腐餘財者聖人也今受聖人之賜可無祭乎說苑雜言楚昭王召孔子將使執政而封以書社七百子西謂楚王曰王之臣用兵有如子路者乎使諸侯有如宰豫者乎長官五官有如子貢者乎昔文王處酆武王處鎬酆鎬之間百乘之地伐上殺主立為天子世皆曰聖王今以孔子之賢而有書社七百里之地而三子佐之非楚之利也楚王遂止莊子內篇人間世孔子適楚楚狂接輿遊其門曰鳳兮鳳兮何如德之衰也來世不可待往世不可追也天下有道聖人成焉天下無道聖人生焉方今之時僅免刑焉福輕乎羽莫之知載禍重乎地莫之知避已乎已乎臨人以德殆乎殆乎畫地而趨迷陽迷陽無傷吾行吾行郤曲無傷吾足山木自寇也膏火自煎也桂可食故伐之漆可用故割之人皆知有用之用而莫知無用之用也琴操猗蘭操者孔子所作也孔子曆聘諸侯諸侯莫能任自衛反魯過隱穀之中見薌蘭獨茂喟然歎曰夫蘭當為王者香今乃獨茂與衆草為伍譬猶賢者不逢時與鄙夫為倫也乃止車援琴鼓之云習習穀風以陰以雨之子於歸遠送於野何彼蒼天不得其所逍遙九州無所定處世人暗蔽不知賢者年紀逝邁一身將老自傷不逢時托辭於薌蘭云越絶書七昔者陳成恆相齊簡公欲為亂憚齊邦鮑晏故徙其兵而伐魯魯君憂也孔子患之乃召門人弟子而謂之曰諸侯有相伐者尚恥之今魯父母之邦也丘墓存焉今齊將伐之可無一出乎顏淵辭出孔子止之子路辭出孔子止之子貢辭出孔子遣之吳越春秋夫差內傳十三年齊大夫陳成恆欲弒簡公陰憚齊國鮑晏故前興兵伐魯魯君憂之孔子患之召門人而謂之曰諸侯有相伐者丘嘗恥之夫魯父母之國也丘墓在焉今齊將伐之子無意一出邪子路辭出孔子止之子張子石請行孔子弗許子貢辭出孔子遣之越絶書外傳本事子貢與夫子坐告夫子曰太宰死夫子曰不死也如是者再子貢再拜而問何以知之夫子曰天生宰嚭者欲以亡吳吳今未亡宰何病乎後人來言不死淮南子人間訓昔者衛君朝於吳吳王囚之欲流之於海說者冠蓋相望而弗能止魯君聞之撤鍾鼓之縣縞素而朝仲尼入見曰君胡為有憂色魯君曰諸侯無親以諸侯為親大夫無黨以大夫為黨今衛君朝於吳王吳王囚之而欲流之於海執衛君之仁義而遭此難也吾欲免之而不能為奈何仲尼曰若欲免之則請子貢行魯君召子貢授之將軍之印子貢辭曰貴無益於解患在所由之道斂躬而行至於吳見太宰嚭太宰嚭甚說之欲薦之於王子貢曰子不能行說於王奈何吾因子也太宰嚭曰子焉知豫之不能也子貢曰衛君之來也衛國之半曰不若朝於晉其半曰不若朝於吳然衛君以為吳可以歸骸骨也故束身以受命今子受衛君而囚之又欲流之於海是賞言朝於晉者而罰言朝於吳也且衛君之來也諸侯皆以為耆龜兆今朝於吳而不利則皆移心於晉矣子欲成伯王之業不亦難乎太宰嚭入復之於王王報出令於百官曰比十日而衛君之禮不具者死子貢可謂知所以說矣史記衛世家孔子聞衛亂曰嗟乎柴也其來乎由也其死矣御覽八百六十五引風俗通子路感雷精而生尚剛好勇死衛人醢之孔子覆醢每聞雷聲惻怛耳拾遺記二孔子相魯之時有神鳳遊集至哀公之末不復來翔故云鳳鳥不至可為悲矣初學記二十九引孝經右契孔子夜夢豐沛邦有赤煙氣起顏回子夏侶往觀之驅車到楚西北范氏之廟見芻兒捶麟傷其前左足束薪而覆之孔子曰兒來汝姓為誰曰吾姓為赤松子時橋名受紀孔子曰汝豈有所見乎吾所見一禽如麕羊頭頭上有角其末有肉方以是西走孔子發薪下麟視孔子而往麟蒙其耳吐三卷書孔子精而讀之搜神記八魯哀公十四年孔子夜夢三槐之間豐沛之邦有赤氤氣起乃呼顏淵子夏同往觀之驅車到楚西北范氏街見芻兒打麟傷其左前足束薪而覆之孔子曰兒來汝姓為誰兒曰吾姓為赤鬆名時喬字受紀孔子曰汝豈有所見乎兒曰吾所見一禽如麕羊頭頭上有角其末有肉方以是西走孔子曰天下已有主也為赤劉陳項為輔五星入井從歲星兒發薪下麟示孔子孔子趨而往麟向孔子蒙其耳吐三卷圖廣三寸長八寸每卷二十四字其言赤劉當起曰周亡赤氣起火曜興玄丘製命帝卯金拾遺記三周靈王立二十一年孔子生於魯襄公之世夜有二蒼龍自天而下來附徵在之房因夢而生孔子有二神女擎香露於空中而來以沐浴徵在天帝下奏鈞天之樂列於顏氏之房空中有聲言天感生聖子故降以和樂笙鏞之音異於俗世也又有五老列於徵在之庭則五星之精也夫子未生時有麟吐玉書於闕里人家文云水精之子孫衰周而素王故二龍繞室五星降庭徵在賢明知為神異乃以繡紱繫麟角信宿而麟去相者云夫子係殷湯水德而素王至敬王之末魯定公十四年魯人鋤商田得麟以示夫子繫角之紱尚猶在焉夫子知命之將終乃抱麟解紱涕泗滂沱且麟出之時及解紱之歲垂百年矣藝文類聚十引琴操魯哀公十四年西狩薪者獲麟擊之傷其左足將以示孔子孔子道與相逢見俯而泣抱麟曰爾孰為來哉孰為來哉反袂拭麵乃歌曰唐虞世兮麟鳳遊今非其時來何求麟兮麟兮我心憂仰視其人龍顏日月夫子奉麟之口須臾取三卷圖一為赤伏劉季興為王二為周滅夫子將終三為漢制造作孝經夫子還謂子夏曰新王將起其如得麟者御覽二十一又七百二十四引公孫尼子孔子有疾哀公使醫視之醫曰子居處飲食何如孔子曰丘春居葛室夏居密陽秋不風冬不煬飲食不造飲酒不勤醫曰是良藥也繹史孔子類記四引莊子孔子病子貢出卜孔子曰吾坐席不敢先居處若齊飲食若祭吾卜之久矣論衡別通孔子病商瞿卜期日中孔子曰取書來比至日中何事乎劉子崇學宣尼臨沒手不釋卷水經注二十五引春秋說題辭孔子卒以所受黃玉葬魯城北論衡紀妖孔子當泗水而葬泗水卻流御覽五百六十引皇覽冢墓記魯大夫叔梁紇冢在魯國東陽聚安泉東北八十五步名曰防冢民傳曰防墳於防地微高孔子冢魯城北便門外南去城十里冢營方百畝冢南北廣十步東西十步高丈二尺冢為祠壇方六尺與地方平無祠堂冢塋中樹以百數皆異種魯人世世皆無能名其樹者民傳云孔子弟子異國人各持其國樹來種之孔子塋中不生荊棘及刺人草伯魚冢孔子冢東邊與孔子並大小相望子思冢在孔子冢南亦大小相望金樓子志怪孔子冢在魯城北塋中樹以百數皆異種魯人世世無能名者傳言孔子弟子既皆異國之人各持其國樹來種之孔子塋中至今不生荊棘草木漢書魯恭王傳恭王初好治宮室壞孔子舊宅以廣其宮聞鍾磬琴瑟之音遂不敢復壞於其壁中得古文經傳水經注二十五泗水廟屋三間夫子在西間東向顏母在中間南向夫人隔東一間東向夫人床前有石硯一枚作甚朴云平生時物也雜事十二禮記檀弓疏引論語撰考讖叔梁紇與徵在禱尼丘山感黑龍之精以生仲尼藝文類聚八十八引春秋演孔圖孔子母徵在遊大冢之陂睡夢黑帝使請與己交語曰女乳必於空桑之中覺則若感生丘於空桑之中後漢班固傳下注引演孔圖孔子母徵在夢感黑帝而生故曰元聖論衡實知孔子生不知其父若母匿之吹律自知殷宋大夫子氏之世也禦覽三百七十一引演孔圖孔胸文曰製作定世符運禦覽三百七十七引演孔圖孔子長十尺大九圍坐如蹲龍立如牽牛就之如昴望之如鬥禦覽三百六十七引孝經援神契孔子海口言若含澤禦覽三百六十七引孝經鉤命決仲尼舌理七重陳重授度禦覽三百六十八引鉤命決仲尼鬥唇吐教陳機授度禦覽三百六十八引鉤命決夫子駢齒注象鉤星也禦覽三百六十八引鉤命決夫子輔喉禦覽三百七十引鉤命決仲尼虎掌是謂威射禦覽三百七十一引鉤命決仲尼龜脊禦覽三百七十一引論語摘輔象孔子胸應矩是謂儀古荀子非相仲尼長荀子非相仲尼之狀麵如蒙魌白虎通姓名孔子首類魯國尼丘山故名為丘論衡骨相孔子反羽禦覽六百九十八引論語隱義注孔子至蔡解於客舍夜有人取孔子乙隻屐去盜者置屐於受盜家孔子屐長一尺四寸與凡人屐異路史後紀十注引世本杇頂反首張麵路史後紀十生而頨頂故名丘而字仲尼四十有九表堤眉穀竅參臂駢脅要大十圍長九尺有六寸時謂長人戰國策七甘羅曰夫項橐生七歲而為孔子師淮南子修務訓夫項托七歲為孔子師孔子有以聽其言也淮南子說林訓高誘注項托年七歲窮難孔子而為之作師論衡實知夫項托年七歲教孔子禦覽四百四引春秋後語甘羅曰夫項橐十歲為孔子師呂氏春秋仲春紀當染孔子學於老聃孟蘇夔靖叔白虎通辟雍孔子師老聃說苑尊賢鮑龍跪石而登褵孔子為之下車劉子知人鮑龍跪石而吟仲尼為之下車晏子春秋問上故臣聞仲尼居處惰倦廉隅不正則季次原憲侍氣鬱而疾志意不通則仲由卜商侍德不盛行不厚則顏回騫雍侍聖賢群輔録廣博物志二十引尸子仲尼志意不立子路侍儀服不修公西華侍禮不習子貢侍辭不辨宰我侍亡忽古今顏回侍節小物冉伯牛侍曰吾以夫六子自勵也韓詩外傳九傳曰孔子過康子子張子夏從孔子入坐二子相與論終日不決子夏辭氣甚溢顏色甚變子張曰子亦聞夫子之議論邪徐言褷褷威儀翼翼後言先默得之推讓巍巍乎蕩蕩乎道有歸矣小人之論也專意自是言人之非瞋目扼腕疾言噴噴口沸目赤一幸得勝疾笑嗌嗌威儀固陋辭氣鄙俗是以君子賤之也賈子容經子路見孔子之背磬折舉哀曰唯由也見孔子聞之曰由也何以遺亡也列子說符孔子之徑能拓國門之關而不肯以力聞呂氏春秋慎大覽慎大孔子之徑舉國門之關而不肯以力聞淮南子道應訓孔子徑杓國門之關而不肯以力聞淮南子主術訓孔子之通智過於萇宏勇服於孟賁足躡於郊菟力招城關能亦多矣然而勇力不聞伎巧不知專行孝道以成素王事亦鮮矣春秋二百四十二年亡國五十二弒君三十六采善鉏醜以成王道論亦博矣然而圍於匡顏色不變弦歌不徹臨死亡之地犯患難之危據義行理而志不懾分亦明矣然而為魯司寇聽獄必為斷作為春秋不道鬼神不敢專已呂氏春秋審分覽不二孔子貴仁淮南子修務訓孔子無黔突劉子惜時仲尼淒淒突不暇黔論衡須頌孔子顯三纍之行論衡幸遇魯城門久朽欲頓孔子過之趨而疾行左右曰久矣孔子曰惡其久也孔子戒慎已甚如過遭壞可謂不幸也故孔子曰君子有不幸而無有幸小人有幸而無不幸論衡言毒孔子見陽虎卻行白汗交流禦覽六十三引論語比考讖水名盜泉仲尼不漱注曰夫子教於洙泗之間今於城北二水之中即夫子領徒之所也文選陸機猛虎行注引尸子孔子至於勝母暮矣而不宿過於盜泉渴矣而不飲惡其名也說苑說叢水名盜泉孔子不飲後漢鍾離意傳孔子忍渴於盜泉之水呂氏春秋孝行覽遇合文王嗜昌蒲菹孔子聞而服之縮頞而食之三年然後勝之論衡語增傳語曰文王飲酒千鍾孔子百觚列子說符宋人有好行仁義者三世不懈家無故黑牛生白犢以問孔子孔子曰此吉祥也以薦上帝居一年其父無故而盲其牛又復生白犢其父又復令其子問孔子其子曰前問之而失明又何問乎父曰聖人之言先忤後合其事未究姑復問之其子又復問孔子孔子曰吉祥也復教以祭其子歸致命其父曰行孔子之言也居一年其子又無故而盲其後楚攻宋圍其城民易子而食之析骸而炊之丁壯者皆乘城而戰死者大半此人以父子有疾皆免及圍解而疾俱復北堂書鈔百三十七引韓詩外傳孔子使子貢為其不來孔子占之遇鼎謂弟子曰占之遇鼎皆言無足而不來顏回掩口而笑孔子曰回也何哂乎曰回謂賜必來孔子曰何如也回對曰乘舟而來矣賜果至矣藝文類聚七十一引衝波傳孔子使子貢久而不來孔子謂弟子占之遇鼎皆言無足不來顏回掩口而笑子曰回也哂謂賜來也曰無足者乘舟而來至矣清旦朝子貢果至驗如顏回之言說苑辨物孔子晨立堂上聞哭者聲音甚悲孔子援琴而鼓之其音同也孔子出而弟子有吒者問誰也曰回也孔子曰回何為而吒回曰今者有哭者其音甚悲非獨哭死又哭生離者孔子曰何以知之回曰似完山之鳥孔子曰何如回曰完山之鳥生四子羽翼已成乃離四海哀鳴送之為是往而不復返也孔子使人問哭者哭者曰父死家貧賣子以葬之將與其別也孔子曰善哉聖人也莊子雜篇外物宋元君夜半而夢人被發窺阿門曰豫自宰路之淵豫為清江使河伯之所漁者餘且得豫元君覺使人占之曰此神龜也君曰漁者有餘且乎左右曰有君曰令餘且會朝明日餘且朝君曰漁何得對曰且之網得白龜焉箕圓五尺君曰獻若之龜龜至君再欲殺之再欲活之心疑卜之曰殺龜以卜吉乃刳龜七十二鑽而無遺策仲尼曰神龜能見夢於元君而不能避餘且之網知能七十二鑽而無遺策而不能避刳腸之患如是則知有所困神有所不及也史記褚少孫補龜策傳孔子聞之曰神龜知吉凶而骨直空枯日為陽德而君於天下辱於三足之烏月為刑而相佐見食於蝦蟆蝟辱於鵲騰蛇之神而殆於即且竹外有節理中直空虛松柏為百木長而守門閭日辰不全故有孤虛黃金有疵白玉有瑕事有所疾亦有所徐物有所拘亦有所據罔有所數亦有所疏人有所貴亦有所不如何可而適乎物安可全乎天尚不全故世為屋不成三瓦而居之以應之天天下有階物不全乃生也春秋繁露山川頌孔子曰山川神祇立寶藏殖器用資曲直含大者可以為宮室台榭小者可以為舟輿浮灄大者無不中小者無不入持斧則斫折鐮則艾生人立禽獸伏死人入多其功而不言是以君子取譬也說苑修文孔子見子桑伯子子桑伯子不衣冠而處弟子曰夫子何為見此人乎曰其質美而無文吾欲說而文之孔子去子桑伯子門人不說曰何為見孔子乎曰其質美而文繁吾欲說而去其文說苑反質仲尼問於老聃曰甚矣道之於今難行也吾比執道委質以當世之君而不我受也道之於今難行也老子曰夫說者流於聽言者亂於辭如此二者則道不可委矣中論審大臣魯人見仲尼之好讓而不爭也亦謂之無能韓詩外傳一孔子南遊適楚至於阿穀之隧有處子佩瑱而浣者孔子曰彼婦人其可與言矣乎抽觴以授子貢曰善為之辭以觀其語子貢曰吾北鄙之人也將南之楚逢天之暑思心潭潭願乞一飲以表我心婦人對曰阿穀之隧隱曲之汜其水載清載濁流而趨海欲飲則飲何問婦人乎受子貢觴迎流而挹之奐然而棄之促流而挹之奐然而溢之坐置之沙上曰禮固不親授子貢以告孔子曰丘知之矣抽琴去其軫以授子貢曰善為之辭以觀其語子貢曰向子之言穆如清風不悖我語和暢我心於此有琴而無軫願借子以調其音婦人對曰吾鄙野之人也僻陋而無心五音不知安能調琴子貢以告孔子曰丘知之矣抽絺綌五兩以授子貢曰善為之辭以觀其語子貢曰吾北鄙之人也將南之楚於此有絺綌五兩吾不敢以當子身敢置之水浦婦人對曰客之行差遲乖人分其資財棄之野鄙吾年甚少何敢受子子不早去今竊有狂夫守之者矣列女傳辨通阿穀處女者阿穀之隧浣者也孔子南遊過阿穀之隧見處子佩瑱而浣孔子謂子貢曰彼浣者其可與言乎抽觴以授子貢曰為之辭以觀其志子貢曰我北鄙之人也自北徂南將欲之楚逢天之暑我思談談願乞一飲以伏我心處子曰阿穀之隧隱曲之地其水一清一濁流入於海欲飲則飲何問乎婢子授子貢觴迎流而挹之投而棄之從流而挹之滿而溢之跪置沙上曰禮不親授子貢還報其辭孔子曰丘已知之矣抽琴去其軫以授子貢曰為之辭子貢往曰向者聞子之言穆如清風不拂不寤私復我心有琴無軫願借子調其音處子曰我鄙野之人也陋固無心五音不知安能調琴子貢以報孔子孔子曰丘已知之矣過賢則賓抽絺綌五兩以授子貢曰為之辭子貢往曰我北鄙之人也自北徂南將欲之楚有絺綌五兩非敢以當子之身也願注之水旁處子曰行客之人嗟然永久分其資財棄於野鄙妾年甚少何敢受子子不早命竊有狂夫名之者矣子貢以告孔子孔子曰丘已知之矣斯婦人達於人情而知禮楚辭七諫路室之女方桑兮孔子過之以自侍王逸注言孔子出遊過於客舍其女方采桑一心不視善其貞信故以自侍北堂書鈔一百六引琴操孔子遊於臘山見取薪而哭長梓上有孤鶼乃承而歌之藝文類聚三十四引琴操孔子遊於泰山見薪者哭甚哀孔子問之薪者曰吾自傷故哀爾繹史孔子類記四引吳越春秋夫差聞孔子至吳微服觀之或人傷其指王怒欲索或而誅之子胥諫乃止吳越春秋句踐伐吳外傳十越王既已誅忠臣霸於關東從琅琊起觀台周七里以望東海死士八千人戈船三百艘居無幾躬求賢士孔子聞之從弟子奉先王雅琴禮樂奏於越越王乃被唐夷之甲帶步光之劍杖屈盧之矛出死士以三百人為陳關下孔子有頃到越王曰唯唯夫子何以教之孔子曰丘能述五帝三王之道故奏雅琴以獻之大王越王喟然歎曰越性脆而愚水行山處以船為車以楫為馬往若飄風去則難從說兵敢死越之常也夫子何說而欲教之孔子不答因辭而去越絶書八句踐伐吳霸關東從琅琊起觀台周九里以望東海死士八千人戈船三百艘居無幾躬求賢聖孔子從弟子七十人奉先王雅琴治禮往奏句踐乃身被賜夷之甲帶步光之劍杖物盧之矛出死士三百人為陳關下孔子有頃到越越王曰唯唯夫子何以教之孔子對曰丘能述五帝三王之道故奏雅琴至大王所句踐喟然歎曰夫越性脆而愚水行而山處以船為車以楫為馬往若飄風去則難從鋭兵任死越之常性也夫子異則不可於是孔子辭弟子莫能從乎繹史孔子類記一引衝波傳孔子去衛適陳途中見二女采桑子曰南枝窈窕北枝長答曰夫子遊陳必絶糧九曲明珠穿不得著來問我采桑娘夫子至陳大夫發兵圍之令穿九曲珠乃釋其厄夫子不能使回賜返問之其家謬言女出外以一瓜獻二子子貢曰瓜子在內也女乃出語曰用蜜塗珠絲將係蟻蟻將係絲如不肯過用煙熏之子依其言乃能穿之於是絶糧七日搜神記十九孔子厄於陳弦歌於館中夜有一人長九尺餘著皂衣高冠大吒聲動左右子貢進問何人邪便提子貢而挾之子路引出與戰於庭有頃未勝孔子察之見其甲車間時時開如掌孔子曰何不探其甲車引而奮登子路引之沒手仆於地乃是大釭魚也長九尺餘孔子曰此物也何為來哉吾聞物老則群精依之因衰而至此其來也豈以吾遇厄絶糧從者病乎夫六畜之物及龜蛇魚鱉草木之屬久者神皆馮依能為妖怪故謂之五酉五酉者五行之方皆有其物酉者老也物老則為怪殺之則已夫何患焉或者天之未喪斯文以是係豫之命乎不然何為至於斯也弦歌不輟子路烹之其味滋病者興明日遂行金樓子雜記上孔子出遊於山使子路取水逢虎於水與戰攬尾得之納於懷中取水還問孔子曰上士殺虎如之何子曰上士殺虎持虎頭中士殺虎如之何子曰中士殺虎持虎耳又問下士殺虎如之何子曰下士殺虎捉虎尾子路出尾棄之復懷石盤曰夫子知虎在水而使我取水是欲殺我也乃欲殺夫子問上士殺人如之何曰用筆端中士殺人如之何曰用語言下士殺人如之何曰用石盤子路乃棄盤而去繹史孔子類記四引吳越春秋禹治洪水至牧德之山見神人焉謂禹曰勞子之形役子之慮以治洪水無乃怠乎我有靈寶五符以役蛟龍水豹因授禹而誡之曰事畢可祕於靈山禹成功後藏於洞庭苞山之穴至吳王闔閭之時有龍威丈人得符獻之吳王以示群臣皆莫能識乃令齎符以問孔子曰吳王間居有赤烏銜此書以至王所莫辨其文故令遠問孔子曰昔禹治水於牧德之山遇神人授以靈寶五符後藏洞庭之苞山君王所得無乃是乎赤鳥之事丘所未聞抱朴子內篇辨問靈寶經有正機平衡飛龜授帙三篇皆仙術也吳王伐石以治宮室而於合石之中得紫文金簡之書不能讀之使使者持以問仲尼而欺仲尼曰吳王間居有赤雀銜書以置殿上不知其義故遠谘呈仲尼以視之曰此乃靈寶之方長生之法禹之所服隱在水邦年齊天地朝於紫庭者也禹將仙化封之名山石函之中乃今赤雀銜之殆天授也繹史孔子類記四引靈寶要略昔太上以靈寶五篇真文以授帝嚳帝嚳將仙封之於鍾山至夏禹巡狩度弱水登鍾山逐得是文後復封之包山洞庭之室吳王闔閭出遊包山見一人自言姓山名隱居闔閭扣之乃入洞庭取素書一卷呈闔閭其文不可識令人齎之問孔子孔子曰丘聞童謠曰吳王出遊觀震湖龍威丈人山隱居北上包山入雲墟乃入洞庭竊禹書天地大文不可舒此文長傳百六初若強取出喪國廬闔閭乃尊事之禦覽四十六引吳地記包山在縣西一百三十里中有洞庭深遠世莫能測吳王使靈威丈人入洞穴十七日不能盡因得玉葉上刻靈寶二卷使示孔子雲禹之書也禦覽一百五十七引東觀漢記鮑永字君長為魯郡太守時彭豐等不肯降後孔子闕里無故荊棘自辟從講室掃除至孔裏永異之召郡府謂曰方今厄急而闕里無故自滌意豈夫子欲令太守大行饗誅無狀也修學校理請豐等會手格殺之禦覽九百二十二引崔鴻十六國春秋北涼録昔魯人有浮海而失津者至於亶州見仲尼及七十子遊於海中與魯人一體杖令閉目乘之使歸告魯侯築城以備寇魯人出海投杖水中乃龍也具以狀告魯侯不信俄而群燕數萬銜土培城魯侯乃大城曲阜迄而齊寇至攻魯不克而還遺讖十三周易乾鑿度孔子曰洛書摘亡辟曰建紀者歲也成姬倉有命在河聖孔表雄德庶人受命握麟征周易乾鑿度孔子曰推即位之術乾坤三上中下坤變初六復曰正陽在下為聖人故一聖二庸三君子四庸五聖六庸七小人八君子九小人十君子十一小人十二君子十三聖人十四庸人十五君子十六庸人十七聖人十八庸人十九小人二十君子二十一小人二十二君子二十三小人二十四君子二十五聖人二十六庸人二十七君子二十八庸人二十九聖人三十庸人三十一小人三十二君子三十三小人三十四君子三十五小人三十六君子三十七聖人三十八庸人三十九君子四十小人四十一聖人四十二庸人孔子曰極至德之世不過此乾三十二世消坤三十六世消代聖人者仁繼之者庸人仁世淫庸世懇二陰之精射三陽當卦自掃知命守録其可防鉤鈐解命圖興孔子曰丘文以候授明之出莫能雍周易乾鑿度孔子曰復十八世消以三六也臨十二世消以二六也泰三十世消以二九二六也大壯二十四世消以二九一六也三十二世消以三九一四也周易乾鑿度孔子曰妒一世消無所據也遁一世消據不正也否十世消以二五也觀二十世消以二五四六也剝十二世消以三四也周易乾鑿度孔子軌以七百六十為世軌者堯以甲子受天元為推術七往六來八往九來七為世軌者文王推爻四乃術數周易乾鑿度孔子曰以爻正月為享國數存六期者天子欲求水旱之厄以位入軌年數除軌算盡則厄所遭也甲乙為饑丙丁為旱戊己為中興庚辛為兵壬癸為水臥算為年立算為日必除先入軌年數水旱兵饑得矣如是乃救災度厄矣陽之法周易乾鑿度孔子曰天之將降嘉瑞應河水清三日青四日青變為赤赤變為黑黑變為黃各各三日河中水安井天乃清明圖乃見見必南向仰天言見三日以三日見六日以六日見九日以九日見十二日以十二日見十五日以十五日見皆言其餘日周易乾鑿度孔子曰帝德之應洛水先溫九日後五日變為五色元黃天地之靜書見矣負圖出午聖人見五日以五日見十日以十日見十五日以十五日見二十日以二十日見二十五日以二十五日見三十日以三十日周易乾鑿度孔子曰君子亦於靜若龍而無角河二日清二日白二日赤二日黑二日黃蛇見水中用日也一日辰為法以一辰二辰以三辰以四五辰以六七辰以八九辰以十辰以十一辰以十二辰夜不可見水中赤煌煌如火英圖書蛇皆然也周易乾鑿度孔子曰復表曰角臨表龍顏泰表載千大壯表握訴龍角大展表升骨履文妒表耳參漏足履王知多權遁表日角連理否表二好文觀表出準虎剝表重童明曆元此皆律曆運期相一匡之神也欲所按合誠洛書靈準聽曰氣五機七八合提九爻結八九七十二録圖起初世者戲也姬通紀河圖龍出洛書龜豫演亦八者七九也始倉甄節五七受命數運不俗守録以次第相改七九度變命失寶合七八八名畢升漸喜六十四精聖性象有録第以所變畢動動日者提不者殆易物之慎命不在仵者霸橫者距命曆掘執並投者上契輔摘推失排絀者咸名紀所錯中與用材毀苴五行旋代出輔運相拒與更用事終始相討期有從至有餘運有托除要有知衙合七八以視旋機審矣周易乾鑿度孔子曰至德之數先立木金水火土德合三百四歲五德備凡一千五百二十歲大終復初其求金木水火土德日名之法道一紀七十六歲因而四之為三百四歲以一歲三百六十五日四分乘之凡為十一萬一千三十六以甲為法除之餘三十六以三十六甲子始數立立算皆為甲旁算亦為甲以日次次之母算者乃木金火水土德之日也德益三十六五德而止六日名甲子木德主春春生三百四歲庚子金德主秋成收三百四歲丙子火德主夏長三百四歲壬子水德主冬藏三百四歲戊子土德主季夏致養三百四歲六子德四正四正子午卯酉也而期四時凡一千五百二十歲終一紀五德者所以立尊號論天弗志長久周易乾鑿度孔子曰丘按録讖論國定符以春秋西狩題釗表命豫亦握嬉帝之十二當興平嗣出妃妾妾得亂不勤竭承維表循符當至者塞政在樞害時失命缺壽以符瑞伏代災七録握藉成年剟裒期凶敕候修身練缺郵專兌兌德始克免延期自然之讖推引相拘沮思愈知命不或世帝思圖也夫天道三微而成一著三著而體成易緯通卦驗孔子曰太皇之先與耀合元精五帝期以序七神天地成位君臣道生君五期輔三名以建德通萬靈遂皇始出握機矩表計宜其刻曰蒼牙通靈昌之成孔演命明道經燧人之皇沒虙戲生本尚芒芒開矩聽八蒼靈唯精不慎明之害類遠振撢度出表挺後名知命陳效睹三萬一千一終一名虙方牙蒼精作易無書以盡序易緯通卦驗孔子表洛書摘亡辟曰亡秦者胡也丘以推秦白精也其先星感河出圖挺白以胡誰亡胡之名行之名行之萌秦為赤軀非命王故帝表有七五命七以永慶王以火代黑黑畏黃精之起因威萌虙羲作易仲仲命德維紀衡周文增通八八之節轉序三百八十四爻以係王命之瑞謀三十五君常其一也興亡殊方各有其祥封於泰山禪於梁陰易姓之起刻石明號丘表大命謀天皇巽奎坤艮出亡興之街仲者帝命所保行文出加政撥臣陽候七陰候八皆行子午視卯酉相違遠期衝六千三百變非摘亡據興盡在文昌所會增卦爻可以先知珍瑞之類繱崖之將審其係象通神明明者類視七若九八卦以推七九之微録圖準命略為世題萌表試故十二月十二日政八風二十四無其相應之驗猶響之應人動作言語也故正其本而萬物理失之毫厘差以千里易緯辨終備孔子表河圖皇參持曰天以鬥視日發明皇以戲招始掛八卦談易緯是類謀孔子演曰天子亡征九聖人起有八符運之以鬥稅之以昴五七布舒河出録圖雒授變書文選漢高祖功臣頌注引尚書璿璣鈐孔子曰五帝出受録圖隸釋史晨祠孔廟碑引尚書考靈耀丘生倉際觸期稽度為赤製故作春秋以明文命綴紀撰書修定禮義文選齊安陸王碑文注引春秋元命包孔子曰扶桑者日所出房所立其耀盛蒼神用事精感薑原卦得震震者動而光故知周蒼代殷者為姬昌人形龍顏長大精翼日衣青光公羊哀十四年解詁得麟之後天下血書魯端門曰趨作法孔聖沒周姬亡彗東出秦政起胡破術書紀散孔不絶子夏明日往視之血書飛為赤鳥化為白書署曰演孔圖中有作圖製法之狀御覽八百四又九百十四引春秋演孔圖孔子論經有鳥化為書孔子奉以告天赤爵集書上化為黃玉刻曰孔提命作應法為赤製藝文類聚九十八引演孔圖趣作法聖沒周姬亡彗東出秦政胡破術書記散孔不絶此魯端門血書十三年冬有星孛東方說題曰麟德之月天當有血書端門子夏至期往視逢一即言門有血書往寫之血蜚鳥化為帛鳥消書出署曰演孔圖御覽六百六引演孔圖孔子曰丘作春秋天授演孔圖中有大玉刻一版曰璿璣一低一昂是七期驗敗毀滅之征也御覽八十四引春秋感精符孔子按録書含觀五常英人知姬昌為蒼帝精北堂書鈔八十五拜揖引孝經右契製作孝經道備使七十二弟子向北辰星而磬折使曾子抱河洛事北面孔子衣絳單衣向北辰星而拜者也事類賦十五注引孝經援神契孔子製作孝經使七十二子向北辰磬折使曾子抱河洛事北向孔子霡縹筆衣絳單衣向北辰而拜搜神記八孔子修春秋製孝經既成齊戒向北辰而拜告備於天乃洪鬱起白霧摩地赤虹自上而下化為黃玉長三尺上有刻文孔子跪受而讀之曰寶文出劉季握卯金刀在軫北字禾子天下服宋書符瑞志孔子作春秋製孝經既成使七十二弟子向北辰星磬折而立使曾子抱河洛事北向孔子齊戒向北辰而拜告備於天曰孝經四卷春秋河洛凡八十一卷謹已備天乃洪鬱起白霧摩地赤虹自上下化為黃玉長三尺上有刻文孔子跪受而讀之曰寶文出劉季握卯金刀在軫北字禾子天下服隸釋史晨祠孔廟碑引孝經授神契丘立製命帝卯行御覽六百十引孝經中契丘學孝經文成道立齊以白天則玄雲踴紫官開北門角亢星北落司命天使書題號孝經篇雲神星裳孔丘知元今使陽衢乘紫麟下告地主要道之君後年麟至口吐圖文北落郎服書魯端門隱形不見子夏往觀寫得十七字餘字滅消文其餘飛為赤鳥翔靡青雲文選曹顏遠思友人詩注又劉歆移書讓太常博士注引論語崇爵讖子夏六十四人共撰仲尼微言以當素王御覽二百七引論語摘輔像仲尼為素王顏淵為司徒御覽五引論語讖仲尼曰吾聞堯率舜等遊首山觀河渚有五老遊河渚一老曰河圖將來告帝期二老曰河圖將來告帝謀三老曰河圖將來告帝書四老曰河圖將來告帝圖五老曰河圖將來告帝筮龍銜玉苞金泥玉檢封盛書五老飛為流星上入昴御覽八十一引論語撰考讖堯舜升登首山觀河渚有五老遊於河渚相謂曰河圖將來告帝期五老流星上昴有須赤龍負玉苞舒圖出堯與大舜等共發曰帝當樞百則禪虞堯喟然歎曰谘爾舜天之曆數在爾躬論衡實知孔子將死遺讖書曰不知何一男子自謂秦始皇上我之堂踞我之床顛倒我衣裳至沙丘而亡又曰董仲舒亂我書又書曰亡秦者胡也後漢郎覬傳覬對尚書曰孔子曰漢三百載計曆改憲三國志魏文紀注引孔子玉版定天下者魏公子桓後漢鍾離意傳注引意別傳意為魯相到官出私錢萬三千文付戶曹孔袴修夫子車身入廟拭機席劍履男子張伯除堂下草土中得玉璧七枚伯懷其一以六枚白意意令主簿安置幾前孔子教授堂下床首有懸甕意召孔袴問此何甕也對曰夫子甕也背有丹書人莫敢發也意曰夫子聖人所以遺甕欲以懸示後賢因發之中得素書文曰後世修吾書董仲舒護吾車拭吾履發吾笥會稽鍾離意璧有七張伯藏其一意即召問伯果服焉續漢郡國志注補引鍾離意別傳意省堂有孔子小車乘皆朽敗意自糶俸雇漆膠之直請魯民治之及護幾席劍履後得甕中素書曰護吾履鍾離意續漢郡國志注補引漢晉春秋鍾離意相魯見仲尼廟頽毀會諸生於廟中慨然歎曰蔽芾甘棠勿剪勿伐況見聖人廟乎遂躬留治之周觀輿服之在焉自仲尼以來莫之開也意發視之得古文策書曰亂吾書董仲舒治吾堂鍾離意璧有七張伯懷其一意尋案未了而卒張伯者治中庭治地得六璧上之意曰此有七何以不遂伯懼探璧懷中魯咸以為神水經注二十五泗水魯人藏孔子所乘車於廟中是顏路所請者也獻帝時遇火燒之永平中鍾離為魯相到官出私錢萬三千文付戶曹孔袴治夫子車身入廟拭幾席劍履男子張伯除堂下草土中得玉璧七枚伯懷其一以六枚白意意令主簿安置幾前孔子寢堂床首有懸甕意召孔袴問何等甕也對曰夫子甕也背有丹書人勿敢發也意曰夫子聖人所以遺甕欲以懸示後賢耳發之中得素書文曰後世修吾書董仲舒護吾車拭吾履發吾笥會稽鍾離意璧有七張伯藏其一意即召問伯果服焉寓言十四上御覽八百十八引韓詩外傳孔子顏淵登魯泰山望吳閶門淵曰見一匹練前有生藍子曰白馬藍芻也御覽八百九十七引論衡儒書稱孔子與顏淵俱登魯東山望吳閶門謂曰爾何見一匹練前生藍孔子曰噫此白馬蘆芻使人視之果然論衡書虛傳書或言顏淵與孔子俱上魯太山孔子東南望吳閶門外有係白馬引顏淵指以示之曰若見吳閶門乎顏淵曰見之孔子曰門外何有曰有如係練之狀孔子撫其目而止之因與俱下下而顏淵發白齒落遂以病死蓋以精神不能若孔子強力自極精華竭盡故夭死續博物志七顏淵與孔子俱上泰山東南望吳昌門外孔子見白馬引顏淵指之若見吳昌門乎顏淵曰見之有係練之狀孔子撫其目而止之顏淵發白齒落遂以病死蓋精力不及聖人而強役之也列子天瑞林類年且百歲底春被裘拾遺穗於故畦並歌並進孔子適衛望之於野顧謂弟子曰彼叟可與言者試往訊之子貢請行逆之壟端麵之而歎曰先生曾不悔乎而行歌拾穗林類行不留歌不輟子貢叩之不已乃仰而應曰吾何悔邪子貢曰先生少不勤行長不競時老無妻子死期將至亦有何樂而拾穗行歌乎林類笑曰吾之所以為樂人皆有之而反以為憂少不勤行長不競時故能壽若此老無妻子死期將至故能樂若此子貢曰壽者人之情死者人之惡子以死為樂何也林類曰死之與生一往一反故死於是者安知不生於彼故吾知其不相若矣吾又安知營營而求生非惑乎亦又安知吾今之死不愈昔之生乎子貢聞之不喻其意還以告夫子夫子曰吾知其可與言果然然彼得之而不盡者也列子黃帝范氏有子曰子華善養私名舉國服之有寵於晉君不仕而居三卿之右目所偏視晉國爵之口所偏肥晉國黜之遊其庭者侔於朝子華使其俠客以智鄙相攻強弱相淩雖傷破於前不用介意終日夜以此為戲樂國殆成俗禾生子伯范氏之上客出行經外宿於田更商丘開之舍中夜禾生子伯二人相與言子華之名勢能使存者亡亡者存富者貧貧者富商丘開先窘於饑寒潛於牖北聽之因假糧荷畚之子華之門子華之門徒皆世族也縞衣乘軒緩步闊視顧見商丘開年老力弱面目黎黑衣冠不檢莫不耳之既而狎侮欺詒擋手必挨抌亡所不為商丘開常無慍容而諸客之技單憊於戲笑遂與商丘開俱乘高台於衆中漫言曰有能自投下者賞百金衆皆競應商丘開以為信然遂先投下形若飛鳥揚於地肌骨無毀范氏之黨以為偶然未詎怪也因復指河曲之淫隈曰彼中有寶珠泳可得也商丘開復從而泳之既出果得珠焉衆昉同疑子華昉令豫肉食衣帛之次俄而范氏之藏大火子華曰若能入火取錦者從所得多少賞若商丘開往無難色入火往還埃不漫身不焦范氏之黨以為有道乃共謝之曰吾不知子之有道而誕子吾不知子之神人而辱子子其愚我也子其聾我也子其盲我也敢問其道商丘開曰吾亡道雖吾之心亦不知所以雖然有一於此試與子言之曩子二客之宿吾舍也聞譽范氏之勢能使存者亡亡者存富者貧貧者富吾誠之無二心故不遠而來及來以子黨之言皆實也唯恐誠之之不至行之之不及不知形體之所措利害之所存也心一而已物無忤者如斯而已今昉知子黨之誕我我內藏猜慮外矜觀聽追幸昔日之不焦溺也怛然內熱惕然震悸矣水火豈復可近哉自此之後范氏門徒遇乞兒馬醫弗敢辱也必下車而揖之宰我聞之以告仲尼仲尼曰汝弗知乎夫至信之人可以感物也動天地感鬼神橫六合而無逆者豈但履危險入水火而已哉商丘開信僞物猶不逆況彼我皆誠哉小子識之列子黃帝顏回問乎仲尼曰吾嘗濟乎觴深之淵矣津人操舟若神吾問焉曰操舟可學邪曰可能遊者可教也善遊者數能乃若夫沒人則未嘗見舟而謖操之也吾問焉而不告敢問何謂也仲尼曰噫吾與若玩其文也久矣而未達其實而固且道與能遊者可教也輕水也善遊者之數能也忘水也乃若夫沒人之未嘗見舟而謖操之也彼視淵若陵視舟之覆猶其車卻也覆卻萬物方陳乎前而不得入其舍惡往而不暇以瓦摳者巧以鉤摳者憚以黃金摳者惛巧一也而有所矜則重外也凡重外者拱內莊子外篇達生顏回問仲尼曰吾嘗濟乎觴深之淵津人操舟若神吾問焉曰操舟可學邪曰可善遊者數能若乃夫沒人則未嘗見舟而便操之也吾問焉而不吾告敢問何謂也仲尼曰善遊者數能忘水也若乃夫沒人之未嘗見舟而便操之也彼視淵若陵視舟之覆猶其車卻也覆卻萬方陳乎前而不得入其舍惡往而不暇以瓦注者巧以鉤注者憚以黃金注者昏其巧一也而有所矜則重外也凡外重者內拙列子黃帝孔子觀於呂梁懸水三十仞流沫三十里黿鼉魚鱉之所不能遊也見一丈夫遊之以為有苦而欲死者也使弟子並流而承之數百步而出被髮行歌而遊於棠行孔子從而問之曰呂梁懸水三十仞流沫三十里黿鼉魚鱉所不能遊向吾見子蹈之以為有苦而欲死者使弟子並流將承子子出而被髮行歌吾以子為鬼也察子則人也請問蹈水有道乎曰亡吾無道吾始乎故長乎性成乎命與齎俱入與汨皆出從水之道而不為私焉此吾所以蹈之也孔子曰何謂始乎故長乎性成乎命也曰吾生於陵而安於陵故也長於水而安於水性也不知吾所以然而然命也莊子外篇達生孔子觀於呂梁縣水三十仞流沫四十里黿鼉魚鱉之所不能遊也見一丈夫遊之以為有苦而欲死也使弟子並流而拯之數百步而出被髮行歌而遊於塘下孔子從而問焉曰吾以子為鬼察子則人也請問蹈水有道乎曰亡吾無道吾始乎故長乎性成乎命與齊俱入與汨偕出從水之道而不為私焉此吾所以蹈之也孔子曰何謂始乎故長乎性成乎命曰吾生於陵而安於陵故也長於水而安於水性也不知吾所以然而然命也列子黃帝仲尼適楚出於林中見篔僂者承蜩猶掇之也仲尼曰子巧乎有道邪曰我有道也五六月纍垸二而不墜則失者錙銖纍三而不墜則失者十一纍五而不墜猶掇之也吾處也若橛株駒吾執臂若槁木之枝雖天地之大萬物之多而唯蜩翼之知吾不反側不以萬物易蜩之翼何為而不得孔子顧謂弟子曰用志不分乃凝於神其篔僂丈人之謂乎丈人曰汝逢衣徒也亦何知問是乎修汝所以而後載言其上莊子外篇達生仲尼適楚出於林中見篔僂者承蜩猶掇之也仲尼曰子巧乎有道邪曰我有道也五六月纍丸二而不墜則失者錙銖纍三而不墜則失者十一纍五而不墜猶掇之也吾處身也若厥株拘吾執臂也若槁木之枝雖天地之大萬物之多而唯蜩翼之知吾不反不側不以萬物易蜩之翼何為而不得孔子顧謂弟子曰用志不分乃凝於神其篔僂丈人之謂乎列子黃帝趙襄子率徒十萬狩於中山藉仍燔林扇赫百里有一人從石壁中出隨煙燼上下衆謂鬼物火過徐行而出若無所經涉者襄子怪而留之徐而察之形色七竅人也氣息聲音人也問奚道而處石奚道而入火其人曰奚物而謂石奚物而謂火襄子曰而向之所出者石也而向之所入者火也其人曰不知也魏文侯聞之問子夏曰彼何人哉子夏曰以商所聞夫子之言和者大同於物物無得傷閡者遊金石蹈水火皆可也文侯曰吾子奚不為之子夏曰刳心去智商未之能雖然試語之有暇矣文侯曰夫子奚不為之子夏曰夫子能之而能不為者也文侯大說列子周穆王宋陽裏華子中年病忘朝取而夕忘夕與而朝忘在途則忘行在室則忘坐今不識先後不識今闔室毒之謁史而卜之弗占謁巫而禱之弗禁謁醫而攻之弗已魯有儒生自媒能治之華子之妻子以居産之半請其方儒生曰此固非卦兆之所占非祈請之所禱非藥石之所攻吾試化其心變其慮庶幾其瘳乎於是試露之而求衣饑之而求食幽之而求明儒生欣然告其子曰疾可已也然吾之方密傳世不以告人試屏左右獨與居室七日從之莫知其所施為也而積年之疾一朝都除華子既悟乃大怒黜妻罰子操戈逐儒生宋人執而問其以華子曰曩吾忘也蕩蕩然不覺天地之有無今頓識既往數十年來存亡得失哀樂好惡擾擾萬緒起矣吾恐將來之存亡得失哀樂好惡之亂吾心如此也須臾之亡可復得乎子貢聞而怪之以告孔子孔子曰此非汝所及乎顧謂顏回記之列子仲尼仲尼間居子貢入侍而有憂色子貢不敢問出告顏回顏回援琴而歌孔子聞之果召回入問曰若奚獨樂回曰夫子奚獨憂孔子曰先言爾志曰吾昔聞之夫子曰樂天知命故不憂回所以樂也孔子愀然有間曰有是言哉汝之意失矣此吾昔日之言爾請以今言為正也汝徒知樂天知命之無憂未知樂天知命有憂之大也今告若其實修一身任窮達知去來之非我亡變亂於心慮爾之所謂樂天知命之無憂也曩吾修詩書正禮樂將以治天下遺來世非但修一身治魯國而已而魯之君臣日失其序仁義益衰情性益薄此道不行一國與當年其如天下與來世矣吾始知詩書禮樂無救於治亂而未知所以革之之方此樂天知命者之所憂雖然吾得之矣夫樂而知者非古人之謂樂知也無樂無知是真樂真知故無所不樂無所不知無所不憂無所不為詩書禮樂何棄之有革之何為顏回北面拜手曰回亦得之矣出告子貢子貢茫然自失歸家淫思七日不寢不食以至骨立顏回重往喻之乃反丘門弦歌誦書終身不輟列子仲尼陳大夫聘魯私見叔孫氏叔孫曰吾國有聖人曰非孔丘耶曰是也何以知其聖乎叔孫氏曰吾常聞之顏回曰孔丘能廢心而用形陳大夫曰吾國亦有聖人子弗知乎曰聖人孰謂曰老聃之弟子有亢倉子者得聃之道能以耳視而目聽魯侯聞之大驚使上卿厚禮而致之亢倉子應聘而至魯侯卑辭請問之亢倉子曰傳之者妄我能視聽不用耳目不能易耳目之用魯侯曰此增異矣其道奈何寡人終願聞之亢倉子曰我體合於心心合於氣氣合於神神合於無其有介然之有唯然之音雖遠在八荒之外近在眉睫之內來幹我者我必知之乃不知是我七孔四支之所覺心腹六藏之所知其自知而已矣魯侯大悅他日以告仲尼仲尼笑而不答商太宰見孔子曰丘聖者歟孔子曰聖則丘何敢然則丘博學多識者也商太宰曰三王聖者歟孔子曰三王善任智勇者聖則丘不知曰五帝聖者歟孔子曰五帝善任仁義者聖則丘弗知曰三皇聖者歟孔子曰三皇善任因時者聖則丘弗知商太宰大駭曰然則孰者為聖孔子動容有間曰西方之人有聖者焉不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉丘疑其為聖弗知真為聖歟真不聖歟商太宰默然心計曰孔丘欺我哉韓非子說林上子圉見孔子於商太宰孔子出子圉入請問客太宰曰吾已見孔子則視子猶蚤虱之細者也吾今見之於君子圉恐孔子貴於君也因請太宰曰君已見孔子孔子亦將視子猶蚤虱也太宰因弗復見也列子湯問孔子東遊見兩小兒辨鬥問其故一兒曰我以日始出時去人近而日中時遠也一兒以日初出遠而日中時近也一兒曰日初出大如車蓋及日中則如盤盂此不為遠者小而近者大乎一兒曰日初出滄滄涼涼及其日中如探湯此不為近者熱而遠者涼乎孔子不能決也兩小兒笑曰孰為汝多知乎金樓子立言上孔子東遊見兩小兒相鬥一兒曰我以日初出去人近一兒曰日中近一兒曰日初出如車蓋至中裁如盤盂豈不近者大遠者小一兒曰日初出滄滄涼涼至日中有如探湯此非遠者涼近者熱邪孔子亦不知日中天而小落扶桑而大列子說符孔子自衛反魯息駕乎河梁而觀焉有懸水三十仞圜流九十里魚鱉弗能遊黿鼉弗能居有一丈夫方將厲之孔子使人並涯止之曰此懸水三十仞圜流九十里魚鱉弗能遊黿鼉弗能居也意者難可以濟乎丈夫不以錯意遂度而出孔子問之曰巧乎有道術乎所以能入而出者何也丈夫對曰始吾之入也先以忠信及吾之出也又從以忠信忠信錯吾軀於波流而吾不敢用私所以能入而復出者以此也孔子謂弟子曰二三子識之水且猶可以忠信誠身親之而況人乎說苑雜言孔子觀於呂梁懸水四十仞環流九十里魚鱉不能過黿鼉不敢居有一丈夫方將涉之孔子使人並崖而止之曰此懸水四十仞圜流九十里魚鱉不敢過黿鼉不敢居意者難可濟也丈夫不以錯意遂渡而出孔子問子巧乎且有道術乎所以能入而出者何也丈夫對曰始吾入先以忠信吾之出也又從以忠信忠信錯吾軀於波流而吾不敢用私吾所以能入而復出也孔子謂弟子曰水而尚可以忠信義久而身親之況於人乎列子說符白公問孔子曰人可與微言乎孔子不應白公問曰若以石投水何如孔子曰吳之善沒者能取之曰若以水投水何如孔子曰淄澠之合易牙嘗而知之白公曰人故不可與微言乎孔子曰何為不可唯知言之謂者乎夫知言之謂者不以言言也爭魚者濡逐獸者趨非樂之也故至言去言至為無為夫淺知之所爭者末矣白公不得已遂死於浴室呂氏春秋審應覽精諭白公問於孔子曰人可與微言乎孔子不應白公曰若以石投水奚若孔子曰沒人能取之白公曰若以水投水奚若孔子曰淄澠之合者易牙嘗而知之白公曰然則人不可與微言乎孔子曰胡為不可唯知言之謂者為可耳淮南子道應訓白公問於孔子曰人可以微言孔子不應白公曰若以石投水中何如曰吳越之善沒者能取之矣曰若以水投水何如孔子曰菑澠之水合易牙嘗而知之白公曰然則人固不可與微言乎孔子曰何謂不可誰知言之謂者乎夫知言之謂者不以言言也爭魚者濡逐獸者趍非樂之者也故至言去言至為無為夫淺知之所爭者末矣白公不得也故死於浴室莊子內篇人間世顏回見仲尼請行曰奚之曰將之衛曰奚為焉曰回聞衛君其年壯其行獨輕用其國而不見其過輕用民死死者以國量乎澤若蕉民其無如矣回嘗聞之夫子曰治國去之亂國就之醫門多疾願以所聞思其所行則庶幾其國有瘳乎仲尼曰嘻若往而殆刑耳夫道不欲雜雜則多多則擾擾則憂憂而不救古之至人先存諸己而後存諸人所存於己者未定何暇至於暴人之所行且若亦知夫德之所蕩而知之所為出乎哉德蕩乎名知出乎爭名也者相軋也知也者爭之器也二者凶器非所以盡行也且德厚信矼未達人氣名聞不爭未達人心而強以仁義繩墨之言衒暴人之前者是以人惡有其美也命之曰菑人菑人者人必反菑之若殆為人菑夫且苟為悅賢而惡不肖惡用而求有以異若唯無詔王公必將乘人而鬥其捷而目將熒之而色將平之口將營之容將形之心且成之是以火救火以水救水名之曰益多順始無窮若殆以不信厚言必死於暴人之前矣且昔者桀殺關龍逢紂殺王子比幹是皆修其身以下傴拊人之民以下拂其上者也故其君因其修以擠之是好名者也昔者堯攻叢枝胥敖禹攻有扈國為虛厲身為刑戮其用兵不止其求實無已是皆求名實者也而獨不聞之乎名實者聖人之所不能勝也而況若乎雖然若必有以也嘗以語我來顏回曰端而虛勉而一則可乎曰惡惡可夫以陽為充孔揚采色不定常人之所不違因案人之所感以求容與其心名之曰日漸之德不成而況大德乎將執而不化外合而內不訾其庸簹可乎然則我內直而外曲成而上比內直者與天為徒與天為徒者知天子之與己皆天之所子而獨以己言蘄乎而人善之蘄乎而人不善之邪若然者人謂之童子是之謂與天為徒外曲者與人之為徒也擎跽曲拳人臣之禮也人皆為之吾敢不為邪為人之所為者人亦無疵焉是之謂與人為徒成而上比者與古為徒其言雖教祇之實也古之有也非吾有也若然者雖直不為病是之謂與古為徒若是則可乎仲尼曰惡惡可大多政法而不諜雖固亦無罪雖然止是耳矣夫胡可以及化猶師心者也顏回曰吾無以進矣敢問其方仲尼曰齊吾將語若有而為之其易邪易之者皞天不宜顏回曰回之家貧唯不飲酒不茹葷者數月矣若此則可以為齊乎曰是祭祀之齊非心齊也回曰敢問心齊仲尼曰若一志無聽之以耳而聽之以心無聽之以心而聽之以氣聽止於耳心止於符氣也者虛而待物者也唯道集虛虛者心齊也顏回曰回之未始得使實自回也得使之也未始有回也可謂虛乎夫子曰盡矣吾語若若能入遊其樊而無感其名入則鳴不入則止無門無毒一宅而寓於不得已則幾矣絶跡易無行地難為人使易以僞為天使難以僞聞以有翼飛者矣未聞以無翼飛者也聞以有知知者矣未聞以無知知者也瞻彼閲者虛室生白吉祥止止夫且不止是之謂坐馳夫徇耳目內通而外於心知鬼神將來舍而況人乎是萬物之化也禹舜之所紐也伏羲幾蘧之所行終而況散焉者乎莊子內篇德充符魯有兀者王駘從之遊者與仲尼相若常季問於仲尼曰王駘兀者也從之遊者與夫子中分魯立不教坐不議虛而往實而歸固有不言之教無形而心成者邪是何人也仲尼曰夫子聖人也丘也直後而未往耳丘將以為師而況不若丘者乎奚假魯國丘將引天下而與從之常季曰彼兀者也而王先生其與庸亦遠矣若然者其用心也獨若之何仲尼曰死生亦大矣而不得與之變雖天地覆墜亦將不與之遺審乎無假而不與物遷命物之化而守其宗者也常季曰何謂也仲尼曰自其異者視之肝膽楚越也自其同者視之萬物皆一也夫若然者且不知耳目之所宜而遊心乎德之和物視其所一而不見其所喪視喪其足猶遺土也常季曰彼為己以其知得其心以其心得其常心物何為最之哉仲尼曰人莫鑒於流水而鑒於止水唯止能止衆止受命於地唯松柏獨也在冬夏青青受命於天唯舜獨也正在萬物之首幸能正生以正衆生夫保始之征不懼之實勇士一人雄入於九軍將求名而能自要者而猶若是而況官天地府萬物直寓六骸象耳目一知之所知而心未嘗死者乎彼且擇日而登假人則從是也彼且何肯以物為事乎莊子內篇德充符魯有兀者叔山無趾踵見仲尼仲尼曰子不謹前既犯患若是矣雖今來何及矣無趾曰吾唯不知務而輕用吾身吾以是亡足今吾來也猶有尊足者存吾是以務全之也夫天無不覆地無不載吾以夫子為天地安知夫子之猶若是也孔子曰丘則陋矣夫子胡不入乎請講以所聞無趾出孔子曰弟子勉之夫無趾兀者也猶務學以復補前行之惡而況全德之人乎無趾語老聘曰孔丘之於至人其未邪彼何賓賓以學子為彼且蘄以綍詭幻怪之名聞不知至人之以是為己桎梏邪老聃曰胡不直使彼以死生為一條以可不可為一貫者解其桎梏其可乎無趾曰天刑之安可解莊子內篇德充符魯哀公問於仲尼曰衛有惡人焉曰哀駘它丈夫與之處者思而不能去也婦人見之請於父母曰與人為妻寧為夫子妾者十數而未止也未嘗有聞其唱者也常和人而已矣無君人之位以濟乎人之死無聚祿以望人之腹又以惡駭天下和而不唱知不出乎四域且而雌雄合乎前是必有異乎人者也寡人召而觀之果以惡駭天下與寡人處不至以月數而寡人有意乎其為人也不至乎期年而寡人信之國無宰而寡人傳國焉悶然而後應泛而若辭寡人醜乎卒授之國無幾何也去寡人而行寡人恤焉若有亡也若無與樂是國也是何人者也仲尼曰丘也嘗使於楚矣適見屯子食於其死母者少焉旬若皆棄之而走不見已焉爾不得類焉爾所愛其母者非愛其形也愛使其形者也戰而死者其人之葬也不以翣資刖者之屨無為愛之皆無其本矣為天子之諸禦不爪剪不穿耳取妻者止於外不得復使形全猶足以為爾而況全德之人乎今哀駘它未言而信無功而親使人授己國唯恐其不受也是必才全而德不形者也哀公曰何謂才全仲尼曰死生存亡窮達貧富賢與不肖毀譽饑渴寒暑是事之變命之行也日夜相代乎前而知不能規乎其始者也故不足以滑和不可入於靈府使之和豫通而不失於兌使日夜無郤而與物為春是接而生時乎心者也是之謂才全何謂德不形曰平者水停之盛也其可以為法也內保之而外不蕩也德者成和之修也德不形者物不能離也哀公異日以告閔子曰始也吾以南面而君天下執民之紀而憂其死吾自以為至通矣今吾聞至人之言恐吾無其實輕用吾身而亡吾國吾與孔丘非君臣也德友而已矣莊子內篇大宗師子桑戶孟子反子琴張三人相與友曰孰能相與於無相與相為於無相為孰能登天遊霧撓挑無極相忘以生無所終窮三人相視而笑莫逆於心遂相與友莫然有間而子桑戶死未葬孔子聞之使子貢往待事焉或編曲或鼓琴相和而歌曰嗟來桑戶兮嗟來桑戶乎而已反其真而我猶為人猗子貢趨而進曰敢問臨尸而歌禮乎二人相視而笑曰是惡知禮意子貢反以告孔子曰彼何人者邪修行無有而外其形骸臨尸而歌顏色不變無以命之彼何人者邪孔子曰彼遊方之外者也而丘遊方之內者也外內不相及而丘使汝往吊之丘則陋矣彼方且與造物者為人而遊乎天地之一氣彼以生為附贅縣疣以死為決疣潰癰夫若然者又惡知死生先後之所在假於異物托於同體忘其肝膽遺其耳目反覆終始不知端倪芒然倣徨乎塵垢之外逍遙乎無為之業彼又惡能憒憒然為世俗之禮以觀衆人之耳目哉子貢曰然則夫子何方之依曰丘天之戮民也雖然吾與汝共之子貢曰敢問其方孔子曰魚相造乎水人相造乎道相造乎水者穿池而養給相造乎道者無事而生定故曰魚相忘乎江湖人相忘乎道術子貢曰敢問畸人曰畸人者畸於人而侔於天故曰天之小人人之君子人之君子天之小人也莊子內篇大宗師顏回問仲尼曰孟孫才其母死哭泣無涕中心不蹙居喪不哀無是三者以善處喪蓋魯國固有無其實而得其名者乎回一怪之仲尼曰夫孟孫氏盡之矣進於知矣唯簡之而不得夫已有所簡矣孟孫氏不知所以生不知所以死不知就先不知就後若化為物以待其所不知之化已乎且方將化惡知不化哉方將不化惡知已化哉吾特與汝其夢未始覺者邪且彼有駭形而無損心有旦宅而無情死孟孫氏特覺人哭亦哭是自其所以乃且也相與吾之耳矣庸詎知吾所謂吾之乎且汝夢為鳥而厲乎天夢為魚而沒於淵不識今之言者其覺者乎其夢者乎造適不及笑獻笑不及排安排而去化乃入於寥天一莊子內篇大宗師顏回曰回益矣仲尼曰何謂也曰回忘仁義矣曰可矣猶未也它日復見曰回益矣曰何謂也曰回忘禮樂矣曰可矣猶未也它日復見曰回益矣曰何謂也曰回坐忘矣仲尼蹴然曰何謂坐忘顏回曰墮枝體黜聰明離形去知同於大通此謂坐忘仲尼曰同則無好也化則無常也而果其賢乎丘也請從而後也淮南子道應訓顏回謂仲尼曰回益矣仲尼曰何謂也曰回忘禮樂矣仲尼曰可矣猶未也異日復見曰回益矣仲尼曰何謂也曰回忘仁義矣仲尼曰可矣猶未也異日復見曰回坐忘矣仲尼造然曰何謂坐忘顏回曰隳支體黜聰明離形去知洞於化通是謂坐忘仲尼曰洞則無善也化則無常矣而夫子薦賢丘請從之後莊子外篇天地夫子問於老聃曰有人治道若相放可不可然不然辨者有言曰離堅白若縣宇若是則可謂聖人乎老聃曰是胥易技係勞形怵心者也執狸之狗成思猿狙之便自山林來丘豫告若而所不能聞與而所不能言凡有首有趾無心無耳者衆有形者與無形無狀而皆存者盡無其動止也其死生也其廢起也此又非其所以也有治在人忘乎物忘乎天其名為忘己忘己之人是之謂入於天莊子外篇天地子貢南遊於楚反於晉過漢陰見一丈人方將為圃畦鑿隧而入井抱甕而出灌搰搰然用力甚多而見功寡子貢曰有械於此一日浸百畦用力甚寡而見功多夫子不欲乎為圃者仰而視之曰奈何曰鑿木為機後重前輕挈水若抽數如泆湯其名為槔為圃者忿然作色而笑曰吾聞之吾師有機械者必有機事有機事者必有機心機心存於胸中則純白不備純白不備則神生不定神生不定者道之所不載也吾非不知羞而不為也子貢瞞然慚俯而不對有間為圃者曰子奚為者邪曰孔丘之徒也為圃者曰子非夫博學以擬聖於於以蓋衆獨弦哀歌以賣名聲於天下者乎汝方將忘汝神氣墮汝形骸而庶幾乎而身之不能治而何暇治天下乎子往矣無乏吾事子貢卑陬失色頊頊然不自得行三十里而後愈其弟子曰向之人何為者邪夫子何故見之變容失色終日不自反邪曰始吾以為天下一人耳不知復有夫人也吾聞之夫子事求可功求成用力少見功多者聖人之道今徒不然執道者德全德全者形全形全者神全神全者聖人之道也托生與民並行而不知其所之汒乎淳備哉功利機巧必忘夫人之心若夫人者非其志不之非其心不為雖以天下譽之得其所謂謷然不顧以天下非之失其所謂儻然不受天下之非譽無益損焉是謂全德之人哉我之謂風波之民反於魯以告孔子孔子曰彼假修渾沌氏之術者也識其一不知其二治其內而不治其外夫明白入素無為復朴體性抱神以遊世俗之間者汝將固驚邪且渾沌氏之術豫與汝何足以識之哉莊子外篇天運孔子西遊於衛顏淵問師金曰以夫子之行為奚如師金曰惜乎而夫子其窮哉顏淵曰何也師金曰夫芻狗之未陳也盛以篋衍巾以文繡尸祝齊戒以將之及其已陳也行者踐其首脊蘇者取而爨之而已將復取而盛以篋衍巾以文繡遊居寢臥其下彼不得夢必且數眯焉今而夫子亦取先王已陳芻狗取弟子遊居寢臥其下故伐樹於宋削跡於衛窮於商周是非其夢邪圍於陳蔡七日不火食死生相與鄰是非其眯邪夫水行莫如用舟而陸行莫如用車以舟之可行於水也而求推之於陸則沒世不行尋常古今非水陸與周魯非舟車與今蘄行周於魯是猶推舟於陸也勞而無功身必有殃彼未知夫無方之傳應物而不窮者也且子獨不見夫桔槔者乎引之則俯舍之則仰彼人之所引非引人也故俯仰而不得罪於人故夫三皇五帝之禮義法度不矜於同而矜於治故譬三皇五帝之禮義法度其猶柤梨橘柚邪其味相反而皆可於口故禮義法度者應時而變者也今取柤狙而衣以周公之服彼必齕齧挽裂盡去而後慊觀古今之異猶柤狙之異乎周公也故西施病心而顰其裏其裏之醜人見而美之歸亦捧心而顰其裏其裏之富人見之堅閉門而不出貧人見之挈妻子而去之走彼知美顰而不知顰之所以美惜乎而夫子其窮哉寓言十四下莊子外篇天運孔子行年五十有一而不聞道乃南之沛見老聃老聃曰子來乎吾聞子北方之賢者也子亦得道乎孔子曰未得也老子曰子惡乎求之哉曰吾求之於度數五年而未得也老子曰子又惡乎求之哉曰吾求之於陰陽十有二年而未得老子曰然使道而可獻則人莫不獻之於其君使道而可進則人莫不進之於其親使道而可以告人則人莫不告其兄弟使道而可以與人則人莫不與其子孫然而不可者無他也中無主而不止外無正而不行由中出者不受於外聖人不出由外入者無主於中聖人不隱名公器也不可多取仁義先王之蘧廬也止可以一宿而不可久處覯而多貴古之至人假道於仁托宿於義以遊逍遙之墟食於苟簡之田立於不貸之圃逍遙無為也苟簡易養也不貸無出也古者謂是采真之遊以富為是者不能讓祿以顯為是者不能讓名親權者不能與人柄操之則栗舍之則悲而一無所鑒以窺其所不休者是天之戮民也怨恩取與諫教生殺八者正之器也唯循大變無所湮者為能用之故曰正者正也其心以為不然者天門弗開矣孔子見老聃而語仁義老聃曰夫播糠眯目則天地四方易位矣蛟虻絪膚則通昔不寐矣夫仁義憯然乃憤吾心亂莫大焉吾子使天下無失其朴吾子亦放風而動總德而立矣又奚傑然若負建鼓而求亡子者邪夫鵠不日浴而白烏不日黔而黑黑白之朴不足以為辨名譽之觀不足以為廣泉涸魚相與處於陸相詬以濕相濡以沫不若相忘於江湖孔子見老聃歸三日不談弟子問曰夫子見老聃亦將何規哉孔子曰吾乃今於是乎見龍龍合而成體散而成章乘乎雲氣而養乎陰陽豫口張而不能脅豫又何規老聃哉子貢曰然則人固有尸居而龍見雷聲而淵默發動如天地者乎賜亦可得而觀乎遂以孔子聲見老聃老聃方將倨堂而應微曰豫年運而往矣子將何以戒我乎子貢曰夫三王五帝之治天下不同其係聲名一也而先生獨以為非聖人如何哉老聃曰小子少進子何以謂不同對曰堯授舜舜授禹禹用力而湯用兵文王順紂而不敢逆武王逆紂而不肯順故曰不同老聃曰小子少進餘語汝三王五帝之治天下黃帝之治天下使民心一民有其親死不哭而民不非也堯之治天下使民心親民有為其親殺其殺而民不非也舜之治天下使民心競民孕婦十月生子子生五月而能言不至乎孩而始誰則人始有夭矣禹之治天下使民心變人有心而兵有順殺盜非殺人自為種而天下耳是以天下大駭儒墨皆起其作始有倫而今乎婦女何言哉餘語汝三皇五帝之治天下名曰治之而亂莫甚焉三皇之知上悖日月之明下睽山川之精中墮四時之施其知僭於厲蟲蠆之尾鮮規之獸莫得安其性命之情者而猶自以為聖人不可恥乎其無恥也子貢蹴蹴然立不安孔子謂老聃曰丘治詩書禮樂易春秋六經自以為久矣孰知其故矣以奸者七十二君論先王之道而明周召之跡一君無所鉤用甚矣夫人之難說也道之難明邪老子曰幸矣子之不遇治世之君也夫六經先王之陳跡也豈其所以跡哉今子之所言猶跡也夫跡履之所出而跡豈履哉夫白之相視眸子不運而風化蟲雄鳴於上風雌應於下風而化類自為雌雄故風化性不可易命不可變時不可止道不可壅苟得於道無自而不可失焉者無自而可孔子不出三月復見曰丘得之矣鳥鵲孺魚傅沫細要者化有弟而兄啼久矣夫丘不與化為人不與化為人安能化人老子曰可丘得之矣史記老莊申韓列傳孔子適周將問禮於老子老子曰子所言者其人與骨皆已朽矣獨其言在耳且君子得其時則駕不得其時則蓬纍而行吾聞之良賈深藏若虛君子盛德容貌若愚去子之驕氣與多欲態色與淫志是皆無益於子之身吾所以告子若是而已孔子去謂弟子曰鳥吾知其能飛魚吾知其能遊獸吾知其能走走者可以為罔遊者可以為綸飛者可以為矰至於龍吾不能知其乘風雲而上天吾今日見老子其猶龍邪論衡龍虛孔子曰遊者可為網飛者可為矰至於龍也吾不知其乘風雲上升今日見老子其猶龍乎論衡知實孔子曰遊者可為綸走者可為矰至於龍吾不知乘雲風上升今日見老子其猶龍邪莊子外篇至樂顏淵東之齊孔子有憂色子貢下席而問曰小子敢問回東之齊夫子有憂色何邪孔子曰善哉汝問昔者管子有言丘甚善之曰褚小者不可以懷大綆短者不可以汲深夫若是者以為命有所成而形有所適也夫不可損益吾恐回與齊侯言堯舜黃帝之道而重以燧人神農之言彼將內求於己而不得不得則惑人惑則死且汝獨不聞邪昔者海鳥止於魯郊魯侯禦而觴之於廟奏九韶以為樂具太牢以為膳鳥乃眩視憂悲不敢食一臠不敢飲一杯三日而死此以己養養鳥也非以鳥養養鳥也夫以鳥養養鳥者宜棲之深林遊之壇陸浮之江湖食之蠙鰷隨行列而止委蛇而處彼惟人言之惡聞奚以夫譊譊為乎咸池九韶之樂張之洞庭之野鳥聞之而飛獸聞之而走魚聞之而下入人卒聞之相與還而觀之魚處水而生人處水而死彼必相與異其好惡故異也故先聖不一其能不同其事名止於實義設於適是之謂條達而福持莊子外篇達生仲尼曰無入而藏無出而陽柴立其中央三者若得其名必極夫畏塗者十殺一人則父子兄弟相戒也必盛卒徒而後敢出焉不亦知乎人之所取畏者衽席之上飲食之間而不知為之戒者過也莊子外篇山木孔子圍於陳蔡之間七日不火食太公任往吊之曰子幾死乎曰然子惡死乎曰然任曰豫嘗言不死之道東海有鳥焉名曰意怠其為鳥也翂翂渼渼而似無能引援而飛迫脅而棲進不敢為前退不敢為後食不敢先嘗必取其緒是故其行列不斥而外人卒不得害是以免於患直木先伐甘井先竭子其意者飾知以驚愚修身以明汙昭昭乎如揭日月而行故不免也昔吾聞之大成之人曰自伐者無功功成者墮名成者虧孰能去功與名而還與衆人道流而不明居得行而不名處純純常常乃比於狂削跡捐勢不為功名是故無責於人人亦無責焉至人不聞子何喜哉孔子曰善哉辭其交遊去其弟子逃於大澤衣裘褐食杼栗入獸不亂群入鳥不亂行鳥獸不惡而況人乎莊子外篇山木孔子問子桑呼曰吾再逐於魯伐樹於宋削跡於衛窮於商周圍於陳蔡之間吾犯此數患親交益疏徒友益散何與子桑呼曰子獨不聞假人之亡與林回棄千金之璧負赤子而趨或曰為其布與赤子之布寡矣為其纍與赤子之纍多矣棄千金之璧負赤子而趨何也林回曰彼以利合此以天屬也夫以利合者迫窮禍患害相棄也以天屬者迫窮禍患害相收也夫相收之與相棄亦遠矣且君子之交淡若水小人之交甘若醴君子淡以親小人甘以絶彼無故以合者則無故以離孔子曰敬聞命矣徐行翔佯而歸絶學捐書弟子無益於前其愛益加進莊子外篇田子方溫伯雪子適齊舍於魯魯人有請見之者溫伯雪子曰不可吾聞中國之君子明乎禮義而陋於知人心吾不欲見也至於齊反舍於魯是人也又請見溫伯雪子曰往也蘄見我今也又蘄見我是必有以振我也出而見客入而歎明日見客又入而歎其仆曰每見之客也必入而歎何邪曰吾固告子矣中國之民明乎禮義而陋乎知人心昔之見我者進退一成規一成矩從容一若龍一若虎其諫我也似子其道我也似父是以歎也仲尼見之而不言子路曰吾子欲見溫伯雪子久矣見之而不言何邪仲尼曰若夫人者目擊而道存矣亦不可以容聲矣呂氏春秋審應覽精諭孔子見溫伯雪子不言而出子貢曰夫子之欲見溫伯雪子好矣今也見之而不言其故何也孔子曰若夫人者目擊而道存矣不可以容聲矣莊子外篇田子方顏淵問於仲尼曰夫子步亦步夫子趨亦趨夫子馳亦馳夫子奔逸絶塵而回瞪若乎後矣夫子曰回何謂邪曰夫子步亦步也夫子言亦言也夫子趨亦趨也夫子辨亦辨也夫子馳亦馳也夫子言道回亦言道也及奔逸絶塵而回瞪若乎後者夫子不言而信不比而周無器而民淹乎前而不知所以然而已矣仲尼曰惡可不察與夫哀莫大於心死而人死亦次之日出東方而入於西極萬物莫不比方有目有趾者待是而後成功是出則存是入則亡萬物亦然有待也而死有待也而生吾一受其成形而不化以待盡效物而動日夜無隙而不知其所終薰然其成形知命不能規乎其前丘以是日徂吾終身與汝交一臂而失之可不哀與汝殆著乎吾所以著也彼已盡矣而汝求之以為有是求馬於唐肆也吾服汝也甚忘汝服吾也亦甚忘雖然汝奚患焉雖忘乎故吾吾有不忘者存淮南子齊俗訓孔子謂顏回曰吾服汝也忘而汝服於我也亦忘雖然汝雖忘乎吾猶有不忘者存論衡自然孔子謂顏淵曰吾服汝忘也汝之服於我亦忘也莊子外篇田子方孔子見老聃老聃新沐方將被髮而乾芃然似非人孔子便而待之少焉見曰丘也眩與其信然與向者先生形體掘若槁木似遺物離人而立於獨也老聃曰吾遊於物之初孔子曰何謂邪曰心困焉而不能知口辟焉而不能言嘗為汝議乎其將至陰肅肅至陽赫赫肅肅出乎天赫赫發乎地兩者交通成和而物生焉或為之紀而莫見其形消息滿虛一晦一明日改月化日有所為而莫見其功生有所乎萌死有所乎歸始終相反乎無端而莫知乎其所窮非是也且孰為之宗孔子曰請問遊是老聃曰夫得是至美至樂也得至美而遊乎至樂謂之至人孔子曰願聞其方曰草食之獸不疾易藪水生之蟲不疾易水行小變而不失其大常也喜怒哀樂不入於胸次夫天下也者萬物之所一也得其所一而同焉則四支百體將為塵垢而死生終始將為晝夜而莫之能滑而況得喪禍福之所介乎棄隸者若棄泥塗知身貴於隸也貴在於我而不失於變且萬化而未始有極也夫孰足以患心已為道者解乎此孔子曰夫子德配天地而猶假至言以修心古之君子孰能脫焉老聃曰不然夫水之於汋也無為而才自然矣至人之於德也不修而物不能離焉若天之自高地之自厚日月之自明夫何修焉孔子出以告顏回曰丘之於道也其猶醯雞與微夫子之發吾覆也吾不知天地之大全也莊子外篇田子方文王觀於臧見一丈夫釣而其釣莫釣非持其釣有釣者也常釣也文王欲舉而授之政而恐大臣父兄之弗安也欲終而釋之而不忍百姓之無天也於是旦而屬諸大夫曰昔者寡人夢見良人黑色而髯乘駁馬而偏朱蹄號曰寓而政於臧丈人庶幾乎民有瘳乎諸大夫蹴然曰先君王也文王曰然則卜之諸大夫曰先君之命王其無它又何卜焉遂迎臧丈人而授之政典法無更偏令無出三年文王觀於國則列士壞植散群長官者不成德鍾斛不敢入於四境列士壞植散群則尚同也長官者不成德則同務也鍾斛不敢入於四境則諸侯無二心也文王於是焉以為太師北面而問曰政可以及天下乎臧丈人昧然而不應泛然而辭朝令而夜遁終身無聞顏淵問於仲尼曰文王其猶未邪又何以夢為乎仲尼曰默汝無言夫文王盡之也而又何論刺焉彼直以循斯須也莊子外篇田子方肩吾問於孫叔敖曰子三為令尹而不榮華三去之而無憂色吾始也疑子今視子之鼻間栩栩然子之用心獨奈何孫叔敖曰吾何以過人哉吾以其來不可卻也其去不可止也吾以為得失之非我也而無憂色而已矣我何以過人哉且不知其在彼乎其在我乎其在彼邪亡乎我在我邪亡乎彼方將躊躇方將四顧何暇至乎人貴人賤哉仲尼聞之曰古之真人知者不得說美人不得濫盜人不得劫伏戲黃帝不得友死生亦大矣而無變乎已況爵祿乎若然者其神經乎大山而無介入乎淵泉而不濡處卑細而不憊充滿天地既以與人已愈有莊子外篇知北遊孔子問於老聃曰今日晏間敢問至道老聃曰汝齊戒疏瀹而心澡雪而精神掊擊而知夫道窅然難言哉將為汝言其崖略夫昭昭生於冥冥有倫生於無形精神生於道形本生於精而萬物以形相生故九竅者胎生八竅者卵生其來無跡其往無崖無門無房四達之皇皇也邀於此者四枝強思慮恂達耳目聰明其用心不勞其應物無方天不得不高地不得不廣日月不得不行萬物不得不昌此其道與且夫博之不必知辨之不必慧聖人以斷之矣若夫益之而不加益損之而不加損者聖人之所保也淵淵乎其若海巍巍乎其終則復始也運量萬物而不匱則君子之道彼其外與萬物皆往資焉而不匱此其道與中國有人焉非陰非陽處於天地之間直且為人將反於宗自本觀之生者喑窅物也雖有壽夭相去幾何須臾之說也奚足以為堯桀之是非果有理人倫雖難所以相齒聖人遭之而不違過之而不守調而應之德也偶而應之道也帝之所興王之所起也人生天地之間若白駒之過郤忽然而已注然勃然莫不出焉油然漻然莫不入焉已化而生又化而死生物哀之人類悲之解其天韜墮其天帙紛乎宛乎魂魄將往乃身從之乃大歸乎不形之形形之不形是人之所同知也非將至之所務也此衆人之所同論也彼至則不論論則不至明見無值辨不若默道不可聞聞不若塞此之謂大得莊子外篇知北遊冉求問於仲尼曰未有天地可知邪仲尼曰可古猶今也冉求失問而退明日復見曰昔者吾問未有天地可知乎夫子曰可古猶今也昔者吾昭然今日吾昧然敢問何謂也仲尼曰昔之昭然也神者先受之今之昧然也且又不為神者求邪無古無今無始無終未有子孫而有子孫可乎冉求未對仲尼曰已矣未應矣不以生生死不以死死生死生有待邪皆有所一體有先天地生者物邪物物者非物物出不得先物也猶其有物也無已聖人之愛人也終無己者亦乃取於是者也莊子外篇知北遊顏淵問乎仲尼曰回嘗聞諸夫子曰無有所將無有所迎回敢問其遊仲尼曰古之人外化而內不化今之人內化而外不化與物化者一不化者也安化安不化安與之相靡必與之莫多犬希氏之囿黃帝之圃有虞氏之宮湯武之室君子之人若儒墨者師故以是非相齏也而況今之人乎聖人處物不傷物不傷物者物亦不能傷也唯無所傷者為能與人相將迎山林與皋壤與使我欣欣然而樂與樂未畢也哀又繼之哀樂之來吾不能禦其去弗能止悲夫世人直謂物逆旅耳夫知遇而不知所不遇知能能而不能所不能無知無能者固人之所不免也夫務免乎人之所不免者豈不亦悲哉至言去言至為去為齊知之所知則淺矣莊子雜篇徐無鬼仲尼之楚楚王觴之孫叔敖執爵而立市南宜僚受酒而祭曰古之人乎於此言已曰丘也聞不言之言矣未之嘗言於此乎言之市南宜僚弄丸而兩家之難解孫叔敖甘寢秉羽而郢人投兵丘願有喙三尺彼之謂不道之道此之謂不言之辨故德總乎道之所一而言休乎知之所不知至矣道之所一者德不能同也知之所不能知者辨不能舉也名若儒墨而凶矣故海不辭東流大之至也聖人並包天地澤及天下而不知其誰氏是故生無爵死無諡實不聚名不立此之謂大人狗不以善吠為良人不以善言為賢而況為大乎夫為大不足以為大而況為德乎夫大備矣莫大天地然奚求焉而大備矣知大備者無求無失無棄不以物易己也反己而不窮循古而不摩大人之誠莊子雜篇則陽孔子之楚舍於蟻丘之漿其鄰有夫妻臣妾登極者子路曰是稯稯何為者邪仲尼曰是聖人仆也是自埋於民自藏於畔其聲銷其志無窮其口雖言其心未嘗言方且與世違而心不屑與之俱是陸沈者也是其市南宜僚邪子路請往召之孔子曰已矣彼知丘之著於己也知丘之適楚也以丘為必使楚王之召己也彼且以丘為佞人也夫若然者其於佞人也羞聞其言而況親見其身乎而何以為存子路往視之其室虛矣莊子雜篇則陽仲尼問於太師大韜伯常騫犬希韋曰夫衛靈公飲酒湛樂不聽國家之政田獵畢弋不應諸侯之際其所以為靈公者何邪大韜曰是因是也伯常騫曰夫靈公有妻三人同濫而浴史蠙奉御而進所搏幣而扶翼其慢若彼之甚也見賢人若此其肅也是其所以為靈公也韜韋曰夫靈公也死卜葬於故墓不吉卜葬於沙丘而吉掘之數仞得石槨焉洗而視之有銘焉曰不馮其子靈公奪而埋之夫靈公之為靈也久矣之二人何足以識之莊子雜篇外物老萊子之弟子出薪遇仲尼反以告曰有人於彼修上而趍下末僂而後耳視若營四海不知其誰氏之子老萊子曰是丘也召而來仲尼至曰丘去汝躬矜與汝容知斯為君子矣仲尼揖而退蹙然改容而問曰業可得進乎老萊子曰夫不忍一世之傷而驁萬世之患抑固窶邪亡其略弗及邪惠以歡為驁終身之醜中民之行進焉耳相引以名相結以隱與其譽堯而非桀不如兩忘而閉其所譽反無非傷也動無非邪也聖人躊躇以興事以每成功奈何哉其載焉終矜爾莊子雜篇盜跖孔子與柳下季為友柳下季之弟名曰盜跖盜跖從卒九千人橫行天下侵暴諸侯穴室樞戶驅人牛馬取人婦女貪得忘親不顧父母兄弟不祭先祖所過之邑大國守城小國入保萬民苦之孔子謂柳下季曰夫為人父者必能詔其子為人兄者必能教其弟若父不能詔其子兄不能教其弟則無貴父子兄弟之親矣今先生世之才士也弟為盜跖為天下害而弗能教也丘竊為先生羞之丘請為先生往說之柳下季曰先生言為人父者必能詔其子為人兄者必能教其弟若子不聽父之詔弟不受兄之教雖今先生之辨將奈之何哉且跖之為人也心如湧泉意如飄風強足以距敵辨足以飾非順其心則喜逆其心則怒易辱人以言先生必無往孔子不聽顏回為馭子貢為右往見盜跖盜跖乃方休卒徒大山之陽膾人肝而壒之孔子下車而前見謁者曰魯人孔丘聞將軍高義敬再拜謁者謁者入通盜跖聞之大怒目如明星發上指冠曰此夫魯國之巧僞人孔丘非邪為我告之爾作言造語妄稱文武冠枝木之冠帶死牛之脅多辭謬說不耕而食不織而衣搖唇鼓舌擅生是非以迷天下之主使天下學士不反其本妄作孝弟而僥幸於封侯富貴者也子之罪大極重疾走歸不然我將以子肝益晝脯之膳孔子復通曰丘得幸於季願望履幕下謁者復通盜跖曰使來前孔子趨而進避席反走再拜盜跖盜跖大怒兩展其足案劍瞋目聲如乳虎曰丘來前若所言順吾意則生逆吾心則死孔子曰丘聞之凡天下有三德生而長大美好無雙少長貴賤見而皆悅之此上德也知維天地能辨諸物此中德也勇悍果敢聚衆率兵此下德也凡人有此一德者足以南面稱孤矣今將軍兼此三者身長八尺二寸面目有光唇如激丹齒如齊貝音中黃鍾而名曰盜跖丘竊為將軍恥不取焉將軍有意聽臣臣請南使吳越北使齊魯東使宋衛西使晉楚使為將軍造大城數百里立數十萬戶之邑尊將軍為諸侯與天下更始罷兵休卒收養昆弟共祭先祖此聖人才士之行而天下之願也盜跖大怒曰丘來前夫可規以利而可諫以言者皆愚陋恆民之謂耳今長大美好人見而說之者此吾父母之遺德也丘雖不吾譽吾獨不自知邪且吾聞之好麵譽人者亦好背而毀之今丘告我以大城衆民是欲規我以利而恆民畜我也安可長久也城之大者莫大乎天下矣堯舜有天下子孫無置錐之地湯武立為天子而後世絶滅非以其利大故邪且吾聞之古者禽獸多而人民少於是皆巢居以避之晝拾橡栗暮棲木上故命之曰有巢氏之民古者民不知衣服夏多積薪冬則煬之故命之曰知生之民神農之世臥則居居起則於於民知其母不知其父與麋鹿共處耕而食織而衣無有相害之心此至德之隆也然而黃帝不能致德與蚩尤戰於涿鹿之野流血百里堯舜作立群臣湯放其主武王殺紂自是之後以強陵弱以衆暴寡湯武以來皆亂人之徒也今子修文武之道掌天下之辨以教後世縫衣淺帶矯言僞行以迷惑天下之主而欲求富貴焉盜莫大於子天下何故不謂子為盜丘而乃謂我為盜跖子以甘辭說子路而使從之使子路去其危冠解其長劍而受教於子天下皆曰孔丘能止暴禁非其卒之也子路欲殺衛君而事不成身菹於衛東門之上是子教之不至也子自謂才士聖人邪則再逐於魯削跡於衛窮於齊圍於陳蔡不容身於天下子教子路菹此患上無以為身下無以為人子之道豈足貴邪世之所高莫若黃帝黃帝尚不能全德而戰涿鹿之野流血百里堯不慈舜不孝禹偏枯湯放其主武王伐紂文王拘裏此六子者世之所高也孰論之皆以利惑其真而強反其情性其行乃甚可羞也世之所謂賢士伯夷叔齊伯夷叔齊辭孤竹之君而餓死於首陽之山骨肉不葬鮑焦飾行非世抱木而死申徒狄諫而不聽負石自投於河為魚鱉所食介子推至忠也自割其股以食文公文公後背之子推怒而去抱木而燔死尾生與女子期於梁下女子不來水至不去抱梁柱而死此四者無異於磔犬流豕操瓢而乞者皆離名輕死不念本養壽命者也世之所謂忠臣者莫若王子比幹伍子胥子胥沈江比幹剖心此二子者世謂忠臣也然卒為天下笑自上觀之至於子胥比幹皆不足貴也丘之所以說我者若告我以鬼事則我不能知也若告吾以人事者不過此矣皆吾所聞知也今吾告子以人之情目欲視色耳欲聽聲口欲察味志氣欲盈人上壽百歲中壽八十下壽六十除病瘐死喪憂患其中開口而笑者一月之中不過四五日而已矣天與地無窮人死者有時操有時之具而托於無窮之間忽然無異騏驥之馳過隙也不能悅其志意養其壽命者皆非通道者也丘之所言皆吾之所棄也亟去走歸無復言之子之道狂狂伋伋詐巧虛僞事也非可以全真也奚足論哉孔子再拜趨走出門上車執轡三失目芒然無見色若死灰據軾低頭不能出氣歸到魯東門外適遇柳下季柳下季曰今者闕然數日不見車馬有行色得微往見跖邪孔子仰天而歎曰然柳下季曰跖得無逆汝意若前乎孔子曰然丘所謂無病而自灸也疾走料虎頭編虎須幾不免虎口哉莊子雜篇漁父孔子遊乎緇帷之林休坐乎杏壇之上弟子讀書孔子弦歌鼓琴奏曲未半有漁父者下船而來須眉交白被髮揄袂行原以上距陸而止左手據膝右手持頤以聽曲終而招子貢子路二人俱對客指孔子曰彼何為者也子路對曰魯之君子也客問其族子路對曰族孔氏客曰孔氏者何治也子路未應子貢對曰孔氏者性服忠信身行仁義飾禮樂選人倫上以忠於世主下以化於齊民將以利天下此孔氏之所治也又問曰有土之君與子貢曰非也侯王之佐與子貢曰非也客乃笑而還行言曰仁則仁矣恐不免其身苦心勞形以危其真嗚呼遠哉其分於道也子貢還報孔子孔子推琴而起曰其聖人與乃下求之至於澤畔方將杖而引其船顧見孔子還向而立孔子反走再拜而進客曰子將何求孔子曰曩者先生有緒言而去丘不肖未知所謂竊待於下風幸聞咳唾之音以卒相丘也客曰嘻甚矣子之好學也孔子再拜而起曰丘少而修學以至於今六十九歲矣無所得聞至教敢不虛心客曰同類相從同聲相應固天之理也吾請釋吾之所有而經子之所以子之所以者人事也天子諸侯大夫庶人此四者自正治之美也四者離位而亂莫大焉官治其職人憂其事乃無所陵故田荒室露衣食不足征賦不屬妻妾不和長少無序庶人之憂也能不勝任官事不治行不清白群下荒怠功美不有爵祿不持大夫之憂也廷無忠臣國家昏亂工技不巧貢職不美春秋後倫不順天子諸侯之憂也陰陽不和寒暑不時以傷庶物諸侯暴亂擅相攘伐以殘民人禮樂不節財用窮匱人倫不飭百姓淫亂天子有司之憂也今子既上無君侯有司之勢而下無大臣職事之官而擅飾禮樂選人倫以化齊民不泰多事乎且人有八疵事有四患不可不察也非其事而事之謂之總莫之顧而進之謂之佞希意道言謂之諂不擇是非而言謂之諛好言人之惡謂之讒析交離親謂之賊稱譽詐僞以敗惡人謂之慝不擇善否兩容顏適偷拔其所欲謂之險此八疵者外以亂人內以傷身君子不友明君不臣所謂四患者好經大事變更身常以掛功名謂之叨專知擅事侵人自用謂之貪見過不更聞諫愈甚謂之很人同於己則可不同於己雖善不善謂之矜此四患也能去八疵無行四患而始可教已孔子愀然而歎再拜而起曰丘再逐於魯削跡於衛伐樹於宋圍於陳蔡丘不知所失而離此四謗者何也客淒然變容曰甚矣子之難悟也人有畏影惡跡而去之走者舉足愈數而跡愈多走愈疾而影不離身自以為尚遲疾走不休絶力而死不知處陰以休影處靜以息跡愚亦甚矣子審仁義之間察同異之際觀動靜之變適受與之度理好惡之情和喜怒之節而幾於不免矣謹修而身慎守其真還以物與人則無所纍矣今不修之身而求之人不亦外乎孔子愀然曰請問何謂真客曰真者精誠之至也不精不誠不能動人故強哭者雖悲不哀強怒者雖嚴不威強親者雖笑不和真悲無聲而哀真怒未發而威真親未笑而和真在內者神動於外是所以貴真也其用於人理也事親則慈孝事君則忠貞飲酒則歡樂處喪則悲哀忠貞以功為主飲酒以樂為主處喪以哀為主事親以適為主功成之美無一其跡矣事親以適不論所以矣飲酒以樂不選其具矣處喪以哀無問其禮矣禮者世俗之所為也真者所以受於天也自然不可易也故聖人法天貴真不拘於俗愚者反此不能法天而恤於人不知貴真祿祿而受變於俗故不足惜哉子之蚤湛於人僞而晚聞大道也孔子又再拜而起曰今者丘得遇也若天幸然先生不羞而比之服役而身教之敢問舍所在請因受業而卒學大道客曰吾聞之可與往者與之至於妙道不可與往者不知其道慎勿與之身乃無咎子勉之吾去子矣吾去子矣乃刺船而去延緣葦間顏淵還車子路受綏孔子不顧待水波定不聞音而後敢乘子路旁車而問曰由得為役久矣未嘗見夫子遇人如此其威也萬乘之主千乘之君見夫子未嘗不分庭伉禮夫子猶有倨傲之容今漁父杖逆立而夫子曲要磬折再拜而應得無太甚乎門人皆怪夫子矣漁父何以得此乎孔子伏軾而歎曰甚矣由之難化也湛於禮義有間矣而朴鄙之心至今未去進吾語汝夫遇長不敬失禮也見賢不尊不仁也彼非至仁不能下人下人不精不得其真故長傷身惜哉不仁之於人也禍莫大焉而由獨擅之且道者萬物之所由也庶物失之者死得之者生為事逆之則敗順之則成故道之所在聖人尊之今漁父之於道可謂有矣吾敢不敬乎莊子雜篇列禦寇魯哀公問於顏闔曰吾以仲尼為貞幹國其有瘳乎曰殆哉汲乎仲尼方且飾羽而畫從事華辭以支為旨忍性以視民而不知不信愛乎心宰乎神夫何足以上民彼宜女與豫頤與誤而可矣今使民離實學僞非所以視民也為後世慮不若休之難治也施於人而不忘非天布也商賈不齒雖以士齒之神者弗齒為外刑者金與木也為內刑者動與過也宵人之離外刑者金木訙之離內刑者陰陽食之夫免乎外內之刑者唯真人能之繹史孔子類記四引莊子孔子舍於沙丘見主人曰辨士也子路曰夫子何以識之曰其口窮踦其鼻空大其服博其睫流其舉足也高其踐地也深鹿合而牛舍韓非子內儲說上殷之法刑棄灰於街者子貢以為重問之仲尼仲尼曰知治之道也夫棄灰於街必掩人掩人人必怒怒則鬥鬥必三族相殘也此三族之道也雖刑之可也且夫重罰者人之所惡也而無棄灰人之所易也使人行之所易而無離所惡此治之道一曰殷之法棄灰於公道者斷其手子貢曰棄灰之罪輕斷手之罰重古人何太毅也曰無棄灰所易也斷手所惡也行所易不關所惡故人以為易故行之公孫龍子跡府楚王張繁弱之弓載忘歸之矢以射蛟兕於雲夢之圃而喪其弓左右請求之王曰止楚人遺弓楚人得之又何求焉仲尼聞之曰楚王仁義而未遂也亦曰人亡弓人得之而已何必楚呂氏春秋孟春紀貴公荊人有遺弓者而不肯索曰荊人遺之荊人得之又何索焉孔子聞之曰去其荊而可矣說苑至公楚共王出獵而遺其弓左右請求之共王曰止楚人遺弓楚人得之又何求焉仲尼聞之曰惜乎其不大亦曰人遺弓人得之而已何必楚也呂氏春秋孝行覽必己孔子行道而息馬逸食人之稼野人取其馬子貢請往說之畢辭野人不聽有鄙人始事孔子者曰請往說之因謂野人曰子不耕於東海吾不耕於西海也吾馬何得不食子之禾其野人大說相謂曰說亦皆如此其辨也獨如向之人解馬而與之淮南子人間訓孔子行遊馬失食農夫之稼野人怒取馬而係之子貢往說之卑辭而不能得也孔子曰夫以人之所不能聽說人譬以太牢享野獸以九韶樂飛鳥也豫之罪也非彼人之過也乃使馬圉往說之至見野人曰豫耕於東海至於西海吾馬之失安得不食子之苗野人大喜解馬而與之論衡自然宋人或刻木為楮葉三年乃成孔子曰使地三年乃成一葉則萬物之有葉者寡矣御覽六百十六引神仙傳孔子讀書老子見而問曰是何書也曰禮也聖人亦讀之老子云聖人可也汝曷為復讀之
