body:
  text: 主德五尚書大傳武丁祭成湯有雉飛升鼎耳而雊武丁問諸祖己祖己曰雉者野鳥也不當升鼎今升鼎者欲為用也無則遠方將有來朝者乎故武丁內反諸己以思先王之道三年編發重譯來朝者六國孔子曰吾於高宗肜日見德之有報之疾也尚書大傳略説孔子曰心之精神是謂聖史記補三皇本紀引韓詩自古封太山禪梁甫者萬有餘家仲尼觀之不能盡識白虎通封禪孔子曰升泰山觀易姓之王可得而數者七十有餘韓詩外傳三楚莊王寢疾卜之曰河為祟大夫曰請用牲莊王曰止古者聖王之祭不過望濉漳江漢楚之望也寡人雖不得河非所獲罪也遂不祭三日而疾有瘳孔子聞之曰楚莊王之霸其有方矣製節守職反身不二其霸不亦宜乎説苑君道楚昭王有疾卜之曰河為祟大夫請用三牲焉王曰止古者先王割地製土祭不過望江漢睢漳楚之望也禍福之至不是過也不穀雖不德河非所獲罪也遂不祭焉仲尼聞之曰昭王可謂知天道矣其不失國宜哉韓詩外傳七孔子曰明王有三懼一曰處尊位而恐不聞其過二曰得志而恐驕三曰聞天下之至道而恐不能行大戴禮主言孔子間居曾子侍孔子曰參今之君子惟士與大夫之言之間也其至於君子之言者甚希矣於乎吾主言其不出而死乎哀哉曾子起曰敢問何謂主言孔子不應曾子懼肅然摳衣下席曰弟子知其不孫也得夫子之間也難是以敢問也孔子不應曾子懼退負序而立孔子曰參汝可語明主之道與曾子曰不敢以為足也得夫子之間也難是以敢問孔子曰吾語女道者所以明德也德者所以尊道也是故非德不尊非道不明雖有國馬不教不服不可以取千里雖有博地衆民不以其地治之不可以霸主是故昔者明主內修七教外行三至七教修焉可以守三至行焉可以征七教不修雖守不固三至不行雖征不服是故明主之守也必折衝乎千里之外其征也衽席之上還師是故內修七教而上不勞外行三至而財不費此之謂明主之道也曾子曰敢問不費不勞可以為明乎孔子愀然揚麋曰參女以明主為勞乎昔者舜左禹而右皋陶不下席而天下治夫政之不中君之過也政之既中令之不行職事者之罪也明主奚為其勞也昔者明主關譏而不征市廛而不稅稅十取一使民之力歲不過三日入山澤以時有禁而無征此六者取財之路也明主舍其四者而節其二者明主焉取其費也曾子曰敢問何謂七教孔子曰上敬老則下益孝上順齒則下益悌上樂施則下益諒上親賢則下擇友上好德則下不隱上惡貪則下恥爭上強果則下廉恥民皆有別則貞則正亦不勞矣此謂七教七教者治民之本也教定是正矣上者民之表也表正則何物不正是故君先立於仁則大夫忠而士信民敦工璞商愨女憧婦空空七者教之志也七者布諸天下而不窕內諸尋常之室而不塞是故聖人等之以禮立之以義行之以順而民棄惡也如灌曾子曰弟子則不足道則至矣孔子曰參姑止又有焉昔者明主之治民有法必別地以州之分屬而治之然後賢民無所隱暴民無所伏使有司日省如時考之歲誘賢焉則賢者親不肖者懼使之哀鰥寡養孤獨恤貧窮誘孝悌選賢舉能此七者修則四海之內無刑民矣上之親下也如腹心則下之親上也如保子之見慈母也上下之相親如此然後令則從施則行因民既邇者説遠者來懷然後布指知寸布手知尺舒肘知尋十尋而索百步而堵三百步而裏千步而井三井而句烈三句烈而距五十里而封百里而有都邑乃為蓄積衣裘焉使處者恤行者有興亡是以蠻夷諸夏雖衣冠不同言語不合莫不來至朝覲於王故曰無市而民不乏無刑而民不違畢弋田獵之得不以盈宮室也征斂於百姓非以充府庫也慢怛以補不足禮節以損有餘故曰多信而寡貌其禮可守其信可復其迹可履其於信也如四時春秋冬夏其博有萬民也如飢而食如渴而飲下土之人信之夫暑熱凍寒遠若邇非道邇也及其明德也是以兵革不動而威用利不施而親此之謂明主之守也折衝乎千里之外此之謂也曾子曰敢問何謂三至孔子曰至禮不讓而天下治至賞不費而天下之士説至樂無聲而天下之民和明主篤行三至故天下之君可得而知也天下之士可得而臣也天下之民可得而用也曾子曰敢問何謂也孔子曰昔者明主以盡知天下良士之名既知其名又知其數既知其數又知其所在明主因天下之爵以尊天下之士此之謂至禮不讓而天下治因天下之祿以富天下之士此之謂至賞不費而天下之士説天下之士説則天下之明譽興此之謂至樂無聲而天下之民和故曰所謂天下之至仁者能合天下之至親者也所謂天下之至知者能用天下之至和者也所謂天下之至明者能選天下之至良者也此三者咸通然後可以征是故仁者莫大於愛人知者莫大於知賢政者莫大於官賢有土之君修此三者則四海之內拱而視然後可以征明主之所征必道之所廢者也彼廢道而不行然後誅其君致其征吊其民而不奪其財也故曰明主之征也猶時雨也至則民説矣是故行施彌博得親彌衆此之謂衽席之上乎還師大戴禮五帝德宰我問於孔子曰昔者豫聞諸榮伊令黃帝三百年請問黃帝者人邪抑非人邪何以至於三百年乎孔子曰豫禹湯文武成王周公可勝觀邪夫黃帝尚矣女何以為先生難言之宰我曰上世之傳隱微之説卒業之辨閽忽之意非君子之道也則豫之問也固矣孔子曰黃帝少典之子也曰軒轅生而神靈弱而能言幼而彗齊長而敦敏成而聰明治五氣設五量撫萬民度四方教熊罷貔豹虎以與赤帝戰於版泉之野三戰然後得行其志黃帝黼黻衣大帶黼裳乘龍扆雲以順天地之紀幽明之故死生之説存亡之難時播百穀草木故教化淳鳥獸昆蟲曆離日月星辰極畋土石金玉勞心力耳目節用水火材物生而民得其利百年死而民畏其神百年亡而民用其教百年故曰三百年宰我請問帝顓頊孔子曰五帝用説三王用度女欲一日辨聞古昔之説躁哉豫也宰我曰昔者豫也聞諸夫子曰小子無有宿問孔子曰顓頊黃帝之孫昌意之子也曰高陽洪淵以有謀疏通而知事養材以任地履時以象天依鬼神以製義治氣以教民潔誠以祭祀乘龍而至四海北至於幽陵南至於交趾西濟於流沙東至於蟠木動靜之物大小之神日月所照莫不祇勵宰我曰請問帝嚳孔子曰元囂之孫醓極之子也曰高辛生而神靈自言其名博施利物不於其身聰以知遠明以察微順天之義知民之急仁而威惠而信修身而天下服取地之財而節用之撫教萬民而利誨之曆日月而迎送之明鬼神而敬事之其色鬱鬱其德嶷嶷其動也時其服也士春夏乘龍秋冬乘馬黃黼黻衣執中而獲天下日月所照風雨所至莫不從順宰我曰請問帝堯孔子曰高辛之子也曰放勳其仁如天其知如神就之如日望之如雲富而不驕貴而不豫黃黼黻衣丹車白馬伯夷主禮龍夔教舞舉舜彭祖而任之四時先民治之流共工於幽州以變北狄放兜於崇山以變南蠻殺三苗於三危以變西戎殛鯀於羽山以變東夷其言不二其德不回四海之內舟輿所至莫不説夷宰我曰請問帝舜孔子曰蟜牛之孫瞽叟之子也曰重華好學孝友聞於四海陶家事親寬裕溫良教敦而知時畏天而愛民恤遠而親親承受大命依於倪皇睿明通知為天下王使禹敷士主名山川以利於民使後稷播種務勤嘉穀以作飲食羲和掌曆敬授民時使益行火以辟山萊伯夷主禮以節天下夔作樂以歌籲舞和以鍾鼓皋陶作士忠信疏通知民之情契作司徒教民孝友敬政率經其言不惑其德不慝舉賢而天下平南撫交趾大放鮮支渠廋氐羌北山戎發息慎東長鳥夷羽民舜之少也惡悴勞苦二十以孝聞乎天下三十在位嗣帝所五十乃死葬於蒼梧之野宰我曰請問禹孔子曰高陽之孫鯀之子也曰文命敏給克濟其德不回其仁可親其言可信聲為律身為度稱以上士亹穆穆為綱為紀巡九州通九道陂九澤度九山為神主為民父母左準繩右規矩履四時據四海平九州戴九天明耳目治天下舉皋陶與益以讚其身舉干戈以征不享不道無德之民四海之內舟車所至莫不賓服孔子曰豫大者如説民説至矣豫也非其人也宰我曰豫也不足誠也敬承命矣他日宰我以語人有為道諸夫子之所孔子曰吾欲以顏色取人於滅明邪改之吾欲以語言取人於豫邪改之吾欲以容貌取人於師邪改之宰我聞之懼不敢見大戴禮虞戴德公曰昔有虞戴德何以深慮何及高舉安取子曰君以聞之唯丘無以更也君之聞如未成也黃帝慕修之曰明法於天明開施教於民行此以上明於天化也物必起是故民命而弗改也公曰善哉以天教於民可以班乎子曰可哉雖可而弗由此以上知所以行斧鉞也父之於子天也君之於臣天也有子不事父有臣不事君是非反天而到行邪故有子不事父不順有臣不事君必刃順天作刑地生庶物是故聖人之教於民也率天如祖地能用民德是以高舉不過天深慮不過地質知而好仁能用民力此三常之禮明而名不蹇禮失則壞名失則惛是故上古不諱正天名也天子之宮四通正地事也天子禦珽諸侯禦荼大夫服笏正民德也斂此三者而一舉之戴天履地以順民事天子告朔於諸侯率天道而敬行之以示威於天下也諸侯內貢於天子率名槊地實也是以不至必誅諸侯相見卿為介以其教士畢行使仁守會朝於天子天子以歲二月為壇於東郊建五色設五兵具五味陳六律品奏五聲聽明教置離抗大侯規鵠堅物九卿佐三公三公佐天子天子踐位諸侯各以其屬就位乃升諸侯諸侯之教士教士執弓挾矢揖讓而升履物以射其地心端容色正時以學攴伎時有慶以地不時有讓以地天下之有道也有天子存國之有道也君得其正家之不亂也有仁父存是故聖人之教於民也以其近而見者稽其遠而明者天事曰明地事曰昌人事曰比兩以慶違此三者謂之愚民愚民曰姦姦必誅是以天下平而國家治民亦無貸居小不約居大則治衆則集寡則繆祀則得福以征則服此唯官民之上德也公曰三代之相授必更製典物道乎子曰否猷德保保惛乎前以小繼大變民示也公曰善哉子之察教我也子曰丘於君唯無言言必盡於他人則否公曰教他人則如何子曰否丘則不能昔商老彭及仲傀政之教大夫官之教士技之教庶人揚則抑抑則揚綴以德行不任以言庶人以言猶以夏後之狖懷袍褐也行不越境公曰善哉我則問政子事教我子曰君問已參黃帝之制製之大禮也公曰先聖之道斯為美乎子曰斯為美雖有美者必偏屬於斯昭天之福迎之以祥作地之福製之以昌興民之德守之以長公曰善哉大戴禮誥志公曰誥志無荒以會民義齋戒必敬會時必節犧牲必全齊盛必潔上下禋祀外內無失節其可以省怨遠災乎子曰丘未知其可以省怨也公曰然則何以事神子曰以禮會時夫民見其禮則上下援援則樂樂斯無憂以此怨省而亂不作也夫禮會其四時四孟四季五牲五穀順至必時其節也丘未知其可以遠災也公曰然則為此何以子曰知仁合則天地成天地成則庶物時庶物時則民財敬民財敬以時作時作則節事節事以動衆動衆則有極有極以使民則勸勸則有功有功則無怨無怨則嗣世久唯聖人是故政以勝衆非以陵衆衆以勝事非以傷事事以靖民非以征民故地廣而民衆非以為災長之祿也丘聞周太史曰政不率天下不由人則凡事易壞而難成虞史伯夷曰明孟也幽幼也明幽雌雄也雌雄迭興而順至正之統也日歸於西起明於東月歸於東起明於西虞夏之曆正建於孟春於時冰泮發蟄百草權輿瑞雉無釋物乃歲俱生於東以順四時卒於冬分於時雞三號卒明載於青色撫十二月節卒於醜日月成歲曆再閏以順天道此謂歲虞汁月天曰作明曰與維天是載地曰作昌曰與維地是事人曰作樂曰與維民是嬉民之動能不遠厥事民之悲色不遠厥德此謂表裏時合物之所生而蕃昌之道如此天生物地養物物備興而時用常節曰聖人主祭於天曰天子天子崩步於四川代於四山卒葬曰帝天作仁地作富人作治樂治不倦財富時節是故聖人嗣則治文王治以俟時湯治以伐亂禹治以移衆衆服以立天下堯貴以樂治時舉舜舜治以德使力在國統民如恕在家撫官而國安之勿變勸之勿沮民咸廢惡如進良上誘善而行罰百姓盡於仁而遂安之此古之明製之治天下也仁者為聖貴次力次美次射禦次古之治天下者必聖人聖人有國則日月不食星辰不隕勃海不運河不滿溢川澤不竭山不崩解陵不施穀川浴不處深淵不涸於時龍至不閉鳳降忘翼鷙獸忘攫爪鳥忘距蜂蠆不螫嬰兒蚊虻不食天駒洛出服河出圖自上世以來莫不降仁國家之昌國家之臧信仁是故不賞不罰如民咸盡力車不建戈遠邇咸服允使來往他賓畢極無怨無惡率惟懿德此無空禮無空名賢人並憂殘毒以時省舉良良舉善善恤民使仁日斆仁賓也大戴禮用兵公曰用兵者其由不祥乎子曰胡為其不祥也聖人之用兵也以禁殘止暴於天下也及後世貪者之用兵也以刈百姓危國家也公曰古之戎兵何世安起子曰傷害之生久矣與民皆生公曰蚩尤作兵與子曰否蚩尤庶人之貪者也及利無義不顧厥親以喪厥身蚩尤惛欲欲而無厭者也何器之能作蜂蠆挾螫而生見害而校以衛厥身者也人生有喜怒故兵之作與民皆生聖人利用而彌之亂人興之喪厥身詩云魚在在藻厥志在餌鮮民之生矣不如死之久矣校德不塞嗣武於孫子聖人愛百姓而憂海內及後世之人思其德必稱其仁故今之道堯舜禹湯文武者猶威致王今若存夫民思其德必稱其人朝夕祝之升聞皇天上神歆焉故永其世而豐其年也夏桀商紂羸暴於天下暴極不辜殺戮無罪不祥於天粒食之民布散厥親疏遠國老幼色是與而暴慢是親讒貸處穀法言法行處辟夭替天道逆亂四時禮樂不行而幼風是禦曆失製攝提失方鄒大無紀不告朔於諸侯玉瑞不行諸侯力政不朝於天子六蠻四夷交伐於中國於是降之災水旱臻焉霜雪大滿甘露不降百草蔫黃五穀不升民多夭疾六畜饣卒眥此太上之不論不議也夭傷厥身失墜天下夫天下之報殃於無德者必與其民公懼焉曰在民上者可以無懼乎哉大戴禮少間公曰今日少間我請言情於子子愀然變色遷席而辭曰君不可以言情於臣臣請言情於君君則不可公曰師之而不言情焉其私不同子曰否臣事君而不言情於君則不臣君而不言情於臣則不君有臣而不臣猶可有君而不君民無所錯手足公曰吾度其上下咸通之權其輕重居之準民之色目既見之鼓民之聲耳既聞之動民之德心既和之通民之欲兼而一之愛民親賢而教不能民庶説乎子曰説則説矣可以為家不可以為國公曰可以為家胡為不可以為國國之民家之民也子曰國之民誠家之民也然其名異不可同也同名同食曰同等唯不同等民以知極故天子昭有神於天地之間以示威於天下也諸侯修禮於內以事天子大夫修官守職以事其君士修四衛執技論力以聽乎大夫庶人仰視天文俯視地理力時使以聽乎父母此惟不同等民以可治也公曰善哉上與下不同乎子曰將以時同時不同上謂之間下謂之多疾君時同於民布政也民時同於君服聽也上下相報而終於施大猶已成發其小者遠猶已成發其近者將行重器先其輕者先清而後濁者天地也天政曰正地政曰生人政曰辨苟本正則華英必得其節以秀孚矣此官民之道也公曰善哉請少復進焉子曰昔堯取人民狀舜取人以色禹取人以言湯取人以聲文王取人以度此四代五王之取人以治天下如此公曰嘻善之不同也子曰何謂其不同也公曰同乎子曰同公曰人狀可知乎子曰不可知也公曰五王取人各有以舉之胡為人之不可知也子曰五王取人比而視相而望五王取人各以己焉是以同狀公曰以子相人何如子曰否丘則不能五王取人丘也傳聞之以委於君丘則否能亦又不能公曰我聞子之言始蒙矣子曰由君居之成於純胡為其蒙也雖古之治天下者豈生於異州哉昔虞舜以天德嗣堯布功散德制禮朔方幽都來服南撫交趾出入日月莫不率俾西王母來獻其白琯粒食之民昭然明視民明教通於四海海外肅慎北發渠搜氐羌來服舜有禹代興禹卒受命乃遷邑姚姓於陳作物配天修德使力民明教通於四海海之外肅慎北發渠搜氐羌來服禹崩十有七世乃有末孫桀即位桀不率先王之明德乃荒耽於酒淫泆於樂德昏政亂作宮高台汙池土察以民為虐粒食之民惛焉幾亡乃有商履代興商履循禮法以觀天子天子不説則嫌於死成湯卒受天命不忍天下粒食之民刈戮不得以疾死故乃放移夏桀散亡其佐乃遷姒姓於杞發厥明德順民天心嗇地作物配天製典慈民咸合諸侯作八政命於總章服禹功以修舜緒為副於天粒食之民昭然明視民明教通於四海海之外肅慎北發渠搜氐羌來服成湯卒崩殷德小破二十有二世乃有武丁即位開先祖之府取其明法以為君臣上下之節殷民更眩近者説遠者至粒食之民昭然明視武丁年崩殷德大破九世乃有末孫紂即位紂不率先王之明德乃上祖夏桀行荒耽於酒淫佚於樂德昏政亂作宮室高台汙池土察以為民虐粒食之民忽然幾亡乃有周昌霸諸侯以佐之紂不説諸侯之聽於周昌則嫌於死乃退伐崇許魏以客事天子文王卒受天命作物配天製無用行三明親親尚賢民明教通於四海海之外肅慎北發渠搜氐羌來服君其志焉或傒將至也公曰大哉子之教我政也列五王之德煩煩如繁諸乎子曰君無譽臣臣之言未盡請盡臣之言君如財之曰於此有功匠焉有利器焉有措扶焉以時令其藏必周密發如用之可以知古可以察今可以事親可以事君可用於生又用之死吉凶並興禍福相生卒反生福大德配天公愀然其色曰難立哉子曰臣願君之立知如以觀聞也時天之氣用地之財以生殺於民民之死不可以教公曰我行之其可乎子曰唯此在君君曰足臣恐其不足君曰不足舉其前必舉其後舉其左必舉其右君既教矣安能無善公籲焉其色曰大哉子之教我製也政之豐也如未之成也子曰君知未成言未盡也凡草木根鞁傷則枝葉必偏枯偏枯是為不實穀亦如之上失政大及小人畜穀公曰所謂失政者若夏商之謂乎子曰否若夏商者天奪之魄不生德焉公曰然則何以謂失政子曰所謂失政者疆蔞未虧人民未變鬼神未亡水土未灊糟者猶糟實者猶實玉者猶玉血者猶血酒者猶酒優以繼湛政出自家門此之謂失政也非天是反人自反臣故曰君無言情於臣君無假人器君無假人名公曰善哉公羊襄二十九年何休解詁孔子曰三皇設言民不違五帝畫象世順機三王肉刑揆漸加應世黠巧姦偽多初學記九引七經義綱孔子曰天子之德感天地洞八方以化合神者稱皇德合天者稱帝德合仁義者稱王藝文類聚十一引帝王世紀孔子稱天子之德感天地洞八方是以化合神者稱皇德合天地者稱帝仁義合者稱王史記商君傳孔丘有言曰推賢而戴者進聚不肖而王者退後漢書翟黼傳黼上疏孔子曰吐珠於澤誰能不含後漢書李雲傳雲上書孔子曰帝者諦也後漢書五行志注引魏志高堂隆對孔子曰災者修類應行精祲相感以戒人君荀子王制孔子曰大節是也小節是也上君也大節是也小節一出焉一入焉中君也大節非也小節雖是也吾無觀其餘矣荀子哀公魯哀公問舜冠於孔子孔子不對三問不對哀公曰寡人問舜冠於子何以不言也孔子曰古之王者有務而拘領者矣其政好生而惡殺焉是以鳳在列樹麟在郊野烏鵲之巢可俯而窺也君不此問而問舜冠所以不對也荀子哀公魯哀公問於孔子曰寡人生於深宮之中長於婦人之手寡人未嘗知哀也未嘗知憂也未嘗知勞也未嘗知懼也未嘗知危也孔子曰君之所問聖君之問也丘小人也何足以知之曰非吾子無所聞之也孔子曰君入廟門而右登自阼階仰視榱棟俯見几筵其器存其人亡君以此思哀則哀將焉不至矣君昧爽而櫛冠平明而聽朝一物不應亂之端也君以此思憂則憂將焉不至矣君平明而聽朝日昃而退諸侯之子孫必有在君之末庭者君以此思勞則勞將焉不至矣君出魯之四門以望魯四郊亡國之虛則必有數蓋焉君以此思懼則懼將焉不至矣且丘聞之君者舟也庶人者水也水則載舟水則覆舟君以此思危則危將焉不至矣新序雜事四哀公問孔子曰寡人生乎深宮之中長於婦人之手寡人未嘗知哀也未嘗知憂也未嘗知勞也未嘗知懼也未嘗知危也孔子辟席曰吾君之問乃聖君之問也丘小人也何足以言之哀公曰否吾子就席微吾子無所聞之矣孔子就席曰然君入廟門升自阼階仰見榱棟俯見几筵其器存其人亡君以此思哀則哀將安不至矣君昧爽而櫛冠平旦而聽朝一物不應亂之端也君以此思憂則憂將安不至矣君平旦而聽朝日昃而退諸侯之子孫必有在君之門庭者君以此思勞則勞將安不至矣君出魯之四門以望魯之四郊亡國之墟列必有數矣君以此思懼則懼將安不至矣丘聞之君者舟也庶人者水也水則載舟水則覆舟君以此思危則危將安不至矣夫執國之柄履民之上懍乎如以腐索禦奔馬易曰履虎尾詩曰如履薄冰不亦危乎哀公再拜曰寡人雖不敏請事斯語矣荀子哀公魯哀公問於孔子曰紳委章甫有益於仁乎孔子蹴然曰君號然也資衰苴杖者不聽樂非耳不能聞也服使然也黼衣黻裳者不茹葷非口不能味也服使然也且丘聞之好肆不守折長者不為市竊其有益與其無益君其知之矣群書治要尸子治天下鄭簡公謂子産曰飲酒之不樂鍾鼓之不鳴寡人之任也國家之不乂朝廷之不治與諸侯交之不得志子之任也子産治鄭國無盜賊道無餓人孔子曰若鄭簡公之好樂雖抱鍾而朝可也群書治要尸子處道孔子曰君者盂也民者水也盂方則水方盂圓則水圓上何好而民不從韓非子外儲説左上孔子曰為人君者猶盂也民猶水也盂方水方盂圜水圜御覽七十九引尸子子貢曰古者黃帝四面信乎孔子曰黃帝取合己者四人使治四方不計而耕不約而成此之謂四面御覽四百九十引尸子魯哀公問孔子曰魯有大忘徙而忘其妻有諸孔子曰此忘之小者也昔商紂有臣曰王子須務為諂使其君樂須臾之樂而忘終身之憂説苑敬慎魯哀公問孔子曰豫聞忘之甚者徙而忘其妻有諸乎孔子對曰此非忘之甚者也忘之甚者忘其身哀公曰可得聞與對曰昔夏桀貴為天子富有天下不修禹之道毀壞辟法裂絶世祀荒淫於樂沈酗於酒其臣有左師觸龍者諂諛不止湯誅桀左師觸龍者身死四支不同壇而居此忘其身者也哀公愀然變色曰善御覽六百二十引尸子孔子謂子夏曰汝知君子之為君乎子夏曰魚失水則死水失魚猶為水也孔子曰商汝知之韓非子內儲説上七術魯哀公問於孔子曰鄙諺曰莫衆而迷今寡人舉事與群臣慮之而國愈亂其故何也孔子對曰明主之問臣一人知之一人不知也如是者明主在上群臣直議於下今群臣無不一辭同軌乎季孫者舉魯國盡化為一君雖問境內之人猶不免於亂也韓非子外儲説左上晉文公攻原裹十日糧遂與大夫期十日至原十日而原不下擊金而退罷兵而去士有從原中出者曰原三日即下矣群臣左右諫曰夫原之食竭力盡矣君姑待之公曰吾與士期十日不去是亡吾信也得原失信吾不為也遂罷兵而去原人聞曰有君如彼其信也可無歸乎乃降公衛人聞曰有君如彼其信也可無從乎乃降公孔子聞而記之曰攻原得衛者信也韓非子外儲説右上堯欲傳天下於舜鯀諫曰不祥哉孰以天下而傳之於匹夫乎堯不聽舉兵而誅殺鯀於羽山之郊共工又諫曰孰以天下而傳之於匹夫乎堯不聽又舉兵而誅共工於幽州之都於是天下莫敢言無傳天下於舜仲尼聞之曰堯之知舜之賢非其難者也夫至乎誅諫者必傳之舜乃其難也一曰不以其所疑敗其所察則難也韓非子難一曆山之農者侵畔舜往耕焉期年糝畝正河濱之漁者爭坻舜往漁焉期年而讓長東夷之陶者器苦窳舜往陶焉期年而器牢仲尼歎曰耕漁與陶非舜官也而舜往為之者所以救敗也舜其信仁乎乃躬耕處苦而民從之故曰聖人之德化乎韓非子難一晉文公將與楚人戰召舅犯問之曰吾將與楚人戰彼衆我寡為之奈何舅犯曰臣聞之繁禮君子不厭忠信戰陳之間不厭詐偽君其詐之而已矣文公辭舅犯因召雍季而問之曰我將與楚人戰彼衆我寡為之奈何雍季對曰焚林而田偷取多獸後必無獸以詐遇民偷取一時後必無復文公曰善辭雍季以舅犯之謀與楚人戰以敗之歸而行爵先雍季而後舅犯群臣曰城濮之事舅犯謀也夫用其言而後其身可乎文公曰此非君所知也夫舅犯言一時之權也雍季言萬世之利也仲尼聞之曰文公之霸也宜哉既知一時之權又知萬世之利呂氏春秋孝行覽義賞昔晉文公將與楚人戰於城濮召咎犯而問曰楚衆我寡奈何而可咎犯對曰臣聞繁禮之君不足於文繁戰之君不足於詐君亦詐之而已文公以咎犯言告雍季雍季曰竭澤而漁豈不獲得而明年無魚焚藪而田豈不獲得而明年無獸詐偽之道雖今偷可後將無復非長術也文公用咎犯之言而敗楚人於城濮反而為賞雍季在上左右諫曰城濮之功咎犯之謀也君用其言而賞後其身或者不可乎文公曰雍季之言百世之利也咎犯之言一時之務也焉有以一時之務先百世之利者乎孔子聞之曰臨難用詐足以卻敵反而尊賢足以報德文公雖不終始足以霸矣韓非子難二昔者文王侵盂克莒舉酆三舉事而紂惡之文王乃懼請入洛西之地赤壤之國方千里以請解炮烙之刑天下皆説仲尼聞之曰仁哉文王輕千里之國而請解炮烙之刑智哉文王出千里之地而得天下之心呂氏春秋季春紀先己孔子見魯哀公哀公曰有語寡人曰為國家者為之堂上而已矣寡人以為迂言也孔子曰此非迂言也丘聞之得之於身者得之人失之於身者失之人不出於門戶而天下治者其惟知反於己身者乎説苑政理衛靈公謂孔子曰有語寡人為國家者謹之於廟堂之上而國家治矣其可乎孔子曰可愛人者則人愛之惡人者則人惡之知得之己者亦知得之人所謂不出於環堵之室而知天下者知反之己者也呂氏春秋貴直論過理糟丘酒池肉圃為格雕柱而桔諸侯不適也刑鬼侯之女而取其環截涉者脛而視其髓殺梅伯而遺文王其醢不適也文王貌受以告諸侯作為璿室築為頃宮剖孕婦而觀其化殺比幹而視其心不適也孔子聞之曰其竅通則比幹不死矣夏商之之所以亡也陸賈新語無為孔子曰移風易俗豈家至之哉先之於身而已矣淮南子齊俗訓晉平公出言而不當師曠舉琴而撞之跌衽宮壁左右欲塗之平公曰舍之以此為寡人失孔子聞之曰平公非不痛其體也欲來諫者也新序雜事四晉人伐楚三舍不止大夫曰請擊之莊王曰先君之時晉不伐楚及孤之身而晉伐楚是寡人之過也如何其辱諸大夫也大夫曰先君之時晉不伐楚及臣之身而晉伐楚是臣之罪也請擊之莊王俯泣而起拜諸大夫晉人聞之曰君臣爭以過為在己且君下其臣猶如此所謂上下一心三軍同力未可攻也乃夜還師孔子聞之曰楚莊王霸其有方矣下士以一言而敵還以安社稷其霸不亦宜乎詩曰柔遠能邇以定我王此之謂也新序雜事五哀公問於孔子曰寡人聞之東益宅不祥信有之乎孔子曰不祥有五而東益不與焉夫損人而益己身之不祥也棄老取幼家之不祥也擇賢用不肖國之不祥也老者不教幼者不學俗之不祥也聖人伏匿天下之不祥也故不祥有五而東益不與焉詩曰各敬爾儀天命不又未聞東益之與為命也文選孫子荊為石苞與孫皓書注引新序孔子曰聖人雖生異世相襲若規矩説苑君道虞人與芮人質其成於文王入文王之境則見其人民之讓為士大夫入其國則見其士大夫讓為公卿二國者相謂曰其人民讓為士大夫其士大夫讓為公卿然則此其君亦讓為天下而不居矣二國者未見文王之身而讓其所爭以為間田而反孔子曰大哉文王之道乎其不可加矣不動而變無為而成敬慎恭已而虞芮自平故書曰惟文王之敬忌此之謂也説苑政理子貢問治民於孔子孔子曰懍懍焉如以腐索禦奔馬子貢曰何其畏也孔子曰夫通達之國皆人也以道導之則吾畜也不以道導之則吾仇也若何而毋畏説苑政理仲尼見梁君梁君問仲尼曰吾欲長有國吾欲列都之得吾欲使民安不惑吾欲使士竭其力吾欲使日月當時吾欲使聖人自來吾欲使官府治為之奈何仲尼對曰千乘之君萬乘之主問於丘者多矣未嘗有如主君問丘之術也然而盡可得也丘聞之兩君相親則長有國君惠臣忠則列都之得無殺不辜毋釋罪人則民不惑益士祿賞則竭其力尊天敬鬼則日月當時善為刑罰則聖人自來尚賢使能則官府治梁君曰豈有不然哉説苑尊賢齊景公問於孔子曰秦穆公其國小處僻而霸何也對曰其國小而志大雖處僻而其政中其舉果其謀和其令不偷親舉五羖大夫於係縲之中與之語三日而授之政以此取之雖王可也霸則小矣説苑尊賢魯哀公問於孔子曰當今之時君子誰賢對曰衛靈公公曰吾聞之其閨門之內姑姊妹無別對曰臣觀於朝廷未觀於堂陛之間也靈公之弟曰公子渠牟其知足以治千乘之國其信足以守之而靈公愛之又有士曰王林國有賢人必進而任之無不達也不能達退而與分其祿而靈公尊之又有士曰慶足國有大事則進而治之無不濟也而靈公説之史蠙去衛靈公邸舍三月琴瑟不禦待史蠙之入也而後入臣是以知其賢也説苑正諫孔子曰良藥苦於口利於病忠言逆於耳利於行故武王諤諤而昌紂默默而亡君無諤諤之臣父無諤諤之子兄無諤諤之弟夫無諤諤之婦士無諤諤之友其亡可立而待故曰君失之臣得之父失之子得之兄失之弟得之夫失之婦得之士失之友得之故無亡國破家悖父亂子放兄棄弟狂夫淫婦絶交敗友説苑權謀齊桓公將伐山戎孤竹使人請助於魯魯君進群臣而謀皆曰師行數千里入蠻夷之地必不反矣於是魯許助之而不行齊已伐山戎孤竹而欲移兵於魯管仲曰不可諸侯未親今又伐遠而還誅近鄰鄰國不親非霸王之道君之所得山戎之寶器者中國之所鮮也不可以不進周公之廟乎桓公乃分山戎之寶獻之周公之廟明年起兵伐莒魯下令丁男悉發五尺童子皆至孔子曰聖人轉禍為福報怨以德此之謂也潛夫論慎微仲尼曰湯武非一善而王桀紂非一惡而亡故代之廢興也在其所積積善多者雖有一惡是謂誤失未足以亡積惡多者雖有一善是謂誤未足以王孔子曰雖明天子熒惑必謀禍福之征慎察用之風俗通五孔子曰火上不可握熒惑班變不可息志帝應其修無極
