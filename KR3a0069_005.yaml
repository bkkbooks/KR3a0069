body:
  text: 臣術六尚書大傳孔子曰文王得四臣丘亦得四友焉自吾得回也門人加親是非胥附邪自吾得賜也遠方之士日至是非奔輳邪自吾得師也前有輝後有光是非先後邪自吾得由也惡言不至於門是非禦侮邪文王有四臣以免虎口丘亦有四友以禦侮韓詩外傳五孔子侍坐於季孫季孫之宰通曰君使人假馬其與之乎孔子曰吾聞君取於臣謂之取不曰假季孫悟告宰通曰今以往君有取謂之取無曰假韓詩外傳七孔子曰昔者周公事文王行無專製事無由己身若不勝衣言若不出口有奉持於前洞洞焉若將失之可謂子矣武王崩成王幼周公承文武之業履天子之位聽天子之政征夷狄之亂誅管蔡之罪抱成王而朝諸侯誅賞製斷無所顧問威動天地振恐海內可謂能武矣成王壯周公致政北面而事之請然後行無伐矜之色可謂臣矣故一人之身能三變者所以應時也韓詩外傳七子貢問大臣子曰齊有鮑叔鄭有子皮子貢曰否齊有管仲鄭有東裏子産孔子曰産薦也子貢曰然則薦賢賢於賢曰知賢智也推賢仁也引賢義也有此三者又何加焉説苑臣術子貢問孔子曰今之人臣孰為賢孔子曰吾未識也往者齊有鮑叔鄭有子皮賢者也子貢曰然則齊無管仲鄭無子産乎子曰賜汝徒知其一不知其二汝聞進賢為賢邪用力為賢邪子貢曰進賢為賢子曰然吾聞鮑叔之進管仲也聞子皮之進子産也未聞管仲子産有所進也劉子薦賢昔子貢問於孔子曰誰為大賢子曰齊有鮑叔鄭有子皮子貢曰齊無管仲鄭無子産乎子曰吾聞進賢為賢非賢為不肖鮑叔薦管仲子皮薦子産未聞二子有所舉也晏子春秋諫下晏子使於魯比其反也景公使國人起大台之役歲寒不已凍餒之者鄉有焉國人望晏子晏子至已復事公乃坐飲酒樂晏子曰君若賜臣臣請歌之歌曰庶民之言曰凍水洗我若之何太上靡散我若之何歌終喟然歎而流涕公就止之曰夫子曷為至此殆為大台之役夫寡人將速罷之晏子再拜出而不言遂如大台執朴鞭其不務者曰吾細人也皆有蓋廬以辟燥濕君為一台而不速成何為國人皆曰晏子助天為虐晏子歸未至而君出令趣罷役車馳而人趨仲尼聞之喟然歎曰古之善為人臣者聲名歸之君禍災歸之身入則切磋其君之不善出則高譽其君之德義是以雖事惰君能使垂衣裳朝諸侯不敢伐其功當此道者其晏子是邪晏子春秋問下梁丘據問晏子曰子事三君君不同心而子俱順焉仁人固多心乎晏子對曰嬰聞之順愛不懈可以使百姓強暴不忠不可以使一人一心可以事百君三心不可以事一君仲尼聞之曰小子識之晏子以一心事百君者也晏子春秋雜上晏子使魯仲尼使門弟子往觀子貢反報曰孰謂晏子習於禮乎夫禮曰登階不曆堂上不趨授玉不跪今晏子皆反此孰謂晏子習於禮者晏子既已有事於魯君退見仲尼仲尼曰夫禮登階不曆堂上不趨授玉不跪夫子反此乎晏子曰嬰聞兩楹之間君臣有位焉君行其一臣行其二君之來速是以登階曆堂上趨以及位也君授玉卑故跪以下之且吾聞之大者不逾間小者出入可也晏子出仲尼送之以賓客之禮不計之義維晏子為能行之韓詩外傳四晏子聘魯上堂則趨授玉則跪子貢怪之問孔子曰晏子知禮乎今者晏子來聘魯上堂則趨授玉則跪何也孔子曰其有方矣待其見我我將問焉俄而晏子至孔子問之晏子對曰夫上堂之禮君行一臣行二今君行疾臣敢不趨乎今君之授幣也卑臣敢不跪乎孔子曰善禮中又有禮賜寡使也何足以識禮也詩曰禮儀卒度笑語卒獲晏子之謂也晏子春秋外篇上仲尼曰靈公汙晏子事之以整齊莊公壯晏子事之以宣武景公奢晏子事之以恭儉君子也相三君而善不通下晏子細人也晏子聞之見仲尼曰嬰聞君子有譏於嬰是以來見如嬰者豈能以道食人者哉嬰之宗族待嬰而祀其先人者數百家與齊國之間士待嬰而舉火者數百家臣為此仕者也如臣者豈能以道食人者哉晏子出仲尼送之以賓客之禮再拜其辱反命門弟子曰救民之姓而不誇行補三君而不有晏子果君子也長短經懼誡引尸子昔周公反政孔子非之曰周公其不聖乎以天下讓不為兆人也三國志魏文帝紀注許芝奏引春秋大傳周公何以不之魯蓋以為雖有繼體守文之君不害聖人受命而王周公反政尸子以為孔子非之以為周公不聖不為兆民也三國志魏文帝紀注輔國將軍等奏孔子曰周公其為不聖乎以天下讓是天地日月輕去萬物也韓非子外儲説右下衛君入朝於周周行人問其號對曰諸侯辟疆周行人卻之曰諸侯不得與天子同號衛君乃自更曰諸侯毀而後內之仲尼聞之曰遠哉禁逼虛名不以借人況實事乎韓非子難一襄子圍於晉陽中出圍賞有功者五人高赫為賞首張孟談曰晉陽之事赫無大功今為賞首何也襄子曰晉陽之事寡人國家危社稷殆矣吾群臣無有不驕侮之意者惟赫子不失君臣之禮是以先之仲尼聞之曰善賞哉襄子賞一人而天下為人臣者不敢失禮矣呂氏春秋孝行覽義賞趙襄子出圍賞有功者五人高赫為首張孟談曰晉陽之中赫無大功賞而為首何也襄子曰寡人之國危社稷殆身在憂約之中與寡人交而不失君臣之禮者惟赫吾是以先之仲尼聞之曰襄子可謂善賞矣賞一人而天下之為人臣莫敢失禮説苑復恩趙襄子見圍於晉陽罷圍賞有功之臣五人高赫無功而受上賞五人皆怒張孟談謂襄子曰晉陽之中赫無大功今與之上賞何也襄子曰吾在拘厄之中不失臣主之禮唯赫也子雖有功皆驕寡人與赫上賞不亦可乎仲尼聞之曰趙襄子可謂善賞士乎賞一人而天下之人臣莫敢失君臣之禮矣呂氏春秋孟春紀去私晉平公問於祁黃羊曰南陽無令其誰可而為之祁黃羊對曰解狐可平公曰解狐非子之仇邪對曰君問可非問臣之仇也平公曰善遂用之國人稱善焉居有間平公又問祁黃羊曰國無尉其誰可而為之對曰午可平公曰午非子之子邪對曰君問可非問臣之子也平公曰善又遂用之國人稱善焉孔子聞之曰善哉祁黃羊之論也外舉不避仇內舉不避子祁黃羊可謂公矣呂氏春秋不苟論武王至殷郊係墮五人禦於前莫肯之為曰吾所以事君者非係也武王左釋白羽右釋黃鉞勉而自為係孔子聞之曰此五人者之所以為王者佐也不肖主之所弗安也故天子有不勝細民者天下有不勝千乘者呂氏春秋士容論務大孔子曰燕爵爭善處於一屋之下母子相哺也區區焉相樂也自以為安矣灶突決上棟焚燕爵顏色不變是何也不知禍之將及之也不亦愚乎為人臣而免於燕爵之智者寡矣鹽鐵論通有昔孫叔敖相楚妻不衣帛馬不秣粟孔子曰不可大儉極下此蟋蟀所為作也鹽鐵論褒賢季孟之權三桓之富不可及也孔子為之曰微為人臣權均於君富侔於國者亡説苑臣術簡子有臣尹綽赦厥簡子曰厥愛我諫我必不於衆人中綽也不愛我諫我必於衆人中尹綽曰厥也愛君之醜而不愛君之過也臣愛君之過而不愛君之醜孔子曰君子哉尹綽而訾不譽也説苑復恩孔子曰北方有獸其名曰蹶前足鼠後足兔是獸也甚矣其愛蛩蛩巨虛也食得甘草必齧以遺蛩蛩巨虛蛩蛩巨虛見人將來必負蹶以走蹶非性之愛蛩蛩巨虛也為其假足之故也二獸者亦非性之愛蹶也為其得甘草而遺之故也夫禽獸昆蟲猶知比假而相有報也況於士君子之欲興名利於天下者乎説苑尊賢介子推行年十五而相荊仲尼聞之使人往視還曰廊下有二十五俊士堂上有二十五老人仲尼曰合二十五人之智智於湯武並二十五人之力力於彭祖以治天下其固免矣説苑尊賢孔子間居喟然而歎曰銅鞮伯華而無死天下其有定矣子路曰願聞其為人也何若孔子曰其幼也敏而好學其壯也有勇而不屈其老也有道而能以下人子路曰其幼也敏而好學則可其壯也有勇而不屈則可夫有道又誰下哉孔子曰由不知也吾聞之以衆攻寡而無不消也以貴下賤無不得也昔在周公旦製天下之政而下士七十人豈無道哉欲得士之故也夫有道而能下於天下之士君子乎哉説苑正諫諫有五一曰正諫二曰降諫三曰忠諫四曰戇諫五曰諷諫孔子曰吾從其諷諫矣乎夫不諫則危君固諫則危身與其危君寧危身危身而終不用則諫亦無功矣智者度君權時調其緩急而處其宜上不敢危君下不以危身故在國而國不危在身而身不殆白虎通諫諍孔子曰諫有五吾從諷之諫事君進思盡忠退思補過去而不訕諫而不露説苑正諫楚昭王欲之荊台遊司馬子綦進諫曰荊台之遊左洞庭之波右彭蠡之水南望獵山下臨方淮其樂使人遺老而忘死人君遊者盡以亡其國願大王勿往遊焉王曰荊台乃吾地也有地而遊之子何為絶我遊乎怒而擊之於是令尹子西駕安車四馬徑於殿下曰今日荊台之遊不可不觀也王登車而拊其背曰荊台之遊與子共樂之矣步馬十里引轡而止曰臣不敢下車願得有道大王肯聽之乎王曰第言之令尹子西曰臣聞之為人臣而忠其君者爵祿不足以賞也為人臣而諛其君者刑罰不足以誅也若司馬子綦者忠臣也若臣者諛臣也願大王殺臣之軀罰臣之家而祿司馬子綦王曰若我能止聽公子獨能禁我遊耳後世遊之無有極時奈何令尹子西曰欲禁後世易耳願大王山陵崩阤為陵於荊台未嘗有持鍾鼓管弦之樂而遊於父之墓上者也於是王還車卒不遊荊台令罷先置孔子從魯聞之曰美哉令尹子西諫之於十里之前而權之於百世之後者也説苑雜言齊高廷問於孔子曰廷不曠山不直地衣蓑提執精氣以問事君之道願夫子告之孔子曰貞以幹之敬以輔之待人無倦見君子則舉之見小人則退之去爾惡心而忠與之敏其行修其禮千里之外親如兄弟若行不敏禮不合對門不通矣抱朴子外篇逸民昔顏回死魯定公將躬吊焉使人訪仲尼仲尼曰凡在邦內皆臣也定公乃升自東階行君禮焉長短經臣術子貢曰陳靈公君臣宣淫於朝泄冶諫而殺之是與比干同也可謂仁乎子曰比干於紂親則叔父官則少師忠款之心在於存宗廟而已故以必死爭之冀身死之後而紂悔悟其本情在乎仁也泄冶位為下大夫無骨肉之親懷寵不去以區區之一身欲正一國之淫昏死而無益可謂懷矣詩云民之多僻無自立辟其泄冶之謂乎
