body:
  text: 勸學一尚書大傳略説子曰君子不可以不學見人不可以不飭不飭無貌無貌不敬不敬無禮無禮不立夫遠而有光者飭也近而逾明者學也譬之如墟邪水潦集焉菅蒲生焉從上觀之誰知其非源水也大戴禮勸學孔子曰野哉君子不可以不學見人不可以不飾不飾無貌無貌不敬不敬無禮無禮不立夫遠而有光者飾也近而逾明者學也譬之如汙邪水潦焉莞蒲生焉從上觀之誰知其非源泉也説苑建本孔子曰鯉君子不可以不學見人不可以不飾不飾則無根無根則失理失理則不忠不忠則失禮失禮則不立夫遠而有光者飾也近而逾明者學也譬之如汙池水潦注焉菅蒲生之從上觀之知其非源也韓詩外傳一孔子曰君子有三憂弗知可無憂與知而不學可無憂與學而不行可無憂與韓詩外傳六子曰不學而好思雖知不廣矣學而慢其身雖學不尊矣不以誠立雖立不久矣誠未著而好言雖言不信矣美材也而不聞君子之道隱小物以害大物者災必及身矣韓詩外傳六孔子曰可與言終日而不倦者其惟學乎其身體不足觀也勇力不足憚也族姓不足稱也宗祖不足道也而可以聞於四方而昭於諸侯者其惟學乎説苑建本孔子曰可以與人終日而不倦者其惟學乎其身體不足觀也其勇力不足憚也其先祖不足稱也其族姓不足道也然而可以開四方而昭於諸侯者其惟學乎韓詩外傳八孔子燕居子貢攝齊而前曰弟子事夫子有年矣才竭而智罷振於學問不敢復進請一休焉孔子曰賜也欲焉休乎曰賜欲休於事君孔子曰詩雲夙夜匪懈以事一人為之若此其不易也若之何其休也曰賜欲休於事父母孔子曰詩雲孝子不匱永錫爾類為之若此其不易也如之何其休也曰賜欲休於事兄弟孔子曰詩雲妻子好合如鼓瑟琴兄弟既翕和樂且耽為之若此其不易也如之何其休也曰賜欲休於耕田孔子曰詩雲晝爾於茅宵爾索抃亟其乘屋其始播百穀為之若此其不易也若之何其休也子貢曰君子亦有休乎孔子曰闔棺兮乃止播兮不知其時之易遷兮此之謂君子所休也荀子大略子貢問於孔子曰賜倦於學矣願息事君孔子曰詩雲溫恭朝夕執事有恪事君難事君焉可息哉然則賜願息事親孔子曰詩雲孝子不匱永錫爾類事親難事親焉可息哉然則賜願息於妻子孔子曰詩雲刑於寡妻至於兄弟以禦於家邦妻子難妻子焉可息哉然則賜願息於朋友孔子曰詩雲朋友攸攝攝以威儀朋友難朋友焉可息哉然則賜願息耕孔子曰詩雲晝爾於茅宵爾索抃亟其乘屋其始播百穀耕難耕焉可息哉然則賜無息者乎孔子曰望其壙皋如也填如也鬲如也此則知所息矣子貢曰大哉死乎君子息焉小人休焉列子天瑞子貢倦於學告仲尼曰願有所息仲尼曰生無所息子貢曰然則賜息無所乎仲尼曰有焉耳望其壙如也宰如也墳如也鬲如也則知所息矣子貢曰大哉死乎君子息焉小人伏焉仲尼曰賜汝知之矣人胥知生之樂未知生之苦知老之憊未知老之佚知死之惡未知死之息也大戴禮勸學孔子曰吾嘗終日思矣不如須臾之所學吾嘗跂而望之不如升高而博見也升高而招非臂之長也而見者遠順風而呼非聲加疾也而聞者著假車馬者非利足也而致千里假舟楫者非能水也而絶江海君子之性非異也而善假於物也荀子宥坐孔子曰吾有恥也吾有鄙也吾有殆也幼不能強學老無以教之吾恥之去其故鄉事君而達卒遇故人曾無舊言吾鄙之與小人處者吾殆之也荀子宥坐孔子曰如垤而進吾與之如丘而止吾已矣今學曾未如疣贅則具然欲為人師荀子宥坐子貢觀於魯廟之北堂出而問於孔子曰向者賜觀於太廟之北堂吾亦未輟還復瞻被九蓋皆繼彼有説邪匠過絶邪孔子曰太廟之堂亦嘗有説官致良工因麗節文非無良材也蓋曰貴文也荀子子道子路問於孔子曰君子亦有憂乎孔子曰君子其未得也則樂其意既已得之又樂其治是以有終身之樂無一日之憂小人其未得也則憂不得既已得之又恐失之是以有終身之憂無一日之樂也説苑雜言子路問孔子曰君子亦有憂乎孔子曰無也君子之修其行未得則樂其意既已得又樂其知是以有終身之樂無一日之憂小人則不然其未之得則憂不得既已得之又恐失之是以有終日之憂無一日之樂荀子法行孔子曰君子有三思而不可不思也少而不學長無能也老而不教死無思也有而不施窮無與也是故君子少思長則學老思死則教有思窮則施禦覽六百七引慎子孔子曰丘少而好學晚而聞道此以博矣群書治要尸子勸學夫子曰車唯恐地之不堅也舟唯恐水之不深也有其器則以人之難為易夫道以人之難為易也群書治要尸子處道孔子曰欲知則問欲能則學欲給則豫欲善則肄國亂則擇其邪人去之則國治矣胸中亂則擇其邪欲而去則德正矣意林一引尸子孔子雲誦詩讀書與古人居讀書誦詩與古人謀莊子雜篇讓王孔子謂顏回曰回來家貧居卑胡不仕乎顏回對曰不願仕回有郭外之田五十畝足以給掞粥郭內之田十畝足以為絲麻鼓琴足以自娛所學夫子之道者足以自樂也回不願仕孔子愀然變容曰善哉回之意丘聞之知足者不以利自纍也審自得者失之而不懼行修於內者無位而不怍丘誦之久矣今於回而後見之是丘之得也呂氏春秋季春紀尊師子貢問孔子曰後世將何以稱夫子孔子曰吾何足以稱哉勿已者則好學而不厭好教而不倦其惟此邪淮南子要略孔子修成康之道述周公之訓以教七十子使服其衣冠修其篇籍故儒者之學生焉説苑建本孔子謂子路曰汝何好子路曰好長劍孔子曰非此之問也請以汝之所能加之以學豈可及哉子路曰學亦有益乎孔子曰夫人君無諫臣則失政士無教友則失德狂馬不釋其策操弓不返於檠木受繩則直人受諫則聖受學重問孰不順成毀仁惡士且近於刑君子不可以不學子路曰南山有竹弗揉自直斬而射之通於犀革又何學為乎孔子曰括而羽之鏃而砥礪之其入不益深乎子路拜曰敬受教哉説苑建本子路問於孔子曰請釋古之學而行由之意可乎孔子曰不可昔者東夷慕諸夏之義有女其夫死為之內私壻終身不嫁不嫁則不嫁矣然非貞節之義也蒼梧之弟娶妻而美好請與兄易忠則忠矣然非禮也今子欲釋古之學而行子之意庸知子用非為是用是為非乎不順其初雖欲悔之難哉説苑貴德子路持劍孔子問曰由安用此乎子路曰善古者固以善之不善古者固以自衛孔子曰君子以忠為質以仁為衛不出環堵之內而聞千里之外不善以忠化寇暴以仁圍何必持劍乎子路曰由也請攝齊以事先生矣中論治學孔子曰弗學何以行弗思何以得小子勉之斯可以為人師矣中論修本孔子曰弟子勉之汝毋自舍人猶舍汝況自舍乎人違汝其遠矣中論修本孔子謂子張曰師吾欲聞彼將以改此也聞彼而不改此雖聞何益中論修本孔子曰小人何以壽為一日之不能善矣久惡惡之甚也
