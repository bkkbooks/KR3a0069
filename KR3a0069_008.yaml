body:
  text: 論政九尚書大傳子曰古之聽民者察貧窮哀孤獨矜寡宥老幼不肖無告有過必赦小罪勿增大罪勿累老弱不受刑有過不受罰故老而受刑謂之悖弱而受刑謂之漊不赦有過謂之賊逆率過以小謂之枳故與其殺不辜寧失有罪與其增以有罪寧失過以有赦尚書大傳孔子如衛人謂曰公甫不能聽訟子曰非公甫之不能聽獄也公甫之聽獄也有罪者懼無罪者恥民近禮矣尚書大傳子曰聽訟雖得其指必哀矜之死者不可復生斷者不可復續也書曰哀矜折獄尚書大傳子曰吳越之俗男女同川而浴其刑重而不勝由無禮也中國之教內外有分男女不同椸枷不同巾櫛其刑重而勝由有禮也語曰夏後不殺不刑罰有罪而民不輕犯死罰二千鸑尚書大傳子曰今之聽民者求所以殺之古之聽民者求所以生之不得其所以生之之道乃刑殺君與臣會焉尚書大傳孔子曰古之刑者省之今之刑者繁之其教古者有禮然後有刑是以刑省也今也反是無禮而齊之以刑是以繁也書曰伯夷降典禮折民以刑謂有禮然後有刑也又曰茲殷罰有倫今也反是諸侯不同聽每君異法聽無有倫是故法之難也後漢五行志注引尚書大傳鄭注孔子說春秋曰政以不由王出不得為政則王君出政之號也韓詩外傳二高牆豐上激下未必崩也降雨興流潦至則崩必先矣草木根荄淺未必撅也飄風興暴雨墜則撅必先矣君子居是邦也不崇仁義尊賢臣以理萬物未必亡也一旦有非常之變諸侯交爭人趨車馳迫然禍至乃始憂愁乾喉焦唇仰天而歎庶幾乎望其安也不亦晚乎孔子曰不慎其前而悔其後嗟乎雖悔無及矣說苑建本豐牆紘下未必崩也流行潦至壞必先矣樹本淺根垓不深未必撅也飄風起暴雨至拔必先矣君子居於是國不崇仁義不尊賢臣未必亡也然一旦有非常之變車馳人走指而禍至乃始幹喉焦唇仰天而歎庶幾焉天其救之不亦難乎孔子曰不慎其前而悔其後雖悔無及矣韓詩外傳二傳曰孔子云美哉顏無父之禦也馬知後有與而輕之知上有人而愛之馬親其正而愛其事如使馬能言彼將必曰樂哉今日之騶也至於顏淪少衰矣馬知後有輿而輕之知上有人而敬之馬親其正而敬其事如使馬能言彼將必曰騶來其人之使我也至於顏夷而衰焉馬知後有輿而重之知上有人而畏之馬親其正而畏其事如使馬能言彼將必曰騶來騶來女不騶彼將殺女故御馬有法矣禦民有道矣法得則馬和而歡道得則民安而集詩曰執轡如組兩驂如舞此之謂也韓詩外傳三傳曰宋大水魯人吊之曰天降淫雨害於粢盛延及君地以憂執政使臣敬吊宋人應之曰寡人不仁齋戒不修使民不時天加以災又遺君憂拜命之辱孔子聞之曰宋國其庶幾矣弟子曰何謂孔子曰昔桀紂不任其過其亡也忽焉成湯文王知任其過其興也勃焉過而改之是不過也宋人聞之乃夙興夜寐吊死問疾戮力宇內三歲年豐政平韓詩外傳六子路治蒲三年孔子過之入境而善之曰由恭敬以信矣入邑曰善哉由忠信以寬矣至庭曰善哉由明察以斷矣子貢執轡而問曰夫子未見由而三稱善可得聞乎孔子曰入其境田疇甚易草萊甚辟此恭敬以信故民盡力入其邑墉屋甚尊樹木甚茂此忠信以寬其民不偷入其庭甚閑此明察以斷故民不擾也韓詩外傳八子賤治單父其民附孔子曰告丘之所以治之者對曰不齊時發倉廩振困窮補不足孔子曰是小人附耳未也對曰賞有能招賢才退不肖孔子曰是士附耳未也對曰所父事者三人所兄事者五人所友者十有二人所師者一人孔子曰所父事者三人所兄事者五人足以教弟矣所友者十有二人足以祛壅蔽矣所師者一人足以慮無失策舉無敗功矣惜乎不齊為之大功乃與堯舜參矣說苑政理孔子謂宓子賤曰子治單父而眾說語丘所以為之者曰不齊父其父子其子恤諸孤而哀喪紀孔子曰善小節也小民附矣猶未足也曰不齊也所父事者三人所兄事者五人所友者十一人孔子曰父事三人可以教孝矣兄事五人可以教弟矣友十一人可以教學矣中節也中民附矣猶未足也曰此地民有賢於不齊者五人不齊事之皆教不齊所以治之術孔子曰欲其大者乃於此在矣昔者堯舜清微其身以聽觀天下務來賢人夫舉賢者百福之宗也而神明之主也不齊之所治者小也不齊所治者大其與堯舜繼矣大戴禮子張問入官子張問入官於孔子孔子曰安身取譽為難也子張曰安身取譽如何孔子曰有善勿專教不能勿搢己過勿發失言勿踦不善辭勿遂行事勿留君子入官自行此六路者則身安譽至而政從矣且夫忿數者獄之所由生也距諫者慮之所以塞也慢易者禮之所以失也墮怠者時之所以後也奢侈者財之所以不足也專者事之所以不成也曆者獄之所由生也君子入官除七路者則身安譽至而政從矣故君子南面臨官大城而公治之精知而略行之合是忠信考是大倫存是美惡而進是利而除是害而無求其報焉而民情可得也故臨之無抗民之志勝之無犯民之言量之無狡民之辭養之無擾於時愛之勿寬於刑言此則身安譽至而民自得也故君子南面臨官所見邇故明不可弊也所求邇故不勞而得也所以治者約故不用眾而譽至也法象在內故不遠源泉不竭故天下積也而木不寡短長人得其量故治而不亂故六者貫乎心藏乎誌形乎色發乎聲若此則身安而譽至而民自得也故君子南面臨官不治則亂至亂至則爭爭之至又反於亂是故寡裕以容其民慈愛以優柔之而民自得也已故躬行者政之始也調悅者情之道也善政行易則民不怨言調悅則民不辨法仁在身則民顯以佚之也財利之生征矣貪以不得善政必簡矣苟以亂之善言必聽矣詳以失之規諫日至煩以不聽矣言之善者在所日聞行之善者在所能為故上者民之儀也有司執政民之表也邇臣便辟者群臣仆之倫也故儀不正則民失誓表弊則百姓亂邇臣便辟不正廉而群臣服汙矣故不可不慎乎三倫矣故君子修身反道察說而邇道之服存焉是故夫工女必自擇絲麻良工必自擇齎材賢君良上必自擇左右始故佚諸取人勞於治事勞於取人佚於治事故君子欲譽則謹其所便欲名則謹於左右故上者辟如緣木者務高而畏下者滋甚六馬之離必於四面之衢民之離道必於上之佚政也故上者尊嚴而絕百姓者卑賤而神民而愛之則存惡之則亡也故君子南面臨官貴而不驕富恭有本能圖修業居久而譚情邇暢而及乎遠察一而關於多一物治而萬物不亂者以身為本者也故君子蒞民不可以不知民之性達諸民之情既知其以生有習然後民特從命也故世舉則民親之政均則民無怨故君子蒞民不臨以高不道以遠不責民之所不能今臨之明王之成功則民嚴而不迎也道以數年之業則民疾疾則辟矣故古者冕而前旒所以蔽明也統纊塞耳所以弇聰也故水至清則無魚人至察則無徒故枉而直之使自得之優而柔之使自求之揆而度之使自索之民有小罪必以其善以赦其過如死使之生其善也是以上下親而不離故惠者政之始也政不正則不可教也不習則民不可使也故君子欲言之見信也者莫若先虛其內也欲政之速行也者莫若以身先之也欲民之速服也者莫若以道禦之也故不先以身雖行必鄰矣不以道禦之雖服必強矣故非忠信則無可以取親於百姓矣外內不相應則無可以取信者矣四者治民之統也大戴禮千乘公曰千乘之國受命於天子通其四疆教其書社循其灌廟建其宗主設其四佐列其五官處其朝市為仁如何子曰不仁國不化公曰何如之謂仁子曰不淫於色子曰立妃設如太廟然乃中治中治不相陵不相陵斯庶嬪遧遧則事上靜靜斯潔信在中朝大夫必慎以恭出會謀事必敬以慎言長幼小大必中度此國家之所以崇也立子設如宗社宗社先示威威明顯見辨爵集德是以母弟官子咸有臣誌莫敢援於外大夫中婦私謁不行此所以使五官治執事政也夫政以教百姓百姓齊以嘉善故蠱佞不生此之謂良民國有道則民昌此國家之所以大遂也卿設如大門大門顯美小大尊卑中度開明閉幽內祿出災以順天道近者閑焉遠者稽焉君發禁宰而行之以時通於地散布於小理天之災祥地寶豐省及民共饗其祿共任其災此國家之所以和也國有四輔輔卿也卿設如四體毋易事毋假名毋重食凡事尚賢進能使知事爵不世能之不愆凡民戴名以能食力以時成以事立此所以使民讓也民咸孝弟而安讓此以怨省而亂不作也此國之所以長也下無用則國家富上有義則國家治長有禮則民不爭立有神則國家敬兼而愛之則民無怨心以為無命則民不偷昔者先王立此六者而樹之德此國家之所以茂也設其四佐而官之司徒典春以教民之不則時不若不令成長幼老疾孤寡以時通於四疆有闔而不通有煩而不治則民不樂生不利衣食凡民之藏貯以及川之神明加於民者發圖功謀齋戒必敬會時必節日曆巫祝執伎以守官俟命而作祈王年禱民命及畜穀蜚征庶虞草方春三月緩施生育動作百物於時有事享於皇祖皇考朝孤子八人以成春事司馬司夏以教士車甲凡士執伎論功修四衛強股肱質射禦才武聰慧治眾長卒所以為儀綴於國出可以為率誘於軍旅四方諸侯之遊士國中賢餘秀興閱焉方夏三月養長秀蕃庶物於時有事享於皇祖皇考爵士之有慶者七人以成夏事司寇司秋以聽獄訟治民之煩亂執權變民中凡民之不刑崩本以要間作起不敬以欺惑憧愚作於財賄六畜五穀曰盜誘居室家有君子曰義子女專曰妖飭五兵及木石曰賊以中情出小曰間大曰講利辭以亂屬曰讒以財投長曰貸凡犯天子之禁陳刑製辟以追國民之不率上教者夫是故一家三夫道行三人飲食哀樂平無獄方秋三月收斂以時於時有事嘗新於皇祖皇考食農夫九人以成秋事司空司冬以制度製地事準揆山林規表衍沃畜水行衰濯浸以節四時之事治地遠近以任民力以節民食太古食壯之食攻老之事公曰功事不少而餱糧不多乎子曰太古之民秀長以壽者食也在今之民羸醜以胔者事也太古無遊民食節事時民各安其居樂其宮室服事信上上下交信地移民在今之世上治不平民治不和百姓不安其居不樂其宮老疾用財壯狡用力於茲民遊薄事貪食於茲民憂古者殷書為成男成女名屬升於公門此以氣食得節作事得時勸有功夏服君事不及靯冬服君事不及凍是故年穀不成天之饑饉道無堇者在今之世男女屬散名不升於公門此以氣食不節作事不成天之饑饉於時委民不得以疾死是故立民之居必於中國之休地因寒暑之和六畜育焉五穀宜焉辨輕重製剛柔和五味以節食時事東辟之民曰夷精以僥至於大遠有不火食者矣南辟之民曰蠻信以樸至於大遠有不火食者矣西辟之民曰戎勁以剛至於大遠有不火食者矣北辟之民曰狄肥以戾至於大遠有不火食者矣及中國之民曰五方之民有安民和味咸有實用利器知通之信令之及量地度居邑有城郭立朝市地以度邑以度民以觀安危距封後利先慮久固依固可守為奧可久能節四時之事霜露時降方冬三月草木落庶虞藏五穀必畜於倉於時有事蒸於皇祖皇考息國老六人以成冬事民咸知孤寡之必不失也咸知有大功之必進等也咸知用勞力之必以時息也推而內之水火入也弗之顧矣而況有強適在前有君長正之者乎公曰善哉大戴禮四代公曰四代之政刑論其明者可以為法乎子曰何哉四代之政刑皆可法也公曰以我行之其可乎子曰否不可臣願君之立知而以觀聞也四代之政刑君若用之則緩急將有所不節不節君將約之約之卒將棄法棄法是無以為國家也公曰巧匠輔繩而斫胡為其棄法也子曰心未之度習未之狎此以數逾而棄法也夫規矩準繩鈞衡此昔者先王之所以為天下也小以及大近以知遠今日行之可以知古可以察今其此邪水火金木土穀此謂六府廢一不可進二不可民並用之今日行之可以知古可以察今其此邪昔夏商之未興也伯夷謂此二帝之眇公曰長國治民恒幹論政之大體以教民辨曆大道以時地性興民之陽德以教民事上服周室之典以順事天子修政勤禮以交諸侯大節無廢小眇其後乎子曰否不可後也詩云東有開明於時雞三號以興庶虞庶虞動蜚征作嗇民執功百草咸淳地傾水流之是以天子盛服朝日於東堂以教敬示威於天下也是以祭祀昭有神明燕食昭有慈愛宗廟之事昭有義率禮朝廷昭有五官無廢甲胄之戒昭果毅以聽天子曰崩諸侯曰薨大夫曰卒士曰不祿庶人曰死昭哀哀愛無失節是以父慈子孝兄愛弟敬此昔先王之所先施於民也君而後此則為國家失本矣公曰善哉子察教我也子曰向也君之言善執國之節也君先眇而後善中備以君子言可以知古可以察今奐然而興民壹始公曰是非吾言也吾一聞於師也子籲焉其色曰嘻君行道矣公曰道邪子曰道也公曰吾未能知人未能取人子曰君何為不觀器視才公曰視可明乎子曰可以表儀公曰願學之子曰平原大藪瞻其草之高豐茂者必有怪鳥獸居之且草可財也如艾而夷之其地必宜五穀高山多林必有怪虎豹蕃孕焉深淵大川必有蛟龍焉民亦如之君察之可以見器見才矣公曰吾猶未也子曰群然戚然頤然然踖然柱然抽然首然僉然湛然淵淵然淑淑然齊齊然節節然穆穆然皇皇然見才色修聲不視聞怪物恪命不改誌舌不更氣君見之舉也得之取也有事事也事必與食食必與位無相越逾昔虞舜天德嗣堯取相十有六人如此公曰嘻美哉子道廣矣曰由德徑徑吾恐惛而不能用也何以哉公曰請問圖德何尚子曰聖知之華也知仁之實也仁信之器也信義之重也義利之本也委利生孽公曰嘻言之至也道天地以民輔之聖人何尚子曰有天德有地德有人德此謂三德三德率行乃有陰陽陽曰德陰曰刑公曰善哉再聞此矣陽德何出子曰陽德出禮禮出刑刑出慮慮則節事於近而揚聲於遠公曰善哉載事何以子曰德以監位位以充局局以觀功功以養民民於此乎上公曰祿不可後乎子曰食為味味為氣氣為誌發誌為言發言定名名以出信信載義而行之祿不可後也公曰所謂民與天地相參者何謂也子曰天道以視地道以履人道以稽廢一曰失統恐不長饗國公愀然其色子曰君藏玉惟慎用之雖慎敬而勿愛民亦如之執事無貳五官有差喜無並愛卑無加尊淺無測深小無招大此謂楣機楣機賓薦不蒙昔舜征薦此道於堯堯親用之不亂上下公曰請問民征子曰無以為也難行公曰願學之幾必能子曰貪於味不讓妨於政願富不久妨於政慕寵假貴妨於政治民惡眾妨於政為父不慈妨於政為子不孝妨於政大縱耳目妨於政好色失誌妨於政好見小利妨於政變從無節撓弱不立妨於政剛毅犯神妨於政鬼神過節妨於政幼勿與眾克勿與比依勿與謀放勿與遊徼勿與事臣聞之弗慶非事君也君聞之弗用以亂厥德臣將慶其簡者蓋人有可知者焉貌色聲眾有美焉必有美質在其中者矣貌色聲眾有惡焉必有惡質在其中者矣此者伯夷之所後出也子曰伯夷建國建政修國修政公曰善哉大戴禮小辯公曰寡人欲學小辯以觀於政其可乎子曰否不可社稷之主愛日日不可得學不可以辯是故昔者先王學齊大道以觀於政天子學樂辯風制禮以行政諸侯學禮辯官政以行事以尊事天子大夫學德別義矜行以事君士學順辯言以遂誌庶人聽長辯禁農以行力如此猶恐不濟奈何其小辯乎公曰不辯則何以為政子曰辯而不小夫小辯破言小言破義小義破道道小不通通道必簡是故循弦以觀於樂足以辯風矣爾雅以觀於古足以辯言矣傳言以象反舌皆至可謂簡矣夫道不簡則不行不行則不樂夫亦固十期之變由不可既也而況天下之言乎曰微子之言吾壹樂辯言子曰辯言之樂不若治政之樂辯言之樂不下席治政之樂皇於四海夫政善則民說民說則歸之如流水親之如父母諸侯初入而後臣之安用辯言公曰然則吾何學而可子曰禮樂而力忠信其君其習可乎公曰多與我言忠信而不可以入患子曰毋乃既明忠信之備而口倦其君則不可而有明忠信之備而又能行之則可立待也君朝而行忠信百官承事忠滿於中而發於外刑於民而放於四海天下其孰能患之公曰請學忠信之備子曰唯社稷之主實知忠信若丘也綴學之徒安知忠信公曰非吾子問之而焉也子三辭將對公曰強避子曰強侍丘聞大道不隱丘言之君發之於朝行之於國一國之人莫不知何一之強辟丘聞之忠有九知知忠必知中知中必知恕知恕必知外知外必知德知德必知政知政必知官知官必知事知事必知患知患必知備若動而無備患而弗知死亡而弗知安與知忠信內思畢必曰中以應實曰知恕內恕度曰知外外內參意曰知德德以柔政曰知政正義辯方曰知官官治物則曰知事事戒不虞曰知備毋患曰樂樂義曰終淮南子泰族訓孔子曰小辯破言小利破義小藝破道小見不達達必簡河以逶蛇故能遠山以陵遲故能高陰陽無為故能和道以優柔故能化魯語下季康子欲以田賦使冉有訪諸仲尼仲尼不對私於冉有曰求來女不聞乎先王制土籍田以力而砥其遠邇賦裏以入而量其有無任力以夫而議其老幼於是乎有鰥寡孤疾有軍旅之出則征之無則已其歲收田一井出稯禾秉芻缶米不是過也先王以為足若子季孫欲其法也則有周公之籍矣若犯法則苟而賦又何訪焉春秋繁露王道臧孫辰請糴於齊孔子曰君子為國必有三年之積一年不孰乃請糴失君之職也春秋繁露身之養重於義仲尼曰國有道雖加刑也無刑國無道雖殺之不可勝也白虎通三教引樂稽燿嘉顏回尚三教變虞夏何如曰教者所以追補敗政靡弊溷濁謂之治也舜之承堯無為易也漢書刑法志孔子曰古之知法者能省刑本也今之知法者不失有罪末矣又曰今之聽獄者求所以殺之古之聽獄者求所以生之晏子春秋問上景公問於晏子曰為政何患晏子對曰患善惡之不分公曰何以察之對曰審擇左右左右善則百僚各得其所宜而善惡分孔子聞之曰此言也信矣善進則不善無由入矣不善進則善無由入矣說苑政理齊侯問於晏子曰為政何患對曰患善惡之不分公曰何以察之對曰審擇左右左右善則百僚各得其所宜而善惡分孔子聞之曰此言也信矣善言進則不善無由入矣不進善言則善無由入矣荀子正論孔子曰天下有道盜其先變乎荀子宥坐孔子為魯司寇有父子訟者孔子拘之三月不別其父請止孔子舍之季孫聞之不悅曰是老也欺予語予曰為國家必以孝今殺一人以戮不孝又舍之冉子以告孔子慨然歎曰嗚呼上失之下殺之其可乎不教其民而聽其獄殺不辜也三軍大敗不可斬也獄犴不治不可刑也罪不在民故也嫚令謹誅賊也令有時斂也無時暴也不教而責成功虐也已此三者然後刑可即也書曰義刑義殺勿庸以即予維曰未有順事言先教也故先王既陳之以道上先服之若不可尚賢以綦之若不可廢不能以單之綦三年而百姓往矣邪民不從然後俟之以刑則民知罪矣詩曰尹氏太師維周之氐秉國之均四方是維天子是庳卑民不迷是以威厲而不試刑錯而不用此之謂也今之世則不然亂其教繁其刑其民迷惑而陷焉則從而製之是以刑彌繁而邪不勝三尺之岸而虛車不能登也百仞之山任負登車焉何則陵遲故也數仞之牆而民不逾也百仞之山而豎子馮而遊焉陵遲故也今夫世之陵遲亦久矣而能使民勿逾乎詩曰周道如砥其直如矢君子所履小人所視眷焉顧之潸然出涕豈不哀哉詩曰瞻彼日月悠悠我思道之雲遠曷雲能來子曰伊稽首不其有來乎韓詩外傳三傳曰魯有父子訟者康子欲殺之孔子曰未可殺也夫民父子訟之為不義久矣是則上失其道上有道是人亡矣訟者聞之請無訟康子曰治民以孝殺一不義以僇不孝不亦可乎孔子曰否不教而聽其獄殺不辜也三軍大敗不可誅也獄讞不治不可刑也上陳之教而先服之則百姓從風矣邪行不從然後俟之以刑則民知罪矣夫一仞之牆民不能逾百仞之山童子登遊焉陵遲故也今其仁義之陵遲久矣能謂民無逾乎詩曰俾民不迷昔之君子道其百姓不使迷是以威厲而刑措不用也故形其仁義謹其教道使民目晰焉而見之使民耳晰焉而聞之使民心晰焉而知之則道不迷而民誌不惑矣詩曰示我顯德行故道義不易民不由也禮樂不明民不見也詩曰周道如砥其直如矢言其易也君子所履小人所視言其明也眷言顧之潸焉出涕哀其不聞禮教而就刑誅也夫散其本教而待之刑辟猶決其牢而發以毒矢也亦不哀乎故曰未可殺也昔者先王使民以禮譬之如禦也刑者鞭策也今猶無轡銜而鞭策以禦也欲馬之進則策其後欲馬之退則策其前禦者以勞而馬亦多傷矣今猶此也上憂勞而民多罹刑詩曰人而無禮胡不遄死為上無禮則不免乎患為下無禮則不免乎刑上下無禮胡不遄死康子避席再拜曰仆雖不敏請承此語矣孔子退朝門人子路難曰父子訟道邪孔子曰非也子路曰然則夫子胡為君子而免之也孔子曰不戒責成害也慢令致期暴也不教而誅賊也君子為政避此三者且詩曰載色載笑匪怒伊教說苑政理魯有父子訟者康子曰殺之孔子曰未可殺也夫民不知子父訟之不善者久矣是則上過也上有道是人亡矣康子曰夫治民以孝為本今殺一人以戮不孝不亦可乎孔子曰不孝而誅之是虐殺不辜也三軍大敗不可誅也獄訟不治不可刑也上陳之教而先服之則百姓從風矣躬行不從而後俟之以刑則民知罪矣夫一仞之牆民不能逾百仞之山童子升而遊焉陵遲故也今是仁義之陵遲久矣能謂民弗逾乎詩曰俾民不迷昔者君子導其百姓不使迷是以威厲而不至刑錯而不用也於是訟者聞之乃請無訟長短經政體孔子曰上失其道而殺其下非禮也故三軍大敗不可斬獄犴不知不可刑何也上教之不行罪不在人故也夫慢令謹誅賊也征斂無時暴也不誡責成虐也政無此三者然後刑即可也陳道德以先服之猶不可則尚賢以勸之又不可則廢不能以憚之而猶有邪人不從化者然後待之以刑矣御覽六百三十三引慎子孔子云有虞氏不賞不罰夏後氏賞而不罰殷人罰而不賞周人罰且賞罰禁也賞使也群書治要屍子發蒙孔子曰臨事而懼希不濟韓非子內儲說上七術魯人燒積澤天北風火南倚恐燒國哀公懼自將眾輒救火者左右無人盡逐獸而火不救乃召問仲尼仲尼曰夫逐獸者樂而無罰救火者苦而無賞此火之所以無救也哀公曰善仲尼曰事急不及以賞救火者盡賞之則國不足以賞於人請徒行罰哀公曰善於是仲尼乃下令曰不救火者比降北之罪逐獸者比入禁之罪令下未遍而火已救矣韓非子外儲說左下孔子相衛弟子子皋為獄吏刖人足所刖者守門人有惡孔子於衛君者曰尼欲作亂衛君欲執孔子孔子走弟子皆逃子皋從出門跀危引之而逃之門下室中吏追不得夜半子皋問跀危曰吾不能虧主之法令而親刖子之足是子報仇之時也而子何故乃肯逃我我何以得此於子跀危曰吾斷足也固吾罪當之不可奈何然方公之獄治臣也公傾側法令先後臣以言欲臣之免也甚而臣知之及獄決罪定公憱然不說形於顏色臣見又知之非私臣而然也夫天性仁心固然也此臣之所以說而德公也韓非子外儲說左下孔子曰善為吏者樹德不能為吏者樹怨概者平量者也吏者平法者也治國者不可失平也說苑至公子羔為衛政刖人之足衛之君臣亂子羔走郭門郭門閉刖者守門曰於彼有缺子羔曰君子不逾曰於彼有竇子羔曰君子不遂曰於此有室子羔入追者罷子羔將去謂刖者曰吾不能虧損主之法令而親刖子之足吾在難中此乃子之報怨時也何故逃我刖者曰斷足固我罪也無可奈何君之治臣也傾側法令先後臣以法欲臣之免於法也臣知之獄決罪定臨當論刑君愀然不樂見於顏色臣又知之君豈私臣哉天生仁人之心其固然也此臣之所以脫君也孔子聞之曰善為吏者樹德不善為吏者樹怨公行之也其子羔之謂歟韓非子外儲說左下仲尼曰與其使民諂下也寧使民諂上韓非子外儲說右上季孫相魯子路為郈令魯以五月起眾為長溝當此之時子路以其私秩粟為漿飯要作溝者於五父之衢而餐之孔子聞之使子貢往覆其飯擊毀其器曰魯君有民子奚為乃餐之子路怫然怒攘肱而入請曰夫子疾由之為仁義乎所學於夫子者仁義也仁義者與天下共其所有而同其利者也今以由之秩粟而餐民不可何也孔子曰由之野也吾以女知之女徒未及也女故如是之不知禮也女之餐之為愛之也夫禮天子愛天下諸侯愛竟內大夫愛官職士愛其家過其所愛曰侵今魯君有民而子擅愛之是子侵也不亦誣乎言未卒而季孫使者至讓曰肥也起民而使之先生使弟子令徒役而餐之將奪肥之民邪孔子駕而去魯說苑臣術子路為蒲令備水災與民春修溝瀆為人煩苦故予人一簞食一壺漿孔子聞之使子貢復之子路忿然不悅往見夫子曰由也以暴雨將至恐有水災故與人修溝瀆以備之而民多匱於食故與人一簞食一壺漿而夫子使賜止之何也夫子止由之行仁也夫子以仁教而禁其行仁也由也不受子曰爾以民為餓何不告於君發倉廩以給食之而汝以私饋之是汝不明君之惠見汝之德義也速己則可矣否則爾之受罪不久矣子路心服而退也韓非子難三葉公子高問政於仲尼仲尼曰政在說近而來遠哀公問政於仲尼仲尼曰政在選賢齊景公問政於仲尼仲尼曰政在節財三公出子貢問曰三公問夫子政一也夫子對之不同何也仲尼曰葉都大而國小民有背心故曰政在說近而來遠魯哀公有大臣三人外障距諸侯四鄰之士內比周而以愚其君使宗廟不埽除社稷不血食者必是三臣也故曰政在選賢齊景公築雍門為路寢一朝而以三百乘之家賜者三故曰政在節財尚書大傳略說子貢曰葉公問政於夫子子曰政在附近而來遠魯哀公問政子曰政在於論臣齊景公問政子曰政在於節用三君問政夫子應之不同然則政有異乎夫子曰荊之地廣而都狹民有離誌焉故曰在於附近而來遠哀公有臣三人內比周以惑其君外障距諸侯賓客以蔽其明故曰政在論臣齊景公奢於台榭淫於苑囿五官之樂不解一旦賜人百乘之家者三故曰節用說苑政理子貢曰葉公問政於夫子夫子曰政在附近而來遠魯哀公問政於夫子夫子曰政在於諭臣齊景公問政於夫子夫子曰政在於節用三君問政於夫子夫子應之不同然則政有異乎孔子曰夫荊之地廣而都狹民有離誌焉故曰在於附近而來遠哀公有臣三人內比周公以惑其君外障距諸侯賓客以蔽其明故曰政在諭臣齊景公奢於台榭淫於苑囿五官之樂不解一旦而賜人百乘之家者三故曰政在於節用此三者政也詩不雲乎亂離斯瘼爰其適歸此傷離散以為亂者也匪其止共惟王之卬此傷奸臣蔽主以為亂者也相亂蔑資曾莫惠我師此傷奢侈不節以為亂者也察此三者之所欲政其同乎哉呂氏春秋先識覽察微魯國之法魯人為人臣妾於諸侯有能贖之者取其金於府子貢贖魯人於諸侯來而讓不取其金孔子曰賜失之矣自今以往魯人不贖人矣取其金則無損於行不取其金則不復贖人矣呂氏春秋先識覽察微子路拯溺者其人拜之以牛子路受之孔子曰魯人必拯溺者矣孔子見之以細觀化遠也淮南子道應訓魯國之法魯人為人妾於諸侯有能贖之者取金於府子貢贖魯人於諸侯來而辭不受金孔子曰賜失之矣夫聖人之舉事也可以移風易俗而受教順可施後世非獨以適身之行也今國之富者寡而貧者眾贖而受金則為不廉不受金則不復贖人自今以來魯人不復贖於諸侯矣淮南子齊俗訓子路拯溺而受牛謝孔子曰魯國必好救人於患子贛贖人而不受金於府孔子曰魯國不復贖人矣子路受而勸德子贛讓而止善孔子之明以小知大以近知遠通於論者也說苑政理魯國之法魯人有贖臣妾於諸侯者取金於府子貢贖人於諸侯而還其金孔子聞之曰賜失之矣聖人之舉事也可以移風易俗而教導可施於百姓非獨適其身之行也今魯國富者寡而貧者眾贖而受金則為不廉不受則後莫復贖自今以來魯人不復贖矣呂氏春秋審應覽具備宓子賤治亶父恐魯君之聽說人而令已不得行其術也將辭而行請近吏二人於魯君與之俱至於亶父邑吏皆朝宓子賤令吏二人書吏方將書宓子賤從旁時掣搖其肘吏書之不善則宓子賤為之怒吏甚患之辭而請歸宓子賤曰子之書甚不善子勉歸矣二吏歸報於君曰宓子不可為書君曰何故吏對曰宓子使臣書而掣搖臣之肘書惡而有甚怒吏皆笑宓子此臣所以辭而去也魯君太息而歎曰宓子以此諫寡人之不肖也寡人之亂子而令宓子不得行其術必數有之矣微二人寡人幾過遂發所愛而令之亶父告宓子曰自今以來亶父非寡人之有也子之有也有便於亶父者子決為之矣五歲而言其要宓子敬諾乃得行其術於亶父三年巫馬旗短褐衣敝裘而往觀化於亶父見夜漁者得則舍之巫馬旗問之曰漁為得也今子得而舍之何也對曰宓子不欲人之取小魚也所舍者小魚也巫馬旗歸告孔子曰宓子之德至矣使小民暗行若有嚴刑於旁敢問宓子何以至於此孔子曰丘嘗與之言曰誠乎此者刑乎彼宓子必行此術於亶父也新序雜事二魯君使宓子賤為單父宰子賤辭去因請借善書者二人使書憲書教品魯君與之至單父使書子賤從旁引其肘書醜則怒之欲好書則又引之書者患之請辭而去歸以告魯君魯君曰子賤苦吾擾之使不得施其善政也乃命有司無得擅征發單父單父之化大治故孔子曰君子哉子賤魯無君者斯安取斯美其德也淮南子道應訓季子治亶父三年而巫馬期才衣短褐易容貌往觀化焉見夜魚釋之巫馬期問焉曰凡子所為魚者欲得也今得而釋之何也漁者對曰季子不欲人取小魚也所得者小魚是以釋之巫馬期歸以報孔子曰季子之德至矣使人暗行若有嚴刑在其側者季子何以至於此孔子曰丘嘗問之以治言曰誡於此者刑於彼季子必行此術也水經泗水注宓子賤之治也孔子使巫馬期觀政入其境見夜漁者問曰子得魚輒放何也曰小者吾大夫欲長育之故也子聞之曰誠彼刑此子賤得之善矣惜哉不齊所治者小也鹽鐵論憂邊孔子曰不通於論者難於言治道不同者不相與謀新序雜事五孔子北之山戎氏有婦人哭於路者其哭甚哀孔子立輿而問曰曷為哭哀至於此也婦人對曰往年虎食我夫今虎食我子是以哀也孔子曰嘻若是則曷為不去也曰其政平其吏不苛吾以是不能去也孔子顧子貢曰弟子記之夫政之不平而吏苛乃甚於虎狼矣詩云降喪饑饉斬伐四國夫政不平也乃斬伐四國而況二人乎其不去宜哉論衡遭虎孔子行魯林中婦人哭甚哀使子貢問之何以哭之哀也曰去年虎食吾夫今年食吾子是以哭哀也子貢曰若此何不去也對曰吾善其政之不苛吏之不暴也子貢還報孔子孔子曰弟子識諸苛政暴吏甚於虎也說苑建本子貢問為政孔子曰富之既富乃教之也此治國之本也說苑政理齊桓公出獵逐鹿而走入山谷之中見一老公而問之曰是為何穀對曰為愚公之穀桓公曰何故對曰以臣名之桓公曰今視公之儀狀非愚人也何為以公名對曰臣請陳之臣故畜牸牛生子而大賣之而買駒少年曰牛不能生馬遂持駒去傍鄰聞之以臣為愚故名此穀為愚公之穀桓公曰公誠愚矣夫何為而與之桓公遂歸明日朝以告管仲管仲正衿再拜曰此夷吾之愚也使堯在上咎繇為理安有取人之駒者乎若有見暴如是叟者又必不與也公知獄訟之不正故與之耳請退而修政孔子曰弟子記之桓公霸君也管仲賢佐也猶有以智為愚者也況不及桓公管仲者也說苑政理魯哀公問政於孔子對曰政有使民富且壽哀公曰何謂也孔子曰薄賦斂則民富無事則遠罪遠罪則民壽公曰若是則寡人貧矣孔子曰詩云凱悌君子民之父母未見其子富而父母貧者也說苑政理宓子賤為單父宰辭於夫子夫子曰毋迎而距也毋望而許也許之則失守距之則閉塞譬如高山深淵仰之不可極度之不可測也子賤曰善敢不承命乎說苑政理孔子弟子有孔蔑者與宓子賤皆仕孔子往過孔蔑問之曰自子之仕者何得何亡孔蔑曰自吾仕者未有所得而有所亡者三曰王事若襲學焉得習以是學不得明也所亡者一也奉祿少鬻鬻不足及親戚親戚益疏矣所亡者二也公事多急不得吊死視病是以朋友益疏矣所亡者三也孔子不說而復往見子賤曰自子之仕何得何亡子賤曰自吾之仕未有所亡而所得者三始誦之文今履而行之是學日益明也所得者一也奉祿雖少鬻鬻得及親戚是以親戚益親也所得者二也公事雖急夜勤吊死視病是以朋友益親也所得者三也孔子謂子賤曰君子哉若人君子哉若人魯無君子者斯焉取斯說苑政理子路治蒲見於孔子曰由願受教孔子曰蒲多壯士又難治也然吾語汝恭以敬可以攝勇寬以正可以容眾恭以潔可以親上說苑政理子貢為信陽令辭孔子而行孔子曰力之順之因子之時無奪無伐無暴無盜子貢曰賜少日事君子君子固有盜者邪孔子曰夫以不肖伐賢是謂奪也以賢伐不肖是謂伐也緩其令急其誅是謂暴也取人善以自為己是謂盜也君子之盜豈必當財幣乎吾聞之曰知為吏者奉法利民不知為吏者枉法以侵民此皆怨之所由生也臨官莫如平臨財莫如廉廉平之守不可攻也匿人之善者是謂蔽賢也揚人之惡者是謂小人也不內相教而外相謗者是謂不足親也言人之善者有所得而無所傷也言人之惡者無所得而有所傷也故君子慎言語矣毋先己而後人擇言出之令口如耳說苑政理孔子見季康子康子未說孔子又見之宰予曰吾聞之夫子曰王公不聘不動今吾子之見司寇也少數矣孔子曰魯國以眾相陵以兵相暴之日久矣而有司不治聘我者其孰大乎於是魯人聞之曰聖人將治可以不先自為刑罰乎自是之後國無爭者孔子謂弟子曰違山十里蟪蛄之聲猶尚存耳政事無如膺之矣續博物志十孔子曰違山十里蟪蛄之聲猶在於耳政事惡嘩而善肅說苑尊賢齊桓公使管仲治國管仲對曰賤不能臨貴桓公以為上卿而國不治桓公曰何故管仲對曰貧不能使富桓公賜之齊國市租一年而國不治桓公曰何故對曰疏不能制親桓公立以為仲父齊國大安而遂霸天下孔子曰管仲之賢不得此三權者亦不能使其君南面而霸矣說苑尊賢子路問於孔子曰治國何如孔子曰在於尊賢而賤不肖子路曰範中行氏尊賢而賤不肖其亡何也曰範中行氏尊賢而不能用也賤不肖而不能去也賢者知其不己用而怨之不肖者知其賤己而仇之賢者怨之不肖者仇之怨仇並前中行氏雖欲無亡得乎說苑指武魯哀公問於仲尼曰吾欲小則守大則攻其道若何仲尼曰若朝廷有禮上下有親民之眾皆君之畜也君將誰攻若朝廷無禮上下無親民眾皆君之仇也君將誰與守說苑雜言孔子曰鞭樸之子不從父之教刑戮之民不從君之政言疾之難行故君子不急斷不意使以為亂源中論慎所從孔子曰知不可由斯知所由矣金樓子立言下子曰滌杯而食洗爵而飲可以養家客未可以饗三軍兕虎在後隋珠在前弗及掇珠先避後患聞雷掩耳見電瞑目耳聞所惡不如無聞目見所惡不如無見火可見而不可握水可循而不可毀故有象之屬莫貴於火有形之類莫尊於水身曲影直者未之聞也用百人之所能則百人之力舉譬若伐樹而引其本千枝萬葉莫能弗從也亢倉子農道孔子之言冬飽則身溫夏飽則身涼
